ительный союз отправляет спрягаемый глагол в конец: weil ich Zeit habe.","russianTrap":"Ловушка: weil ich habe Zeit. Это русская логика порядка слов, но не немецкая.","germanLogic":"Придаточное предложение в немецком закрывается глаголом.","formula":"weil/dass/wenn/obwohl + подлежащее + ... + Verb","typicalMistakes":["weil ich habe Zeit","dass er kommt heute","wenn ich habe Zeit"],"grammarTables":[{"title":"Союзы и порядок слов","headers":["Союз","Смысл","Порядок"],"rows":[["weil","потому что","глагол в конце"],["dass","что","глагол в конце"],["wenn","если/когда","глагол в конце"],["obwohl","хотя","глагол в конце"],["ob","ли","глагол в конце"]]},{"title":"Цель","headers":["Конструкция","Когда","Пример"],"rows":[["um ... zu","один субъект","Ich lerne, um besser zu sprechen."],["damit","разные субъекты","Ich erkläre es, damit du es verstehst."]]}],"whyForRussian":"Этот блок добавлен специально для русскоговорящего ученика: сначала сравниваем с русской логикой, потом показываем немецкий механизм и только после этого тренируем форму.","visualSchemes":[{"title":"Русская мысль -> немецкая форма","steps":[{"label":"1","title":"Смысл","text":"Что я хочу сказать по-русски?"},{"label":"2","title":"Форма","text":"Какой немецкий механизм нужен?","de":"Verb, Artikel, Kasus"},{"label":"3","title":"Контроль","text":"Проверяю порядок, падеж и регистр."}],"bars":[{"label":"смысл","value":70},{"label":"форма","value":90},{"label":"перевод","value":45}]}]},{"id":"b2-16-","level":"B2","order":16,"module":"B2 уверенное владение","title":"Управление глаголов и коллокации","goal":"Учить глаголы как готовые блоки.","rule":"На B2 ошибка в предлоге часто звучит заметнее, чем ошибка в слове. Учите блок: Einfluss nehmen auf, zur Verfügung stehen, eine Rolle spielen, Wert legen auf.","examples":[{"de":"Diese Faktoren nehmen Einfluss auf die Entscheidung.","ru":"Эти факторы влияют на решение."},{"de":"Ich lege großen Wert auf klare Kommunikation.","ru":"Я придаю большое значение ясной коммуникации."},{"de":"Weitere Informationen stehen zur Verfügung.","ru":"Дополнительная информация доступна."}],"drills":[{"q":"Wert legen ...","options":["auf + Akk.","an + Dat.","für + Dat."],"answer":0,"explanation":"Правильно: «auf + Akk.». Немецкий предлог учится вместе с падежом и глаголом управления, потому что русский предлог часто не совпадает.","topic":""},{"q":"Einfluss nehmen ...","options":["auf","mit","bei"],"answer":0,"explanation":"Правильно: «auf». Немецкий предлог учится вместе с падежом и глаголом управления, потому что русский предлог часто не совпадает.","topic":""},{"q":"zur Verfügung stehen =","options":["быть доступным","закрывать","сомневаться"],"answer":0,"explanation":"Правильно: «быть доступным». Немецкий предлог учится вместе с падежом и глаголом управления, потому что русский предлог часто не совпадает.","topic":""}],"tags":["collocations"],"deepTheoryRu":"Предлоги в немецком жёстко управляют падежом. Русский перевод часто не помогает. Нужно учить блок: mit + Dativ, für + Akkusativ, aufgrund + Genitiv.","russianTrap":"Ловушка: выбирать падеж по русскому переводу. Например «с автобусом» не помогает — mit всегда требует Dativ.","germanLogic":"Предлог заранее задаёт форму артикля и местоимения.","formula":"предлог + падеж: mit dem Bus, für den Termin, wegen des Problems","typicalMistakes":["mit den Bus","für dem Termin","aufgrund die Kosten"],"grammarTables":[{"title":"Предлоги по падежам","headers":["Akkusativ","Dativ","Genitiv"],"rows":[["durch","aus","aufgrund"],["für","bei","wegen"],["gegen","mit","trotz"],["ohne","nach","während"],["um","zu","hinsichtlich"]]}],"whyForRussian":"Этот блок добавлен специально для русскоговорящего ученика: сначала сравниваем с русской логикой, потом показываем немецкий механизм и только после этого тренируем форму.","visualSchemes":[{"title":"Русская мысль -> немецкая форма","steps":[{"label":"1","title":"Смысл","text":"Что я хочу сказать по-русски?"},{"label":"2","title":"Форма","text":"Какой немецкий механизм нужен?","de":"Verb, Artikel, Kasus"},{"label":"3","title":"Контроль","text":"Проверяю порядок, падеж и регистр."}],"bars":[{"label":"смысл","value":70},{"label":"форма","value":90},{"label":"перевод","value":45}]}]},{"id":"b2-17-","level":"B2","order":17,"module":"B2 уверенное владение","title":"Отрицание, частицы, нюанс","goal":"Смягчать и уточнять позицию.","rule":"Nicht/kein — база. B2 добавляет kaum, weder...noch, keineswegs, nicht unbedingt, zwar...aber, doch, eben, wohl. Эти слова меняют тон.","examples":[{"de":"Das ist nicht unbedingt problematisch.","ru":"Это не обязательно проблематично."},{"de":"Der Vorschlag ist keineswegs unrealistisch.","ru":"Предложение вовсе не нереалистично."},{"de":"Zwar ist die Lösung teuer, aber sie ist nachhaltig.","ru":"Хотя решение дорогое, оно устойчивое."}],"drills":[{"q":"keineswegs значит...","options":["вовсе не","иногда","поэтому"],"answer":0,"explanation":"Правильно: «вовсе не». Артикль нужно учить вместе с существительным: он показывает род, число и падеж, которых в русском нет в такой форме.","topic":""},{"q":"zwar ... aber выражает...","options":["уступку/баланс","причину","время"],"answer":0,"explanation":"Правильно: «уступку/баланс». Артикль нужно учить вместе с существительным: он показывает род, число и падеж, которых в русском нет в такой форме.","topic":""},{"q":"nicht unbedingt =","options":["не обязательно","никогда","всегда"],"answer":0,"explanation":"Правильно: «не обязательно». Артикль нужно учить вместе с существительным: он показывает род, число и падеж, которых в русском нет в такой форме.","topic":""}],"tags":["particles"],"deepTheoryRu":"В русском нет артиклей, поэтому русскоговорящий часто хочет учить только слово. В немецком это ошибка: существительное надо учить вместе с der/die/das, потому что род влияет на Akkusativ, Dativ, Genitiv и окончания прилагательных.","russianTrap":"Ловушка: учить Termin без der. Потом сложно понять, почему einen Termin, mit dem Termin, wegen des Termins.","germanLogic":"Артикль — это не украшение, а грамматическая метка рода, числа и падежа.","formula":"слово = артикль + существительное + пример: der Termin — Ich habe einen Termin.","typicalMistakes":["учить слово без артикля","путать der/die/das","не менять мужской род в Akkusativ"],"grammarTables":[{"title":"Артикли в Nominativ","headers":["Род/число","Определённый","Неопределённый","Пример"],"rows":[["мужской","der","ein","der Termin / ein Termin"],["женский","die","eine","die Frage / eine Frage"],["средний","das","ein","das Formular / ein Formular"],["множественное","die","-","die Unterlagen"]]},{"title":"Мини-логика артикля","headers":["Функция","Что показывает","Почему важно"],"rows":[["род","der/die/das","влияет на падеж"],["падеж","den/dem/des...","показывает роль слова"],["число","die Plural","множественное часто отличается"]]}],"whyForRussian":"Этот блок добавлен специально для русскоговорящего ученика: сначала сравниваем с русской логикой, потом показываем немецкий механизм и только после этого тренируем форму.","visualSchemes":[{"title":"Русская мысль -> немецкая форма","steps":[{"label":"1","title":"Смысл","text":"Что я хочу сказать по-русски?"},{"label":"2","title":"Форма","text":"Какой немецкий механизм нужен?","de":"Verb, Artikel, Kasus"},{"label":"3","title":"Контроль","text":"Проверяю порядок, падеж и регистр."}],"bars":[{"label":"смысл","value":70},{"label":"форма","value":90},{"label":"перевод","value":45}]}]},{"id":"b2-18-","level":"B2","order":18,"module":"B2 уверенное владение","title":"Письменный стиль и редемиттель","goal":"Писать структурированно и не слишком тяжело.","rule":"B2-текст: тезис → аргументы → пример → контраргумент → вывод. Используйте связки осознанно: zunächst, darüber hinaus, hingegen, abschließend.","examples":[{"de":"Zunächst sollte man berücksichtigen, dass...","ru":"Сначала следует учесть, что..."},{"de":"Dafür spricht vor allem, dass...","ru":"В пользу этого говорит прежде всего то, что..."},{"de":"Abschließend lässt sich sagen, dass...","ru":"В заключение можно сказать, что..."}],"drills":[{"q":"Фраза для вывода:","options":["Abschließend lässt sich sagen...","Am Montag bin ich...","Ich heiße..."],"answer":0,"explanation":"Правильно: «Abschließend lässt sich sagen...». Для русскоговорящего здесь важен не перевод, а звук: немецкое буквосочетание читается стабильно, но не по-русски и не по-английски.","topic":""},{"q":"hingegen выражает...","options":["контраст","причину","будущее"],"answer":0,"explanation":"Правильно: «контраст». Для русскоговорящего здесь важен не перевод, а звук: немецкое буквосочетание читается стабильно, но не по-русски и не по-английски.","topic":""},{"q":"Текст B2 должен иметь...","options":["структуру","только длинные слова","без примеров"],"answer":0,"explanation":"Правильно: «структуру». Для русскоговорящего здесь важен не перевод, а звук: немецкое буквосочетание читается стабильно, но не по-русски и не по-английски.","topic":""}],"tags":["writing"],"deepTheoryRu":"Русскоговорящему важно сразу отделить немецкое чтение от английского и русского. Немецкий в основном читается стабильнее английского, но есть группы букв, которые нельзя читать по-русски: ei = ай, ie = долгое и, sch = ш, sp/st в начале часто шп/шт.","russianTrap":"Ловушка: видеть латинские буквы и читать их как английские или русские. Например mein — не «меин», а примерно «майн».","germanLogic":"Немецкая логика: сначала выучи устойчивые буквосочетания, потом слово читается почти механически.","formula":"буква/сочетание → звук → пример: ei → ай → mein; sch → ш → Deutsch","typicalMistakes":["читать ei как «еи»","произносить sch как «сх»","игнорировать умлауты ä/ö/ü"],"grammarTables":[{"title":"Главные сочетания","headers":["Сочетание","Звук","Пример"],"rows":[["ei","ай","mein, nein"],["ie","долгое и","Liebe, sie"],["sch","ш","Deutsch, sprechen"],["sp/st в начале","шп/шт","sprechen, stehen"]]},{"title":"Умлауты","headers":["Буква","Ориентир для русского","Пример"],"rows":[["ä","между э/е","spät"],["ö","округлённый э","schön"],["ü","округлённый и","Tür"],["ß","долгое/глухое с","Straße"]]}],"whyForRussian":"Этот блок добавлен специально для русскоговорящего ученика: сначала сравниваем с русской логикой, потом показываем немецкий механизм и только после этого тренируем форму.","visualSchemes":[{"title":"Схема чтения","steps":[{"label":"1","title":"Вижу сочетание","text":"Не читаю по-английски.","de":"ei, ie, sch, sp, st"},{"label":"2","title":"Выбираю звук","text":"Сначала звук, потом слово.","de":"mein, Liebe, sprechen"},{"label":"3","title":"Собираю фразу","text":"Читаю вслух короткими блоками.","de":"Ich spreche Deutsch."}],"bars":[{"label":"звук","value":90},{"label":"ударение","value":60},{"label":"фраза","value":70}]}]},{"id":"b2-19-b2","level":"B2","order":19,"module":"B2 уверенное владение","title":"B2-письмо и говорение","goal":"Готовить экзаменационные форматы.","rule":"Письмо: адресат, цель, структура, регистр. Говорение: позиция, аргументы, реакция на партнёра. Нужны готовые фразы, но ответ не должен звучать как шаблон без смысла.","examples":[{"de":"Ich kann Ihren Standpunkt nachvollziehen, allerdings...","ru":"Я могу понять Вашу позицию, однако..."},{"de":"Ein weiterer Aspekt, der berücksichtigt werden sollte, ist...","ru":"Ещё один аспект, который следует учитывать, — это..."},{"de":"Ich komme zu dem Schluss, dass...","ru":"Я прихожу к выводу, что..."}],"drills":[{"q":"Как мягко не согласиться?","options":["Ich kann Ihren Standpunkt nachvollziehen, allerdings...","Du hast komplett falsch.","Nein nein nein."],"answer":0,"explanation":"Правильно: «Ich kann Ihren Standpunkt nachvollziehen, allerdings...». После модального глагола смысловой глагол обычно стоит в конце в инфинитиве.","topic":""},{"q":"Ein weiterer Aspekt... добавляет...","options":["новый аргумент","время встречи","приветствие"],"answer":0,"explanation":"Правильно: «новый аргумент». В устном ответе важнее структура, чем скорость: тема, мнение, причина, пример, вывод.","topic":""},{"q":"come to conclusion =","options":["zu dem Schluss kommen","einen Termin machen","laut lesen"],"answer":0,"explanation":"Правильно: «zu dem Schluss kommen». Dativ часто нужен после mit, bei, zu, aus, von, seit, nach и для адресата помощи.","topic":""}],"tags":["exam","speaking"],"deepTheoryRu":"Konjunktiv — это не просто «сослагательное наклонение». Для B1/B2 важны две функции: Konjunktiv II для вежливости/условности и Konjunktiv I для косвенной речи.","russianTrap":"Ловушка: переводить würde как отдельное слово «бы» и забывать инфинитив в конце.","germanLogic":"Konjunktiv меняет дистанцию: делает высказывание вежливым, гипотетическим или переданным со слов другого человека.","formula":"KII: würde + Infinitiv / hätte / wäre / könnte. KI: er habe, sie sei.","typicalMistakes":["ich würde gemacht","er hat gesagt, er hat... вместо er habe","Können Sie sofort! вместо Könnten Sie..."],"grammarTables":[{"title":"Konjunktiv II","headers":["Функция","Форма","Пример"],"rows":[["вежливость","könnte","Könnten Sie mir helfen?"],["условие","wäre/hätte","Wenn ich Zeit hätte..."],["предложение","würde + Infinitiv","Ich würde mehr üben."]]},{"title":"Konjunktiv I","headers":["Обычная форма","Косвенная речь","Пример"],"rows":[["er hat","er habe","Er sagte, er habe keine Zeit."],["sie ist","sie sei","Sie erklärte, die Maßnahme sei notwendig."],["sie müssen","sie müssten","если KI совпадает, часто KII"]]}],"whyForRussian":"Этот блок добавлен специально для русскоговорящего ученика: сначала сравниваем с русской логикой, потом показываем немецкий механизм и только после этого тренируем форму.","visualSchemes":[{"title":"Русская мысль -> немецкая форма","steps":[{"label":"1","title":"Смысл","text":"Что я хочу сказать по-русски?"},{"label":"2","title":"Форма","text":"Какой немецкий механизм нужен?","de":"Verb, Artikel, Kasus"},{"label":"3","title":"Контроль","text":"Проверяю порядок, падеж и регистр."}],"bars":[{"label":"смысл","value":70},{"label":"форма","value":90},{"label":"перевод","value":45}]}]},{"id":"b2-20-b2","level":"B2","order":20,"module":"B2 уверенное владение","title":"Частые ошибки B2","goal":"Убирать то, что сильнее всего портит впечатление.","rule":"Типовые ошибки: глагол не в конце после dass/weil; неверный падеж после предлога; калька с русского; слишком длинные предложения; Genitiv/Dativ в официальном стиле без контроля.","examples":[{"de":"Falsch: weil ich habe Zeit. Richtig: weil ich Zeit habe.","ru":"Неверно/верно: потому что у меня есть время."},{"de":"Falsch: wegen dem Problem. Standard: wegen des Problems.","ru":"Разговорно/стандартно: из-за проблемы."}],"drills":[{"q":"Правильно:","options":["weil ich Zeit habe","weil ich habe Zeit","weil habe ich Zeit"],"answer":0,"explanation":"Правильно: «weil ich Zeit habe». В придаточном предложении спрягаемый глагол уходит в конец.","topic":""},{"q":"Письменный стандарт:","options":["wegen des Problems","wegen dem Problem","wegen den Problem"],"answer":0,"explanation":"Правильно: «wegen des Problems». В письменном стандарте wegen/aufgrund/trotz/während обычно требуют Genitiv.","topic":""},{"q":"Слишком длинную фразу лучше...","options":["разделить","сделать ещё длиннее","убрать пунктуацию"],"answer":0,"explanation":"Правильно: «разделить». Сравнивайте не русский перевод, а роль слова: Nominativ - кто, Akkusativ - кого/что, Dativ - кому/с кем/где, Genitiv - чей/из-за чего.","topic":""}],"tags":["errors"],"deepTheoryRu":"В русском падежи часто видны по окончанию слова. В немецком главную работу часто делает артикль: der Mann, den Mann, dem Mann, des Mannes. Поэтому нельзя переводить только по смыслу — нужно видеть роль слова в предложении.","russianTrap":"Ловушка: думать «мужчина — der Mann всегда». Но после sehen будет Ich sehe den Mann, а после mit — mit dem Mann.","germanLogic":"Немецкий падеж отвечает на роль: кто действует, кого/что затронули, кому/где/с кем, чей/из-за чего.","formula":"Nominativ = кто? Akkusativ = кого/что? Dativ = кому/где/с кем? Genitiv = чей/из-за чего?","typicalMistakes":["der Mann после sehen","mit den Bus вместо mit dem Bus","wegen dem Problem в формальном письме"],"grammarTables":[{"title":"Артикли по падежам","headers":["Падеж","муж.","жен.","сред.","мн."],"rows":[["Nominativ","der/ein","die/eine","das/ein","die/-"],["Akkusativ","den/einen","die/eine","das/ein","die/-"],["Dativ","dem/einem","der/einer","dem/einem","den + -n"],["Genitiv","des/eines","der/einer","des/eines","der/-"]]},{"title":"Роль падежа","headers":["Падеж","Вопрос","Пример"],"rows":[["Nominativ","кто/что?","Der Arzt hilft."],["Akkusativ","кого/что?","Ich sehe den Arzt."],["Dativ","кому/с кем/где?","Ich helfe dem Patienten."],["Genitiv","чей/из-за чего?","wegen des Problems"]]}],"whyForRussian":"Этот блок добавлен специально для русскоговорящего ученика: сначала сравниваем с русской логикой, потом показываем немецкий механизм и только после этого тренируем форму.","visualSchemes":[{"title":"Падежная развилка","steps":[{"label":"1","title":"Глагол/предлог","text":"Сначала ищу управление.","de":"mit, helfen, sehen"},{"label":"2","title":"Падеж","text":"Выбираю роль: Akkusativ или Dativ.","de":"Akkusativ / Dativ"},{"label":"3","title":"Артикль","text":"Меняю der/ein по таблице.","de":"den Arzt / dem Arzt"}],"bars":[{"label":"управление","value":90},{"label":"артикль","value":85},{"label":"перевод","value":40}]}]},{"id":"b2-21-fehleranalyse","level":"B2","order":21,"module":"B2 точность","title":"Самопроверка ошибок B2","goal":"Системно исправлять типовые ошибки.","rule":"На B2 важно проверять не каждое слово, а зоны риска: род/падеж, порядок V2, конец придаточного, управление глагола, стиль. Делайте короткий чек-лист перед отправкой текста.","examples":[{"de":"Aufgrund der hohen Kosten ist die Entscheidung schwierig.","ru":"Из-за высоких расходов решение сложное."},{"de":"Ich bin der Ansicht, dass regelmäßige Übung entscheidend ist.","ru":"Я считаю, что регулярная практика решающая."},{"de":"Daran muss noch gearbeitet werden.","ru":"Над этим ещё нужно работать."},{"de":"Es ist zu prüfen, ob die Form korrekt gewählt wurde.","ru":"Нужно проверить, правильно ли выбрана форма."}],"drills":[{"q":"Что проверять после aufgrund?","options":["Genitiv","только Nominativ","инфинитив"],"answer":0,"explanation":"Правильно: «Genitiv». Для русскоговорящего ключевой контроль - место спрягаемого глагола. В главном предложении он стоит на позиции 2.","topic":"prepositions"},{"q":"После dass глагол стоит:","options":["в конце","на втором месте","перед dass"],"answer":0,"explanation":"Правильно: «в конце». Для русскоговорящего ключевой контроль - место спрягаемого глагола. В главном предложении он стоит на позиции 2.","topic":"clauses"},{"q":"Daran muss gearbeitet werden — это:","options":["Passiv mit Modalverb","Perfekt","Imperativ"],"answer":0,"explanation":"Правильно: «Passiv mit Modalverb». Dativ часто нужен после mit, bei, zu, aus, von, seit, nach и для адресата помощи.","topic":"passive"}],"tags":["accuracy","b2"],"deepTheoryRu":"Русский порядок слов свободнее: «Сегодня я учу немецкий» и «Я сегодня учу немецкий» звучат нормально. В немецком спрягаемый глагол — якорь предложения. В обычном утверждении он стоит на позиции 2, даже если первым стоит время, место или причина.","russianTrap":"Ловушка: переносить русский порядок напрямую: Heute ich lerne Deutsch. Немцу это ломает грамматику, потому что после Heute должен идти глагол.","germanLogic":"Немецкая логика: первое поле можно менять для акцента, но второе место закреплено за спрягаемым глаголом.","formula":"Поле 1 + Verb 2 + субъект + остальное: Heute lerne ich Deutsch.","typicalMistakes":["Heute ich lerne Deutsch","Weil ich habe Zeit","ставить два элемента перед глаголом"],"grammarTables":[{"title":"V2 в главном предложении","headers":["Тип","Правильно","Почему"],"rows":[["Обычно","Ich lerne Deutsch.","глагол lerne на позиции 2"],["Время первым","Heute lerne ich Deutsch.","Heute = поле 1, lerne = V2"],["Место первым","In Frankfurt wohne ich.","место в поле 1, глагол остаётся вторым"]]},{"title":"Где стоит глагол","headers":["Конструкция","Позиция глагола","Пример"],"rows":[["Главное предложение","2","Ich lerne Deutsch."],["Ja/Nein-вопрос","1","Haben Sie Zeit?"],["W-вопрос","2","Wo wohnen Sie?"],["Придаточное","в конце","..., weil ich Zeit habe."]]}],"whyForRussian":"Этот блок добавлен специально для русскоговорящего ученика: сначала сравниваем с русской логикой, потом показываем немецкий механизм и только после этого тренируем форму.","contrastExamples":[{"ru":"Нужно проверить, правильно ли выбрана форма.","literal":"Не так: Man muss schauen die Form.","de":"Es ist zu prüfen, ob die Form korrekt gewählt wurde.","note":"B2-стиль использует нейтральную проверочную формулу."}],"visualSchemes":[{"title":"Граф предложения V2","steps":[{"label":"1","title":"Поле 1","text":"Тема, время или место.","de":"Heute"},{"label":"2","title":"Verb 2","text":"Спрягаемый глагол закреплён.","de":"lerne"},{"label":"3","title":"Субъект","text":"Если первым было не ich, субъект идёт после глагола.","de":"ich"},{"label":"4","title":"Рамка","text":"Остальное закрывает смысл.","de":"Deutsch."}],"bars":[{"label":"V2","value":95},{"label":"рамка","value":75},{"label":"акцент","value":55}]}]},{"id":"b2-22-register","level":"B2","order":22,"module":"B2 стиль","title":"Регистр: разговорно vs официально","goal":"Выбирать стиль под ситуацию.","rule":"B2 требует различать стиль. В письме в учреждение лучше: Ich bitte um Rückmeldung. В разговоре с другом можно проще: Sag mir bitte Bescheid.","examples":[{"de":"Ich bitte um eine kurze Rückmeldung.","ru":"Прошу коротко ответить."},{"de":"Könntest du mir Bescheid sagen?","ru":"Мог бы ты мне сообщить?"},{"de":"Die Unterlagen wurden bereits eingereicht.","ru":"Документы уже были поданы."}],"drills":[{"q":"Официальнее звучит:","options":["Ich bitte um Rückmeldung.","Sag mal schnell.","Gib Antwort."],"answer":0,"explanation":"Правильно: «Ich bitte um Rückmeldung.». Это нейтральная официальная формула; она звучит естественнее дословной русской кальки.","topic":"style"},{"q":"Bescheid sagen — это:","options":["сообщить","лечить","запретить"],"answer":0,"explanation":"Правильно: «сообщить». В официальном немецком важны нейтральный тон, точная просьба и стандартные формулы, а не дословная русская канцелярская фраза.","topic":"style"},{"q":"wurden eingereicht — это:","options":["Passiv Präteritum","Akkusativ","Imperativ"],"answer":0,"explanation":"Правильно: «Passiv Präteritum». В официальном немецком важны нейтральный тон, точная просьба и стандартные формулы, а не дословная русская канцелярская фраза.","topic":"passive"}],"tags":["style","writing"],"deepTheoryRu":"Для русскоговорящего письмо на немецком сложно не только грамматикой, но и регистром. Немецкое официальное письмо требует ясной структуры, нейтрального тона и точных просьб.","russianTrap":"Ловушка: писать слишком эмоционально или слишком прямо, как в устном русском. В немецком официальном стиле лучше спокойная формула.","germanLogic":"Официальное письмо — это не художественный текст, а управляемая структура: причина, факт, просьба, срок, финал.","formula":"Anrede → Grund → Details → Bitte/Forderung → Frist → Schlussformel","typicalMistakes":["Hallo в официальном письме","Mach schnell","слишком длинное предложение без структуры"],"grammarTables":[{"title":"Официальное письмо","headers":["Часть","Фраза","Задача"],"rows":[["Обращение","Sehr geehrte Damen und Herren,","безопасный старт"],["Причина","Ich wende mich an Sie, weil...","объяснить цель"],["Просьба","Ich bitte um Rückmeldung.","сказать, что нужно"],["Срок","bis zum 15. August","дать рамку"],["Финал","Mit freundlichen Grüßen","официально закрыть"]]}],"whyForRussian":"Этот блок добавлен специально для русскоговорящего ученика: сначала сравниваем с русской логикой, потом показываем немецкий механизм и только после этого тренируем форму.","visualSchemes":[{"title":"Схема официального текста","steps":[{"label":"1","title":"Цель","text":"Сразу назвать Anliegen.","de":"Hiermit möchte ich..."},{"label":"2","title":"Факт","text":"Коротко и проверяемо.","de":"Der Termin wurde nicht eingehalten."},{"label":"3","title":"Просьба","text":"Вежливо и конкретно.","de":"Ich bitte um Rückmeldung."},{"label":"4","title":"Формула","text":"Закрыть стандартно.","de":"Mit freundlichen Grüßen"}],"bars":[{"label":"структура","value":90},{"label":"регистр","value":95},{"label":"эмоции","value":25}]}]},{"id":"b2-23-ersatzformen-passiv","level":"B2","order":23,"module":"B2 грамматика","title":"Альтернативы Passiv","goal":"Писать компактно без постоянного werden.","rule":"Passiv можно заменить конструкциями: sich lassen + Infinitiv, sein + zu + Infinitiv, -bar. Они часто встречаются в инструкциях и официальных текстах.","examples":[{"de":"Das Problem lässt sich lösen.","ru":"Проблему можно решить."},{"de":"Der Antrag ist bis Freitag einzureichen.","ru":"Заявление нужно подать до пятницы."},{"de":"Die Regel ist leicht verständlich.","ru":"Правило легко понятно."}],"drills":[{"q":"lässt sich lösen значит:","options":["можно решить","запрещено решать","решилось вчера"],"answer":0,"explanation":"Правильно: «можно решить». Passiv переносит фокус с исполнителя на действие или результат: wird geprüft, wurde geprüft, ist geprüft worden.","topic":"passive"},{"q":"ist einzureichen выражает:","options":["необходимость","радость","прошлое"],"answer":0,"explanation":"Правильно: «необходимость». Passiv переносит фокус с исполнителя на действие или результат: wird geprüft, wurde geprüft, ist geprüft worden.","topic":"passive"},{"q":"verständlicher Text =","options":["понятный текст","дорогой текст","устный текст"],"answer":0,"explanation":"Правильно: «понятный текст». Passiv переносит фокус с исполнителя на действие или результат: wird geprüft, wurde geprüft, ist geprüft worden.","topic":"word-formation"}],"tags":["passive","style"],"deepTheoryRu":"В русском можно сказать «заявление проверяют» без указания исполнителя. В немецком для этого часто используется Passiv: Der Antrag wird geprüft. Это особенно важно в официальном стиле.","russianTrap":"Ловушка: пытаться всегда переводить через man. Man prüft den Antrag возможно, но Passiv звучит официальнее и нейтральнее.","germanLogic":"Passiv ставит действие в центр, а исполнителя убирает или делает второстепенным.","formula":"werden + Partizip II: wird geprüft; wurde geprüft; ist geprüft worden","typicalMistakes":["Der Antrag ist prüfen","wurde gepruft без Partizip II","путать Zustandspassiv и Vorgangspassiv"],"grammarTables":[{"title":"Passiv","headers":["Время/тип","Форма","Пример"],"rows":[["Präsens","wird + Partizip II","Der Antrag wird geprüft."],["Präteritum","wurde + Partizip II","Der Antrag wurde geprüft."],["Perfekt","ist + Partizip II + worden","Der Antrag ist geprüft worden."],["Zustand","sein + Partizip II","Die Praxis ist geschlossen."]]},{"title":"Замены Passiv","headers":["Конструкция","Смысл","Пример"],"rows":[["man","кто-то делает","Man prüft den Antrag."],["sich lassen","можно сделать","Das lässt sich lösen."],["sein + zu","нужно сделать","Der Antrag ist zu prüfen."],["-bar","возможно","verständlich, lösbar"]]}],"whyForRussian":"Этот блок добавлен специально для русскоговорящего ученика: сначала сравниваем с русской логикой, потом показываем немецкий механизм и только после этого тренируем форму.","visualSchemes":[{"title":"Русская мысль -> немецкая форма","steps":[{"label":"1","title":"Смысл","text":"Что я хочу сказать по-русски?"},{"label":"2","title":"Форма","text":"Какой немецкий механизм нужен?","de":"Verb, Artikel, Kasus"},{"label":"3","title":"Контроль","text":"Проверяю порядок, падеж и регистр."}],"bars":[{"label":"смысл","value":70},{"label":"форма","value":90},{"label":"перевод","value":45}]}]},{"id":"b2-24-wissenschaftssprache","level":"B2","order":24,"module":"B2 стиль","title":"Нейтральная аргументация","goal":"Избегать слишком эмоционального стиля.","rule":"В B2-письме часто нужен нейтральный тон: Es lässt sich feststellen…, Zu berücksichtigen ist…, Daraus ergibt sich…. Это не делает текст C1, но повышает точность.","examples":[{"de":"Es lässt sich feststellen, dass die Nachfrage steigt.","ru":"Можно установить, что спрос растёт."},{"de":"Zu berücksichtigen ist der zeitliche Aufwand.","ru":"Нужно учитывать временные затраты."},{"de":"Daraus ergibt sich ein weiterer Vorteil.","ru":"Из этого следует ещё одно преимущество."}],"drills":[{"q":"Нейтральная фраза для вывода:","options":["Daraus ergibt sich…","Mega cool ist…","Ich finde krass…"],"answer":0,"explanation":"Правильно: «Daraus ergibt sich…». Связка занимает поле предложения и влияет на порядок слов: deshalb/trotzdem требуют глагол сразу после себя.","topic":"style"},{"q":"Zu berücksichtigen ist… значит:","options":["следует учитывать…","можно забыть…","это смешно…"],"answer":0,"explanation":"Правильно: «следует учитывать…». Связка занимает поле предложения и влияет на порядок слов: deshalb/trotzdem требуют глагол сразу после себя.","topic":"style"},{"q":"Es lässt sich feststellen… подходит для:","options":["официального текста","ругательства","команды собаке"],"answer":0,"explanation":"Правильно: «официального текста». Связка занимает поле предложения и влияет на порядок слов: deshalb/trotzdem требуют глагол сразу после себя.","topic":"style"}],"tags":["style","argumentation"],"deepTheoryRu":"Связки в немецком опасны тем, что меняют порядок слов. Русскоговорящий часто переводит связку и сохраняет русский порядок. В немецком важно знать: связка занимает позицию или нет.","russianTrap":"Ловушка: Deshalb ich lerne Deutsch. После deshalb сразу глагол: Deshalb lerne ich Deutsch.","germanLogic":"Связки делятся на 0-позицию, 1-позицию и подчинительные союзы.","formula":"deshalb/trotzdem/dennoch + Verb + Subjekt; weil/dass/obwohl + ... + Verb","typicalMistakes":["Deshalb ich lerne","Obwohl es ist schwierig","Denn требует глагол в конец"],"grammarTables":[{"title":"Связки и позиция","headers":["Тип","Связки","Порядок"],"rows":[["0-позиция","und, aber, denn, sondern, oder","после них обычный порядок"],["1-позиция","deshalb, trotzdem, dennoch, folglich","сразу V2"],["подчинительные","weil, dass, obwohl, während, sofern","глагол в конце"]]}],"whyForRussian":"Этот блок добавлен специально для русскоговорящего ученика: сначала сравниваем с русской логикой, потом показываем немецкий механизм и только после этого тренируем форму.","visualSchemes":[{"title":"Русская мысль -> немецкая форма","steps":[{"label":"1","title":"Смысл","text":"Что я хочу сказать по-русски?"},{"label":"2","title":"Форма","text":"Какой немецкий механизм нужен?","de":"Verb, Artikel, Kasus"},{"label":"3","title":"Контроль","text":"Проверяю порядок, падеж и регистр."}],"bars":[{"label":"смысл","value":70},{"label":"форма","value":90},{"label":"перевод","value":45}]}]},{"id":"b2-25-medizin-aufklaerung","level":"B2","order":25,"module":"Профиль: медицина","title":"Медицинское разъяснение и согласие","goal":"Понимать лексику консультации и рисков.","rule":"В медицине важны нейтральные формулы: über Risiken aufklären, eine Einwilligung einholen, den Befund besprechen, die Nachsorge planen.","examples":[{"de":"Die Patientin wurde über mögliche Risiken aufgeklärt.","ru":"Пациентку проинформировали о возможных рисках."},{"de":"Vor dem Eingriff muss die Einwilligung vorliegen.","ru":"До вмешательства должно быть согласие."},{"de":"Die Nachsorge sollte sorgfältig geplant werden.","ru":"Послеоперационное наблюдение нужно тщательно спланировать."}],"drills":[{"q":"aufklären über значит:","options":["информировать о","платить за","отменять"],"answer":0,"explanation":"Правильно: «информировать о». В медицинском немецком важны точность, нейтральный тон, риск, согласие и последующее наблюдение.","topic":"medical"},{"q":"Einwilligung =","options":["согласие","счёт","направление"],"answer":0,"explanation":"Правильно: «согласие». В медицинском немецком важны точность, нейтральный тон, риск, согласие и последующее наблюдение.","topic":"medical"},{"q":"sollte geplant werden — это:","options":["Passiv mit Modalverb","Imperativ","Genitiv"],"answer":0,"explanation":"Правильно: «Passiv mit Modalverb». Dativ часто нужен после mit, bei, zu, aus, von, seit, nach и для адресата помощи.","topic":"passive"}],"tags":["medical","profile"],"deepTheoryRu":"Медицинский немецкий требует нейтральности и точности. Нельзя звучать рекламно или давить на пациента. Важны цель, риск, альтернатива, согласие и Nachsorge.","russianTrap":"Ловушка: переводить медицинские фразы буквально с русского и терять нейтральный тон.","germanLogic":"В медицине грамматика служит ясности: кто информирует, о чём, какие риски, какое согласие.","formula":"über Risiken aufklären → Einwilligung einholen → Nachsorge planen","typicalMistakes":["рекламный стиль вместо нейтрального","не различать Aufklärung и Einwilligung","не указывать риски"],"grammarTables":[{"title":"Медицинская консультация","headers":["Этап","Немецкая формула","Смысл"],"rows":[["Анамнез","die Anamnese erheben","собрать историю"],["Объяснение","über Risiken aufklären","информировать о рисках"],["Согласие","eine Einwilligung einholen","получить согласие"],["Контроль","die Nachsorge planen","спланировать наблюдение"]]}],"whyForRussian":"Этот блок добавлен специально для русскоговорящего ученика: сначала сравниваем с русской логикой, потом показываем немецкий механизм и только после этого тренируем форму.","visualSchemes":[{"title":"Русская мысль -> немецкая форма","steps":[{"label":"1","title":"Смысл","text":"Что я хочу сказать по-русски?"},{"label":"2","title":"Форма","text":"Какой немецкий механизм нужен?","de":"Verb, Artikel, Kasus"},{"label":"3","title":"Контроль","text":"Проверяю порядок, падеж и регистр."}],"bars":[{"label":"смысл","value":70},{"label":"форма","value":90},{"label":"перевод","value":45}]}]},{"id":"b2-26-schweiz-formal","level":"B2","order":26,"module":"Профиль: Швейцария","title":"Швейцарские официальные слова","goal":"Узнавать лексику, отличающуюся от Германии.","rule":"В Швейцарии часто встречаются слова: das Spital, der Entscheid, die Offerte, parkieren. В официальной переписке используйте нейтральный стандартный немецкий.","examples":[{"de":"Die Offerte wird Ihnen per E-Mail zugestellt.","ru":"Предложение будет отправлено Вам по email."},{"de":"Der Entscheid liegt beim Kanton.","ru":"Решение находится у кантона."},{"de":"Das Spital bestätigt den Termin schriftlich.","ru":"Больница подтверждает приём письменно."}],"drills":[{"q":"Spital в Швейцарии =","options":["больница","магазин","страховка"],"answer":0,"explanation":"Правильно: «больница». В официальном немецком важны нейтральный тон, точная просьба и стандартные формулы, а не дословная русская канцелярская фраза.","topic":"swiss"},{"q":"Offerte =","options":["предложение/смета","операция","жалоба"],"answer":0,"explanation":"Правильно: «предложение/смета». В официальном немецком важны нейтральный тон, точная просьба и стандартные формулы, а не дословная русская канцелярская фраза.","topic":"swiss"},{"q":"Entscheid =","options":["решение","звонок","договор"],"answer":0,"explanation":"Правильно: «решение». В официальном немецком важны нейтральный тон, точная просьба и стандартные формулы, а не дословная русская канцелярская фраза.","topic":"swiss"}],"tags":["swiss","profile"],"deepTheoryRu":"Konjunktiv — это не просто «сослагательное наклонение». Для B1/B2 важны две функции: Konjunktiv II для вежливости/условности и Konjunktiv I для косвенной речи.","russianTrap":"Ловушка: переводить würde как отдельное слово «бы» и забывать инфинитив в конце.","germanLogic":"Konjunktiv меняет дистанцию: делает высказывание вежливым, гипотетическим или переданным со слов другого человека.","formula":"KII: würde + Infinitiv / hätte / wäre / könnte. KI: er habe, sie sei.","typicalMistakes":["ich würde gemacht","er hat gesagt, er hat... вместо er habe","Können Sie sofort! вместо Könnten Sie..."],"grammarTables":[{"title":"Konjunktiv II","headers":["Функция","Форма","Пример"],"rows":[["вежливость","könnte","Könnten Sie mir helfen?"],["условие","wäre/hätte","Wenn ich Zeit hätte..."],["предложение","würde + Infinitiv","Ich würde mehr üben."]]},{"title":"Konjunktiv I","headers":["Обычная форма","Косвенная речь","Пример"],"rows":[["er hat","er habe","Er sagte, er habe keine Zeit."],["sie ist","sie sei","Sie erklärte, die Maßnahme sei notwendig."],["sie müssen","sie müssten","если KI совпадает, часто KII"]]}],"whyForRussian":"Этот блок добавлен специально для русскоговорящего ученика: сначала сравниваем с русской логикой, потом показываем немецкий механизм и только после этого тренируем форму.","visualSchemes":[{"title":"Схема официального текста","steps":[{"label":"1","title":"Цель","text":"Сразу назвать Anliegen.","de":"Hiermit möchte ich..."},{"label":"2","title":"Факт","text":"Коротко и проверяемо.","de":"Der Termin wurde nicht eingehalten."},{"label":"3","title":"Просьба","text":"Вежливо и конкретно.","de":"Ich bitte um Rückmeldung."},{"label":"4","title":"Формула","text":"Закрыть стандартно.","de":"Mit freundlichen Grüßen"}],"bars":[{"label":"структура","value":90},{"label":"регистр","value":95},{"label":"эмоции","value":25}]}]},{"id":"a0-13-r-h-ig-ich","level":"A0","order":13,"module":"Старт","title":"Произношение r, h и окончаний -ig/-ich","goal":"Уменьшить типичные ошибки чтения на старте.","rule":"h в начале слова произносится: Haus, haben. Окончание -ig часто звучит как -ich. Немецкое r зависит от региона, но на старте достаточно не произносить его как сильное русское «р».","examples":[{"de":"das Haus","ru":"дом"},{"de":"haben","ru":"иметь"},{"de":"wichtig","ru":"важный"},{"de":"Ich habe heute Zeit.","ru":"У меня сегодня есть время."}],"drills":[{"q":"В слове Haus буква h...","options":["произносится","всегда молчит","заменяется на ш"],"answer":0,"explanation":"Правильно: «произносится». Для русскоговорящего здесь важен не перевод, а звук: немецкое буквосочетание читается стабильно, но не по-русски и не по-английски.","topic":"pronunciation"},{"q":"-ig в wichtig часто звучит как...","options":["-их","-ик","-иг с твёрдым г"],"answer":0,"explanation":"Правильно: «-их». Для русскоговорящего здесь важен не перевод, а звук: немецкое буквосочетание читается стабильно, но не по-русски и не по-английски.","topic":"pronunciation"},{"q":"Что важнее на A0?","options":["понятное чтение","идеальный акцент","сложные диалекты"],"answer":0,"explanation":"Правильно: «понятное чтение». Для русскоговорящего здесь важен не перевод, а звук: немецкое буквосочетание читается стабильно, но не по-русски и не по-английски.","topic":"pronunciation"},{"q":"Выберите читаемое слово с h в начале:","options":["Haus","sehen","gehen"],"answer":0,"explanation":"Правильно: «Haus». Для русскоговорящего здесь важен не перевод, а звук: немецкое буквосочетание читается стабильно, но не по-русски и не по-английски.","topic":"pronunciation"}],"tags":["pronunciation","v14.2"],"deepTheoryRu":"Русскоговорящему важно сразу отделить немецкое чтение от английского и русского. Немецкий в основном читается стабильнее английского, но есть группы букв, которые нельзя читать по-русски: ei = ай, ie = долгое и, sch = ш, sp/st в начале часто шп/шт.","russianTrap":"Ловушка: видеть латинские буквы и читать их как английские или русские. Например mein — не «меин», а примерно «майн».","germanLogic":"Немецкая логика: сначала выучи устойчивые буквосочетания, потом слово читается почти механически.","formula":"буква/сочетание → звук → пример: ei → ай → mein; sch → ш → Deutsch","typicalMistakes":["читать ei как «еи»","произносить sch как «сх»","игнорировать умлауты ä/ö/ü"],"grammarTables":[{"title":"Главные сочетания","headers":["Сочетание","Звук","Пример"],"rows":[["ei","ай","mein, nein"],["ie","долгое и","Liebe, sie"],["sch","ш","Deutsch, sprechen"],["sp/st в начале","шп/шт","sprechen, stehen"]]},{"title":"Умлауты","headers":["Буква","Ориентир для русского","Пример"],"rows":[["ä","между э/е","spät"],["ö","округлённый э","schön"],["ü","округлённый и","Tür"],["ß","долгое/глухое с","Straße"]]}],"whyForRussian":"Этот блок добавлен специально для русскоговорящего ученика: сначала сравниваем с русской логикой, потом показываем немецкий механизм и только после этого тренируем форму.","visualSchemes":[{"title":"Схема чтения","steps":[{"label":"1","title":"Вижу сочетание","text":"Не читаю по-английски.","de":"ei, ie, sch, sp, st"},{"label":"2","title":"Выбираю звук","text":"Сначала звук, потом слово.","de":"mein, Liebe, sprechen"},{"label":"3","title":"Собираю фразу","text":"Читаю вслух короткими блоками.","de":"Ich spreche Deutsch."}],"bars":[{"label":"звук","value":90},{"label":"ударение","value":60},{"label":"фраза","value":70}]}]},{"id":"a0-14-topic","level":"A0","order":14,"module":"Старт","title":"Карточка слова: артикль, перевод, пример","goal":"Учить слово так, чтобы оно работало в предложении.","rule":"Минимальная карточка: der/die/das + слово, перевод, короткий пример. Так род и падежи запоминаются раньше, чем появятся сложные правила.","examples":[{"de":"der Termin — Ich habe einen Termin.","ru":"запись — У меня есть запись."},{"de":"die Frage — Ich habe eine Frage.","ru":"вопрос — У меня есть вопрос."},{"de":"das Formular — Ich fülle das Formular aus.","ru":"формуляр — Я заполняю формуляр."},{"de":"die Sprache — Ich lerne die Sprache.","ru":"язык — Я учу язык."}],"drills":[{"q":"Лучшая карточка для Termin:","options":["Termin","der Termin + пример","только перевод"],"answer":1,"explanation":"Правильно: «der Termin + пример». Артикль нужно учить вместе с существительным: он показывает род, число и падеж, которых в русском нет в такой форме.","topic":"articles"},{"q":"Что помогает падежам позже?","options":["учить артикль сразу","убирать артикль","учить только множественное число"],"answer":0,"explanation":"Правильно: «учить артикль сразу». Артикль нужно учить вместе с существительным: он показывает род, число и падеж, которых в русском нет в такой форме.","topic":"articles"},{"q":"die Frage значит...","options":["вопрос","ответ","комната"],"answer":0,"explanation":"Правильно: «вопрос». Артикль нужно учить вместе с существительным: он показывает род, число и падеж, которых в русском нет в такой форме.","topic":"vocab"},{"q":"Какой пример корректен?","options":["Ich habe eine Frage.","Ich habe ein Frage.","Ich bin Frage."],"answer":0,"explanation":"Правильно: «Ich habe eine Frage.». Perfekt строится как haben/sein + Partizip II, а Partizip обычно закрывает фразу.","topic":"articles"}],"tags":["articles","vocab","v14.2"],"deepTheoryRu":"В русском нет артиклей, поэтому русскоговорящий часто хочет учить только слово. В немецком это ошибка: существительное надо учить вместе с der/die/das, потому что род влияет на Akkusativ, Dativ, Genitiv и окончания прилагательных.","russianTrap":"Ловушка: учить Termin без der. Потом сложно понять, почему einen Termin, mit dem Termin, wegen des Termins.","germanLogic":"Артикль — это не украшение, а грамматическая метка рода, числа и падежа.","formula":"слово = артикль + существительное + пример: der Termin — Ich habe einen Termin.","typicalMistakes":["учить слово без артикля","путать der/die/das","не менять мужской род в Akkusativ"],"grammarTables":[{"title":"Артикли в Nominativ","headers":["Род/число","Определённый","Неопределённый","Пример"],"rows":[["мужской","der","ein","der Termin / ein Termin"],["женский","die","eine","die Frage / eine Frage"],["средний","das","ein","das Formular / ein Formular"],["множественное","die","-","die Unterlagen"]]},{"title":"Мини-логика артикля","headers":["Функция","Что показывает","Почему важно"],"rows":[["род","der/die/das","влияет на падеж"],["падеж","den/dem/des...","показывает роль слова"],["число","die Plural","множественное часто отличается"]]}],"whyForRussian":"Этот блок добавлен специально для русскоговорящего ученика: сначала сравниваем с русской логикой, потом показываем немецкий механизм и только после этого тренируем форму.","visualSchemes":[{"title":"Артикль как метка формы","steps":[{"label":"1","title":"Род","text":"Учить слово вместе с der/die/das.","de":"der Termin"},{"label":"2","title":"Падеж","text":"Роль меняет артикль.","de":"den Termin"},{"label":"3","title":"Фраза","text":"Сразу закреплять в примере.","de":"Ich habe einen Termin."}],"bars":[{"label":"род","value":80},{"label":"падеж","value":90},{"label":"пример","value":70}]}]},{"id":"a1-14-perfekt-sein-haben","level":"A1","order":14,"module":"Грамматика","title":"Perfekt: sein или haben","goal":"Выбирать вспомогательный глагол в прошедшем времени.","rule":"Большинство глаголов образуют Perfekt с haben. Движение с изменением места и изменение состояния часто требуют sein: kommen, gehen, fahren, aufstehen.","examples":[{"de":"Ich habe gelernt.","ru":"Я учил."},{"de":"Ich bin gekommen.","ru":"Я пришёл."},{"de":"Wir sind gefahren.","ru":"Мы поехали."},{"de":"Sie hat gearbeitet.","ru":"Она работала."}],"drills":[{"q":"lernen в Perfekt:","options":["ich habe gelernt","ich bin gelernt","ich habe lernen"],"answer":0,"explanation":"Правильно: «ich habe gelernt». Perfekt строится как haben/sein + Partizip II, а Partizip обычно закрывает фразу.","topic":"past"},{"q":"kommen в Perfekt:","options":["ich bin gekommen","ich habe gekommen","ich bin kommen"],"answer":0,"explanation":"Правильно: «ich bin gekommen». Движение с изменением места в Perfekt часто берет sein.","topic":"past"},{"q":"arbeiten в Perfekt:","options":["hat gearbeitet","ist gearbeitet","hat arbeiten"],"answer":0,"explanation":"Правильно: «hat gearbeitet». У отделяемого глагола спрягается основа, а приставка закрывает фразу в конце: rufe ... an.","topic":"past"},{"q":"fahren часто требует...","options":["sein","werden","dürfen"],"answer":0,"explanation":"Правильно: «sein». Konjunktiv I используется для косвенной речи: автор передает чужие слова дистанционно.","topic":"past"}],"tags":["past","verbs","v14.2"],"deepTheoryRu":"Отделяемые глаголы — типичная немецкая рамка. В словаре глагол пишется вместе: anrufen. В обычной фразе приставка уходит в конец: Ich rufe dich an.","russianTrap":"Ловушка: Ich anrufe dich. В главном предложении приставка отделяется.","germanLogic":"Спрягается основная часть, приставка закрывает смысл в конце.","formula":"anrufen → Ich rufe ... an","typicalMistakes":["Ich anrufe dich","Ich rufe dich auf вместо an","zu anrufen вместо anzurufen"],"grammarTables":[{"title":"Отделяемый глагол","headers":["Форма","Пример","Комментарий"],"rows":[["Infinitiv","anrufen","словарная форма"],["Präsens","Ich rufe dich an.","приставка в конце"],["Perfekt","Ich habe angerufen.","ge между приставкой и основой"],["zu + Infinitiv","anzurufen","zu внутри"]]}],"whyForRussian":"Этот блок добавлен специально для русскоговорящего ученика: сначала сравниваем с русской логикой, потом показываем немецкий механизм и только после этого тренируем форму.","visualSchemes":[{"title":"Русская мысль -> немецкая форма","steps":[{"label":"1","title":"Смысл","text":"Что я хочу сказать по-русски?"},{"label":"2","title":"Форма","text":"Какой немецкий механизм нужен?","de":"Verb, Artikel, Kasus"},{"label":"3","title":"Контроль","text":"Проверяю порядок, падеж и регистр."}],"bars":[{"label":"смысл","value":70},{"label":"форма","value":90},{"label":"перевод","value":45}]}]},{"id":"a1-15-dativ","level":"A1","order":15,"module":"Грамматика","title":"Dativ после частых предлогов","goal":"Автоматически узнавать Dativ-предлоги в быту.","rule":"После mit, bei, zu, aus, von, seit обычно стоит Dativ: mit dem Bus, bei der Ärztin, zur Schule.","examples":[{"de":"mit dem Bus","ru":"на автобусе"},{"de":"bei der Ärztin","ru":"у врачихи/на приёме"},{"de":"zu dem Termin → zum Termin","ru":"на запись/к приёму"},{"de":"aus der Schweiz","ru":"из Швейцарии"}],"drills":[{"q":"mit требует...","options":["Dativ","Akkusativ","Genitiv"],"answer":0,"explanation":"Правильно: «Dativ». Сравнивайте не русский перевод, а роль слова: Nominativ - кто, Akkusativ - кого/что, Dativ - кому/с кем/где, Genitiv - чей/из-за чего.","topic":"cases"},{"q":"bei ___ Ärztin","options":["der","die","den"],"answer":0,"explanation":"Правильно: «der». Сравнивайте не русский перевод, а роль слова: Nominativ - кто, Akkusativ - кого/что, Dativ - кому/с кем/где, Genitiv - чей/из-за чего.","topic":"cases"},{"q":"zu dem сокращается как...","options":["zum","zur","ins"],"answer":0,"explanation":"Правильно: «zum». Сравнивайте не русский перевод, а роль слова: Nominativ - кто, Akkusativ - кого/что, Dativ - кому/с кем/где, Genitiv - чей/из-за чего.","topic":"prepositions"},{"q":"aus der Schweiz — это...","options":["Dativ","Akkusativ","Nominativ"],"answer":0,"explanation":"Правильно: «Dativ». Сравнивайте не русский перевод, а роль слова: Nominativ - кто, Akkusativ - кого/что, Dativ - кому/с кем/где, Genitiv - чей/из-за чего.","topic":"cases"}],"tags":["cases","prepositions","v14.2"],"deepTheoryRu":"В русском падежи часто видны по окончанию слова. В немецком главную работу часто делает артикль: der Mann, den Mann, dem Mann, des Mannes. Поэтому нельзя переводить только по смыслу — нужно видеть роль слова в предложении.","russianTrap":"Ловушка: думать «мужчина — der Mann всегда». Но после sehen будет Ich sehe den Mann, а после mit — mit dem Mann.","germanLogic":"Немецкий падеж отвечает на роль: кто действует, кого/что затронули, кому/где/с кем, чей/из-за чего.","formula":"Nominativ = кто? Akkusativ = кого/что? Dativ = кому/где/с кем? Genitiv = чей/из-за чего?","typicalMistakes":["der Mann после sehen","mit den Bus вместо mit dem Bus","wegen dem Problem в формальном письме"],"grammarTables":[{"title":"Артикли по падежам","headers":["Падеж","муж.","жен.","сред.","мн."],"rows":[["Nominativ","der/ein","die/eine","das/ein","die/-"],["Akkusativ","den/einen","die/eine","das/ein","die/-"],["Dativ","dem/einem","der/einer","dem/einem","den + -n"],["Genitiv","des/eines","der/einer","des/eines","der/-"]]},{"title":"Роль падежа","headers":["Падеж","Вопрос","Пример"],"rows":[["Nominativ","кто/что?","Der Arzt hilft."],["Akkusativ","кого/что?","Ich sehe den Arzt."],["Dativ","кому/с кем/где?","Ich helfe dem Patienten."],["Genitiv","чей/из-за чего?","wegen des Problems"]]}],"whyForRussian":"Этот блок добавлен специально для русскоговорящего ученика: сначала сравниваем с русской логикой, потом показываем немецкий механизм и только после этого тренируем форму.","visualSchemes":[{"title":"Падежная развилка","steps":[{"label":"1","title":"Глагол/предлог","text":"Сначала ищу управление.","de":"mit, helfen, sehen"},{"label":"2","title":"Падеж","text":"Выбираю роль: Akkusativ или Dativ.","de":"Akkusativ / Dativ"},{"label":"3","title":"Артикль","text":"Меняю der/ein по таблице.","de":"den Arzt / dem Arzt"}],"bars":[{"label":"управление","value":90},{"label":"артикль","value":85},{"label":"перевод","value":40}]}]},{"id":"a1-16-a1","level":"A1","order":16,"module":"Коммуникация","title":"Письмо A1: запись и отмена","goal":"Написать короткое сообщение о записи.","rule":"A1-письмо держится на шаблонах: обращение, причина, просьба, благодарность, подпись. Не нужно писать длинно.","examples":[{"de":"Sehr geehrte Damen und Herren,","ru":"Уважаемые дамы и господа,"},{"de":"Ich möchte den Termin absagen.","ru":"Я хотел(а) бы отменить запись."},{"de":"Könnten Sie mir einen neuen Termin geben?","ru":"Не могли бы Вы дать мне новую запись?"},{"de":"Vielen Dank. Mit freundlichen Grüßen","ru":"Большое спасибо. С уважением"}],"drills":[{"q":"Что подходит для официального начала?","options":["Sehr geehrte Damen und Herren","Hallo du","Tschüss Leute"],"answer":0,"explanation":"Правильно: «Sehr geehrte Damen und Herren». В официальном немецком важны нейтральный тон, точная просьба и стандартные формулы, а не дословная русская канцелярская фраза.","topic":"formal"},{"q":"absagen значит...","options":["отменять","оплачивать","покупать"],"answer":0,"explanation":"Правильно: «отменять». В официальном немецком важны нейтральный тон, точная просьба и стандартные формулы, а не дословная русская канцелярская фраза.","topic":"vocab"},{"q":"Вежливая просьба:","options":["Könnten Sie...?","Du musst...","Mach!"],"answer":0,"explanation":"Правильно: «Könnten Sie...?». Konjunktiv II звучит вежливо или гипотетически, что важно для B1/B2.","topic":"politeness"},{"q":"Финальная формула:","options":["Mit freundlichen Grüßen","Keine Ahnung","Bis später Alter"],"answer":0,"explanation":"Правильно: «Mit freundlichen Grüßen». Dativ часто нужен после mit, bei, zu, aus, von, seit, nach и для адресата помощи.","topic":"formal"}],"tags":["letter","formal","v14.2"],"deepTheoryRu":"Для русскоговорящего письмо на немецком сложно не только грамматикой, но и регистром. Немецкое официальное письмо требует ясной структуры, нейтрального тона и точных просьб.","russianTrap":"Ловушка: писать слишком эмоционально или слишком прямо, как в устном русском. В немецком официальном стиле лучше спокойная формула.","germanLogic":"Официальное письмо — это не художественный текст, а управляемая структура: причина, факт, просьба, срок, финал.","formula":"Anrede → Grund → Details → Bitte/Forderung → Frist → Schlussformel","typicalMistakes":["Hallo в официальном письме","Mach schnell","слишком длинное предложение без структуры"],"grammarTables":[{"title":"Официальное письмо","headers":["Часть","Фраза","Задача"],"rows":[["Обращение","Sehr geehrte Damen und Herren,","безопасный старт"],["Причина","Ich wende mich an Sie, weil...","объяснить цель"],["Просьба","Ich bitte um Rückmeldung.","сказать, что нужно"],["Срок","bis zum 15. August","дать рамку"],["Финал","Mit freundlichen Grüßen","официально закрыть"]]}],"whyForRussian":"Этот блок добавлен специально для русскоговорящего ученика: сначала сравниваем с русской логикой, потом показываем немецкий механизм и только после этого тренируем форму.","visualSchemes":[{"title":"Схема официального текста","steps":[{"label":"1","title":"Цель","text":"Сразу назвать Anliegen.","de":"Hiermit möchte ich..."},{"label":"2","title":"Факт","text":"Коротко и проверяемо.","de":"Der Termin wurde nicht eingehalten."},{"label":"3","title":"Просьба","text":"Вежливо и конкретно.","de":"Ich bitte um Rückmeldung."},{"label":"4","title":"Формула","text":"Закрыть стандартно.","de":"Mit freundlichen Grüßen"}],"bars":[{"label":"структура","value":90},{"label":"регистр","value":95},{"label":"эмоции","value":25}]}]},{"id":"a1-17-a1-20","level":"A1","order":17,"module":"Повторение","title":"Повторение A1: 20 коротких фраз","goal":"Закрепить базовые фразы без новой теории.","rule":"Повторение должно быть активным: закрыть перевод, сказать по-немецки, затем проверить. Лучше 20 коротких фраз, чем 2 длинных правила.","examples":[{"de":"Ich brauche Hilfe.","ru":"Мне нужна помощь."},{"de":"Ich habe eine Frage.","ru":"У меня есть вопрос."},{"de":"Ich möchte bezahlen.","ru":"Я хотел(а) бы оплатить."},{"de":"Können Sie das wiederholen?","ru":"Можете это повторить?"}],"drills":[{"q":"«Мне нужна помощь» =","options":["Ich brauche Hilfe.","Ich bin Hilfe.","Ich habe helfen."],"answer":0,"explanation":"Правильно: «Ich brauche Hilfe.». Для русскоговорящего главное - не переводить дословно, а проверить немецкую форму: глагол, артикль, падеж, предлог и порядок слов.","topic":"phrases"},{"q":"«У меня вопрос» =","options":["Ich habe eine Frage.","Ich bin Frage.","Ich frage haben."],"answer":0,"explanation":"Правильно: «Ich habe eine Frage.». Perfekt строится как haben/sein + Partizip II, а Partizip обычно закрывает фразу.","topic":"phrases"},{"q":"«Я хотел бы оплатить» =","options":["Ich möchte bezahlen.","Ich muss bezahlen möchte.","Ich bezahle möchte."],"answer":0,"explanation":"Правильно: «Ich möchte bezahlen.». После модального глагола смысловой глагол обычно стоит в конце в инфинитиве.","topic":"modal"},{"q":"«Повторите, пожалуйста» =","options":["Können Sie das wiederholen?","Wiederholen Sie mich?","Ich wiederhole Sie."],"answer":0,"explanation":"Правильно: «Können Sie das wiederholen?». Вежливая просьба строится через Können Sie ... bitte ...?, а не через прямой приказ.","topic":"politeness"}],"tags":["review","phrases","v14.2"],"deepTheoryRu":"Для русскоговорящего ученика важно не просто перевести фразу, а понять немецкий механизм: где глагол, какой падеж, какой артикль, какой стиль и почему выбран именно этот вариант.","russianTrap":"Ловушка: переводить слово в слово с русского и сохранять русский порядок слов.","germanLogic":"Немецкий строит смысл через форму: позицию глагола, артикль, падеж, предлог и рамку.","formula":"смысл → грамматическая роль → немецкая форма → пример","typicalMistakes":["дословный перевод","пропуск артикля","русский порядок слов"],"grammarTables":[{"title":"Мини-чеклист","headers":["Что проверить","Вопрос","Пример"],"rows":[["глагол","где стоит?","V2 или конец придаточного"],["артикль","какой род?","der/die/das"],["падеж","какая роль?","Akkusativ/Dativ/Genitiv"],["стиль","официально или разговорно?","Sie / du"]]}],"whyForRussian":"Этот блок добавлен специально для русскоговорящего ученика: сначала сравниваем с русской логикой, потом показываем немецкий механизм и только после этого тренируем форму.","visualSchemes":[{"title":"Русская мысль -> немецкая форма","steps":[{"label":"1","title":"Смысл","text":"Что я хочу сказать по-русски?"},{"label":"2","title":"Форма","text":"Какой немецкий механизм нужен?","de":"Verb, Artikel, Kasus"},{"label":"3","title":"Контроль","text":"Проверяю порядок, падеж и регистр."}],"bars":[{"label":"смысл","value":70},{"label":"форма","value":90},{"label":"перевод","value":45}]}]},{"id":"a2-14-topic","level":"A2","order":14,"module":"Коммуникация","title":"Телефонный разговор: запись, перенос, уточнение","goal":"Говорить по телефону в клинике или офисе.","rule":"По телефону нужны короткие фразы: представиться, назвать причину, уточнить дату, попросить повторить, подтвердить или перенести.","examples":[{"de":"Ich rufe wegen meines Termins an.","ru":"Я звоню по поводу моей записи."},{"de":"Könnten Sie den Termin verschieben?","ru":"Не могли бы Вы перенести запись?"},{"de":"Habe ich das richtig verstanden?","ru":"Я правильно понял(а)?"},{"de":"Könnten Sie mir das per E-Mail bestätigen?","ru":"Не могли бы Вы подт
