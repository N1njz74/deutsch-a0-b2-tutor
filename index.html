      justify-content: center;
      gap: 7px;
      text-decoration: none;
      margin: 4px 4px 4px 0;

      color: var(--text);
      border-radius: 999px;

    .progress-bar {

      border-radius: 999px;

      border: 1px solid rgba(148,163,184,.16);

      display: block;
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      width: 0%;
      transition: width .25s ease;

    .example-list, .rule-list {
      display: grid;
      gap: 8px;
      margin: 12px 0;
      padding: 0;
      list-style: none;
    }
    .example {
      display: grid;
      gap: 4px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 10px;
      background: rgba(255,255,255,.035);
    }
    .de { color: #bfdbfe; font-weight: 650; }
    .ru { color: var(--muted); }
    .speak {
      border: 1px solid rgba(96,165,250,.45);
      background: rgba(96,165,250,.12);
      color: #dbeafe;
      border-radius: 999px;
      padding: 2px 8px;
      font-size: .8rem;
      margin-left: 6px;
    }
    .drill {
      border-top: 1px solid var(--line);
      padding-top: 12px;
      margin-top: 12px;
    }
    .option {
      display: block;
      width: 100%;
      text-align: left;
      margin: 7px 0;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
      color: var(--text);
      background: rgba(255,255,255,.04);
    }
    .option.correct { border-color: rgba(34,197,94,.7); background: rgba(34,197,94,.13); }
    .option.wrong { border-color: rgba(251,113,133,.7); background: rgba(251,113,133,.11); }
    .answer-note { color: var(--text-soft); margin-top: 6px; }
    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: 16px;
    }
    table { width: 100%; border-collapse: collapse; min-width: 740px; }
    th, td { padding: 10px 12px; border-bottom: 1px solid var(--line); vertical-align: top; }
    th { color: var(--text-soft); text-align: left; background: rgba(255,255,255,.04); }
    td { color: #e5e7eb; }
    .vocab-card { display: grid; gap: 6px; }
    .diagnostic-grid {
      display: grid;
      gap: 12px;
    }
    .diagnostic-q {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      background: rgba(255,255,255,.035);
    }
    .diagnostic-q label {
      display: block;
      margin: 8px 0;
      color: var(--text-soft);
    }
    .result-box {
      border: 1px solid rgba(52,211,153,.45);
      background: rgba(52,211,153,.10);
      border-radius: 16px;
      padding: 16px;
      margin: 14px 0;
    }
    .drawer-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.5);
      z-index: 29;
      display: none;
    }
    .drawer {
      position: fixed;
      inset: 0 auto 0 0;
      width: min(330px, 86vw);
      background: #0b1220;
      border-right: 1px solid var(--line);
      z-index: 30;
      transform: translateX(-102%);
      transition: transform .18s ease;
      padding: 14px;
      overflow-y: auto;
    }
    .drawer.open { transform: translateX(0); }
    .drawer-backdrop.open { display: block; }
    .drawer button { display: block; width: 100%; text-align: left; margin: 8px 0; border-radius: 14px; }
    .toast {
      position: fixed;
      left: 50%;
      bottom: 20px;
      transform: translateX(-50%);
      background: #020617;
      border: 1px solid var(--line);
      color: var(--text);
      border-radius: 999px;
      padding: 10px 14px;
      box-shadow: var(--shadow);
      display: none;
      z-index: 60;
    }
    .toast.show { display: block; }
    details {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255,255,255,.035);
      padding: 12px;
      margin: 12px 0;
    }
    summary { cursor: pointer; font-weight: 700; }
    .hidden-learned {
      display: none !important;

    .empty {
      color: var(--muted);
      border: 1px dashed var(--line);
      padding: 18px;
      border-radius: 16px;

/* v146-diagnostic-review-css */
.diagnostic-review{margin-top:16px;display:grid;gap:10px}
.diagnostic-review .diag-item{border:1px solid var(--line);border-radius:14px;padding:12px;background:rgba(255,255,255,.035)}

/* v153-lesson-theory-css */
.deep-theory{margin:16px 0;display:grid;gap:12px}

.theory-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:10px;margin-top:10px}

.grammar-table th{background:rgba(96,165,250,.12)}

.lesson-nav-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}


/* v155-russian-bridge-css */
.contrast-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:10px;margin-top:10px}
.contrast-card{border:1px solid var(--line);border-radius:14px;padding:12px;background:rgba(15,23,42,.36)}
.contrast-card .literal{color:#fecdd3}
.contrast-card .right{color:#bbf7d0}

/* v156-systematic-theory-css */
.level-guide{border:1px solid var(--line);border-radius:16px;background:rgba(96,165,250,.08);padding:14px;margin:14px 0;display:grid;gap:12px}
.guide-columns{display:grid;grid-template-columns:1.1fr .9fr;gap:12px}

.guide-step,.scheme-step{border:1px solid var(--line);border-radius:14px;background:rgba(2,6,23,.34);padding:10px}

.guide-bars,.scheme-bars{display:grid;gap:8px}
.bar-line{display:grid;grid-template-columns:minmax(100px,160px) 1fr 44px;gap:8px;align-items:center}

.bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-2));border-radius:999px}
.scheme-panel{border:1px solid var(--line);border-radius:16px;background:rgba(255,255,255,.035);padding:12px;margin-top:10px}
.scheme-panel h4{margin:0 0 8px}
@media (max-width: 780px){.guide-columns{grid-template-columns:1fr}.bar-line{grid-template-columns:96px 1fr 38px}}

  <script type="application/json" id="app-data">{"version":"v15.6","date":"2026-07-09","levels":["A0","A1","A2","B1","B2"],"lessons":[{"id":"a0-01-ss","level":"A0","order":1,"module":"Старт","title":"Алфавит, умлауты и ß","goal":"Научиться читать немецкие слова без страха.","rule":"Немецкий алфавит близок к латинице. Важно сразу различать ä/ö/ü и ß. Буквосочетания: ei = «ай», ie = долгое «и», sch = «ш», sp/st в начале часто читаются как «шп/шт».","examples":[{"de":"mein Name","ru":"моё имя"},{"de":"die Liebe","ru":"любовь"},{"de":"die Straße","ru":"улица"},{"de":"Ich spreche Deutsch.","ru":"Я говорю по-немецки."}],"drills":[{"q":"Как обычно читается сочетание «ei»?","options":["и","ай","ой"],"answer":1,"explanation":"Правильно: «ай». Сочетание ei читается как «ай»: mein ≈ майн, nein ≈ найн.","topic":""},{"q":"Где есть буква ß?","options":["die Straße","der Tisch","sprechen"],"answer":0,"explanation":"Правильно: «die Straße». Для русскоговорящего здесь важен не перевод, а звук: немецкое буквосочетание читается стабильно, но не по-русски и не по-английски.","topic":""},{"q":"Как читается sch?","options":["ш","сх","к"],"answer":0,"explanation":"Правильно: «ш». Для русскоговорящего здесь важен не перевод, а звук: немецкое буквосочетание читается стабильно, но не по-русски и не по-английски.","topic":""}],"tags":["pronunciation"],"deepTheoryRu":"Русскоговорящему важно сразу отделить немецкое чтение от английского и русского. Немецкий в основном читается стабильнее английского, но есть группы букв, которые нельзя читать по-русски: ei = ай, ie = долгое и, sch = ш, sp/st в начале часто шп/шт.","russianTrap":"Ловушка: видеть латинские буквы и читать их как английские или русские. Например mein — не «меин», а примерно «майн».","germanLogic":"Немецкая логика: сначала выучи устойчивые буквосочетания, потом слово читается почти механически.","formula":"буква/сочетание → звук → пример: ei → ай → mein; sch → ш → Deutsch","typicalMistakes":["читать ei как «еи»","произносить sch как «сх»","игнорировать умлауты ä/ö/ü"],"grammarTables":[{"title":"Главные сочетания","headers":["Сочетание","Звук","Пример"],"rows":[["ei","ай","mein, nein"],["ie","долгое и","Liebe, sie"],["sch","ш","Deutsch, sprechen"],["sp/st в начале","шп/шт","sprechen, stehen"]]},{"title":"Умлауты","headers":["Буква","Ориентир для русского","Пример"],"rows":[["ä","между э/е","spät"],["ö","округлённый э","schön"],["ü","округлённый и","Tür"],["ß","долгое/глухое с","Straße"]]}],"whyForRussian":"Этот блок добавлен специально для русскоговорящего ученика: сначала сравниваем с русской логикой, потом показываем немецкий механизм и только после этого тренируем форму.","visualSchemes":[{"title":"Схема чтения","steps":[{"label":"1","title":"Вижу сочетание","text":"Не читаю по-английски.","de":"ei, ie, sch, sp, st"},{"label":"2","title":"Выбираю звук","text":"Сначала звук, потом слово.","de":"mein, Liebe, sprechen"},{"label":"3","title":"Собираю фразу","text":"Читаю вслух короткими блоками.","de":"Ich spreche Deutsch."}],"bars":[{"label":"звук","value":90},{"label":"ударение","value":60},{"label":"фраза","value":70}]}]},{"id":"a0-02-","level":"A0","order":2,"module":"Старт","title":"Первые фразы и знакомство","goal":"Представиться, поздороваться и попросить повторить.","rule":"Для старта нужны готовые блоки. Вежливое обращение: Sie/Ihnen. Неформальное: du/dir.","examples":[{"de":"Guten Tag. Ich heiße Anna.","ru":"Добрый день. Меня зовут Анна."},{"de":"Ich komme aus Russland.","ru":"Я из России."},{"de":"Können Sie das bitte wiederholen?","ru":"Не могли бы Вы повторить?"}],"drills":[{"q":"Как сказать «Меня зовут Анна»?","options":["Ich habe Anna.","Ich heiße Anna.","Ich bin heißen Anna."],"answer":1,"explanation":"Правильно: «Ich heiße Anna.». Русское «меня зовут» по-немецки выражается глаголом heißen: Ich heiße Anna.","topic":""},{"q":"Вежливая просьба повторить:","options":["Kannst du schlafen?","Können Sie das bitte wiederholen?","Ich wiederhole Sie."],"answer":1,"explanation":"Правильно: «Können Sie das bitte wiederholen?». Вежливая просьба строится через Können Sie ... bitte ...?, а не через прямой приказ.","topic":""},{"q":"Что значит «Guten Tag»?","options":["Добрый день","До свидания","Спасибо"],"answer":0,"explanation":"Правильно: «Добрый день». Guten Tag - нейтральное дневное приветствие, безопасное в официальной ситуации.","topic":""}],"tags":["phrases"],"deepTheoryRu":"Для русскоговорящего ученика важно не просто перевести фразу, а понять немецкий механизм: где глагол, какой падеж, какой артикль, какой стиль и почему выбран именно этот вариант.","russianTrap":"Ловушка: переводить слово в слово с русского и сохранять русский порядок слов.","germanLogic":"Немецкий строит смысл через форму: позицию глагола, артикль, падеж, предлог и рамку.","formula":"смысл → грамматическая роль → немецкая форма → пример","typicalMistakes":["дословный перевод","пропуск артикля","русский порядок слов"],"grammarTables":[{"title":"Мини-чеклист","headers":["Что проверить","Вопрос","Пример"],"rows":[["глагол","где стоит?","V2 или конец придаточного"],["артикль","какой род?","der/die/das"],["падеж","какая роль?","Akkusativ/Dativ/Genitiv"],["стиль","официально или разговорно?","Sie / du"]]}],"whyForRussian":"Этот блок добавлен специально для русскоговорящего ученика: сначала сравниваем с русской логикой, потом показываем немецкий механизм и только после этого тренируем форму.","contrastExamples":[{"ru":"Я из России.","literal":"Не так: Ich bin aus Russland.","de":"Ich komme aus Russland.","note":"Происхождение обычно выражается через kommen aus."},{"ru":"Не могли бы Вы повторить?","literal":"Не так: Wiederholen Sie!","de":"Können Sie das bitte wiederholen?","note":"Können Sie ... bitte звучит вежливо."}],"visualSchemes":[{"title":"Русская мысль -> немецкая форма","steps":[{"label":"1","title":"Смысл","text":"Что я хочу сказать по-русски?"},{"label":"2","title":"Форма","text":"Какой немецкий механизм нужен?","de":"Verb, Artikel, Kasus"},{"label":"3","title":"Контроль","text":"Проверяю порядок, падеж и регистр."}],"bars":[{"label":"смысл","value":70},{"label":"форма","value":90},{"label":"перевод","value":45}]}]},{"id":"a0-03-","level":"A0","order":3,"module":"Старт","title":"Числа, дни, время","goal":"Понимать время встречи, дату и базовые числа.","rule":"Точное время обычно с um: um acht Uhr. Дни недели с am: am Montag. Даты часто с am + порядковое числительное.","examples":[{"de":"Der Termin ist um neun Uhr.","ru":"Приём в девять часов."},{"de":"Am Montag habe ich Zeit.","ru":"В понедельник у меня есть время."},{"de":"Heute ist der achte Juli.","ru":"Сегодня восьмое июля."}],"drills":[{"q":"Что подходит к точному времени?","options":["am acht Uhr","um acht Uhr","in acht Uhr"],"answer":1,"explanation":"Правильно: «um acht Uhr». Для точного времени используется um, а для дней недели - am.","topic":""},{"q":"Как сказать «в понедельник»?","options":["am Montag","um Montag","der Montag"],"answer":0,"explanation":"Правильно: «am Montag». Дни недели в значении «в понедельник» оформляются через am + день.","topic":""},{"q":"Что значит morgen?","options":["сегодня","завтра","вчера"],"answer":1,"explanation":"Правильно: «завтра». Morgen с большой буквы - утро, morgen с маленькой - завтра.","topic":""}],"tags":["time"],"deepTheoryRu":"Для русскоговорящего ученика важно не просто перевести фразу, а понять немецкий механизм: где глагол, какой падеж, какой артикль, какой стиль и почему выбран именно этот вариант.","russianTrap":"Ловушка: переводить слово в слово с русского и сохранять русский порядок слов.","germanLogic":"Немецкий строит смысл через форму: позицию глагола, артикль, падеж, предлог и рамку.","formula":"смысл → грамматическая роль → немецкая форма → пример","typicalMistakes":["дословный перевод","пропуск артикля","русский порядок слов"],"grammarTables":[{"title":"Мини-чеклист","headers":["Что проверить","Вопрос","Пример"],"rows":[["глагол","где стоит?","V2 или конец придаточного"],["артикль","какой род?","der/die/das"],["падеж","какая роль?","Akkusativ/Dativ/Genitiv"],["стиль","официально или разговорно?","Sie / du"]]}],"whyForRussian":"Этот блок добавлен специально для русскоговорящего ученика: сначала сравниваем с русской логикой, потом показываем немецкий механизм и только после этого тренируем форму.","visualSchemes":[{"title":"Русская мысль -> немецкая форма","steps":[{"label":"1","title":"Смысл","text":"Что я хочу сказать по-русски?"},{"label":"2","title":"Форма","text":"Какой немецкий механизм нужен?","de":"Verb, Artikel, Kasus"},{"label":"3","title":"Контроль","text":"Проверяю порядок, падеж и регистр."}],"bars":[{"label":"смысл","value":70},{"label":"форма","value":90},{"label":"перевод","value":45}]}]},{"id":"a0-04-","level":"A0","order":4,"module":"Старт","title":"Простое предложение: кто + глагол","goal":"Собрать немецкую фразу с правильным местом глагола.","rule":"В обычном утверждении спрягаемый глагол стоит на втором месте: Ich lerne Deutsch. Если сначала стоит время или место, глагол всё равно второй: Heute lerne ich Deutsch.","examples":[{"de":"Ich lerne Deutsch.","ru":"Я учу немецкий."},{"de":"Heute lerne ich Deutsch.","ru":"Сегодня я учу немецкий."},{"de":"In Frankfurt wohne ich.","ru":"Во Франкфурте я живу."}],"drills":[{"q":"Где стоит спрягаемый глагол в утверждении?","options":["на первом месте","на втором месте","в конце всегда"],"answer":1,"explanation":"Правильно: «на втором месте». В немецком главном предложении спрягаемый глагол занимает вторую позицию.","topic":""},{"q":"Выберите правильный порядок:","options":["Heute ich lerne Deutsch.","Heute lerne ich Deutsch.","Heute Deutsch lerne ich."],"answer":1,"explanation":"Правильно: «Heute lerne ich Deutsch.». Для русскоговорящего ключевой контроль - место спрягаемого глагола. В главном предложении он стоит на позиции 2.","topic":""},{"q":"Что является глаголом в «Ich wohne in Berlin»?","options":["Ich","wohne","Berlin"],"answer":1,"explanation":"Правильно: «wohne». Для русскоговорящего ключевой контроль - место спрягаемого глагола. В главном предложении он стоит на позиции 2.","topic":""}],"tags":["word-order"],"deepTheoryRu":"Русский порядок слов свободнее: «Сегодня я учу немецкий» и «Я сегодня учу немецкий» звучат нормально. В немецком спрягаемый глагол — якорь предложения. В обычном утверждении он стоит на позиции 2, даже если первым стоит время, место или причина.","russianTrap":"Ловушка: переносить русский порядок напрямую: Heute ich lerne Deutsch. Немцу это ломает грамматику, потому что после Heute должен идти глагол.","germanLogic":"Немецкая логика: первое поле можно менять для акцента, но второе место закреплено за спрягаемым глаголом.","formula":"Поле 1 + Verb 2 + субъект + остальное: Heute lerne ich Deutsch.","typicalMistakes":["Heute ich lerne Deutsch","Weil ich habe Zeit","ставить два элемента перед глаголом"],"grammarTables":[{"title":"V2 в главном предложении","headers":["Тип","Правильно","Почему"],"rows":[["Обычно","Ich lerne Deutsch.","глагол lerne на позиции 2"],["Время первым","Heute lerne ich Deutsch.","Heute = поле 1, lerne = V2"],["Место первым","In Frankfurt wohne ich.","место в поле 1, глагол остаётся вторым"]]},{"title":"Где стоит глагол","headers":["Конструкция","Позиция глагола","Пример"],"rows":[["Главное предложение","2","Ich lerne Deutsch."],["Ja/Nein-вопрос","1","Haben Sie Zeit?"],["W-вопрос","2","Wo wohnen Sie?"],["Придаточное","в конце","..., weil ich Zeit habe."]]}],"whyForRussian":"Этот блок добавлен специально для русскоговорящего ученика: сначала сравниваем с русской логикой, потом показываем немецкий механизм и только после этого тренируем форму.","contrastExamples":[{"ru":"Сегодня я учу немецкий.","literal":"Не так: Heute ich lerne Deutsch.","de":"Heute lerne ich Deutsch.","note":"Heute занимает первое поле, поэтому lerne стоит вторым."},{"ru":"Во Франкфурте я живу.","literal":"Не так: In Frankfurt ich wohne.","de":"In Frankfurt wohne ich.","note":"После обстоятельства места глагол остаётся на позиции 2."}],"visualSchemes":[{"title":"Граф предложения V2","steps":[{"label":"1","title":"Поле 1","text":"Тема, время или место.","de":"Heute"},{"label":"2","title":"Verb 2","text":"Спрягаемый глагол закреплён.","de":"lerne"},{"label":"3","title":"Субъект","text":"Если первым было не ich, субъект идёт после глагола.","de":"ich"},{"label":"4","title":"Рамка","text":"Остальное закрывает смысл.","de":"Deutsch."}],"bars":[{"label":"V2","value":95},{"label":"рамка","value":75},{"label":"акцент","value":55}]}]},{"id":"a0-05-sein-haben-werden-praesens","level":"A0","order":5,"module":"Старт","title":"sein, haben, werden в Präsens","goal":"Использовать три самые частые формы.","rule":"sein = быть, haben = иметь, werden = становиться/будет. Формы нерегулярные, их нужно выучить как таблицу: ich bin, du bist, er ist; ich habe, du hast; ich werde, du wirst.","examples":[{"de":"Ich bin müde.","ru":"Я устал/устала."},{"de":"Sie hat heute Zeit.","ru":"У неё сегодня есть время."},{"de":"Wir werden besser.","ru":"Мы становимся лучше."}],"drills":[{"q":"Правильно: ich ...","options":["bin","ist","bist"],"answer":0,"explanation":"Правильно: «bin». Для русскоговорящего главное - не переводить дословно, а проверить немецкую форму: глагол, артикль, падеж, предлог и порядок слов.","topic":""},{"q":"Правильно: du ... Zeit.","options":["haben","hast","hat"],"answer":1,"explanation":"Правильно: «hast». У haben форма для du - du hast; русское «у тебя есть» переводится через haben.","topic":""},{"q":"Что значит werden в базовом смысле?","options":["иметь","становиться","знать"],"answer":1,"explanation":"Правильно: «становиться». werden сначала значит «становиться», а уже потом участвует в Futur и Passiv.","topic":""}],"tags":["verbs"],"deepTheoryRu":"Для русскоговорящего ученика важно не просто перевести фразу, а понять немецкий механизм: где глагол, какой падеж, какой артикль, какой стиль и почему выбран именно этот вариант.","russianTrap":"Ловушка: переводить слово в слово с русского и сохранять русский порядок слов.","germanLogic":"Немецкий строит смысл через форму: позицию глагола, артикль, падеж, предлог и рамку.","formula":"смысл → грамматическая роль → немецкая форма → пример","typicalMistakes":["дословный перевод","пропуск артикля","русский порядок слов"],"grammarTables":[{"title":"Мини-чеклист","headers":["Что проверить","Вопрос","Пример"],"rows":[["глагол","где стоит?","V2 или конец придаточного"],["артикль","какой род?","der/die/das"],["падеж","какая роль?","Akkusativ/Dativ/Genitiv"],["стиль","официально или разговорно?","Sie / du"]]}],"whyForRussian":"Этот блок добавлен специально для русскоговорящего ученика: сначала сравниваем с русской логикой, потом показываем немецкий механизм и только после этого тренируем форму.","visualSchemes":[{"title":"Русская мысль -> немецкая форма","steps":[{"label":"1","title":"Смысл","text":"Что я хочу сказать по-русски?"},{"label":"2","title":"Форма","text":"Какой немецкий механизм нужен?","de":"Verb, Artikel, Kasus"},{"label":"3","title":"Контроль","text":"Проверяю порядок, падеж и регистр."}],"bars":[{"label":"смысл","value":70},{"label":"форма","value":90},{"label":"перевод","value":45}]}]},{"id":"a0-06-ja-nein-w","level":"A0","order":6,"module":"Старт","title":"Ja/Nein-вопрос и W-вопрос","goal":"Задать простой вопрос.","rule":"В вопросе без вопросительного слова глагол стоит на первом месте: Haben Sie Zeit? В W-вопросе вопросительное слово первое, глагол второе: Wo wohnen Sie?","examples":[{"de":"Haben Sie heute Zeit?","ru":"У Вас сегодня есть время?"},{"de":"Wo wohnen Sie?","ru":"Где Вы живёте?"},{"de":"Wie heißen Sie?","ru":"Как Вас зовут?"}],"drills":[{"q":"Правильный ja/nein-вопрос:","options":["Sie haben Zeit?","Haben Sie Zeit?","Wo haben Sie Zeit?"],"answer":1,"explanation":"Правильно: «Haben Sie Zeit?». В вопросе без вопросительного слова спрягаемый глагол стоит первым.","topic":""},{"q":"Какое W-слово значит «где»?","options":["wer","wo","wann"],"answer":1,"explanation":"Правильно: «wo». W-слово занимает первое место, а спрягаемый глагол остается на втором.","topic":""},{"q":"В W-вопросе глагол стоит...","options":["на втором месте","всегда в конце","на третьем месте"],"answer":0,"explanation":"Правильно: «на втором месте». В русском вопрос часто держится интонацией, а в немецком его показывает порядок слов: глагол первым или после W-слова.","topic":""}],"tags":["questions"],"deepTheoryRu":"В русском вопрос часто делается интонацией: «У вас есть время?» В немецком порядок слов показывает тип вопроса. Если вопрос без вопросительного слова, глагол идёт первым. Если есть W-слово, оно первое, глагол второй.","russianTrap":"Ловушка: говорить Sie haben Zeit? как основной учебный вариант. Это возможно интонационно, но стандартный грамматический вопрос: Haben Sie Zeit?","germanLogic":"Немецкий вопрос строится через позицию глагола, а не только через интонацию.","formula":"Ja/Nein: Verb + Subjekt + ...? W-Frage: W-Wort + Verb + Subjekt + ...?","typicalMistakes":["Sie haben Zeit? вместо Haben Sie Zeit?","Wo Sie wohnen?","Wann der Termin ist? как прямой вопрос"],"grammarTables":[{"title":"Типы вопросов","headers":["Тип","Шаблон","Пример"],"rows":[["Ja/Nein","Verb + Subjekt","Haben Sie Zeit?"],["W-Frage","Wort + Verb + Subjekt","Wo wohnen Sie?"],["Косвенный вопрос","..., W/ob + ... + Verb","Können Sie sagen, wann der Termin ist?"]]}],"whyForRussian":"Этот блок добавлен специально для русскоговорящего ученика: сначала сравниваем с русской логикой, потом показываем немецкий механизм и только после этого тренируем форму.","visualSchemes":[{"title":"Русская мысль -> немецкая форма","steps":[{"label":"1","title":"Смысл","text":"Что я хочу сказать по-русски?"},{"label":"2","title":"Форма","text":"Какой немецкий механизм нужен?","de":"Verb, Artikel, Kasus"},{"label":"3","title":"Контроль","text":"Проверяю порядок, падеж и регистр."}],"bars":[{"label":"смысл","value":70},{"label":"форма","value":90},{"label":"перевод","value":45}]}]},{"id":"a0-07-nicht-kein","level":"A0","order":7,"module":"Старт","title":"Отрицание nicht и kein","goal":"Отрицать действие и существительное.","rule":"kein отрицает существительное с неопределённым артиклем или без артикля: Ich habe keinen Termin. nicht отрицает глагол, прилагательное или всю фразу: Ich komme nicht.","examples":[{"de":"Ich habe keinen Termin.","ru":"У меня нет записи."},{"de":"Ich verstehe nicht.","ru":"Я не понимаю."},{"de":"Das ist nicht teuer.","ru":"Это не дорого."},{"de":"Ich verstehe das nicht.","ru":"Я этого не понимаю."}],"drills":[{"q":"Как отрицать «einen Termin»?","options":["nicht Termin","keinen Termin","kein Termin"],"answer":1,"explanation":"Правильно: «keinen Termin». kein отрицает существительное, nicht - действие, качество или всю мысль.","topic":""},{"q":"Выберите правильное:","options":["Ich verstehe nicht.","Ich nicht verstehe.","Ich verstehe kein."],"answer":0,"explanation":"Правильно: «Ich verstehe nicht.». kein отрицает существительное, nicht - действие, качество или всю мысль.","topic":""},{"q":"kein меняется по падежам?","options":["да","нет","только в B2"],"answer":0,"explanation":"Правильно: «да». Артикль нужно учить вместе с существительным: он показывает род, число и падеж, которых в русском нет в такой форме.","topic":""}],"tags":["negation"],"deepTheoryRu":"В русском нет артиклей, поэтому русскоговорящий часто хочет учить только слово. В немецком это ошибка: существительное надо учить вместе с der/die/das, потому что род влияет на Akkusativ, Dativ, Genitiv и окончания прилагательных.","russianTrap":"Ловушка: учить Termin без der. Потом сложно понять, почему einen Termin, mit dem Termin, wegen des Termins.","germanLogic":"Артикль — это не украшение, а грамматическая метка рода, числа и падежа.","formula":"слово = артикль + существительное + пример: der Termin — Ich habe einen Termin.","typicalMistakes":["учить слово без артикля","путать der/die/das","не менять мужской род в Akkusativ"],"grammarTables":[{"title":"Артикли в Nominativ","headers":["Род/число","Определённый","Неопределённый","Пример"],"rows":[["мужской","der","ein","der Termin / ein Termin"],["женский","die","eine","die Frage / eine Frage"],["средний","das","ein","das Formular / ein Formular"],["множественное","die","-","die Unterlagen"]]},{"title":"Мини-логика артикля","headers":["Функция","Что показывает","Почему важно"],"rows":[["род","der/die/das","влияет на падеж"],["падеж","den/dem/des...","показывает роль слова"],["число","die Plural","множественное часто отличается"]]}],"whyForRussian":"Этот блок добавлен специально для русскоговорящего ученика: сначала сравниваем с русской логикой, потом показываем немецкий механизм и только после этого тренируем форму.","contrastExamples":[{"ru":"У меня нет записи.","literal":"Не так: Ich habe nicht Termin.","de":"Ich habe keinen Termin.","note":"kein отрицает существительное Termin."},{"ru":"Я этого не понимаю.","literal":"Не так: Ich verstehe kein das.","de":"Ich verstehe das nicht.","note":"nicht отрицает действие verstehen."}],"visualSchemes":[{"title":"Артикль как метка формы","steps":[{"label":"1","title":"Род","text":"Учить слово вместе с der/die/das.","de":"der Termin"},{"label":"2","title":"Падеж","text":"Роль меняет артикль.","de":"den Termin"},{"label":"3","title":"Фраза","text":"Сразу закреплять в примере.","de":"Ich habe einen Termin."}],"bars":[{"label":"род","value":80},{"label":"падеж","value":90},{"label":"пример","value":70}]}]},{"id":"a0-08-","level":"A0","order":8,"module":"Старт","title":"Мини-диалог: выжить в разговоре","goal":"Собрать короткий бытовой диалог.","rule":"На A0 важнее не идеальная грамматика, а безопасные готовые фразы: Bitte langsamer. Ich lerne Deutsch. Können Sie mir helfen?","examples":[{"de":"Entschuldigung, ich lerne Deutsch.","ru":"Извините, я учу немецкий."},{"de":"Bitte etwas langsamer.","ru":"Пожалуйста, немного медленнее."},{"de":"Ich brauche Hilfe.","ru":"Мне нужна помощь."}],"drills":[{"q":"Как попросить говорить медленнее?","options":["Bitte etwas langsamer.","Bitte schneller.","Ich langsamer."],"answer":0,"explanation":"Правильно: «Bitte etwas langsamer.». Модальный глагол занимает вторую позицию, а смысловой глагол уходит в конец в инфинитиве.","topic":""},{"q":"Что значит «Ich brauche Hilfe»?","options":["Мне нужна помощь","Я иду домой","Я говорю быстро"],"answer":0,"explanation":"Правильно: «Мне нужна помощь». Модальный глагол занимает вторую позицию, а смысловой глагол уходит в конец в инфинитиве.","topic":""},{"q":"Как начать вежливо?","options":["Entschuldigung","Tschüss","Nein danke"],"answer":0,"explanation":"Правильно: «Entschuldigung». Модальный глагол занимает вторую позицию, а смысловой глагол уходит в конец в инфинитиве.","topic":""}],"tags":["dialogue"],"deepTheoryRu":"Модальный глагол в немецком занимает место спрягаемого глагола, а смысловой глагол уходит в конец в инфинитиве. Для русского это непривычно: «я должен сегодня работать» → Ich muss heute arbeiten.","russianTrap":"Ловушка: Ich muss heute arbeite. После модального нужен инфинитив arbeiten.","germanLogic":"Модальный глагол открывает рамку, инфинитив закрывает рамку.","formula":"Subjekt + Modalverb + ... + Infinitiv","typicalMistakes":["Ich muss arbeite","Ich heute muss arbeiten","Ich möchte einen Termin vereinbare"],"grammarTables":[{"title":"Модальные глаголы","headers":["Глагол","Смысл","Пример"],"rows":[["können","мочь/уметь","Ich kann kommen."],["müssen","должен","Ich muss arbeiten."],["wollen","хотеть","Ich will lernen."],["möchten","хотел бы","Ich möchte einen Termin."],["dürfen","можно/иметь разрешение","Darf ich fragen?"],["sollen","следует/должен по поручению","Sie sollen warten."]]}],"whyForRussian":"Этот блок добавлен специально для русскоговорящего ученика: сначала сравниваем с русской логикой, потом показываем немецкий механизм и только после этого тренируем форму.","visualSchemes":[{"title":"Русская мысль -> немецкая форма","steps":[{"label":"1","title":"Смысл","text":"Что я хочу сказать по-русски?"},{"label":"2","title":"Форма","text":"Какой немецкий механизм нужен?","de":"Verb, Artikel, Kasus"},{"label":"3","title":"Контроль","text":"Проверяю порядок, падеж и регистр."}],"bars":[{"label":"смысл","value":70},{"label":"форма","value":90},{"label":"перевод","value":45}]}]},{"id":"a0-09-artikel-merken","level":"A0","order":9,"module":"Старт","title":"Как учить существительные с артиклем","goal":"Не терять род существительного уже на старте.","rule":"Немецкое существительное нужно учить как связку: артикль + слово + пример. Не der/die/das отдельно, а der Termin, die Frage, das Formular. Это снижает ошибки в Akkusativ и Dativ позже.","examples":[{"de":"der Termin","ru":"запись/приём"},{"de":"die Frage","ru":"вопрос"},{"de":"das Formular","ru":"формуляр"},{"de":"Ich habe einen Termin.","ru":"У меня есть запись."},{"de":"Das Formular liegt hier.","ru":"Формуляр лежит здесь."}],"drills":[{"q":"Как лучше учить слово Termin?","options":["Termin","der Termin","einen Termin только"],"answer":1,"explanation":"Правильно: «der Termin». Артикль нужно учить вместе с существительным: он показывает род, число и падеж, которых в русском нет в такой форме.","topic":"articles"},{"q":"Какой артикль у Frage?","options":["der","die","das"],"answer":1,"explanation":"Правильно: «die». Артикль нужно учить вместе с существительным: он показывает род, число и падеж, которых в русском нет в такой форме.","topic":"articles"},{"q":"Что значит das Formular?","options":["формуляр","друг","дорога"],"answer":0,"explanation":"Правильно: «формуляр». Артикль нужно учить вместе с существительным: он показывает род, число и падеж, которых в русском нет в такой форме.","topic":"articles"}],"tags":["articles","learning"],"deepTheoryRu":"В русском нет артиклей, поэтому русскоговорящий часто хочет учить только слово. В немецком это ошибка: существительное надо учить вместе с der/die/das, потому что род влияет на Akkusativ, Dativ, Genitiv и окончания прилагательных.","russianTrap":"Ловушка: учить Termin без der. Потом сложно понять, почему einen Termin, mit dem Termin, wegen des Termins.","germanLogic":"Артикль — это не украшение, а грамматическая метка рода, числа и падежа.","formula":"слово = артикль + существительное + пример: der Termin — Ich habe einen Termin.","typicalMistakes":["учить слово без артикля","путать der/die/das","не менять мужской род в Akkusativ"],"grammarTables":[{"title":"Артикли в Nominativ","headers":["Род/число","Определённый","Неопределённый","Пример"],"rows":[["мужской","der","ein","der Termin / ein Termin"],["женский","die","eine","die Frage / eine Frage"],["средний","das","ein","das Formular / ein Formular"],["множественное","die","-","die Unterlagen"]]},{"title":"Мини-логика артикля","headers":["Функция","Что показывает","Почему важно"],"rows":[["род","der/die/das","влияет на падеж"],["падеж","den/dem/des...","показывает роль слова"],["число","die Plural","множественное часто отличается"]]}],"whyForRussian":"Этот блок добавлен специально для русскоговорящего ученика: сначала сравниваем с русской логикой, потом показываем немецкий механизм и только после этого тренируем форму.","contrastExamples":[{"ru":"Формуляр лежит здесь.","literal":"Не так: Formular liegt hier.","de":"Das Formular liegt hier.","note":"Существительное учим с артиклем."}],"visualSchemes":[{"title":"Русская мысль -> немецкая форма","steps":[{"label":"1","title":"Смысл","text":"Что я хочу сказать по-русски?"},{"label":"2","title":"Форма","text":"Какой немецкий механизм нужен?","de":"Verb, Artikel, Kasus"},{"label":"3","title":"Контроль","text":"Проверяю порядок, падеж и регистр."}],"bars":[{"label":"смысл","value":70},{"label":"форма","value":90},{"label":"перевод","value":45}]}]},{"id":"a0-10-hoeflichkeit","level":"A0","order":10,"module":"Старт","title":"Вежливые фразы Sie-уровня","goal":"Безопасно говорить с незнакомыми людьми.","rule":"В Германии и Швейцарии в официальной ситуации лучше начинать с Sie. Типовые фразы: Könnten Sie…, Ich hätte gern…, Entschuldigung, ich habe eine Frage.","examples":[{"de":"Könnten Sie mir bitte helfen?","ru":"Не могли бы Вы мне помочь?"},{"de":"Ich hätte gern einen Termin.","ru":"Я хотел(а) бы записаться."},{"de":"Entschuldigung, ich habe eine Frage.","ru":"Извините, у меня вопрос."}],"drills":[{"q":"Вежливое обращение к незнакомому человеку:","options":["du","Sie","ihr"],"answer":1,"explanation":"Правильно: «Sie». В официальном немецком важны нейтральный тон, точная просьба и стандартные формулы, а не дословная русская канцелярская фраза.","topic":"politeness"},{"q":"Как сказать «я хотел бы»?","options":["Ich hätte gern","Ich habe gern","Ich bin gern"],"answer":0,"explanation":"Правильно: «Ich hätte gern». Konjunktiv II звучит вежливо или гипотетически, что важно для B1/B2.","topic":"politeness"},{"q":"Что звучит безопасно в клинике?","options":["Könnten Sie mir bitte helfen?","Hilf sofort!","Du musst helfen."],"answer":0,"explanation":"Правильно: «Könnten Sie mir bitte helfen?». Konjunktiv II звучит вежливо или гипотетически, что важно для B1/B2.","topic":"politeness"}],"tags":["phrases","politeness"],"deepTheoryRu":"Для русскоговорящего письмо на немецком сложно не только грамматикой, но и регистром. Немецкое официальное письмо требует ясной структуры, нейтрального тона и точных просьб.","russianTrap":"Ловушка: писать слишком эмоционально или слишком прямо, как в устном русском. В немецком официальном стиле лучше спокойная формула.","germanLogic":"Официальное письмо — это не художественный текст, а управляемая структура: причина, факт, просьба, срок, финал.","formula":"Anrede → Grund → Details → Bitte/Forderung → Frist → Schlussformel","typicalMistakes":["Hallo в официальном письме","Mach schnell","слишком длинное предложение без структуры"],"grammarTables":[{"title":"Официальное письмо","headers":["Часть","Фраза","Задача"],"rows":[["Обращение","Sehr geehrte Damen und Herren,","безопасный старт"],["Причина","Ich wende mich an Sie, weil...","объяснить цель"],["Просьба","Ich bitte um Rückmeldung.","сказать, что нужно"],["Срок","bis zum 15. August","дать рамку"],["Финал","Mit freundlichen Grüßen","официально закрыть"]]}],"whyForRussian":"Этот блок добавлен специально для русскоговорящего ученика: сначала сравниваем с русской логикой, потом показываем немецкий механизм и только после этого тренируем форму.","visualSchemes":[{"title":"Русская мысль -> немецкая форма","steps":[{"label":"1","title":"Смысл","text":"Что я хочу сказать по-русски?"},{"label":"2","title":"Форма","text":"Какой немецкий механизм нужен?","de":"Verb, Artikel, Kasus"},{"label":"3","title":"Контроль","text":"Проверяю порядок, падеж и регистр."}],"bars":[{"label":"смысл","value":70},{"label":"форма","value":90},{"label":"перевод","value":45}]}]},{"id":"a0-11-satzbau-minimal","level":"A0","order":11,"module":"Старт","title":"Минимальный шаблон немецкой фразы","goal":"Собирать простые фразы без лишней теории.","rule":"Для первых фраз держите шаблон: Wer? + Verb + Ergänzung. Если добавляете время в начало, глагол всё равно остаётся вторым.","examples":[{"de":"Ich brauche Hilfe.","ru":"Мне нужна помощь."},{"de":"Heute brauche ich Hilfe.","ru":"Сегодня мне нужна помощь."},{"de":"Wir lernen Deutsch.","ru":"Мы учим немецкий."}],"drills":[{"q":"Где глагол в Heute brauche ich Hilfe?","options":["1","2","в конце"],"answer":1,"explanation":"Правильно: «2». Для русскоговорящего ключевой контроль - место спрягаемого глагола. В главном предложении он стоит на позиции 2.","topic":"word-order"},{"q":"Выберите правильное:","options":["Ich Hilfe brauche.","Ich brauche Hilfe.","Brauche ich Hilfe."],"answer":1,"explanation":"Правильно: «Ich brauche Hilfe.». Для русскоговорящего ключевой контроль - место спрягаемого глагола. В главном предложении он стоит на позиции 2.","topic":"word-order"},{"q":"Wer? в фразе Wir lernen Deutsch:","options":["Wir","lernen","Deutsch"],"answer":0,"explanation":"Правильно: «Wir». Для русскоговорящего ключевой контроль - место спрягаемого глагола. В главном предложении он стоит на позиции 2.","topic":"word-order"}],"tags":["word-order"],"deepTheoryRu":"Русский порядок слов свободнее: «Сегодня я учу немецкий» и «Я сегодня учу немецкий» звучат нормально. В немецком спрягаемый глагол — якорь предложения. В обычном утверждении он стоит на позиции 2, даже если первым стоит время, место или причина.","russianTrap":"Ловушка: переносить русский порядок напрямую: Heute ich lerne Deutsch. Немцу это ломает грамматику, потому что после Heute должен идти глагол.","germanLogic":"Немецкая логика: первое поле можно менять для акцента, но второе место закреплено за спрягаемым глаголом.","formula":"Поле 1 + Verb 2 + субъект + остальное: Heute lerne ich Deutsch.","typicalMistakes":["Heute ich lerne Deutsch","Weil ich habe Zeit","ставить два элемента перед глаголом"],"grammarTables":[{"title":"V2 в главном предложении","headers":["Тип","Правильно","Почему"],"rows":[["Обычно","Ich lerne Deutsch.","глагол lerne на позиции 2"],["Время первым","Heute lerne ich Deutsch.","Heute = поле 1, lerne = V2"],["Место первым","In Frankfurt wohne ich.","место в поле 1, глагол остаётся вторым"]]},{"title":"Где стоит глагол","headers":["Конструкция","Позиция глагола","Пример"],"rows":[["Главное предложение","2","Ich lerne Deutsch."],["Ja/Nein-вопрос","1","Haben Sie Zeit?"],["W-вопрос","2","Wo wohnen Sie?"],["Придаточное","в конце","..., weil ich Zeit habe."]]}],"whyForRussian":"Этот блок добавлен специально для русскоговорящего ученика: сначала сравниваем с русской логикой, потом показываем немецкий механизм и только после этого тренируем форму.","visualSchemes":[{"title":"Граф предложения V2","steps":[{"label":"1","title":"Поле 1","text":"Тема, время или место.","de":"Heute"},{"label":"2","title":"Verb 2","text":"Спрягаемый глагол закреплён.","de":"lerne"},{"label":"3","title":"Субъект","text":"Если первым было не ich, субъект идёт после глагола.","de":"ich"},{"label":"4","title":"Рамка","text":"Остальное закрывает смысл.","de":"Deutsch."}],"bars":[{"label":"V2","value":95},{"label":"рамка","value":75},{"label":"акцент","value":55}]}]},{"id":"a0-12-mini-check-a0","level":"A0","order":12,"module":"Старт","title":"A0 мини-проверка перед A1","goal":"Понять, готов ли пользователь идти дальше.","rule":"Перед A1 достаточно уверенно читать простые слова, знать sein/haben, задавать простой вопрос и понимать nicht/kein на уровне готовых фраз.","examples":[{"de":"Ich bin bereit.","ru":"Я готов(а)."},{"de":"Haben Sie Zeit?","ru":"У Вас есть время?"},{"de":"Ich verstehe nicht.","ru":"Я не понимаю."}],"drills":[{"q":"ich + sein =","options":["ich bin","ich ist","ich bist"],"answer":0,"explanation":"Правильно: «ich bin». В русском вопрос часто держится интонацией, а в немецком его показывает порядок слов: глагол первым или после W-слова.","topic":"verbs"},{"q":"Ja/Nein-вопрос начинается с…","options":["подлежащего","глагола","артикля"],"answer":1,"explanation":"Правильно: «глагола». В вопросе без вопросительного слова спрягаемый глагол стоит первым.","topic":"questions"},{"q":"Как сказать «я не понимаю»?","options":["Ich verstehe nicht.","Ich nicht verstehe.","Ich habe kein verstehe."],"answer":0,"explanation":"Правильно: «Ich verstehe nicht.». kein отрицает существительное, nicht - действие, качество или всю мысль.","topic":"negation"}],"tags":["checkpoint"],"deepTheoryRu":"В русском вопрос часто делается интонацией: «У вас есть время?» В немецком порядок слов показывает тип вопроса. Если вопрос без вопросительного слова, глагол идёт первым. Если есть W-слово, оно первое, глагол второй.","russianTrap":"Ловушка: говорить Sie haben Zeit? как основной учебный вариант. Это возможно интонационно, но стандартный грамматический вопрос: Haben Sie Zeit?","germanLogic":"Немецкий вопрос строится через позицию глагола, а не только через интонацию.","formula":"Ja/Nein: Verb + Subjekt + ...? W-Frage: W-Wort + Verb + Subjekt + ...?","typicalMistakes":["Sie haben Zeit? вместо Haben Sie Zeit?","Wo Sie wohnen?","Wann der Termin ist? как прямой вопрос"],"grammarTables":[{"title":"Типы вопросов","headers":["Тип","Шаблон","Пример"],"rows":[["Ja/Nein","Verb + Subjekt","Haben Sie Zeit?"],["W-Frage","Wort + Verb + Subjekt","Wo wohnen Sie?"],["Косвенный вопрос","..., W/ob + ... + Verb","Können Sie sagen, wann der Termin ist?"]]}],"whyForRussian":"Этот блок добавлен специально для русскоговорящего ученика: сначала сравниваем с русской логикой, потом показываем немецкий механизм и только после этого тренируем форму.","visualSchemes":[{"title":"Русская мысль -> немецкая форма","steps":[{"label":"1","title":"Смысл","text":"Что я хочу сказать по-русски?"},{"label":"2","title":"Форма","text":"Какой немецкий механизм нужен?","de":"Verb, Artikel, Kasus"},{"label":"3","title":"Контроль","text":"Проверяю порядок, падеж и регистр."}],"bars":[{"label":"смысл","value":70},{"label":"форма","value":90},{"label":"перевод","value":45}]}]},{"id":"a1-01-praesens","level":"A1","order":1,"module":"A1 база","title":"Регулярные глаголы в Präsens","goal":"Спрягать lernen, machen, wohnen.","rule":"У регулярных глаголов основа + окончание: ich -e, du -st, er/sie/es -t, wir -en, ihr -t, sie/Sie -en.","examples":[{"de":"ich lerne, du lernst, er lernt","ru":"я учу, ты учишь, он учит"},{"de":"Wir wohnen in Frankfurt.","ru":"Мы живём во Франкфурте."},{"de":"Du lernst Deutsch.","ru":"Ты учишь немецкий."}],"drills":[{"q":"du + lernen =","options":["du lerne","du lernst","du lernt"],"answer":1,"explanation":"Правильно: «du lernst». Для русскоговорящего главное - не переводить дословно, а проверить немецкую форму: глагол, артикль, падеж, предлог и порядок слов.","topic":""},{"q":"wir + machen =","options":["wir machen","wir macht","wir machst"],"answer":0,"explanation":"Правильно: «wir machen». Для русскоговорящего главное - не переводить дословно, а проверить немецкую форму: глагол, артикль, падеж, предлог и порядок слов.","topic":""},{"q":"ich + wohnen =","options":["ich wohnt","ich wohne","ich wohnen"],"answer":1,"explanation":"Правильно: «ich wohne». Для русскоговорящего главное - не переводить дословно, а проверить немецкую форму: глагол, артикль, падеж, предлог и порядок слов.","topic":""}],"tags":["verbs"],"deepTheoryRu":"Окончания прилагательных — одна из главных зон риска для русскоговорящих. В немецком окончание зависит от рода, числа, падежа и артикля. Не нужно угадывать — нужно видеть систему.","russianTrap":"Ловушка: везде ставить gute/guten. Например ein guter Plan, eine gute Idee, ein gutes Beispiel.","germanLogic":"Если артикль уже показывает род/падеж, прилагательное несёт меньше информации. Если артикль слабый или его нет, прилагательное несёт больше.","formula":"артикль + прилагательное + существительное; окончание зависит от грамматической информации.","typicalMistakes":["ein gute Plan","mit gutem Grund забывать Dativ","die langfristige Folgen вместо langfristigen"],"grammarTables":[{"title":"После ein-слов","headers":["Род/падеж","Пример","Почему"],"rows":[["муж. Nom.","ein guter Plan","прилагательное показывает мужской род"],["жен. Nom.","eine gute Idee","женский род уже виден"],["сред. Nom.","ein gutes Beispiel","прилагательное показывает средний род"],["Dativ","mit einem guten Arzt","после Dativ часто -en"]]},{"title":"После der-слов","headers":["Форма","Пример","Комментарий"],"rows":[["der","der gute Plan","слабое окончание"],["die","die gute Idee","слабое окончание"],["das","das gute Beispiel","слабое окончание"],["Plural","die guten Beispiele","часто -en"]]}],"whyForRussian":"Этот блок добавлен специально для русскоговорящего ученика: сначала сравниваем с русской логикой, потом показываем немецкий механизм и только после этого тренируем форму.","contrastExamples":[{"ru":"Ты учишь немецкий.","literal":"Не так: Du lernen Deutsch.","de":"Du lernst Deutsch.","note":"Для du нужно окончание -st."}],"visualSchemes":[{"title":"Русская мысль -> немецкая форма","steps":[{"label":"1","title":"Смысл","text":"Что я хочу сказать по-русски?"},{"label":"2","title":"Форма","text":"Какой немецкий механизм нужен?","de":"Verb, Artikel, Kasus"},{"label":"3","title":"Контроль","text":"Проверяю порядок, падеж и регистр."}],"bars":[{"label":"смысл","value":70},{"label":"форма","value":90},{"label":"перевод","value":45}]}]},{"id":"a1-02-","level":"A1","order":2,"module":"A1 база","title":"Частые нерегулярные глаголы","goal":"Узнать сильные изменения в Präsens.","rule":"У некоторых глаголов меняется гласная во 2/3 лице: fahren → du fährst, er fährt; lesen → du liest, er liest; sprechen → du sprichst.","examples":[{"de":"Er fährt mit dem Bus.","ru":"Он едет на автобусе."},{"de":"Sprichst du Deutsch?","ru":"Ты говоришь по-немецки?"}],"drills":[{"q":"er + fahren =","options":["er fährt","er fahrt","er fahren"],"answer":0,"explanation":"Правильно: «er fährt». Для русскоговорящего главное - не переводить дословно, а проверить немецкую форму: глагол, артикль, падеж, предлог и порядок слов.","topic":""},{"q":"du + sprechen =","options":["du sprechst","du sprichst","du sprechen"],"answer":1,"explanation":"Правильно: «du sprichst». Для русскоговорящего главное - не переводить дословно, а проверить немецкую форму: глагол, артикль, падеж, предлог и порядок слов.","topic":""},{"q":"lesen: er ...","options":["liest","lest","lesen"],"answer":0,"explanation":"Правильно: «liest». Для русскоговорящего главное - не переводить дословно, а проверить немецкую форму: глагол, артикль, падеж, предлог и порядок слов.","topic":""}],"tags":["verbs"],"deepTheoryRu":"Для русскоговорящего ученика важно не просто перевести фразу, а понять немецкий механизм: где глагол, какой падеж, какой артикль, какой стиль и почему выбран именно этот вариант.","russianTrap":"Ловушка: переводить слово в слово с русского и сохранять русский порядок слов.","germanLogic":"Немецкий строит смысл через форму: позицию глагола, артикль, падеж, предлог и рамку.","formula":"смысл → грамматическая роль → немецкая форма → пример","typicalMistakes":["дословный перевод","пропуск артикля","русский порядок слов"],"grammarTables":[{"title":"Мини-чеклист","headers":["Что проверить","Вопрос","Пример"],"rows":[["глагол","где стоит?","V2 или конец придаточного"],["артикль","какой род?","der/die/das"],["падеж","какая роль?","Akkusativ/Dativ/Genitiv"],["стиль","официально или разговорно?","Sie / du"]]}],"whyForRussian":"Этот блок добавлен специально для русскоговорящего ученика: сначала сравниваем с русской логикой, потом показываем немецкий механизм и только после этого тренируем форму.","visualSchemes":[{"title":"Русская мысль -> немецкая форма","steps":[{"label":"1","title":"Смысл","text":"Что я хочу сказать по-русски?"},{"label":"2","title":"Форма","text":"Какой немецкий механизм нужен?","de":"Verb, Artikel, Kasus"},{"label":"3","title":"Контроль","text":"Проверяю порядок, падеж и регистр."}],"bars":[{"label":"смысл","value":70},{"label":"форма","value":90},{"label":"перевод","value":45}]}]},{"id":"a1-03-der-die-das-nominativ","level":"A1","order":3,"module":"A1 база","title":"Артикли der/die/das и Nominativ","goal":"Понять род и форму подлежащего.","rule":"В Nominativ артикли: der Mann, die Frau, das Kind, die Leute. Род нужно учить вместе со словом.","examples":[{"de":"Der Arzt hilft.","ru":"Врач помогает."},{"de":"Die Frage ist wichtig.","ru":"Вопрос важен."},{"de":"Das Kind schläft.","ru":"Ребёнок спит."}],"drills":[{"q":"Какой артикль у Frau?","options":["der","die","das"],"answer":1,"explanation":"Правильно: «die». Артикль нужно учить вместе с существительным: он показывает род, число и падеж, которых в русском нет в такой форме.","topic":""},{"q":"Nominativ отвечает на вопрос...","options":["кто/что делает?","кого/что?","кому?"],"answer":0,"explanation":"Правильно: «кто/что делает?». Артикль нужно учить вместе с существительным: он показывает род, число и падеж, которых в русском нет в такой форме.","topic":""},{"q":"Множественное число в Nominativ чаще:","options":["die","der","das"],"answer":0,"explanation":"Правильно: «die». Артикль нужно учить вместе с существительным: он показывает род, число и падеж, которых в русском нет в такой форме.","topic":""}],"tags":["cases"],"deepTheoryRu":"В русском нет артиклей, поэтому русскоговорящий часто хочет учить только слово. В немецком это ошибка: существительное надо учить вместе с der/die/das, потому что род влияет на Akkusativ, Dativ, Genitiv и окончания прилагательных.","russianTrap":"Ловушка: учить Termin без der. Потом сложно понять, почему einen Termin, mit dem Termin, wegen des Termins.","germanLogic":"Артикль — это не украшение, а грамматическая метка рода, числа и падежа.","formula":"слово = артикль + существительное + пример: der Termin — Ich habe einen Termin.","typicalMistakes":["учить слово без артикля","путать der/die/das","не менять мужской род в Akkusativ"],"grammarTables":[{"title":"Артикли в Nominativ","headers":["Род/число","Определённый","Неопределённый","Пример"],"rows":[["мужской","der","ein","der Termin / ein Termin"],["женский","die","eine","die Frage / eine Frage"],["средний","das","ein","das Formular / ein Formular"],["множественное","die","-","die Unterlagen"]]},{"title":"Мини-логика артикля","headers":["Функция","Что показывает","Почему важно"],"rows":[["род","der/die/das","влияет на падеж"],["падеж","den/dem/des...","показывает роль слова"],["число","die Plural","множественное часто отличается"]]}],"whyForRussian":"Этот блок добавлен специально для русскоговорящего ученика: сначала сравниваем с русской логикой, потом показываем немецкий механизм и только после этого тренируем форму.","visualSchemes":[{"title":"Артикль как метка формы","steps":[{"label":"1","title":"Род","text":"Учить слово вместе с der/die/das.","de":"der Termin"},{"label":"2","title":"Падеж","text":"Роль меняет артикль.","de":"den Termin"},{"label":"3","title":"Фраза","text":"Сразу закреплять в примере.","de":"Ich habe einen Termin."}],"bars":[{"label":"род","value":80},{"label":"падеж","value":90},{"label":"пример","value":70}]}]},{"id":"a1-04-akkusativ","level":"A1","order":4,"module":"A1 база","title":"Akkusativ: прямой объект","goal":"Сказать, кого/что видят, покупают, имеют.","rule":"В Akkusativ меняется то кому? чаще всего =","options":["Dativ","Akkusativ","Genitiv"],"answer":0,"explanation":"Правильно: «Dativ». Артикль нужно учить вместе с существительным: он показывает род, число и падеж, которых в русском нет в такой форме.","topic":""}],"tags":["cases"],"deepTheoryRu":"В русском нет артиклей, поэтому русскоговорящий часто хочет учить только слово. В немецком это ошибка: существительное надо учить вместе с der/die/das, потому что род влияет на Akkusativ, Dativ, Genitiv и окончания прилагательных.","russianTrap":"Ловушка: учить Termin без der. Потом сложно понять, почему einen Termin, mit dem Termin, wegen des Termins.","germanLogic":"Артикль — это не украшение, а грамматическая метка рода, числа и падежа.","formula":"слово = артикль + существительное + пример: der Termin — Ich habe einen Termin.","typicalMistakes":["учить слово без артикля","путать der/die/das","не менять мужской род в Akkusativ"],"grammarTables":[{"title":"Артикли в Nominativ","headers":["Род/число","Определённый","Неопределённый","Пример"],"rows":[["мужской","der","ein","der Termin / ein Termin"],["женский","die","eine","die Frage / eine Frage"],["средний","das","ein","das Formular / ein Formular"],["множественное","die","-","die Unterlagen"]]},{"title":"Мини-логика артикля","headers":["Функция","Что показывает","Почему важно"],"rows":[["род","der/die/das","влияет на падеж"],["падеж","den/dem/des...","показывает роль слова"],["число","die Plural","множественное часто отличается"]]}],"whyForRussian":"Этот блок добавлен специально для русскоговорящего ученика: сначала сравниваем с русской логикой, потом показываем немецкий механизм и только после этого тренируем форму.","contrastExamples":[{"ru":"Я еду на автобусе.","literal":"Не так: Ich fahre mit den Bus.","de":"Ich fahre mit dem Bus.","note":"mit требует Dativ."}],"visualSchemes":[{"title":"Артикль как метка формы","steps":[{"label":"1","title":"Род","text":"Учить слово вместе с der/die/das.","de":"der Termin"},{"label":"2","title":"Падеж","text":"Роль меняет артикль.","de":"den Termin"},{"label":"3","title":"Фраза","text":"Сразу закреплять в примере.","de":"Ich habe einen Termin."}],"bars":[{"label":"род","value":80},{"label":"падеж","value":90},{"label":"пример","value":70}]}]},{"id":"a1-06-","level":"A1","order":6,"module":"A1 база","title":"Модальные глаголы","goal":"Сказать могу/должен/хочу/разрешено.","rule":"Модальный глагол стоит на втором месте, основной инфинитив уходит в конец: Ich muss arbeiten. Частые: können, müssen, wollen, möchten, dürfen, sollen.","examples":[{"de":"Ich möchte einen Termin vereinbaren.","ru":"Я хотел(а) бы записаться."},{"de":"Wir müssen heute arbeiten.","ru":"Мы должны сегодня работать."},{"de":"Darf ich fragen?","ru":"Можно спросить?"}],"drills":[{"q":"Правильный порядок:","options":["Ich muss heute arbeiten.","Ich heute arbeiten muss.","Ich muss heute arbeite."],"answer":0,"explanation":"Правильно: «Ich muss heute arbeiten.». После модального глагола смысловой глагол обычно стоит в конце в инфинитиве.","topic":""},{"q":"möchten значит...","options":["хотел бы","должен","могу"],"answer":0,"explanation":"Правильно: «хотел бы». Модальный глагол занимает вторую позицию, а смысловой глагол уходит в конец в инфинитиве.","topic":""},{"q":"Инфинитив после модального стоит...","options":["в конце","на первом месте","не нужен"],"answer":0,"explanation":"Правильно: «в конце». Модальный глагол занимает вторую позицию, а смысловой глагол уходит в конец в инфинитиве.","topic":""}],"tags":["modal"],"deepTheoryRu":"Модальный глагол в немецком занимает место спрягаемого глагола, а смысловой глагол уходит в конец в инфинитиве. Для русского это непривычно: «я должен сегодня работать» → Ich muss heute arbeiten.","russianTrap":"Ловушка: Ich muss heute arbeite. После модального нужен инфинитив arbeiten.","germanLogic":"Модальный глагол открывает рамку, инфинитив закрывает рамку.","formula":"Subjekt + Modalverb + ... + Infinitiv","typicalMistakes":["Ich muss arbeite","Ich heute muss arbeiten","Ich möchte einen Termin vereinbare"],"grammarTables":[{"title":"Модальные глаголы","headers":["Глагол","Смысл","Пример"],"rows":[["können","мочь/уметь","Ich kann kommen."],["müssen","должен","Ich muss arbeiten."],["wollen","хотеть","Ich will lernen."],["möchten","хотел бы","Ich möchte einen Termin."],["dürfen","можно/иметь разрешение","Darf ich fragen?"],["sollen","следует/должен по поручению","Sie sollen warten."]]}],"whyForRussian":"Этот блок добавлен специально для русскоговорящего ученика: сначала сравниваем с русской логикой, потом показываем немецкий механизм и только после этого тренируем форму.","visualSchemes":[{"title":"Русская мысль -> немецкая форма","steps":[{"label":"1","title":"Смысл","text":"Что я хочу сказать по-русски?"},{"label":"2","title":"Форма","text":"Какой немецкий механизм нужен?","de":"Verb, Artikel, Kasus"},{"label":"3","title":"Контроль","text":"Проверяю порядок, падеж и регистр."}],"bars":[{"label":"смысл","value":70},{"label":"форма","value":90},{"label":"перевод","value":45}]}]},{"id":"a1-07-","level":"A1","order":7,"module":"A1 база","title":"Отделяемые глаголы","goal":"Понять anrufen, aufstehen, einkaufen.","rule":"В Präsens приставка отделяется и уходит в конец: Ich rufe dich an. В Perfekt Partizip часто с ge внутри: angerufen, eingekauft.","examples":[{"de":"Ich stehe um sieben Uhr auf.","ru":"Я встаю в семь."},{"de":"Rufen Sie mich bitte an.","ru":"Позвоните мне, пожалуйста."},{"de":"Wir kaufen heute ein.","ru":"Мы сегодня закупаемся."}],"drills":[{"q":"anrufen: Ich ... dich ...","options":["rufe / an","anrufe / —","rufe / auf"],"answer":0,"explanation":"Правильно: «rufe / an». У отделяемого глагола спрягается основа, а приставка закрывает фразу в конце: rufe ... an.","topic":""},{"q":"aufstehen значит...","options":["вставать","звонить","покупать"],"answer":0,"explanation":"Правильно: «вставать». У отделяемого глагола спрягается основа, а приставка закрывает фразу в конце: rufe ... an.","topic":""},{"q":"Приставка в Präsens ча
