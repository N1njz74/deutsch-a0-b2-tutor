lumns:repeat(3,minmax(0,1fr));gap:14px}.grid2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.card{padding:16px}.quick{display:block;text-decoration:none;color:var(--text);min-height:160px}.quick b{display:block;font-size:1.12rem;margin-bottom:8px}.quick .tag{display:inline-flex;margin-top:10px}.tag{border:1px solid rgba(96,165,250,.45);background:rgba(96,165,250,.12);color:#dbeafe;border-radius:999px;padding:4px 8px;font-size:.78rem}.tag.ok{border-color:rgba(52,211,153,.45);background:rgba(52,211,153,.12)}.tag.warn{border-color:rgba(251,191,36,.45);background:rgba(251,191,36,.1)}.section{margin-top:26px}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}.tab{border:1px solid var(--line);background:#0b1220;color:var(--text);border-radius:999px;padding:8px 12px}.tab.active{border-color:var(--accent);background:rgba(96,165,250,.16)}.lesson{display:grid;grid-template-columns:1fr auto;gap:12px;margin:12px 0}.lesson.done{opacity:.62}.btn{border:0;border-radius:12px;background:linear-gradient(135deg,#2563eb,#16a34a);color:white;padding:10px 13px;font-weight:650}.btn.secondary{background:#1f2937;border:1px solid var(--line)}.btn.danger{background:#7f1d1d}.btn.small{padding:7px 10px;font-size:.86rem}.examples{display:grid;gap:7px;margin-top:9px}.ex{border-left:3px solid var(--accent);padding:8px 10px;background:rgba(96,165,250,.08);border-radius:9px}.task{border-left:3px solid var(--warn);padding:8px 10px;background:rgba(251,191,36,.08);border-radius:9px;margin-top:9px}.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin:12px 0}.field{border:1px solid var(--line);border-radius:12px;background:#07101f;color:var(--text);padding:9px 11px}.vocab{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.word{display:grid;grid-template-columns:1fr 1fr;gap:10px;border:1px solid var(--line);border-radius:14px;padding:10px;background:rgba(15,23,42,.75)}.word small{display:block;color:var(--muted)}.diag{display:grid;gap:12px}.q{     A0:[
      ['a0-01','Буквы, звуки и первые фразы','В немецком важно сразу привыкнуть к артиклю и порядку слов. Минимальная фраза: подлежащее + глагол.',['Ich bin Anna. — Я Анна.','Das ist ein Buch. — Это книга.','Ich lerne Deutsch. — Я учу немецкий.'],'Составьте 3 фразы о себе: Ich bin…, Ich habe…, Ich lerne…'],
      ['a0-02','Артикли der, die, das','У каждого существительного есть род. Учите слово сразу с артиклем.',['der Arzt','die Sprache','das Zimmer'],'Подберите артикль: ___ Haus, ___ Frau, ___ Mann.'],
      ['a0-03','Глагол sein','sein = быть. Формы: ich bin, du bist, er/sie/es ist, wir sind.',['Ich bin müde.','Du bist hier.','Wir sind bereit.'],'Переведите: Я здесь. Мы готовы. Она врач.'],
      ['a0-04','Глагол haben','haben = иметь. Формы: ich habe, du hast, er/sie/es hat, wir haben.',['Ich habe Zeit.','Sie hat ein Auto.','Wir haben Fragen.'],'Скажите по-немецки: У меня есть вопрос. У нас есть время.'],
      ['a0-05','Отрицание nicht и kein','nicht отрицает действие или признак. kein отрицает существительное с неопределённым артиклем.',['Ich komme nicht.','Das ist kein Problem.','Ich habe keine Zeit.'],'Выберите: Ich habe ___ Auto. Ich bin ___ müde.'],
      ['a0-06','Вопросы Ja/Nein','В вопросе без вопросительного слова глагол стоит на первом месте.',['Kommst du?','Haben Sie Zeit?','Ist das frei?'],'Сделайте вопрос: Du lernst Deutsch. Sie haben Zeit.']
    ],
    A1:[
      ['a1-01','Спряжение регулярных глаголов','Основа + окончания: ich -e, du -st, er -t, wir -en, ihr -t, sie -en.',['ich mache','du lernst','wir wohnen'],'Проспрягайте lernen в ich, du, wir.'],
      ['a1-02','Порядок слов в обычном предложении','В простом предложении личный глагол обычно на позиции 2.',['Heute lerne ich.','Ich lerne heute.','Am Montag arbeite ich.'],'Поменяйте начало: Ich gehe morgen zum Arzt.'],
      ['a1-03','Akkusativ','Akkusativ отвечает на кого/что. der → den, ein → einen.',['Ich sehe den Mann.','Sie kauft einen Mantel.','Wir brauchen das Formular.'],'Поставьте артикль: Ich nehme ___ Bus.'],
      ['a1-04','Модальные глаголы','Модальный глагол стоит на позиции 2, смысловой инфинитив уходит в конец.',['Ich kann kommen.','Du musst lernen.','Wir wollen bezahlen.'],'Скажите: Я должен работать. Она хочет позвонить.'],
      ['a1-05','Предлоги места','Wo? часто требует Dativ: in der Stadt, im Zimmer, auf dem Tisch.',['Ich bin im Büro.','Das liegt auf dem Tisch.','Wir wohnen in Frankfurt.'],'Ответьте: Wo bist du?'],
      ['a1-06','Perfekt для прошлого','haben/sein + Partizip II. Для движения часто sein.',['Ich habe gelernt.','Sie ist gekommen.','Wir haben gegessen.'],'Скажите: Я купил. Мы пришли.']

      ['a2-01','Dativ','Dativ отвечает на кому/где. der/das → dem, die → der, plural → den + n.',['Ich helfe dem Kind.','Wir sprechen mit der Ärztin.','Das liegt auf den Tischen.'],'Поставьте Dativ: mit ___ Freund, bei ___ Klinik.'],
      ['a2-02','Wechselpräpositionen','Wo? = Dativ. Wohin? = Akkusativ.',['Ich bin in der Klinik.','Ich gehe in die Klinik.','Das Bild hängt an der Wand.'],'Различите: in ___ Praxis / in ___ Praxis gehen.'],
      ['a2-03','Nebensätze mit weil, dass, wenn','В придаточном предложении глагол уходит в конец.',['Ich lerne, weil ich arbeiten möchte.','Ich glaube, dass es stimmt.','Wenn ich Zeit habe, übe ich.'],'Продолжите: Ich lerne Deutsch, weil…'],

      ['b1-05','Zweiteilige Konnektoren','Не только…, но и…; либо…, либо…; хотя…, но…',['nicht nur…, sondern auch…','entweder…, oder…','zwar…, aber…'],'Составьте 2 фразы о работе и учёбе.'],

      ['b2-03','Partizipialattribute','Причастные обороты делают речь компактной и письменной.',['die bereits bezahlte Rechnung','der zu unterschreibende Vertrag','die im Bericht genannten Risiken'],'Раскройте: die bestätigte Anmeldung.'],

  ];
  const diag=[
    ['A0','Что значит Ich bin?',['я есть/я являюсь','у меня есть','я иду'],0],['A0','Где правильный артикль?',['der Haus','das Haus','die Haus'],1],['A1','Где глагол на позиции 2?',['Heute ich lerne.','Heute lerne ich.','Heute ich Deutsch lerne.'],1],['A1','Akkusativ от der Mann?',['dem Mann','den Mann','des Mannes'],1],['A1','Правильная модальная рамка:',['Ich kann Deutsch sprechen.','Ich Deutsch sprechen kann.','Ich kann spreche Deutsch.'],0],['A2','После weil глагол…',['на позиции 2','в конце','не нужен'],1],['A2','Wo? in…',['die Klinik','der Klinik','den Klinik'],1],['A2','Perfekt от kommen:',['ich habe gekommen','ich bin gekommen','ich komme gehabt'],1],['B1','Вежливо попросить:',['Gib mir!','Könnten Sie mir helfen?','Du hilfst jetzt.'],1],['B1','Passiv Präsens:',['Der Termin wird bestätigt.','Der Termin bestätigt.','Der Termin hat bestätigt.'],0],['B1','Genitiv:',['die Adresse die Klinik','die Adresse der Klinik','die Adresse dem Klinik'],1],['B2','Косвенная речь:',['Er sagt, er sei krank.','Er sagt, er ist krank immer.','Er sagt, krank er sei.'],0],['B2','Passiv с Modalverb:',['muss geprüft werden','wird prüfen müssen','prüfen muss werden'],0],['B2','Nominalstil:',['nach Prüfung der Unterlagen','nach wir prüfen die Unterlagen','weil Prüfung Unterlagen'],0],['B2','hingegen означает:',['напротив/зато','потому что','несмотря на'],0]
  ];
  let state={done:{},hideDone:false,level:'A0',profile:{medical:false,swiss:false,plastic:false},answers:{},vocabLevel:'Alle',vocabTopic:'Alle',vocabSearch:'',result:null};
  try{state={...state,...JSON.parse(localStorage.getItem(storeKey)||'{}')}}catch(e){}
  const save=()=>localStorage.setItem(storeKey,JSON.stringify(state));
  const allLessons=()=>levels.flatMap(l=>grammar[l].map(x=>({level:l,id:x[0],title:x[1],rule:x[2],examples:x[3],task:x[4]})));
  function route(){return (location.hash||'#home').slice(1)}
  function nav(){const html=links.map(x=>`<a href="#${x[0]}">${x[1]}</a>`).join('');$('#nav').innerHTML=html;$('#drawerLinks').innerHTML=html+levels.map(l=>`<a href="#path/${l}">${l}</a>`).join('')}
  function progress(){const total=allLessons().length,done=Object.keys(state.done||{}).length;return {total,done,pct:Math.round(done/total*100)}}
  function appHeader(title,sub=''){return `<section class="panel"><h1>${title}</h1>${sub?`<p class="lead">${sub}</p>`:''}</section>`}
  function renderHome(){const p=progress();return `<section class="hero"><div class="panel"><h1>Немецкий с нуля до B2</h1><p class="lead">Короткое правило → примеры → тренировка → мини‑проверка. Быстрые входы в грамматику B2, словарь и диагностику вынесены на первый экран.</p><div class="toolbar"><span class="tag ok">A0–B2</span><span class="tag">v14 · GitHub Pages</span><span class="tag warn">прогресс сохраняется локально</span></div><div class="progressbar"><i style="width:${p.pct}%"></i></div><p class="muted">Изучено: ${p.done}/${p.total} уроков (${p.pct}%).</p></div><div class="panel"><h2>Быстрый старт</h2><p class="muted">Выберите самый короткий путь.</p><div class="toolbar"><a class="btn" href="#path/A0">Я новичок</a><a class="btn secondary" href="#diagnostic">Проверить уровень</a><a class="btn secondary" href="#b2">Грамматика B2</a><a class="btn secondary" href="#vocab">Словарь</a></div></div></section><section class="section grid"><a class="card quick" href="#path/A0"><b>Путь с нуля до B2</b><p class="muted">Уровни A0, A1, A2, B1, B2. Каждый урок короткий и проверяемый.</p><span class="tag">уроки</span></a><a class="card quick" href="#diagnostic"><b>Диагностика</b><p class="muted">15 вопросов. Результат показывает, с какого уровня начать.</p><span class="tag">5 минут</span></a><a class="card quick" href="#b2"><b>Грамматика B2 коротко</b><p class="muted">Сжатый список тем B2 без длинного поиска по приложению.</p><span class="tag">экзамен</span></a><a class="card quick" href="#vocab"><b>Словарь отдельно</b><p class="muted">Фильтр по уровню, теме и поиску. Есть медицина и Швейцария.</p><span class="tag">слова</span></a></section><section class="section grid3"><div class="card"><h3>Как учиться</h3><p>1. Пройдите диагностику. 2. Откройте нужный уровень. 3. Нажимайте ✓ изучено. 4. Включайте скрытие изученного только осознанно.</p></div><div class="card"><h3>Не теряем материал</h3><p>По умолчанию изученные уроки остаются видимыми. Отдельный переключатель скрывает их из списка.</p></div><div class="card"><h3>Профильные блоки</h3><p>Медицина, клиника, Швейцария и пластическая хирургия вынесены в словарь и дополнительные фразы.</p></div></section>`}
  function lessonCard(x){if(state.hideDone&&state.done[x.id])return '';return `<article class="card lesson ${state.done[x.id]?'done':''}"><div><h3>${x.level}: ${x.title}</h3><p>${x.rule}</p><div class="examples">${x.examples.map(e=>`<div class="ex">${e}</div>`).join('')}</div><div class="task"><b>Мини‑проверка:</b> ${x.task}</div></div><div><button class="btn small" data-done="${x.id}">${state.done[x.id]?'✓ изучено':'Отметить ✓'}</button></div></article>`}
  function renderPath(level='A0'){state.level=level;save();const list=grammar[level].map(x=>({level,id:x[0],title:x[1],rule:x[2],examples:x[3],task:x[4]}));return `${appHeader('Путь A0–B2',`Текущий уровень: ${level}. Можно переключаться без потери прогресса.`)}<section class="section"><div class="tabs">${levels.map(l=>`<a class="tab ${l==level?'active':''}" href="#path/${l}">${l}</a>`).join('')}<label class="tab"><input type="checkbox" id="hideDone" ${state.hideDone?'checked':''}> скрывать изученное</label></div>${list.map(lessonCard).join('')||'<div class="note">Все уроки этого уровня скрыты как изученные. Отключите фильтр, чтобы вернуть их.</div>'}</section>`}
  function renderB2(){const lessons=grammar.B2.map(x=>({level:'B2',id:x[0],title:x[1],rule:x[2],examples:x[3],task:x[4]}));return `${appHeader('Грамматика B2 коротко','Главные темы B2 в сжатом виде. Это отдельный быстрый вход, а не спрятанный раздел.') }<section class="section grid3">${b2Rules.map(r=>`<div class="card"><h3>${r[0]}</h3><p>${r[1]}</p></div>`).join('')}</section><section class="section"><h2>Уроки B2</h2>${lessons.map(lessonCard).join('')}</section>`}
  function renderVocab(){const topics=[...new Set(vocab.map(v=>v[1]))];let rows=vocab.filter(v=>(state.vocabLevel=='Alle'||v[0]==state.vocabLevel)&&(state.vocabTopic=='Alle'||v[1]==state.vocabTopic)&&(!state.vocabSearch||(`${v[2]} ${v[3]} ${v[1]}`).toLowerCase().includes(state.vocabSearch.toLowerCase())));return `${appHeader('Словарь отдельно','Фильтры по уровню, теме и поиску. Слова учите сразу с артиклем и примерным контекстом.') }<section class="section toolbar"><select class="field" id="vLevel"><option>Alle</option>${levels.map(l=>`<option ${state.vocabLevel==l?'selected':''}>${l}</option>`).join('')}</select><select class="field" id="vTopic"><option>Alle</option>${topics.map(t=>`<option ${state.vocabTopic==t?'selected':''}>${t}</option>`).join('')}</select><input class="field" id="vSearch" placeholder="поиск" value="${state.vocabSearch||''}"><button class="btn secondary" id="clearV">Сброс</button></section><section class="vocab">${rows.map(v=>`<div class="word"><div><b>${v[2]}</b><small>${v[0]} · ${v[1]}</small></div><div>${v[3]}</div></div>`).join('')||'<div class="note">Нет слов по выбранному фильтру.</div>'}</section><section class="section note">Совет: для B2 добавляйте не отдельные слова, а связки: <b>aus meiner Sicht</b>, <b>im Vergleich dazu</b>, <b>unter bestimmten Umständen</b>.</section>`}
  function renderDiag(){let score=0;diag.forEach((q,i)=>{if(Number(state.answers[i])===q[3])score++});let rec='A0';if(score>=13)rec='B2';else if(score>=10)rec='B1';else if(score>=7)rec='A2';else if(score>=4)rec='A1';const result=state.result?`<div class="note"><h3>Результат: ${score}/${diag.length}</h3><p>Рекомендуемый старт: <b>${rec}</b>. Откройте <a href="#path/${rec}">уровень ${rec}</a> и пройдите уроки по порядку.</p></div>`:'';return `${appHeader('Проверка уровня','Ответьте на вопросы. Это не официальный экзамен, а практическая диагностика для выбора старта.') }<section class="section diag">${diag.map((q,i)=>`<div class="q"><b>${i+1}. ${q[1]}</b>${q[2].map((a,j)=>`<label><input type="radio" name="q${i}" value="${j}" ${Number(state.answers[i])===j?'checked':''}> ${a}</label>`).join('')}</div>`).join('')}<div class="toolbar"><button class="btn" id="finishDiag">Показать результат</button><button class="btn secondary" id="resetDiag">Сбросить</button></div>${result}</section>`}
  function renderTrainer(){let due=allLessons().filter(x=>!state.done[x.id]).slice(0,8);return `${appHeader('Тренировка','Короткая очередь: сначала неизученные уроки. Отмечайте готовые темы.') }<section class="section">${due.map(lessonCard).join('')||'<div class="note">Все уроки отмечены как изученные. Можно сбросить прогресс в разделе Прогресс.</div>'}</section>`}
  function renderProgress(){const p=progress();return `${appHeader('Прогресс','Состояние хранится в браузере через localStorage. На другом устройстве прогресс будет отдельным.') }<section class="section grid3"><div class="card"><h3>${p.done}/${p.total}</h3><p class="muted">уроков изучено</p><div class="progressbar"><i style="width:${p.pct}%"></i></div></div><div class="card"><h3>Фильтр</h3><label><input type="checkbox" id="hideDone2" ${state.hideDone?'checked':''}> скрывать изученное</label><p class="muted">По умолчанию материал не исчезает.</p></div><div class="card"><h3>Действия</h3><div class="toolbar"><button class="btn secondary" id="export">Экспорт JSON</button><button class="btn danger" id="resetAll">Сброс</button></div></div></section><section class="section card"><h2>Изученные темы</h2><p>${allLessons().filter(x=>state.done[x.id]).map(x=>`${x.level}: ${x.title}`).join(' · ')||'Пока нет отметок.'}</p></section>`}
  function renderProfile(){return `${appHeader('Профильные блоки','Необязательные темы для медицины, клиники, Швейцарии и пластической хирургии.') }<section class="section grid3"><div class="card"><h3>Медицина</h3><p>der Befund, die Behandlung, der Eingriff, die Nachsorge, die Beschwerden.</p></div><div class="card"><h3>Клиника и Швейцария</h3><p>das Spital, die Krankenkasse, der Kanton, die Praxis, die Überweisung.</p></div><div class="card"><h3>Пластическая хирургия</h3><p>die Beratung, die Narkose, das Risiko, die Heilung, die Nachkontrolle.</p></div></section>`}
  function render(){nav();let r=route(),html='';if(r.startsWith('path/'))html=renderPath(r.split('/')[1]||state.level);else if(r=='diagnostic')html=renderDiag();else if(r=='b2')html=renderB2();else if(r=='vocab')html=renderVocab();else if(r=='trainer')html=renderTrainer();else if(r=='progress')html=renderProgress();else if(r=='profile')html=renderProfile();else html=renderHome();$('#app').innerHTML=html+`<footer class="footer">v14.0 · автономный HTML · цель: A0–B2, B2‑грамматика и словарь без лишнего входного барьера.</footer>`;bind();window.scrollTo(0,0)}
  function bind(){document.querySelectorAll('[data-done]').forEach(b=>b.onclick=()=>{state.done[b.dataset.done]=!state.done[b.dataset.done];if(!state.done[b.dataset.done])delete state.done[b.dataset.done];save();render()});['hideDone','hideDone2'].forEach(id=>{let e=$('#'+id);if(e)e.onchange=()=>{state.hideDone=e.checked;save();render()}});let vl=$('#vLevel');if(vl)vl.onchange=()=>{state.vocabLevel=vl.value;save();render()};let vt=$('#vTopic');if(vt)vt.onchange=()=>{state.vocabTopic=vt.value;save();render()};let vs=$('#vSearch');if(vs)vs.oninput=()=>{state.vocabSearch=vs.value;save();render()};let cv=$('#clearV');if(cv)cv.onclick=()=>{state.vocabLevel='Alle';state.vocabTopic='Alle';state.vocabSearch='';save();render()};document.querySelectorAll('.q input').forEach(inp=>inp.onchange=()=>{state.answers[inp.name.slice(1)]=Number(inp.value);save()});let fd=$('#finishDiag');if(fd)fd.onclick=()=>{state.result=true;save();render()};let rd=$('#resetDiag');if(rd)rd.onclick=()=>{state.answers={};state.result=false;save();render()};let ex=$('#export');if(ex)ex.onclick=()=>{let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(state,null,2)],{type:'application/json'}));a.download='deutsch-progress.json';a.click()};let rs=$('#resetAll');if(rs)rs.onclick=()=>{if(confirm('Сбросить прогресс?')){localStorage.removeItem(storeKey);location.reload()}}}
  $('#menu').onclick=()=>{$('#drawer').classList.add('open');$('#shade').classList.add('open')};$('#shade').onclick=()=>{$('#drawer').classList.remove('open');$('#shade').classList.remove('open')};$('#drawer').onclick=e=>{if(e.target.tagName=='A')$('#shade').onclick()};$('#print').onclick=()=>print();$('#search').addEventListener('keydown',e=>{if(e.key==='Enter'){state.vocabSearch=e.target.value;state.vocabLevel='Alle';state.vocabTopic='Alle';save();location.hash='vocab'}});addEventListener('hashchange',render);render();
  </script>
