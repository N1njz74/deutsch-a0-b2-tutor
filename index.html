e."},{"type":"Швейцария B2","prompt":"Напишите письмо в Krankenkasse: уточните Franchise, Kostenübernahme и необходимые Unterlagen."},{"type":"Пластическая хирургия B2","prompt":"Аргументируйте нейтрально: какие риски есть у эстетического вмешательства и почему важны realistiche Erwartungen."},{"type":"Строительство/АКЗ B2","prompt":"Опишите рабочий дефект: Schichtdicke недостаточная, Untergrund плохо vorbereitet, нужна Nachbesserung и Prüfprotokoll."},{"type":"Самопроверка B2","prompt":"Возьмите свой текст на 180 слов и исправьте: Verbposition, Kasus, Register, Wiederholungen, Absatzlogik."},{"type":"Nominalstil B2","prompt":"Перепишите 8 предложений в официальный стиль: prüfen → nach Prüfung, klären → zur Klärung, durchführen → Durchführung."},{"type":"Аргументация B2","prompt":"Сравните очный языковой курс и приложение: Kosten, Flexibilität, Motivation, Qualität, soziale Kontakte."},{"type":"Медиация B2","prompt":"Передайте по-русски содержание немецкого письма от клиники: Termin, Kosten, Risiken, Unterlagen, Frist."}],"levelGuides":{"A0":{"title":"A0: карта старта для русскоговорящего","focus":"Звуки, готовые фразы, V2, первые артикли.","blocks":["Не переводить «меня зовут» и возраст дословно.","Сразу учить слово с артиклем.","Каждое утверждение проверять по позиции глагола.","Просьбы учить готовыми вежливыми блоками."],"flow":["звук","слово с артиклем","готовая фраза","мини-вопрос","ответ вслух"],"bars":[{"label":"чтение","value":90},{"label":"шаблоны","value":85},{"label":"артикль","value":60},{"label":"V2","value":65}]},"A1":{"title":"A1: карта базового предложения","focus":"Глагол, артикль, Akkusativ/Dativ, бытовые сценарии.","blocks":["Глагол согласуется с лицом: ich lerne, du lernst.","Akkusativ и Dativ выбирать по управлению.","Отделяемые приставки держать в конце.","Ситуации «врач, город, документы, работа» тренировать фразами."],"flow":["кто действует","глагол","объект","падеж","место/время"],"bars":[{"label":"Präsens","value":85},{"label":"Akk/Dativ","value":75},{"label":"сценарии","value":80},{"label":"приставки","value":65}]},"A2":{"title":"A2: карта связной речи","focus":"Причина, цель, прошлое, придаточные и документы.","blocks":["После weil/dass/wenn/ob глагол уходит в конец.","Perfekt держит рамку haben/sein + Partizip II.","um ... zu объясняет цель без дословного русского «чтобы».","Сообщения и звонки строить короткими блоками."],"flow":["главная мысль","связка","придаточное","глагол в конце","проверка смысла"],"bars":[{"label":"Nebensatz","value":90},{"label":"Perfekt","value":80},{"label":"цель","value":75},{"label":"документы","value":70}]},"B1":{"title":"B1: карта самостоятельного ответа","focus":"Аргумент, письмо, мнение, управление глаголов.","blocks":["Ответ строить блоками: Thema -> Meinung -> Grund -> Beispiel -> Fazit.","В официальном письме избегать давления и эмоций.","Verben mit Präpositionen учить как цельные конструкции.","Relativsatz использовать для уточнения без длинной русской кальки."],"flow":["тема","мнение","причина","пример","вывод"],"bars":[{"label":"структура","value":85},{"label":"письмо","value":80},{"label":"управление","value":75},{"label":"связки","value":80}]},"B2":{"title":"B2: карта качества, точности и регистра","focus":"Дифференцированная аргументация, Nominalstil, Passiv, Konjunktiv, регистр и редактура.","blocks":["Каждый B2-текст должен иметь тезис, ограничение, аргумент, пример и вывод.","Nominalstil использовать там, где нужен официальный и компактный стиль.","Passiv выбирать, когда важнее процесс или результат, а не исполнитель.","Konnektoren должны не просто украшать текст, а показывать причинно-следственную логику.","Русскую длинную фразу лучше разбить или заменить немецкой конструкцией.","Перед сдачей проверять Valenz, Kasus, Verbposition, Register, Artikel."],"flow":["позиция","аргумент","ограничение","пример","B2-форма","редактура"],"bars":[{"label":"Argumentation","value":95},{"label":"Nominalstil","value":90},{"label":"Passiv","value":85},{"label":"Register","value":95},{"label":"Fehleranalyse","value":90}]}}}</script>
  <script>
  (() => {
    'use strict';

    const DATA = JSON.parse(document.getElementById('app-data').textContent);
        // v147-local-user-profiles
    const STORE_KEY_BASE = 'deTutor.v2';
    const ACTIVE_PROFILE_KEY = STORE_KEY_BASE + ':activeProfile';
    const PROFILE_LIST_KEY = STORE_KEY_BASE + ':profiles';

    function safeProfileId(s){
      return String(s || 'main').replace(/[^a-zA-Z0-9_-]/g, '').slice(0, 32) || 'main';
    }

    function readActiveProfileId(){
      try {
        return safeProfileId(localStorage.getItem(ACTIVE_PROFILE_KEY) || 'main');
      } catch(e) {
        return 'main';
      }
    }

    let activeProfileId = readActiveProfileId();

    function profileStoreKey(id = activeProfileId){
      return STORE_KEY_BASE + ':profile:' + safeProfileId(id);
    }

    const STORE_KEY = {
      toString(){ return profileStoreKey(activeProfileId); }
    };

    function seedProfileFromLegacy(){
      try {
        const oldRaw = localStorage.getItem(STORE_KEY_BASE);
        const key = profileStoreKey(activeProfileId);
        if (oldRaw && !localStorage.getItem(key)) {
          localStorage.setItem(key, oldRaw);
        }
      } catch(e) {}
    }
    const LEVELS = DATA.levels;
    const NAV = [
      ['home','Главная'],
      ['diagnostic','Диагностика'],
      ['path','Путь A0→B2'],
      ['grammar','Грамматика'],
      ['b2','B2 коротко'],
      ['vocab','Словарь'],
      ['trainer','Тренажёр'],
      ['progress','Прогресс'],
      ['settings','Настройки']
    ];
    const $ = (s, root=document) => root.querySelector(s);
    const $$ = (s, root=document) => Array.from(root.querySelectorAll(s));
    const esc = (s) => String(s ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
    const cleanSpeak = (s) => String(s || '').replace(/\([^)]*\)/g,'').replace(/^[^A-Za-zÄÖÜäöüß]+/,'').trim();

    let state = loadState();

    function getProfiles(){
      let list = null;
      try { list = JSON.parse(localStorage.getItem(PROFILE_LIST_KEY) || 'null'); } catch(e) {}
      if (!Array.isArray(list) || !list.length) {
        list = [
          {id:'main', name:'Пользователь 1'},
          {id:'user2', name:'Пользователь 2'}
        ];
      }
      if (!list.some(p => safeProfileId(p.id) === activeProfileId)) {
        list.unshift({id:activeProfileId, name:'Текущий пользователь'});
      }
      return list.map(p => ({id:safeProfileId(p.id), name:String(p.name || p.id || 'Пользователь')}));
    }

    function saveProfiles(list){
      try { localStorage.setItem(PROFILE_LIST_KEY, JSON.stringify(list)); } catch(e) {}
    }

    function activeProfileName(){
      const p = getProfiles().find(x => x.id === activeProfileId);
      return p ? p.name : activeProfileId;
    }

    function switchProfile(id){
      saveState();
      activeProfileId = safeProfileId(id);
      try { localStorage.setItem(ACTIVE_PROFILE_KEY, activeProfileId); } catch(e) {}
      seedProfileFromLegacy();
      state = loadState();
      saveState();
      render();
      toast('Профиль: ' + activeProfileName());
    }

    function addProfile(){
      const name = prompt('Имя нового пользователя:', 'Пользователь');
      if (!name) return;
      const list = getProfiles();
      const id = 'u' + Date.now();
      list.push({id, name:name.trim()});
      saveProfiles(list);
      switchProfile(id);
    }

    function renameProfile(){
      const list = getProfiles();
      const current = list.find(p => p.id === activeProfileId);
      const name = prompt('Новое имя профиля:', current ? current.name : activeProfileId);
      if (!name) return;
      list.forEach(p => { if (p.id === activeProfileId) p.name = name.trim(); });
      saveProfiles(list);
      render();
      toast('Имя профиля обновлено');
    }

    function deleteProfile(){
      const list = getProfiles();
      if (list.length <= 1) return toast('Нельзя удалить единственный профиль');
      const current = list.find(p => p.id === activeProfileId);
      if (!confirm('Удалить профиль "' + (current ? current.name : activeProfileId) + '" и его локальный прогресс?')) return;
      try { localStorage.removeItem(profileStoreKey(activeProfileId)); } catch(e) {}
      const next = list.filter(p => p.id !== activeProfileId);
      saveProfiles(next);
      switchProfile(next[0].id);
    }

    function renderUserProfilePanel(){
      const profiles = getProfiles();
      return `<article class="card">
        <div class="badge-row"><span class="badge ok">локальные профили</span><span class="badge">${esc(activeProfileName())}</span></div>
        <h3>Пользователь и отдельный прогресс</h3>
        <p>Каждый профиль хранит свой прогресс, диагностику, изученные уроки и настройки в этом браузере.</p>
        <div class="toolbar">
          <select data-action="profile-select">
            ${profiles.map(p => `<option value="${esc(p.id)}" ${p.id===activeProfileId?'selected':''}>${esc(p.name)}</option>`).join('')}
          </select>
          <button class="btn" data-action="profile-add">+ профиль</button>
          <button class="btn" data-action="profile-rename">Переименовать</button>
          <button class="btn danger" data-action="profile-delete">Удалить</button>
        </div>
        <p class="muted">Для синхронизации между телефоном и ноутбуком позже нужен backend: Supabase/Firebase. GitHub Pages сам пользовательские данные не хранит.</p>
      </article>`;
    }

    function defaultState(){
      return {
        version: DATA.version,
        currentLevel: 'A0',
        lessonStatus: {},
        wordStatus: {},
        hideLearned: false,
        statusFilter: 'all',
        vocabLevel: 'Alle',
        vocabTopic: 'Alle',
        vocabSearch: '',
        grammarLevel: 'Alle',
        diagnosticResult: null,
        diagnosticAnswers: {},
        weakTopics: {},
        profile: { medicine:true, swiss:true, surgery:true },
        audio: { enabled:true, rate:0.95, lang:'de-DE', mode:'offline', lastEngine:'' },
        migratedFromV13: false
      };
    }

    function loadState(){
      try { seedProfileFromLegacy(); } catch(e) {}
      let s = defaultState();
      try {
        const raw = localStorage.getItem(STORE_KEY);
        if (raw) s = Object.assign(s, JSON.parse(raw));
      } catch(e) {}
      s.profile = Object.assign({medicine:true, swiss:true, surgery:true}, s.profile || {});
      if (s.profilePolicy !== 'v14.9-profile-defaults') {
        s.profile.medicine = true;
        s.profile.swiss = true;
        s.profile.surgery = true;
        s.profilePolicy = 'v14.9-profile-defaults';
      }
      s.audio = Object.assign({enabled:true, rate:0.95, lang:'de-DE', mode:'offline', lastEngine:'', policyVersion:''}, s.audio || {});
      if (s.audio.policyVersion !== 'v15.1-all-neural-audio') {
        s.audio.mode = 'offline';
        s.audio.policyVersion = 'v15.1-all-neural-audio';
      }
      s.lessonStatus = s.lessonStatus || {};
      s.wordStatus = s.wordStatus || {};
      s.weakTopics = s.weakTopics || {};
      s.diagnosticAnswers = s.diagnosticAnswers || {};
      migrateOldDoneKeys(s);
      return s;
    }

    function saveState(){
      try { localStorage.setItem(STORE_KEY, JSON.stringify(state)); } catch(e) {}
      updateLevelSelect();
    }

    function migrateOldDoneKeys(s){
      if (s.migratedFromV13) return;
      try {
        const keys = Object.keys(localStorage).filter(k => k.startsWith('done-') && localStorage.getItem(k) === '1');
        if (keys.length) {
          // старые ключи v13 не имеют полной карты новых уроков; сохраняем факт миграции и помечаем стартовый маршрут как изученный, если он был отмечен
          if (keys.includes('done-study-route')) {
            const first = DATA.lessons.find(l => l.level === 'A0');
            if (first) s.lessonStatus[first.id] = 'learned';
          }
          s.v13DoneKeys = keys;
        }
      } catch(e) {}
      s.migratedFromV13 = true;
    }

    function route(){
      return (location.hash || '#home').slice(1) || 'home';
    }

    function navigate(name){
      if (route() === name) render();
      else location.hash = name;
      closeDrawer();
    }

    function toast(msg){
      const t = $('#toast');
      t.textContent = msg;
      t.classList.add('show');
      clearTimeout(toast._timer);
      toast._timer = setTimeout(() => t.classList.remove('show'), 2300);
    }

    function updateNav(){
      const current = route().split('/')[0];
      const buttons = NAV.map(([r,label]) => `<button class="${current===r?'active':''}" data-route="${r}">${esc(label)}</button>`).join('');
      $('#desktopNav').innerHTML = buttons;
      $('#drawerNav').innerHTML = buttons + `<hr style="border-color:var(--line);margin:14px 0"><button data-action="print">Печатная шпаргалка</button>`;
    }

    function updateLevelSelect(){
      const sel = $('#levelSelect');
      sel.innerHTML = LEVELS.map(l => `<option value="${l}" ${state.currentLevel===l?'selected':''}>${l}</option>`).join('');
    }

    function levelIndex(level){ return LEVELS.indexOf(level); }

    function lessonsBy(level){
      return DATA.lessons.filter(l => level === 'Alle' || l.level === level);
    }

    function statusOf(id){
      return state.lessonStatus[id] || 'new';
    }

    function statusBadge(st){
      const map = {
        new: ['Новый',''],
        in_progress: ['В процессе','warn'],
        learned: ['✓ изучено','ok'],
        review: ['Повторить','danger']
      };
      const x = map[st] || map.new;
      return `<span class="badge ${x[1]}">${x[0]}</span>`;
    }

    function levelProgress(level){
      const arr = lessonsBy(level);
      const done = arr.filter(l => statusOf(l.id) === 'learned').length;
      return {done, total: arr.length, pct: arr.length ? Math.round(done / arr.length * 100) : 0};
    }

    function allProgress(){
      const done = DATA.lessons.filter(l => statusOf(l.id) === 'learned').length;
      return {done, total: DATA.lessons.length, pct: Math.round(done / DATA.lessons.length * 100)};
    }

    function nextLesson(){
      const fromCurrent = DATA.lessons.filter(l => levelIndex(l.level) >= levelIndex(state.currentLevel));
      return fromCurrent.find(l => statusOf(l.id) !== 'learned') || DATA.lessons.find(l => statusOf(l.id) !== 'learned') || DATA.lessons[0];
    }

    function render(){
      updateNav();
      updateLevelSelect();
      const r = route();
      const [base, param] = r.split('/');
      const app = $('#app');
      let html = '';
      if (base === 'home') html = renderHome();
      else if (base === 'diagnostic') html = renderDiagnostic();
      else if (base === 'path') html = renderPath(param || state.currentLevel);
      else if (base === 'lesson') html = renderLesson(param);
      else if (base === 'grammar') html = renderGrammar(param);
      else if (base === 'b2') html = renderB2Short();
      else if (base === 'vocab') html = renderVocab();
      else if (base === 'trainer') html = renderTrainer();
      else if (base === 'progress') html = renderProgress();
      else if (base === 'settings') html = renderSettings();
      else html = renderHome();
      app.innerHTML = html;
      app.focus({preventScroll:true});
      bindDynamic();
    }

              <span class="badge">v15.6</span>
            </div>
            <h1>Немецкий без хаоса: A0 → B2</h1>
            <p class="lead">Сначала выберите сценарий. В версии v15.6 добавлены карты уровней, схемы внутри уроков и усиленный B2: аргументация, Nominalstil, Passiv, регистр и редактура.</p>

              <div class="progress-bar"><span style="width:${p.pct}%"></span></div>
            </div>
            <div class="stat">
              <div class="muted">Следующий шаг</div>
              <h3>${esc(n.level)} · ${esc(n.title)}</h3>
              <p>${esc(n.goal)}</p>
              <button class="btn primary" data-route="lesson/${esc(n.id)}">Открыть урок</button>
            </div>
            <div class="stat">
              <div class="muted">B2-грамматика</div>
              <div class="progress-bar"><span style="width:${b2p.pct}%"></span></div>
              <p>${b2p.done}/${b2p.total} B2-тем отмечено.</p>
            </div>
          </aside>
        </section>

        <section class="panel">
          <div class="section-title"><h2>Быстрые зоны</h2><span class="muted">сделано по плану v13 → v14.2</span></div>
          <div class="grid four">
            ${infoCard('Диагностика', 'Короткий входной тест. Слабые темы сохраняются в прогрессе.', 'diagnostic')}
            ${infoCard('Учебный путь', `${DATA.lessons.length} уроков: правило → русский перенос → примеры → тренировка.`, 'path')}
            ${infoCard('Грамматика', 'Фильтр по уровню, режим B2-резюме, печатная шпаргалка.', 'grammar')}
            ${infoCard('Словарь', `${DATA.vocab.length} слов и фраз. Профильные блоки выключены по умолчанию.`, 'vocab')}
          </div>
        </section>

        <section class="panel">
          <div class="section-title"><h2>Уровни</h2><button class="btn" data-route="progress">Открыть прогресс</button></div>
          <div class="grid">
            ${LEVELS.map(l => {
              const pr = levelProgress(l);
              return `<article class="card">
                <div class="badge-row"><span class="badge">${l}</span><span class="badge ${pr.pct===100?'ok':''}">${pr.pct}%</span></div>
                <h3>${levelTitle(l)}</h3>
                <p>${levelGoal(l)}</p>
                <div class="progress-bar"><span style="width:${pr.pct}%"></span></div>
                <p class="muted">${pr.done}/${pr.total} уроков</p>
                <button class="btn" data-route="path/${l}">Открыть ${l}</button>
              </article>`;
            }).join('')}
          </div>
        </section>
      `;
    }

    function infoCard(title, text, routeName){
      return `<article class="card"><h3>${esc(title)}</h3><p>${esc(text)}</p><button class="btn" data-route="${routeName}">Перейти</button></article>`;
    }

    function levelTitle(l){
      return ({A0:'Полный старт', A1:'База общения', A2:'Систематизация', B1:'Самостоятельность', B2:'Уверенное владение'})[l] || l;
    }
    function levelGoal(l){
      return ({
        A0:'читать, представиться, задать первые вопросы',
        A1:'говорить о себе, семье, городе, работе и потребностях',
        A2:'рассказывать прошлое, объяснять причину, писать короткие сообщения',
        B1:'аргументировать, писать связные тексты, понимать основные темы',
        B2:'писать и говорить структурированно, пользоваться официальным стилем'
      })[l] || '';
    }

    function levelTabs(active, base='path'){
      return `<div class="level-tabs">
        ${LEVELS.map(l => `<button class="${active===l?'active':''}" data-route="${base}/${l}">${l}</button>`).join('')}
        ${base==='grammar' ? `<button class="${active==='Alle'?'active':''}" data-route="grammar/Alle">Все</button>` : ''}
      </div>`;
    }

    function renderPath(level){
      if (!LEVELS.includes(level)) level = state.currentLevel;
      state.currentLevel = level;
      saveState();
      const all = lessonsBy(level);
      const visible = all.filter(l => {
        const st = statusOf(l.id);
        if (state.hideLearned && st === 'learned') return false;
        if (state.statusFilter !== 'all' && st !== state.statusFilter) return false;
        return true;
      });
      return `
        <section class="panel">
          <div class="section-title">
            <div><h2>Путь с нуля до B2</h2><p class="muted">Выбран уровень ${esc(level)} · ${esc(levelTitle(level))}</p></div>
            <button class="btn" data-route="diagnostic">Не знаю уровень</button>
          </div>
          ${levelTabs(level,'path')}
          ${renderLevelGuide(level)}
          <div class="toolbar">
            <label class="pill"><input type="checkbox" data-action="toggle-hide" ${state.hideLearned?'checked':''}> Скрывать изученное</label>
            <select data-action="status-filter">
              ${[['all','Все статусы'],['new','Новые'],['in_progress','В процессе'],['learned','Изученные'],['review','На повторение']].map(([v,t]) => `<option value="${v}" ${state.statusFilter===v?'selected':''}>${t}</option>`).join('')}
            </select>
            ${state.hideLearned ? '<button class="btn" data-action="show-learned">Показать изученное</button>' : ''}
          </div>
          <div class="grid">
            ${visible.map(renderLessonCard).join('') || '<div class="empty">По текущему фильтру уроков нет. Снимите скрытие изученного или измените статус.</div>'}
          </div>
        </section>
      `;
    }

    function renderLessonCard(l){
      const st = statusOf(l.id);
      return `<article class="lesson-card ${state.hideLearned && st==='learned'?'hidden-learned':''}">
        <div class="badge-row"><span class="badge">${esc(l.level)}</span>${statusBadge(st)}<span class="badge">${esc(l.module)}</span></div>
        <h3>${esc(l.order)}. ${esc(l.title)}</h3>
        <p>${esc(l.goal)}</p>
        <div class="progress-bar"><span style="width:${st==='learned'?100:st==='in_progress'?45:st==='review'?20:0}%"></span></div>
        <button class="btn primary" data-route="lesson/${esc(l.id)}">Урок</button>
        <button class="btn good" data-action="mark" data-id="${esc(l.id)}" data-status="learned">✓ изучено</button>
        <button class="btn warn" data-action="mark" data-id="${esc(l.id)}" data-status="review">Повторить</button>
      </article>`;
    }


    // v153-lesson-deep-theory-render

    // v156-systematic-theory-render
    function renderBarsV156(bars){
      if (!Array.isArray(bars) || !bars.length) return '';
      return `<div class="scheme-bars">${bars.map(b => {
        const value = Math.max(0, Math.min(100, Number(b.value) || 0));
        return `<div class="bar-line"><span>${esc(b.label || '')}</span><span class="bar-track"><span class="bar-fill" style="width:${value}%"></span></span><span>${value}%</span></div>`;
      }).join('')}</div>`;
    }

    function renderFlowV156(steps, cls='scheme-flow'){
      if (!Array.isArray(steps) || !steps.length) return '';
      return `<div class="${cls}">${steps.map((s,i) => {
        if (typeof s === 'string') return `<div class="scheme-step"><span class="step-label">${i+1}</span><p>${esc(s)}</p></div>`;
        return `<div class="scheme-step">
          <span class="step-label">${esc(s.label || String(i+1))}</span>
          <h4>${esc(s.title || '')}</h4>
          <p>${esc(s.text || '')}</p>
          ${s.de ? `<p class="de"><b>${esc(s.de)}</b> <button class="speak" data-speak="${esc(s.de)}">🔊</button></p>` : ''}
        </div>`;
      }).join('')}</div>`;
    }

    function renderVisualSchemes(l){
      const schemes = Array.isArray(l.visualSchemes) ? l.visualSchemes : [];
      if (!schemes.length) return '';
      return `<details open>
        <summary>Схемы и мини-графики</summary>
        ${schemes.map(s => `<div class="scheme-panel">
          <h4>${esc(s.title || 'Схема')}</h4>
          ${s.subtitle ? `<p class="muted">${esc(s.subtitle)}</p>` : ''}
          ${renderFlowV156(s.steps)}
          ${renderBarsV156(s.bars)}
        </div>`).join('')}
      </details>`;
    }

    function renderLevelGuide(level){
      const guide = DATA.levelGuides && DATA.levelGuides[level];
      if (!guide) return '';
      return `<div class="level-guide">
        <div>
          <h3>${esc(guide.title || level)}</h3>
          <p class="muted">${esc(guide.focus || '')}</p>
        </div>
        <div class="guide-columns">
          <div>
            <h4>Что должно быть сильным</h4>
            <ul class="mistake-list">${(guide.blocks || []).map(x => `<li>${esc(x)}</li>`).join('')}</ul>
          </div>
          <div>
            <h4>Граф качества уровня</h4>
            ${renderBarsV156(guide.bars)}
          </div>
        </div>
        <div>
          <h4>Маршрут мышления</h4>
          ${renderFlowV156(guide.flow || [], 'guide-flow')}
        </div>
      </div>`;
    }

      return `<div class="grammar-table-wrap">

          <tbody>${t.rows.map(row => `<tr>${row.map(cell => `<td>${esc(cell)}</td>`).join('')}</tr>`).join('')}</tbody>

    function renderDrill(d, key){

    function renderLesson(id){
      const l = DATA.lessons.find(x => x.id === id) || nextLesson() || DATA.lessons[0];
      if (!l) return `<section class="panel"><h2>Урок не найден</h2><button class="btn" data-route="path">Вернуться к пути</button></section>`;

      const st = statusOf(l.id);
      const sameLevel = DATA.lessons
        .filter(x => x.level === l.level)
        .sort((a,b) => (a.order || 0) - (b.order || 0));

      const pos = sameLevel.findIndex(x => x.id === l.id);
      const prev = pos > 0 ? sameLevel[pos - 1] : null;
      const next = pos >= 0 && pos < sameLevel.length - 1 ? sameLevel[pos + 1] : null;

      const examples = Array.isArray(l.examples) ? l.examples : [];
      const drills = Array.isArray(l.drills) ? l.drills : [];

      return `<section class="panel lesson-page">
        <div class="section-title">
          <div>
            <div class="badge-row">
              <span class="badge">${esc(l.level)}</span>
              <span class="badge">${esc(l.module || '')}</span>
              ${statusBadge(st)}
            </div>
            <h2>${esc(l.title)}</h2>
            <p class="muted">${esc(l.goal || '')}</p>
          </div>
          <div class="toolbar">
            <button class="btn" data-route="path/${esc(l.level)}">К уровню ${esc(l.level)}</button>
            <button class="btn primary" data-action="mark" data-id="${esc(l.id)}" data-status="learned">✓ изучено</button>
            <button class="btn" data-action="mark" data-id="${esc(l.id)}" data-status="review">Повторить</button>
          </div>
        </div>

        <article class="lesson-card">
          <h3>Короткое правило</h3>
          <p>${esc(l.rule || '')}</p>

          ${renderLessonDeepTheory(l)}

          <h3>Примеры</h3>
          <div class="grid two">
            ${examples.map(ex => `<div class="example">
              <p class="de"><b>${esc(ex.de || '')}</b> ${ex.de ? `<button class="speak" data-speak="${esc(ex.de)}">🔊</button>` : ''}</p>
              <p class="ru">${esc(ex.ru || '')}</p>
            </div>`).join('')}
          </div>

          <h3>Тренировка</h3>
          <div class="grid two">

    function allowedVocab(v){
      if (!v.profile) return true;
      return !!state.profile[v.profile];
    }

    function hasCyrillicText(x){
      return /[А-Яа-яЁё]/.test(String(x || ''));
    }

    function cleanGermanCandidate(x){
      x = String(x || '').trim();
      if (!x) return '';
      const beforeParen = x.split('(')[0].trim();
      if (beforeParen && /[A-Za-zÄÖÜäöüß]/.test(beforeParen) && !hasCyrillicText(beforeParen)) return beforeParen;
      if (/[A-Za-zÄÖÜäöüß]/.test(x) && !hasCyrillicText(x)) return x;
      return '';
    }

    function speakableVocabText(v){
      return cleanGermanCandidate(v.de) ||
             cleanGermanCandidate(v.example) ||
             cleanGermanCandidate(v.ru) ||
             String(v.de || '').trim();
    }
    function renderVocab(){
      const levels = ['Alle', ...LEVELS];
      const topics = ['Alle', ...Array.from(new Set(DATA.vocab.filter(allowedVocab).map(v => v.topic))).sort((a,b)=>a.localeCompare(b,'ru'))];
      const q = (state.vocabSearch || '').trim().toLowerCase();
      const arr = DATA.vocab.filter(v => {
        if (!allowedVocab(v)) return false;
        if (state.vocabLevel !== 'Alle' && v.level !== state.vocabLevel) return false;
        if (state.vocabTopic !== 'Alle' && v.topic !== state.vocabTopic) return false;
        if (q && ![v.de,v.ru,v.example,v.topic,v.pos].join(' ').toLowerCase().includes(q)) return false;
        return true;
      });
      return `

          <div class="section-title">
            <div><h2>Словарь отдельно</h2><p class="muted">${arr.length}/${DATA.vocab.length} слов и фраз. Профессиональные пакеты включаются в настройках.</p></div>

          <div class="grid four">
            ${['medicine','swiss','surgery'].map(p => profileCard(p)).join('')}

          <div class="table-wrap" aria-label="Словарь">
            <table>
              <thead><tr><th>Уровень</th><th>Тема</th><th>Deutsch</th><th>Перевод</th><th>Пример</th><th>Статус</th></tr></thead>
              <tbody>${arr.map(v => {
                const known = state.wordStatus[v.id] === 'known';
                return `<tr>
                  <td><span class="badge">${esc(v.level)}</span></td>
                  <td>${esc(v.topic)} ${v.profile?`<span class="badge warn">${esc(profileName(v.profile))}</span>`:''}</td>
                  <td><b>${esc(v.de)}</b> <button class="speak" data-speak="${esc(speakableVocabText(v))}">🔊</button><br><span class="muted">${esc(v.pos)}</span></td>
                  <td>${esc(v.ru)}</td>
                  <td>${esc(v.example)}</td>

    function diagnosticExplain(q, rightText, yourText){
      const raw = [q.q, q.topic, q.level, rightText, ...(q.options || [])].join(' ').toLowerCase();

      if (q.explanation) return q.explanation;

      if (raw.includes('guten tag')) return '«Guten Tag» — дневное приветствие: “добрый день”. Это не прощание и не ночная формула.';
      if (raw.includes('ei') || raw.includes('mein')) return 'ei обычно читается как «ай»: mein ≈ майн, nein ≈ найн.';
      if (raw.includes('sch')) return 'sch читается как русский звук «ш»: Schule, Deutsch, sprechen.';
      if (raw.includes('ich ...') || raw.includes('ich bin')) return 'Для sein с ich нужна форма bin: ich bin. Bist = du, ist = er/sie/es.';
      if (raw.includes('du + lernen') || raw.includes('du lernst')) return 'У регулярного глагола lernen во 2-м лице единственного числа окончание -st: du lernst.';
      if (raw.includes('wo wohnen')) return '“Где?” = wo. В W-вопросе порядок: W-слово + глагол + подлежащее: Wo wohnen Sie?';
      if (raw.includes('haben sie zeit')) return 'В Ja/Nein-вопросе глагол стоит первым: Haben Sie Zeit?';
      if (raw.includes('um acht')) return 'Для точного времени используется um: um acht Uhr. am используется с днями и датами.';
      if (raw.includes('akkusativ') || raw.includes('den termin')) return 'Akkusativ нужен для прямого объекта “кого? что?”. У мужского рода der/ein меняется на den/einen: der Termin → den Termin.';
      if (raw.includes('dativ') || raw.includes('mit ') || raw.includes('dem bus') || raw.includes('mir')) return 'Dativ часто отвечает на “кому?” и используется после mit, bei, zu, aus, von, seit, nach.';
      if (raw.includes('genitiv') || raw.includes('aufgrund') || raw.includes('wegen') || raw.includes('trotz')) return 'В письменном стандарте aufgrund, wegen, trotz, während часто требуют Genitiv: aufgrund der Kosten.';
      if (raw.includes('modal') || raw.includes('muss arbeiten')) return 'С модальным глаголом смысловой глагол уходит в конец в инфинитиве: Ich muss arbeiten.';
      if (raw.includes('perfekt') || raw.includes('gefahren') || raw.includes('gelernt')) return 'Perfekt = haben/sein + Partizip II. Движение с изменением места часто берёт sein: ich bin gefahren.';
      if (raw.includes('wohin') || raw.includes('wechsel')) return 'С Wechselpräpositionen wo? → Dativ, wohin? → Akkusativ.';
      if (raw.includes('weil') || raw.includes('dass') || raw.includes('wenn') || raw.includes('obwohl')) return 'После weil/dass/wenn/obwohl спрягаемый глагол стоит в конце придаточного: weil ich Zeit habe.';
      if (raw.includes('um') && raw.includes('zu')) return 'Если субъект один и тот же, цель часто выражается через um ... zu. Если субъекты разные, чаще нужен damit.';
      if (raw.includes('adjektiv') || raw.includes('guter') || raw.includes('gute idee')) return 'Окончание прилагательного зависит от рода, падежа и артикля: ein guter Plan, eine gute Idee, ein gutes Beispiel.';
      if (raw.includes('relativ') || raw.includes('mit ___ ich')) return 'В Relativsatz местоимение зависит от падежа внутри придаточного. После mit нужен Dativ: mit dem.';
      if (raw.includes('anzurufen')) return 'У отделяемого глагола zu вставляется между приставкой и основой: anrufen → anzurufen.';
      if (raw.includes('passiv') || raw.includes('wurde') || raw.includes('aufgeklärt')) return 'Passiv смещает фокус на действие. Präsens: wird geprüft; Präteritum: wurde geprüft.';
      if (raw.includes('lässt sich') || raw.includes('laesst sich')) return 'lässt sich + Infinitiv означает “это можно сделать”: Das Problem lässt sich lösen = проблему можно решить.';
      if (raw.includes('konjunktiv ii') || raw.includes('könnten') || raw.includes('hätte') || raw.includes('wäre')) return 'Konjunktiv II используется для вежливости, осторожных предложений и нереальных условий.';
      if (raw.includes('konjunktiv i') || raw.includes('sei') || raw.includes('er habe')) return 'Konjunktiv I передаёт чужие слова в косвенной речи: er habe, sie sei.';
      if (raw.includes('dennoch') || raw.includes('deshalb') || raw.includes('trotzdem')) return 'dennoch/deshalb/trotzdem занимают первое поле, поэтому после них сразу стоит спрягаемый глагол: Dennoch sollte man…';
      if (raw.includes('nominalstil') || raw.includes('nach prüfung')) return 'Nominalstil заменяет действие существительным: nachdem man geprüft hat → nach Prüfung. Это делает текст официальнее.';
      if (raw.includes('rückmeldung') || raw.includes('официальнее')) return 'В официальной ситуации нужен нейтральный регистр: Ich bitte um Rückmeldung.';
      if (raw.includes('einwilligung')) return 'die Einwilligung — согласие. В медицине это ключевое слово перед процедурой или лечением.';
      if (raw.includes('franchise')) return 'die Franchise в Швейцарии относится к медицинской страховке и собственному участию в расходах.';
      if (raw.includes('trockenschichtdicke')) return 'die Trockenschichtdicke — сухая толщина слоя покрытия. Это термин строительства/АКЗ.';

      return `Правильный ответ — «${rightText}». Твой вариант «${yourText}» отличается по форме, падежу, порядку слов, смыслу или стилю.`;
    }

    function renderDiagnosticReview(r){

      return `<div class="diagnostic-review">

        ${DATA.diagnostic.map((q,i) => {
          const selected = Number(answers[i]);
          const known = Number.isInteger(selected) && selected >= 0;
          const ok = known && selected === q.answer;
          const yourText = known ? q.options[selected] : 'не выбран';
          const rightText = q.options[q.answer];
          return `<article class="diag-item ${ok?'ok':'bad'}">
            <div class="diag-q">${i+1}. [${esc(q.level)}] ${esc(q.q)}</div>

            <div class="diag-line"><b>Правильный ответ:</b> ${esc(rightText)}</div>
            <div class="diag-line"><b>Статус:</b> ${ok ? '✓ правильно' : '✗ ошибка'}</div>
            <div class="diag-explain"><b>Почему так:</b> ${esc(diagnosticExplain(q, rightText, yourText))}</div>

    function submitDiagnostic(){
      const form = $('#diagnosticForm');
      const byLevel = {};
      const answers = {};
      LEVELS.forEach(l => byLevel[l] = {correct:0,total:0});
      let totalCorrect = 0;

      DATA.diagnostic.forEach((q,i) => {
        byLevel[q.level].total++;
        const val = form.querySelector(`input[name="dq${i}"]:checked`);
        const choice = val ? Number(val.value) : -1;
        answers[i] = choice;

        if (choice === q.answer) {
          byLevel[q.level].correct++;
          totalCorrect++;
        } else {
          state.weakTopics[q.topic] = (state.weakTopics[q.topic] || 0) + 1;
        }
      });

      let recommended = 'B2';
      for (const l of LEVELS) {
        if (byLevel[l].correct < Math.ceil(byLevel[l].total * .6)) { recommended = l; break; }
      }

      state.currentLevel = recommended;
      state.diagnosticAnswers = answers;
      state.diagnosticResult = {recommended, byLevel, totalCorrect, answers, date: new Date().toISOString()};
      saveState();
      render();
      toast(`Рекомендация: ${recommended}`);
    }

        <details open>
          <summary>Аудио-настройки</summary>
          <p class="muted">v15.0: основной режим — качественный Neural MP3 из папки audio/. Online MP3 оставлен как экспериментальный запасной режим, но прямой Google TTS может блокироваться браузером. Auto пробует: neural MP3 → голос устройства → online.</p>
          <div class="toolbar">
            <label class="pill"><input type="checkbox" data-action="audio-enabled" ${state.audio.enabled?'checked':''}> Озвучка включена</label>
            <label>Режим <select data-action="audio-mode">
              ${[['auto','Авто'],['device','Голос устройства'],['online','Онлайн MP3'],['offline','Neural MP3']].map(([v,t]) => `<option value="${v}" ${state.audio.mode===v?'selected':''}>${t}</option>`).join('')}
            </select></label>
            <label>Язык <select data-action="audio-lang">
              ${[['de-DE','Deutsch DE'],['de-CH','Deutsch CH'],['de-AT','Deutsch AT']].map(([v,t]) => `<option value="${v}" ${state.audio.lang===v?'selected':''}>${t}</option>`).join('')}
            </select></label>
            <label>Скорость <input type="number" min="0.6" max="1.3" step="0.05" data-action="audio-rate" value="${esc(state.audio.rate)}"></label>
            <button class="btn" data-speak="Guten Tag. Ich lerne Deutsch.">Тест 🔊</button>
          </div>
          <p class="muted">Последний движок: ${esc(state.audio.lastEngine || 'ещё не проверялся')}. На iPhone/Android первый запуск должен быть именно нажатием на кнопку 🔊.</p>
        </details>
        <details>
          <summary>Печатная версия</summary>
          <p>Печать скрывает меню, кнопки, озвучку и лишнюю навигацию.</p>
          <button class="btn" data-action="print">Печатать текущий экран</button>
        </details>
      </section>`;
    }

    function bindDynamic(){
      $$('#app [data-speak], .topbar [data-speak], .drawer [data-speak]').forEach(b => b.addEventListener('click', ev => {
        ev.stopPropagation();
        speak(b.getAttribute('data-speak'));
      }));
    }

    function isMobileAudio(){
      return /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent || '');
    }

    function bestGermanVoice(){
      try {
        const voices = window.speechSynthesis ? window.speechSynthesis.getVoices() : [];
        const lang = state.audio.lang || 'de-DE';
        return voices.find(v => v.lang === lang && v.localService) ||
               voices.find(v => v.lang === lang) ||
               voices.find(v => /^de[-_]/i.test(v.lang) && v.localService) ||
               voices.find(v => /^de[-_]/i.test(v.lang)) || null;
      } catch(e) { return null; }
    }

    function audioFileName(text){
      const s = cleanSpeak(text).toLowerCase().replace(/ä/g,'ae').replace(/ö/g,'oe').replace(/ü/g,'ue').replace(/ß/g,'ss').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'').slice(0,80);
      return s || 'audio';
    }

    function tryOfflineMp3(text){
      return new Promise((resolve, reject) => {
        const a = new Audio(`audio/${audioFileName(text)}.mp3`);
        a.preload = 'auto';
        a.onended = () => resolve('neural-mp3');
        a.onerror = () => reject(new Error('offline mp3 not found'));
        a.play().catch(reject);
      });
    }

    function buildOnlineTtsUrls(text){
      const spoken = cleanSpeak(text).slice(0,180);
      if (!spoken) return [];
      const q = encodeURIComponent(spoken);
      const lang = encodeURIComponent((state.audio.lang || 'de-DE').split('-')[0] || 'de');
      const textlen = encodeURIComponent(String(spoken.length));

      return [
        {
          label: 'online-mp3-googleapis-gtx',
          url: `https://translate.googleapis.com/translate_tts?ie=UTF-8&client=gtx&tl=${lang}&q=${q}`
        },
        {
          label: 'online-mp3-google-tw-ob',
          url: `https://translate.google.com/translate_tts?ie=UTF-8&client=tw-ob&tl=${lang}&q=${q}&total=1&idx=0&textlen=${textlen}&prev=input`
        },
        {
          label: 'online-mp3-google-gtx',
          url: `https://translate.google.com/translate_tts?ie=UTF-8&client=gtx&tl=${lang}&q=${q}`
        }
      ];
    }

    function playOnlineTtsUrl(item){
      return new Promise((resolve, reject) => {
        const a = new Audio();
        window.__deTutorAudio = a;

        let settled = false;

        const finish = () => {
          if (settled) return;
          settled = true;
          clearTimeout(timer);
          state.audio.lastEngine = item.label;
          saveState();
          resolve(item.label);
        };

        const fail = (reason) => {
          if (settled) return;
          settled = true;
          clearTimeout(timer);
          const msg = `${item.label}: ${reason}`;
          state.audio.lastEngine = msg;
          saveState();
          reject(new Error(msg));
        };

        const timer = setTimeout(() => fail('timeout'), isMobileAudio() ? 11000 : 8000);

        a.preload = 'auto';
        a.playbackRate = Number(state.audio.rate) || .95;
        a.onplaying = finish;
        a.onended = finish;
        a.onerror = () => {
          const code = a.error ? `media ${a.error.code}` : 'media error';
          fail(code);
        };

        a.src = item.url + `&cachebust=${Date.now()}`;
        a.play().catch(e => fail(e && (e.name || e.message) ? (e.name || e.message) : 'play rejected'));
      });
    }

    async function tryOnlineMp3(text){
      const sources = buildOnlineTtsUrls(text);
      if (!sources.length) throw new Error('online mp3 empty text');

      const errors = [];
      for (const src of sources) {
        try {
          return await playOnlineTtsUrl(src);
        } catch(e) {
          errors.push(e && e.message ? e.message : String(e));
        }
      }

      const msg = 'online error: ' + errors.join(' | ');
      state.audio.lastEngine = msg;
      saveState();
      throw new Error(msg);
    }

    function tryDeviceSpeech(text){
      return new Promise((resolve, reject) => {
        try {
          if (!('speechSynthesis' in window) || !('SpeechSynthesisUtterance' in window)) return reject(new Error('speechSynthesis unavailable'));
          const spoken = cleanSpeak(text);
          if (!spoken) return reject(new Error('empty text'));
          window.speechSynthesis.cancel();
          const u = new SpeechSynthesisUtterance(spoken);
          u.lang = state.audio.lang || 'de-DE';
          u.rate = Number(state.audio.rate) || .95;
          const voice = bestGermanVoice();
          if (voice) u.voice = voice;
          let started = false;
          const timer = setTimeout(() => {
            if (!started) reject(new Error('device speech timeout'));
          }, isMobileAudio() ? 1400 : 2200);
          u.onstart = () => { started = true; state.audio.lastEngine = voice ? `device: ${voice.name}` : 'device: default'; saveState(); };
          u.onend = () => { clearTimeout(timer); resolve(state.audio.lastEngine || 'device'); };
          u.onerror = (e) => { clearTimeout(timer); reject(e.error || new Error('speech error')); };
          window.speechSynthesis.speak(u);
        } catch(e) { reject(e); }
      });
    }

    async function speak(text){
      if (!state.audio.enabled) return toast('Озвучка выключена в настройках');

      const mode = state.audio.mode || 'offline';
      const order = mode === 'auto' ? ['offline','device','online'] :
                    mode === 'online' ? ['online'] :
                    mode === 'device' ? ['device'] :
                    mode === 'offline' ? ['offline'] :
                    ['offline','device','online'];

      for (const engine of order) {
        try {
          let used = '';
          if (engine === 'offline') used = await tryOfflineMp3(text);
          if (engine === 'online') used = await tryOnlineMp3(text);
          if (engine === 'device') used = await tryDeviceSpeech(text);

          if (used) {
            state.audio.lastEngine = used;
            saveState();
            toast(`Озвучка: ${used}`);
            return;
          }
        } catch(e) {
          state.audio.lastEngine = `${engine} error: ${e && (e.message || e.name || e) ? (e.message || e.name || e) : 'unknown'}`;
          saveState();
        }
      }

      toast('Озвучка не запустилась. Деталь: ' + (state.audio.lastEngine || 'нет данных') + '.');
    }

    function markLesson(id, status){
      state.lessonStatus[id] = status;
      saveState();
      toast(status === 'learned' ? 'Отмечено как изучено' : 'Добавлено на повторение');
      render();
    }

    function answerDrill(btn){
      const parent = btn.closest('.drill');
      const correct = Number(btn.dataset.correct);
      const choice = Number(btn.dataset.choice);
      $$('.option', parent).forEach((b,i) => {
        b.disabled = true;
        if (i === correct) b.classList.add('correct');
        if (i === choice && i !== correct) b.classList.add('wrong');
      });
      const note = $('.answer-note', parent);
      if (choice === correct) {
        note.textContent = 'Верно. ' + (btn.dataset.explanation || '');
      } else {
        const topic = parent.dataset.topic || 'trainer';
        state.weakTopics[topic] = (state.weakTopics[topic] || 0) + 1;
        saveState();
        note.textContent = 'Неверно. Правильный ответ подсвечен. ' + (btn.dataset.explanation || '');
      }
    }

    function exportProgress(){
      const blob = new Blob([JSON.stringify(state, null, 2)], {type:'application/json'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `deutsch-a0-b2-progress-${new Date().toISOString().slice(0,10)}.json`;
      a.click();
      URL.revokeObjectURL(a.href);
    }

    function resetProgress(){
      if (!confirm('Сбросить локальный прогресс в этом браузере?')) return;
      try { localStorage.removeItem(STORE_KEY); } catch(e) {}
      state = defaultState();
      saveState();
      render();
      toast('Прогресс сброшен');
    }

    function closeDrawer(){
      $('#drawer').classList.remove('open');
      $('#drawerBackdrop').classList.remove('open');
    }

    document.addEventListener('click', ev => {
      const routeBtn = ev.target.closest('[data-route]');
      if (routeBtn) {
        ev.preventDefault();
        navigate(routeBtn.dataset.route);
        return;
      }
      const action = ev.target.closest('[data-action]');
      if (!action) return;
      const a = action.dataset.action;
      // v14.2: form-controls обрабатываются через change, не через click.
      // Иначе select перерисовывал экран при открытии и выбор мог теряться при отпускании мышки.
      if (['toggle-hide','status-filter','vocab-level','vocab-topic','audio-enabled','audio-mode','audio-lang'].includes(a)) return;
      if (a === 'mark') markLesson(action.dataset.id, action.dataset.status);
      if (a === 'answer-drill') answerDrill(action);
      if (a === 'show-learned') { state.hideLearned = false; saveState(); render(); }
      if (a === 'vocab-search') {}
      if (a === 'clear-vocab') { state.vocabLevel='Alle'; state.vocabTopic='Alle'; state.vocabSearch=''; saveState(); render(); }
      if (a === 'word-known') { state.wordStatus[action.dataset.id] = state.wordStatus[action.dataset.id] === 'known' ? '' : 'known'; saveState(); render(); }
      if (a === 'toggle-profile') { const p=action.dataset.profile; state.profile[p]=!state.profile[p]; saveState(); render(); }
      if (a === 'submit-diagnostic') submitDiagnostic();
      if (a === 'reset-diagnostic') { state.diagnosticResult = null; state.diagnosticAnswers = {}; saveState(); render(); }
      if (a === 'set-level') { state.currentLevel = action.dataset.level; saveState(); render(); }
      if (a === 'profile-add') addProfile();
      if (a === 'profile-rename') renameProfile();
      if (a === 'profile-delete') deleteProfile();
      if (a === 'print') window.print();
      if (a === 'export-progress') exportProgress();
      if (a === 'reset-progress') resetProgress();
    });

    document.addEventListener('change', ev => {
      const action = ev.target.closest('[data-action]');
      if (!action) return;
      const a = action.dataset.action;
      if (a === 'toggle-hide') { state.hideLearned = action.checked; saveState(); render(); }
      if (a === 'status-filter') { state.statusFilter = action.value; saveState(); render(); }
      if (a === 'vocab-level') { state.vocabLevel = action.value; saveState(); render(); }
      if (a === 'vocab-topic') { state.vocabTopic = action.value; saveState(); render(); }
      if (a === 'audio-enabled') { state.audio.enabled = action.checked; saveState(); }
      if (a === 'audio-mode') { state.audio.mode = action.value; saveState(); render(); }
      if (a === 'audio-lang') { state.audio.lang = action.value; saveState(); render(); }
      if (a === 'profile-select') switchProfile(action.value);
    });

    document.addEventListener('input', ev => {
      const el = ev.target;
      if (el.matches('[data-action="vocab-search"]')) {
        state.vocabSearch = el.value;
        saveState();
        clearTimeout(window.__vocabTimer);
        window.__vocabTimer = setTimeout(render, 180);
      }
      if (el.matches('[data-action="audio-rate"]')) {
        state.audio.rate = Number(el.value) || .95;
        saveState();
      }
    });

    $('#levelSelect').addEventListener('change', ev => {
      state.currentLevel = ev.target.value;
      saveState();
      if (['path','trainer'].includes(route().split('/')[0])) navigate(route().split('/')[0] === 'path' ? `path/${state.currentLevel}` : 'trainer');
      else toast(`Текущий уровень: ${state.currentLevel}`);
    });

    $('#globalSearch').addEventListener('keydown', ev => {
      if (ev.key === 'Enter') {
        state.vocabSearch = ev.target.value;
        state.vocabLevel = 'Alle';
        state.vocabTopic = 'Alle';
        saveState();
        navigate('vocab');
      }
    });

    $('#menuBtn').addEventListener('click', () => {
      $('#drawer').classList.add('open');
      $('#drawerBackdrop').classList.add('open');
    });
    $('#drawerBackdrop').addEventListener('click', closeDrawer);
    window.addEventListener('hashchange', render);


    if ('speechSynthesis' in window) {
      try { window.speechSynthesis.onvoiceschanged = () => { state.audio.lastEngine = bestGermanVoice() ? `device ready: ${bestGermanVoice().name}` : state.audio.lastEngine; saveState(); }; } catch(e) {}
    }

    updateNav();
    updateLevelSelect();
    render();
  })();
  </script>
</body>
</html>
