dem Problem в формальном письме"],"grammarTables":[{"title":"Артикли по падежам","headers":["Падеж","муж.","жен.","сред.","мн."],"rows":[["Nominativ","der/ein","die/eine","das/ein","die/-"],["Akkusativ","den/einen","die/eine","das/ein","die/-"],["Dativ","dem/einem","der/einer","dem/einem","den + -n"],["Genitiv","des/eines","der/einer","des/eines","der/-"]]},{"title":"Роль падежа","headers":["Падеж","Вопрос","Пример"],"rows":[["Nominativ","кто/что?","Der Arzt hilft."],["Akkusativ","кого/что?","Ich sehe den Arzt."],["Dativ","кому/с кем/где?","Ich helfe dem Patienten."],["Genitiv","чей/из-за чего?","wegen des Problems"]]}],"whyForRussian":"Этот блок добавлен специально для русскоговорящего ученика: сначала сравниваем с русской логикой, потом показываем немецкий механизм и только после этого тренируем форму.","visualSchemes":[{"title":"Падежная развилка","steps":[{"label":"1","title":"Глагол/предлог","text":"Сначала ищу управление.","de":"mit, helfen, sehen"},{"label":"2","title":"Падеж","text":"Выбираю роль: Akkusativ или Dativ.","de":"Akkusativ / Dativ"},{"label":"3","title":"Артикль","text":"Меняю der/ein по таблице.","de":"den Arzt / dem Arzt"}],"bars":[{"label":"управление","value":90},{"label":"артикль","value":85},{"label":"перевод","value":40}]}]},{"id":"a2-02-wechselpraepositionen-wo-wohin","level":"A2","order":2,"module":"A2 система","title":"Wechselpräpositionen: wo/wohin","goal":"Выбирать Dativ или Akkusativ после in/an/auf/unter...","rule":"Если вопрос где? — Dativ. Если куда? — Akkusativ. Ich bin in der Schule. Ich gehe in die Schule.","examples":[{"de":"Das Buch liegt auf dem Tisch.","ru":"Книга лежит на столе."},{"de":"Ich lege das Buch auf den Tisch.","ru":"Я кладу книгу на стол."},{"de":"Wir gehen ins Kino.","ru":"Мы идём в кино."}],"drills":[{"q":"wo? требует...","options":["Dativ","Akkusativ","Genitiv"],"answer":0,"explanation":"Правильно: «Dativ». В русском вопрос часто держится интонацией, а в немецком его показывает порядок слов: глагол первым или после W-слова.","topic":""},{"q":"wohin? требует...","options":["Dativ","Akkusativ","Nominativ"],"answer":1,"explanation":"Правильно: «Akkusativ». В русском вопрос часто держится интонацией, а в немецком его показывает порядок слов: глагол первым или после W-слова.","topic":""},{"q":"in + das Kino =","options":["ins Kino","im Kino","in dem Kino"],"answer":0,"explanation":"Правильно: «ins Kino». В русском вопрос часто держится интонацией, а в немецком его показывает порядок слов: глагол первым или после W-слова.","topic":""}],"tags":["prepositions"],"deepTheoryRu":"В русском вопрос часто делается интонацией: «У вас есть время?» В немецком порядок слов показывает тип вопроса. Если вопрос без вопросительного слова, глагол идёт первым. Если есть W-слово, оно первое, глагол второй.","russianTrap":"Ловушка: говорить Sie haben Zeit? как основной учебный вариант. Это возможно интонационно, но стандартный грамматический вопрос: Haben Sie Zeit?","germanLogic":"Немецкий вопрос строится через позицию глагола, а не только через интонацию.","formula":"Ja/Nein: Verb + Subjekt + ...? W-Frage: W-Wort + Verb + Subjekt + ...?","typicalMistakes":["Sie haben Zeit? вместо Haben Sie Zeit?","Wo Sie wohnen?","Wann der Termin ist? как прямой вопрос"],"grammarTables":[{"title":"Типы вопросов","headers":["Тип","Шаблон","Пример"],"rows":[["Ja/Nein","Verb + Subjekt","Haben Sie Zeit?"],["W-Frage","Wort + Verb + Subjekt","Wo wohnen Sie?"],["Косвенный вопрос","..., W/ob + ... + Verb","Können Sie sagen, wann der Termin ist?"]]}],"whyForRussian":"Этот блок добавлен специально для русскоговорящего ученика: сначала сравниваем с русской логикой, потом показываем немецкий механизм и только после этого тренируем форму.","visualSchemes":[{"title":"Русская мысль -> немецкая форма","steps":[{"label":"1","title":"Смысл","text":"Что я хочу сказать по-русски?"},{"label":"2","title":"Форма","text":"Какой немецкий механизм нужен?","de":"Verb, Artikel, Kasus"},{"label":"3","title":"Контроль","text":"Проверяю порядок, падеж и регистр."}],"bars":[{"label":"смысл","value":70},{"label":"форма","value":90},{"label":"перевод","value":45}]}]},{"id":"a2-03-perfekt","level":"A2","order":3,"module":"A2 система","title":"Perfekt системно","goal":"Строить прошлое для разных типов глаголов.","rule":"Слабые: gemacht. Сильные часто с -en: geschrieben. Отделяемые: eingekauft. Неотделяемые без ge-: besucht. Движение/изменение состояния часто с sein.","examples":[{"de":"Ich habe die E-Mail geschrieben.","ru":"Я написал письмо."},{"de":"Sie ist früh aufgestanden.","ru":"Она рано встала."},{"de":"Wir haben das Museum besucht.","ru":"Мы посетили музей."}],"drills":[{"q":"besuchen в Partizip II:","options":["besucht","gebesucht","besuchen"],"answer":0,"explanation":"Правильно: «besucht». У отделяемого глагола спрягается основа, а приставка закрывает фразу в конце: rufe ... an.","topic":""},{"q":"aufstehen:","options":["aufgestanden","geaufstanden","aufgesteht"],"answer":0,"explanation":"Правильно: «aufgestanden». У отделяемого глагола спрягается основа, а приставка закрывает фразу в конце: rufe ... an.","topic":""},{"q":"fahren часто с...","options":["sein","haben","machen"],"answer":0,"explanation":"Правильно: «sein». Konjunktiv I используется для косвенной речи: автор передает чужие слова дистанционно.","topic":""}],"tags":["past"],"deepTheoryRu":"Отделяемые глаголы — типичная немецкая рамка. В словаре глагол пишется вместе: anrufen. В обычной фразе приставка уходит в конец: Ich rufe dich an.","russianTrap":"Ловушка: Ich anrufe dich. В главном предложении приставка отделяется.","germanLogic":"Спрягается основная часть, приставка закрывает смысл в конце.","formula":"anrufen → Ich rufe ... an","typicalMistakes":["Ich anrufe dich","Ich rufe dich auf вместо an","zu anrufen вместо anzurufen"],"grammarTables":[{"title":"Отделяемый глагол","headers":["Форма","Пример","Комментарий"],"rows":[["Infinitiv","anrufen","словарная форма"],["Präsens","Ich rufe dich an.","приставка в конце"],["Perfekt","Ich habe angerufen.","ge между приставкой и основой"],["zu + Infinitiv","anzurufen","zu внутри"]]}],"whyForRussian":"Этот блок добавлен специально для русскоговорящего ученика: сначала сравниваем с русской логикой, потом показываем немецкий механизм и только после этого тренируем форму.","visualSchemes":[{"title":"Русская мысль -> немецкая форма","steps":[{"label":"1","title":"Смысл","text":"Что я хочу сказать по-русски?"},{"label":"2","title":"Форма","text":"Какой немецкий механизм нужен?","de":"Verb, Artikel, Kasus"},{"label":"3","title":"Контроль","text":"Проверяю порядок, падеж и регистр."}],"bars":[{"label":"смысл","value":70},{"label":"форма","value":90},{"label":"перевод","value":45}]}]},{"id":"a2-04-praeteritum-sein-haben-modal","level":"A2","order":4,"module":"A2 система","title":"Präteritum sein/haben/modal","goal":"Понимать короткое письменное прошлое.","rule":"В разговоре часто Perfekt, но sein/haben/modal часто в Präteritum: ich war, ich hatte, ich musste, ich konnte.","examples":[{"de":"Ich war gestern krank.","ru":"Вчера я был болен."},{"de":"Wir hatten keine Zeit.","ru":"У нас не было времени."},{"de":"Sie musste länger warten.","ru":"Ей пришлось ждать дольше."}],"drills":[{"q":"ich + sein в Präteritum:","options":["ich war","ich bin","ich wäre"],"answer":0,"explanation":"Правильно: «ich war». Модальный глагол занимает вторую позицию, а смысловой глагол уходит в конец в инфинитиве.","topic":""},{"q":"wir + haben в Präteritum:","options":["wir hatten","wir haben","wir hätten"],"answer":0,"explanation":"Правильно: «wir hatten». Модальный глагол занимает вторую позицию, а смысловой глагол уходит в конец в инфинитиве.","topic":""},{"q":"musste значит...","options":["должен был","мог бы","хотел бы"],"answer":0,"explanation":"Правильно: «должен был». Модальный глагол занимает вторую позицию, а смысловой глагол уходит в конец в инфинитиве.","topic":""}],"tags":["past"],"deepTheoryRu":"Модальный глагол в немецком занимает место спрягаемого глагола, а смысловой глагол уходит в конец в инфинитиве. Для русского это непривычно: «я должен сегодня работать» → Ich muss heute arbeiten.","russianTrap":"Ловушка: Ich muss heute arbeite. После модального нужен инфинитив arbeiten.","germanLogic":"Модальный глагол открывает рамку, инфинитив закрывает рамку.","formula":"Subjekt + Modalverb + ... + Infinitiv","typicalMistakes":["Ich muss arbeite","Ich heute muss arbeiten","Ich möchte einen Termin vereinbare"],"grammarTables":[{"title":"Модальные глаголы","headers":["Глагол","Смысл","Пример"],"rows":[["können","мочь/уметь","Ich kann kommen."],["müssen","должен","Ich muss arbeiten."],["wollen","хотеть","Ich will lernen."],["möchten","хотел бы","Ich möchte einen Termin."],["dürfen","можно/иметь разрешение","Darf ich fragen?"],["sollen","следует/должен по поручению","Sie sollen warten."]]}],"whyForRussian":"Этот блок добавлен специально для русскоговорящего ученика: сначала сравниваем с русской логикой, потом показываем немецкий механизм и только после этого тренируем форму.","visualSchemes":[{"title":"Русская мысль -> немецкая форма","steps":[{"label":"1","title":"Смысл","text":"Что я хочу сказать по-русски?"},{"label":"2","title":"Форма","text":"Какой немецкий механизм нужен?","de":"Verb, Artikel, Kasus"},{"label":"3","title":"Контроль","text":"Проверяю порядок, падеж и регистр."}],"bars":[{"label":"смысл","value":70},{"label":"форма","value":90},{"label":"перевод","value":45}]}]},{"id":"a2-05-weil-dass-wenn-ob","level":"A2","order":5,"module":"A2 система","title":"Придаточные weil/dass/wenn/ob","goal":"Ставить глагол в конец придаточного.","rule":"Союзы weil, dass, wenn, ob отправляют спрягаемый глагол в конец придаточного: Ich denke, dass er kommt.","examples":[{"de":"Ich lerne Deutsch, weil ich in Deutschland lebe.","ru":"Я учу немецкий, потому что живу в Германии."},{"de":"Ich weiß nicht, ob er heute kommt.","ru":"Я не знаю, придёт ли он сегодня."},{"de":"Wenn ich Zeit habe, übe ich.","ru":"Когда у меня есть время, я занимаюсь."},{"de":"weil ich Zeit habe","ru":"Потому что у меня есть время."}],"drills":[{"q":"После weil глагол...","options":["в конце","на первом месте","всегда второй"],"answer":0,"explanation":"Правильно: «в конце». После weil/dass/wenn/obwohl спрягаемый глагол уходит в конец придаточного.","topic":""},{"q":"ob значит...","options":["ли","потому что","хотя"],"answer":0,"explanation":"Правильно: «ли». После weil/dass/wenn/obwohl спрягаемый глагол уходит в конец придаточного.","topic":""},{"q":"Правильно:","options":["weil ich Zeit habe","weil ich habe Zeit","weil habe ich Zeit"],"answer":0,"explanation":"Правильно: «weil ich Zeit habe». В придаточном предложении спрягаемый глагол уходит в конец.","topic":""}],"tags":["clauses"],"deepTheoryRu":"Русский часто сохраняет привычный порядок слов после «потому что/что/если». В немецком подчинительный союз отправляет спрягаемый глагол в конец: weil ich Zeit habe.","russianTrap":"Ловушка: weil ich habe Zeit. Это русская логика порядка слов, но не немецкая.","germanLogic":"Придаточное предложение в немецком закрывается глаголом.","formula":"weil/dass/wenn/obwohl + подлежащее + ... + Verb","typicalMistakes":["weil ich habe Zeit","dass er kommt heute","wenn ich habe Zeit"],"grammarTables":[{"title":"Союзы и порядок слов","headers":["Союз","Смысл","Порядок"],"rows":[["weil","потому что","глагол в конце"],["dass","что","глагол в конце"],["wenn","если/когда","глагол в конце"],["obwohl","хотя","глагол в конце"],["ob","ли","глагол в конце"]]},{"title":"Цель","headers":["Конструкция","Когда","Пример"],"rows":[["um ... zu","один субъект","Ich lerne, um besser zu sprechen."],["damit","разные субъекты","Ich erkläre es, damit du es verstehst."]]}],"whyForRussian":"Этот блок добавлен специально для русскоговорящего ученика: сначала сравниваем с русской логикой, потом показываем немецкий механизм и только после этого тренируем форму.","contrastExamples":[{"ru":"Потому что у меня есть время.","literal":"Не так: weil ich habe Zeit.","de":"weil ich Zeit habe","note":"В придаточном haben стоит в конце."}],"visualSchemes":[{"title":"Рамка придаточного","steps":[{"label":"1","title":"Союз","text":"weil/dass/wenn открывает придаточное.","de":"weil"},{"label":"2","title":"Смысл","text":"Подлежащее и дополнения идут внутри.","de":"ich Zeit"},{"label":"3","title":"Глагол","text":"Спрягаемый глагол закрывает часть.","de":"habe"}],"bars":[{"label":"союз","value":75},{"label":"конец","value":95},{"label":"перенос с русского","value":80}]}]},{"id":"a2-06-komparativ-superlativ","level":"A2","order":6,"module":"A2 система","title":"Сравнение: Komparativ/Superlativ","goal":"Сравнивать людей, цены, варианты.","rule":"Komparativ часто с -er: schneller, wichtiger. Superlativ: am wichtigsten или der wichtigste. Нерегулярные: gut → besser → am besten.","examples":[{"de":"Deutsch wird leichter.","ru":"Немецкий становится легче."},{"de":"Das ist die beste Lösung.","ru":"Это лучшее решение."},{"de":"Diese Wohnung ist größer als die andere.","ru":"Эта квартира больше другой."}],"drills":[{"q":"gut →","options":["besser","guter","mehr gut"],"answer":0,"explanation":"Правильно: «besser». Окончание прилагательного зависит от артикля, рода, числа и падежа, а не только от русского смысла.","topic":""},{"q":"als используется для...","options":["сравнения","причины","времени"],"answer":0,"explanation":"Правильно: «сравнения». Окончание прилагательного зависит от артикля, рода, числа и падежа, а не только от русского смысла.","topic":""},{"q":"am wichtigsten =","options":["важнее всего","важный","неважный"],"answer":0,"explanation":"Правильно: «важнее всего». Окончание прилагательного зависит от артикля, рода, числа и падежа, а не только от русского смысла.","topic":""}],"tags":["adjectives"],"deepTheoryRu":"Окончания прилагательных — одна из главных зон риска для русскоговорящих. В немецком окончание зависит от рода, числа, падежа и артикля. Не нужно угадывать — нужно видеть систему.","russianTrap":"Ловушка: везде ставить gute/guten. Например ein guter Plan, eine gute Idee, ein gutes Beispiel.","germanLogic":"Если артикль уже показывает род/падеж, прилагательное несёт меньше информации. Если артикль слабый или его нет, прилагательное несёт больше.","formula":"артикль + прилагательное + существительное; окончание зависит от грамматической информации.","typicalMistakes":["ein gute Plan","mit gutem Grund забывать Dativ","die langfristige Folgen вместо langfristigen"],"grammarTables":[{"title":"После ein-слов","headers":["Род/падеж","Пример","Почему"],"rows":[["муж. Nom.","ein guter Plan","прилагательное показывает мужской род"],["жен. Nom.","eine gute Idee","женский род уже виден"],["сред. Nom.","ein gutes Beispiel","прилагательное показывает средний род"],["Dativ","mit einem guten Arzt","после Dativ часто -en"]]},{"title":"После der-слов","headers":["Форма","Пример","Комментарий"],"rows":[["der","der gute Plan","слабое окончание"],["die","die gute Idee","слабое окончание"],["das","das gute Beispiel","слабое окончание"],["Plural","die guten Beispiele","часто -en"]]}],"whyForRussian":"Этот блок добавлен специально для русскоговорящего ученика: сначала сравниваем с русской логикой, потом показываем немецкий механизм и только после этого тренируем форму.","visualSchemes":[{"title":"Русская мысль -> немецкая форма","steps":[{"label":"1","title":"Смысл","text":"Что я хочу сказать по-русски?"},{"label":"2","title":"Форма","text":"Какой немецкий механизм нужен?","de":"Verb, Artikel, Kasus"},{"label":"3","title":"Контроль","text":"Проверяю порядок, падеж и регистр."}],"bars":[{"label":"смысл","value":70},{"label":"форма","value":90},{"label":"перевод","value":45}]}]},{"id":"a2-07-","level":"A2","order":7,"module":"A2 система","title":"Возвратные глаголы","goal":"Говорить о действиях с sich.","rule":"Некоторые глаголы требуют reflexiv: sich erinnern, sich interessieren, sich fühlen. Местоимение меняется: ich erinnere mich, du erinnerst dich.","examples":[{"de":"Ich interessiere mich für Medizin.","ru":"Я интересуюсь медициной."},{"de":"Wie fühlst du dich?","ru":"Как ты себя чувствуешь?"},{"de":"Wir erinnern uns an den Termin.","ru":"Мы помним о встрече."}],"drills":[{"q":"ich + sich interessieren:","options":["ich interessiere mich","ich interessiere sich","ich interessiere mir"],"answer":0,"explanation":"Правильно: «ich interessiere mich». Местоимение выбирается по роли внутри немецкой части фразы, а не по русскому вопросу целиком.","topic":""},{"q":"du + sich fühlen:","options":["du fühlst dich","du fühlst sich","du fühlst dir"],"answer":0,"explanation":"Правильно: «du fühlst dich». Местоимение выбирается по роли внутри немецкой части фразы, а не по русскому вопросу целиком.","topic":""},{"q":"sich erinnern an требует...","options":["an + Akkusativ","mit + Dativ","zu + Dativ"],"answer":0,"explanation":"Правильно: «an + Akkusativ». Местоимение выбирается по роли внутри немецкой части фразы, а не по русскому вопросу целиком.","topic":""}],"tags":["verbs"],"deepTheoryRu":"Местоимения в немецком меняются по падежам. Русскому это знакомо по смыслу: я/меня/мне. Но формы нужно автоматизировать: ich/mich/mir, er/ihn/ihm.","russianTrap":"Ловушка: использовать ich вместо mich/mir после глагола или предлога.","germanLogic":"Местоимение показывает роль человека или предмета в предложении.","formula":"Nominativ: ich; Akkusativ: mich; Dativ: mir","typicalMistakes":["Ich sehe er","Hilfst du ich?","mit sie вместо mit ihr"],"grammarTables":[{"title":"Личные местоимения","headers":["Nominativ","Akkusativ","Dativ"],"rows":[["ich","mich","mir"],["du","dich","dir"],["er","ihn","ihm"],["sie","sie","ihr"],["wir","uns","uns"]]},{"title":"da-/wo-композиты","headers":["Предлог + вещь","Форма","Пример"],"rows":[["auf + das","darauf","Ich warte darauf."],["über + das","darüber","Wir sprechen darüber."],["mit + was","womit","Womit lässt sich das erklären?"]]}],"whyForRussian":"Этот блок добавлен специально для русскоговорящего ученика: сначала сравниваем с русской логикой, потом показываем немецкий механизм и только после этого тренируем форму.","visualSchemes":[{"title":"Русская мысль -> немецкая форма","steps":[{"label":"1","title":"Смысл","text":"Что я хочу сказать по-русски?"},{"label":"2","title":"Форма","text":"Какой немецкий механизм нужен?","de":"Verb, Artikel, Kasus"},{"label":"3","title":"Контроль","text":"Проверяю порядок, падеж и регистр."}],"bars":[{"label":"смысл","value":70},{"label":"форма","value":90},{"label":"перевод","value":45}]}]},{"id":"a2-08-","level":"A2","order":8,"module":"A2 система","title":"Местоимения","goal":"Заменять повторяющиеся существительные.","rule":"Личные местоимения меняются по падежу: ich/mich/mir; du/dich/dir; er/ihn/ihm; sie/sie/ihr.","examples":[{"de":"Ich sehe ihn.","ru":"Я вижу его."},{"de":"Ich helfe ihr.","ru":"Я помогаю ей."},{"de":"Kannst du mir helfen?","ru":"Можешь мне помочь?"}],"drills":[{"q":"Akkusativ от er:","options":["ihn","ihm","er"],"answer":0,"explanation":"Правильно: «ihn». Akkusativ показывает объект действия; у мужского рода der/ein меняется на den/einen.","topic":""},{"q":"Dativ от sie (она):","options":["ihr","sie","ihn"],"answer":0,"explanation":"Правильно: «ihr». Dativ часто нужен после mit, bei, zu, aus, von, seit, nach и для адресата помощи.","topic":""},{"q":"mir значит...","options":["мне","меня","я"],"answer":0,"explanation":"Правильно: «мне». Сравнивайте не русский перевод, а роль слова: Nominativ - кто, Akkusativ - кого/что, Dativ - кому/с кем/где, Genitiv - чей/из-за чего.","topic":""}],"tags":["pronouns"],"deepTheoryRu":"В русском падежи часто видны по окончанию слова. В немецком главную работу часто делает артикль: der Mann, den Mann, dem Mann, des Mannes. Поэтому нельзя переводить только по смыслу — нужно видеть роль слова в предложении.","russianTrap":"Ловушка: думать «мужчина — der Mann всегда». Но после sehen будет Ich sehe den Mann, а после mit — mit dem Mann.","germanLogic":"Немецкий падеж отвечает на роль: кто действует, кого/что затронули, кому/где/с кем, чей/из-за чего.","formula":"Nominativ = кто? Akkusativ = кого/что? Dativ = кому/где/с кем? Genitiv = чей/из-за чего?","typicalMistakes":["der Mann после sehen","mit den Bus вместо mit dem Bus","wegen dem Problem в формальном письме"],"grammarTables":[{"title":"Артикли по падежам","headers":["Падеж","муж.","жен.","сред.","мн."],"rows":[["Nominativ","der/ein","die/eine","das/ein","die/-"],["Akkusativ","den/einen","die/eine","das/ein","die/-"],["Dativ","dem/einem","der/einer","dem/einem","den + -n"],["Genitiv","des/eines","der/einer","des/eines","der/-"]]},{"title":"Роль падежа","headers":["Падеж","Вопрос","Пример"],"rows":[["Nominativ","кто/что?","Der Arzt hilft."],["Akkusativ","кого/что?","Ich sehe den Arzt."],["Dativ","кому/с кем/где?","Ich helfe dem Patienten."],["Genitiv","чей/из-за чего?","wegen des Problems"]]}],"whyForRussian":"Этот блок добавлен специально для русскоговорящего ученика: сначала сравниваем с русской логикой, потом показываем немецкий механизм и только после этого тренируем форму.","visualSchemes":[{"title":"Падежная развилка","steps":[{"label":"1","title":"Глагол/предлог","text":"Сначала ищу управление.","de":"mit, helfen, sehen"},{"label":"2","title":"Падеж","text":"Выбираю роль: Akkusativ или Dativ.","de":"Akkusativ / Dativ"},{"label":"3","title":"Артикль","text":"Меняю der/ein по таблице.","de":"den Arzt / dem Arzt"}],"bars":[{"label":"управление","value":90},{"label":"артикль","value":85},{"label":"перевод","value":40}]}]},{"id":"a2-09-","level":"A2","order":9,"module":"A2 система","title":"Склонение прилагательных: старт","goal":"Ставить окончания после der/ein/без артикля.","rule":"После der-слов часто слабое окончание -e/-en: der gute Plan. После ein-слов в Nominativ муж./ср. прилагательное несёт род: ein guter Plan, ein gutes Beispiel.","examples":[{"de":"der gute Arzt","ru":"хороший врач"},{"de":"ein wichtiger Termin","ru":"важная встреча"},{"de":"mit gutem Grund","ru":"по хорошей причине"}],"drills":[{"q":"ein ___ Plan","options":["guter","gute","guten"],"answer":0,"explanation":"Правильно: «guter». Артикль нужно учить вместе с существительным: он показывает род, число и падеж, которых в русском нет в такой форме.","topic":""},{"q":"der ___ Plan","options":["gute","guter","gutes"],"answer":0,"explanation":"Правильно: «gute». Артикль нужно учить вместе с существительным: он показывает род, число и падеж, которых в русском нет в такой форме.","topic":""},{"q":"mit требует Dativ: mit gut___ Grund","options":["em","en","er"],"answer":0,"explanation":"Правильно: «em». Dativ часто нужен после mit, bei, zu, aus, von, seit, nach и для адресата помощи.","topic":""}],"tags":["adjectives"],"deepTheoryRu":"В русском нет артиклей, поэтому русскоговорящий часто хочет учить только слово. В немецком это ошибка: существительное надо учить вместе с der/die/das, потому что род влияет на Akkusativ, Dativ, Genitiv и окончания прилагательных.","russianTrap":"Ловушка: учить Termin без der. Потом сложно понять, почему einen Termin, mit dem Termin, wegen des Termins.","germanLogic":"Артикль — это не украшение, а грамматическая метка рода, числа и падежа.","formula":"слово = артикль + существительное + пример: der Termin — Ich habe einen Termin.","typicalMistakes":["учить слово без артикля","путать der/die/das","не менять мужской род в Akkusativ"],"grammarTables":[{"title":"Артикли в Nominativ","headers":["Род/число","Определённый","Неопределённый","Пример"],"rows":[["мужской","der","ein","der Termin / ein Termin"],["женский","die","eine","die Frage / eine Frage"],["средний","das","ein","das Formular / ein Formular"],["множественное","die","-","die Unterlagen"]]},{"title":"Мини-логика артикля","headers":["Функция","Что показывает","Почему важно"],"rows":[["род","der/die/das","влияет на падеж"],["падеж","den/dem/des...","показывает роль слова"],["число","die Plural","множественное часто отличается"]]}],"whyForRussian":"Этот блок добавлен специально для русскоговорящего ученика: сначала сравниваем с русской логикой, потом показываем немецкий механизм и только после этого тренируем форму.","visualSchemes":[{"title":"Артикль как метка формы","steps":[{"label":"1","title":"Род","text":"Учить слово вместе с der/die/das.","de":"der Termin"},{"label":"2","title":"Падеж","text":"Роль меняет артикль.","de":"den Termin"},{"label":"3","title":"Фраза","text":"Сразу закреплять в примере.","de":"Ich habe einen Termin."}],"bars":[{"label":"род","value":80},{"label":"падеж","value":90},{"label":"пример","value":70}]}]},{"id":"a2-10-a2","level":"A2","order":10,"module":"A2 система","title":"Письмо A2: сообщение и просьба","goal":"Писать короткие бытовые тексты.","rule":"Структура: обращение → причина → просьба/информация → завершение. Используйте короткие предложения и понятные связки: weil, deshalb, bitte.","examples":[{"de":"Sehr geehrte Damen und Herren, ich möchte einen Termin verschieben.","ru":"Уважаемые дамы и господа, я хотел(а) бы перенести запись."},{"de":"Ich kann am Montag leider nicht kommen.","ru":"К сожалению, я не могу прийти в понедельник."},{"de":"Könnten Sie mir bitte einen neuen Termin geben?","ru":"Не могли бы Вы дать мне новую запись?"}],"drills":[{"q":"Формальное обращение:","options":["Sehr geehrte Damen und Herren","Hallo Leute","Tschüss"],"answer":0,"explanation":"Правильно: «Sehr geehrte Damen und Herren». После weil/dass/wenn/obwohl спрягаемый глагол уходит в конец придаточного.","topic":""},{"q":"leider значит...","options":["к сожалению","поэтому","вчера"],"answer":0,"explanation":"Правильно: «к сожалению». После weil/dass/wenn/obwohl спрягаемый глагол уходит в конец придаточного.","topic":""},{"q":"Könnten Sie... звучит...","options":["вежливо","грубо","детски"],"answer":0,"explanation":"Правильно: «вежливо». После weil/dass/wenn/obwohl спрягаемый глагол уходит в конец придаточного.","topic":""}],"tags":["writing"],"deepTheoryRu":"Русский часто сохраняет привычный порядок слов после «потому что/что/если». В немецком подчинительный союз отправляет спрягаемый глагол в конец: weil ich Zeit habe.","russianTrap":"Ловушка: weil ich habe Zeit. Это русская логика порядка слов, но не немецкая.","germanLogic":"Придаточное предложение в немецком закрывается глаголом.","formula":"weil/dass/wenn/obwohl + подлежащее + ... + Verb","typicalMistakes":["weil ich habe Zeit","dass er kommt heute","wenn ich habe Zeit"],"grammarTables":[{"title":"Союзы и порядок слов","headers":["Союз","Смысл","Порядок"],"rows":[["weil","потому что","глагол в конце"],["dass","что","глагол в конце"],["wenn","если/когда","глагол в конце"],["obwohl","хотя","глагол в конце"],["ob","ли","глагол в конце"]]},{"title":"Цель","headers":["Конструкция","Когда","Пример"],"rows":[["um ... zu","один субъект","Ich lerne, um besser zu sprechen."],["damit","разные субъекты","Ich erkläre es, damit du es verstehst."]]}],"whyForRussian":"Этот блок добавлен специально для русскоговорящего ученика: сначала сравниваем с русской логикой, потом показываем немецкий механизм и только после этого тренируем форму.","visualSchemes":[{"title":"Рамка придаточного","steps":[{"label":"1","title":"Союз","text":"weil/dass/wenn открывает придаточное.","de":"weil"},{"label":"2","title":"Смысл","text":"Подлежащее и дополнения идут внутри.","de":"ich Zeit"},{"label":"3","title":"Глагол","text":"Спрягаемый глагол закрывает часть.","de":"habe"}],"bars":[{"label":"союз","value":75},{"label":"конец","value":95},{"label":"перенос с русского","value":80}]}]},{"id":"a2-11-damit-um-zu","level":"A2","order":11,"module":"A2 развитие","title":"Цель: damit и um…zu","goal":"Объяснять цель действия.","rule":"Если субъект один и тот же, часто используется um…zu: Ich lerne, um besser zu sprechen. Если субъекты разные — damit: Ich erkläre es, damit du es verstehst.","examples":[{"de":"Ich lerne Deutsch, um in der Klinik zu arbeiten.","ru":"Я учу немецкий, чтобы работать в клинике."},{"de":"Ich schreibe es auf, damit ich es nicht vergesse.","ru":"Я записываю, чтобы не забыть."},{"de":"Er hilft mir, damit ich schneller fertig werde.","ru":"Он помогает мне, чтобы я быстрее закончил(а)."}],"drills":[{"q":"Один субъект: Ich lerne, ___ besser zu sprechen.","options":["um","damit","weil"],"answer":0,"explanation":"Правильно: «um». После weil/dass/wenn/obwohl спрягаемый глагол уходит в конец придаточного.","topic":"clauses"},{"q":"Разные субъекты чаще требуют:","options":["um…zu","damit","ohne zu"],"answer":1,"explanation":"Правильно: «damit». После weil/dass/wenn/obwohl спрягаемый глагол уходит в конец придаточного.","topic":"clauses"},{"q":"Где стоит zu в um…zu?","options":["перед инфинитивом","после подлежащего","в начале главного"],"answer":0,"explanation":"Правильно: «перед инфинитивом». После weil/dass/wenn/obwohl спрягаемый глагол уходит в конец придаточного.","topic":"infinitive"}],"tags":["clauses","infinitive"],"deepTheoryRu":"Русский часто сохраняет привычный порядок слов после «потому что/что/если». В немецком подчинительный союз отправляет спрягаемый глагол в конец: weil ich Zeit habe.","russianTrap":"Ловушка: weil ich habe Zeit. Это русская логика порядка слов, но не немецкая.","germanLogic":"Придаточное предложение в немецком закрывается глаголом.","formula":"weil/dass/wenn/obwohl + подлежащее + ... + Verb","typicalMistakes":["weil ich habe Zeit","dass er kommt heute","wenn ich habe Zeit"],"grammarTables":[{"title":"Союзы и порядок слов","headers":["Союз","Смысл","Порядок"],"rows":[["weil","потому что","глагол в конце"],["dass","что","глагол в конце"],["wenn","если/когда","глагол в конце"],["obwohl","хотя","глагол в конце"],["ob","ли","глагол в конце"]]},{"title":"Цель","headers":["Конструкция","Когда","Пример"],"rows":[["um ... zu","один субъект","Ich lerne, um besser zu sprechen."],["damit","разные субъекты","Ich erkläre es, damit du es verstehst."]]}],"whyForRussian":"Этот блок добавлен специально для русскоговорящего ученика: сначала сравниваем с русской логикой, потом показываем немецкий механизм и только после этого тренируем форму.","visualSchemes":[{"title":"Русская мысль -> немецкая форма","steps":[{"label":"1","title":"Смысл","text":"Что я хочу сказать по-русски?"},{"label":"2","title":"Форма","text":"Какой немецкий механизм нужен?","de":"Verb, Artikel, Kasus"},{"label":"3","title":"Контроль","text":"Проверяю порядок, падеж и регистр."}],"bars":[{"label":"смысл","value":70},{"label":"форма","value":90},{"label":"перевод","value":45}]}]},{"id":"a2-12-praeteritum-modal","level":"A2","order":12,"module":"A2 развитие","title":"Präteritum модальных глаголов","goal":"Рассказывать о прошлом проще и естественнее.","rule":"Модальные глаголы в прошедшем часто используются в Präteritum: ich musste, konnte, wollte, sollte, durfte. Инфинитив смыслового глагола остаётся в конце.","examples":[{"de":"Ich musste lange warten.","ru":"Мне пришлось долго ждать."},{"de":"Wir konnten nicht kommen.","ru":"Мы не смогли прийти."},{"de":"Sie wollte einen Termin vereinbaren.","ru":"Она хотела договориться о приёме."}],"drills":[{"q":"ich + müssen в Präteritum:","options":["musste","müsste","gemusst"],"answer":0,"explanation":"Правильно: «musste». После модального глагола смысловой глагол обычно стоит в конце в инфинитиве.","topic":"past"},{"q":"Правильный порядок:","options":["Ich musste lange warten.","Ich lange warten musste.","Ich musste wartete lange."],"answer":0,"explanation":"Правильно: «Ich musste lange warten.». После модального глагола смысловой глагол обычно стоит в конце в инфинитиве.","topic":"word-order"},{"q":"konnte значит:","options":["мог/смог","должен был","хотел"],"answer":0,"explanation":"Правильно: «мог/смог». Модальный глагол занимает вторую позицию, а смысловой глагол уходит в конец в инфинитиве.","topic":"modal"}],"tags":["past","modal"],"deepTheoryRu":"Модальный глагол в немецком занимает место спрягаемого глагола, а смысловой глагол уходит в конец в инфинитиве. Для русского это непривычно: «я должен сегодня работать» → Ich muss heute arbeiten.","russianTrap":"Ловушка: Ich muss heute arbeite. После модального нужен инфинитив arbeiten.","germanLogic":"Модальный глагол открывает рамку, инфинитив закрывает рамку.","formula":"Subjekt + Modalverb + ... + Infinitiv","typicalMistakes":["Ich muss arbeite","Ich heute muss arbeiten","Ich möchte einen Termin vereinbare"],"grammarTables":[{"title":"Модальные глаголы","headers":["Глагол","Смысл","Пример"],"rows":[["können","мочь/уметь","Ich kann kommen."],["müssen","должен","Ich muss arbeiten."],["wollen","хотеть","Ich will lernen."],["möchten","хотел бы","Ich möchte einen Termin."],["dürfen","можно/иметь разрешение","Darf ich fragen?"],["sollen","следует/должен по поручению","Sie sollen warten."]]}],"whyForRussian":"Этот блок добавлен специально для русскоговорящего ученика: сначала сравниваем с русской логикой, потом показываем немецкий механизм и только после этого тренируем форму.","visualSchemes":[{"title":"Русская мысль -> немецкая форма","steps":[{"label":"1","title":"Смысл","text":"Что я хочу сказать по-русски?"},{"label":"2","title":"Форма","text":"Какой немецкий механизм нужен?","de":"Verb, Artikel, Kasus"},{"label":"3","title":"Контроль","text":"Проверяю порядок, падеж и регистр."}],"bars":[{"label":"смысл","value":70},{"label":"форма","value":90},{"label":"перевод","value":45}]}]},{"id":"a2-13-telefonieren","level":"A2","order":13,"module":"A2 развитие","title":"Телефонный разговор и запись","goal":"Позвонить, уточнить и перенести запись.","rule":"Для телефона нужны готовые рамки: Ich rufe wegen… an. Ich möchte einen Termin vereinbaren. Könnten wir den Termin verschieben?","examples":[{"de":"Ich rufe wegen meines Termins an.","ru":"Я звоню по поводу моего приёма."},{"de":"Ich möchte einen Termin vereinbaren.","ru":"Я хотел(а) бы договориться о приёме."},{"de":"Könnten wir den Termin verschieben?","ru":"Могли бы мы перенести запись?"}],"drills":[{"q":"Как начать звонок по поводу записи?","options":["Ich rufe wegen meines Termins an.","Ich telefoniere mein Termin.","Ich bin Termin."],"answer":0,"explanation":"Правильно: «Ich rufe wegen meines Termins an.». В письменном стандарте wegen/aufgrund/trotz/während обычно требуют Genitiv.","topic":"phone"},{"q":"vereinbaren значит:","options":["договариваться","отменять","болеть"],"answer":0,"explanation":"Правильно: «договариваться». Для русскоговорящего главное - не переводить дословно, а проверить немецкую форму: глагол, артикль, падеж, предлог и порядок слов.","topic":"phone"},{"q":"Вежливо перенести:","options":["Könnten wir den Termin verschieben?","Termin weg!","Ich verschiebe du."],"answer":0,"explanation":"Правильно: «Könnten wir den Termin verschieben?». Akkusativ показывает объект действия; у мужского рода der/ein меняется на den/einen.","topic":"politeness"}],"tags":["phone","appointments"],"deepTheoryRu":"Для русскоговорящего ученика важно не просто перевести фразу, а понять немецкий механизм: где глагол, какой падеж, какой артикль, какой стиль и почему выбран именно этот вариант.","russianTrap":"Ловушка: переводить слово в слово с русского и сохранять русский порядок слов.","germanLogic":"Немецкий строит смысл через форму: позицию глагола, артикль, падеж, предлог и рамку.","formula":"смысл → грамматическая роль → немецкая форма → пример","typicalMistakes":["дословный перевод","пропуск артикля","русский порядок слов"],"grammarTables":[{"title":"Мини-чеклист","headers":["Что проверить","Вопрос","Пример"],"rows":[["глагол","где стоит?","V2 или конец придаточного"],["артикль","какой род?","der/die/das"],["падеж","какая роль?","Akkusativ/Dativ/Genitiv"],["стиль","официально или разговорно?","Sie / du"]]}],"whyForRussian":"Этот блок добавлен специально для русскоговорящего ученика: сначала сравниваем с русской логикой, потом показываем немецкий механизм и только после этого тренируем форму.","visualSchemes":[{"title":"Русская мысль -> немецкая форма","steps":[{"label":"1","title":"Смысл","text":"Что я хочу сказать по-русски?"},{"label":"2","title":"Форма","text":"Какой немецкий механизм нужен?","de":"Verb, Artikel, Kasus"},{"label":"3","title":"Контроль","text":"Проверяю порядок, падеж и регистр."}],"bars":[{"label":"смысл","value":70},{"label":"форма","value":90},{"label":"перевод","value":45}]}]},{"id":"b1-01-","level":"B1","order":1,"module":"B1 самостоятельность","title":"Времена: обзор функций","goal":"Использовать времена не только как формы, но и как смысл.","rule":"Präsens — сейчас/регулярно/будущее по контексту. Perfekt — разговорное прошлое. Präteritum — письменное повествование и sein/haben/modal. Plusquamperfekt — действие раньше другого прошлого. Futur I — будущее или предположение.","examples":[{"de":"Nachdem ich angekommen war, rief ich sie an.","ru":"После того как я приехал, я ей позвонил."},{"de":"Er wird wohl krank sein.","ru":"Он, вероятно, болен."}],"drills":[{"q":"Plusquamperfekt показывает...","options":["предшествование в прошлом","будущее","приказ"],"answer":0,"explanation":"Правильно: «предшествование в прошлом». Модальный глагол занимает вторую позицию, а смысловой глагол уходит в конец в инфинитиве.","topic":""},{"q":"Futur I может выражать...","options":["предположение","только прошлое","падеж"],"answer":0,"explanation":"Правильно: «предположение». Модальный глагол занимает вторую позицию, а смысловой глагол уходит в конец в инфинитиве.","topic":""},{"q":"sein/haben в прошлом часто:","options":["Präteritum","Genitiv","Imperativ"],"answer":0,"explanation":"Правильно: «Präteritum». Модальный глагол занимает вторую позицию, а смысловой глагол уходит в конец в инфинитиве.","topic":""}],"tags":["tenses"],"deepTheoryRu":"Модальный глагол в немецком занимает место спрягаемого глагола, а смысловой глагол уходит в конец в инфинитиве. Для русского это непривычно: «я должен сегодня работать» → Ich muss heute arbeiten.","russianTrap":"Ловушка: Ich muss heute arbeite. После модального нужен инфинитив arbeiten.","germanLogic":"Модальный глагол открывает рамку, инфинитив закрывает рамку.","formula":"Subjekt + Modalverb + ... + Infinitiv","typicalMistakes":["Ich muss arbeite","Ich heute muss arbeiten","Ich möchte einen Termin vereinbare"],"grammarTables":[{"title":"Модальные глаголы","headers":["Глагол","Смысл","Пример"],"rows":[["können","мочь/уметь","Ich kann kommen."],["müssen","должен","Ich muss arbeiten."],["wollen","хотеть","Ich will lernen."],["möchten","хотел бы","Ich möchte einen Termin."],["dürfen","можно/иметь разрешение","Darf ich fragen?"],["sollen","следует/должен по поручению","Sie sollen warten."]]}],"whyForRussian":"Этот блок добавлен специально для русскоговорящего ученика: сначала сравниваем с русской логикой, потом показываем немецкий механизм и только после этого тренируем форму.","visualSchemes":[{"title":"Русская мысль -> немецкая форма","steps":[{"label":"1","title":"Смысл","text":"Что я хочу сказать по-русски?"},{"label":"2","title":"Форма","text":"Какой немецкий механизм нужен?","de":"Verb, Artikel, Kasus"},{"label":"3","title":"Контроль","text":"Проверяю порядок, падеж и регистр."}],"bars":[{"label":"смысл","value":70},{"label":"форма","value":90},{"label":"перевод","value":45}]}]},{"id":"b1-02-","level":"B1","order":2,"module":"B1 самостоятельность","title":"Относительные предложения","goal":"Соединять фразы без повторов.","rule":"Относительное местоимение зависит от рода/числа существительного и падежа в придаточном: der Mann, den ich sehe; die Frau, der ich helfe.","examples":[{"de":"Das ist der Kollege, der mir geholfen hat.","ru":"Это коллега, который мне помог."},{"de":"Die Aufgabe, die ich gemacht habe, war schwer.","ru":"Задание, которое я сделал, было сложным."},{"de":"Der Patient, dem ich helfe, wartet.","ru":"Пациент, которому я помогаю, ждёт."}],"drills":[{"q":"der Mann, ___ ich sehe","options":["den","dem","der"],"answer":0,"explanation":"Правильно: «den». Сравнивайте не русский перевод, а роль слова: Nominativ - кто, Akkusativ - кого/что, Dativ - кому/с кем/где, Genitiv - чей/из-за чего.","topic":""},{"q":"die Frau, ___ ich helfe","options":["der","die","den"],"answer":0,"explanation":"Правильно: «der». Сравнивайте не русский перевод, а роль слова: Nominativ - кто, Akkusativ - кого/что, Dativ - кому/с кем/где, Genitiv - чей/из-за чего.","topic":""},{"q":"В относительном придаточном глагол...","options":["в конце","на втором месте","не используется"],"answer":0,"explanation":"Правильно: «в конце». Сравнивайте не русский перевод, а роль слова: Nominativ - кто, Akkusativ - кого/что, Dativ - кому/с кем/где, Genitiv - чей/из-за чего.","topic":""}],"tags":["clauses"],"deepTheoryRu":"В русском падежи часто видны по окончанию слова. В немецком главную работу часто делает артикль: der Mann, den Mann, dem Mann, des Mannes. Поэтому нельзя переводить только по смыслу — нужно видеть роль слова в предложении.","russianTrap":"Ловушка: думать «мужчина — der Mann всегда». Но после sehen будет Ich sehe den Mann, а после mit — mit dem Mann.","germanLogic":"Немецкий падеж отвечает на роль: кто действует, кого/что затронули, кому/где/с кем, чей/из-за чего.","formula":"Nominativ = кто? Akkusativ = кого/что? Dativ = кому/где/с кем? Genitiv = чей/из-за чего?","typicalMistakes":["der Mann после sehen","mit den Bus вместо mit dem Bus","wegen dem Problem в формальном письме"],"grammarTables":[{"title":"Артикли по падежам","headers":["Падеж","муж.","жен.","сред.","мн."],"rows":[["Nominativ","der/ein","die/eine","das/ein","die/-"],["Akkusativ","den/einen","die/eine","das/ein","die/-"],["Dativ","dem/einem","der/einer","dem/einem","den + -n"],["Genitiv","des/eines","der/einer","des/eines","der/-"]]},{"title":"Роль падежа","headers":["Падеж","Вопрос","Пример"],"rows":[["Nominativ","кто/что?","Der Arzt hilft."],["Akkusativ","кого/что?","Ich sehe den Arzt."],["Dativ","кому/с кем/где?","Ich helfe dem Patienten."],["Genitiv","чей/из-за чего?","wegen des Problems"]]}],"whyForRussian":"Этот блок добавлен специально для русскоговорящего ученика: сначала сравниваем с русской логикой, потом показываем немецкий механизм и только после этого тренируем форму.","visualSchemes":[{"title":"Падежная развилка","steps":[{"label":"1","title":"Глагол/предлог","text":"Сначала ищу управление.","de":"mit, helfen, sehen"},{"label":"2","title":"Падеж","text":"Выбираю роль: Akkusativ или Dativ.","de":"Akkusativ / Dativ"},{"label":"3","title":"Артикль","text":"Меняю der/ein по таблице.","de":"den Arzt / dem Arzt"}],"bars":[{"label":"управление","value":90},{"label":"артикль","value":85},{"label":"перевод","value":40}]}]},{"id":"b1-03-zu-infinitiv","level":"B1","order":3,"module":"B1 самостоятельность","title":"zu + Infinitiv","goal":"Писать цель и сложные действия.","rule":"После многих выражений используется zu + Infinitiv: Es ist wichtig, Deutsch zu üben. При отделяемом глаголе zu вставляется внутрь: anzurufen.","examples":[{"de":"Es ist wichtig, regelmäßig zu üben.","ru":"Важно регулярно заниматься."},{"de":"Ich habe vor, eine Prüfung zu machen.","ru":"Я планирую сдавать экзамен."},{"de":"Vergiss nicht, mich anzurufen.","ru":"Не забудь мне позвонить."}],"drills":[{"q":"Правильно:","options":["Deutsch zu üben","zu Deutsch üben","Deutsch üben zu"],"answer":0,"explanation":"Правильно: «Deutsch zu üben». У отделяемого глагола спрягается основа, а приставка закрывает фразу в конце: rufe ... an.","topic":""},{"q":"anrufen с zu:","options":["anzurufen","zu anrufen","an zu rufen"],"answer":0,"explanation":"Правильно: «anzurufen». У отделяемого глагола спрягается основа, а приставка закрывает фразу в конце: rufe ... an.","topic":""},{"q":"um ... zu выражает...","options":["цель","причину в прошлом","род"],"answer":0,"explanation":"Правильно: «цель». У отделяемого глагола спрягается основа, а приставка закрывает фразу в конце: rufe ... an.","topic":""}],"tags":["infinitive"],"deepTheoryRu":"Отделяемые глаголы — типичная немецкая рамка. В словаре глагол пишется вместе: anrufen. В обычной фразе приставка уходит в конец: Ich rufe dich an.","russianTrap":"Ловушка: Ich anrufe dich. В главном предложении приставка отделяется.","germanLogic":"Спрягается основная часть, приставка закрывает смысл в конце.","formula":"anrufen → Ich rufe ... an","typicalMistakes":["Ich anrufe dich","Ich rufe dich auf вместо an","zu anrufen вместо anzurufen"],"grammarTables":[{"title":"Отделяемый глагол","headers":["Форма","Пример","Комментарий"],"rows":[["Infinitiv","anrufen","словарная форма"],["Präsens","Ich rufe dich an.","приставка в конце"],["Perfekt","Ich habe angerufen.","ge между приставкой и основой"],["zu + Infinitiv","anzurufen","zu внутри"]]}],"whyForRussian":"Этот блок добавлен специально для русскоговорящего ученика: сначала сравниваем с русской логикой, потом показываем немецкий механизм и только после этого тренируем форму.","visualSchemes":[{"title":"Русская мысль -> немецкая форма","steps":[{"label":"1","title":"Смысл","text":"Что я хочу сказать по-русски?"},{"label":"2","title":"Форма","text":"Какой немецкий механизм нужен?","de":"Verb, Artikel, Kasus"},{"label":"3","title":"Контроль","text":"Проверяю порядок, падеж и регистр."}],"bars":[{"label":"смысл","value":70},{"label":"форма","value":90},{"label":"перевод","value":45}]}]},{"id":"b1-04-passiv","level":"B1","order":4,"module":"B1 самостоятельность","title":"Passiv: базовый","goal":"Сместить фокус с исполнителя на действие.","rule":"Vorgangspassiv = werden + Partizip II: Der Antrag wird geprüft. Zustandspassiv = sein + Partizip II: Die Tür ist geöffnet.","examples":[{"de":"Der Brief wird geschrieben.","ru":"Письмо пишется."},{"de":"Die Patienten werden informiert.","ru":"Пациентов информируют."},{"de":"Die Praxis ist geschlossen.","ru":"Кабинет закрыт."}],"drills":[{"q":"Vorgangspassiv строится через...","options":["werden + Partizip II","haben + Infinitiv","sein + Infinitiv"],"answer":0,"explanation":"Правильно: «werden + Partizip II». Akkusativ показывает объект действия; у мужского рода der/ein меняется на den/einen.","topic":""},{"q":"Die Praxis ist geschlossen =","options":["состояние","процесс","команда"],"answer":0,"explanation":"Правильно: «состояние». В Perfekt нужен помощник haben/sein и Partizip II в конце; движение с изменением места часто берет sein.","topic":""},{"q":"Der Antrag wird geprüft =","options":["заявление проверяется","проверил заявление","заявление дорогое"],"answer":0,"explanation":"Правильно: «заявление проверяется». В Perfekt нужен помощник haben/sein и Partizip II в конце; движение с изменением места часто берет sein.","topic":""}],"tags":["passive"],"deepTheoryRu":"В русском можно сказать «заявление проверяют» без указания исполнителя. В немецком для этого часто используется Passiv: Der Antrag wird geprüft. Это особенно важно в официальном стиле.","russianTrap":"Ловушка: пытаться всегда переводить через man. Man prüft den Antrag возможно, но Passiv звучит официальнее и нейтральнее.","germanLogic":"Passiv ставит действие в центр, а исполнителя убирает или делает второстепенным.","formula":"werden + Partizip II: wird geprüft; wurde geprüft; ist geprüft worden","typicalMistakes":["Der Antrag ist prüfen","wurde gepruft без Partizip II","путать Zustandspassiv и Vorgangspassiv"],"grammarTables":[{"title":"Passiv","headers":["Время/тип","Форма","Пример"],"rows":[["Präsens","wird + Partizip II","Der Antrag wird geprüft."],["Präteritum","wurde + Partizip II","Der Antrag wurde geprüft."],["Perfekt","ist + Partizip II + worden","Der Antrag ist geprüft worden."],["Zustand","sein + Partizip II","Die Praxis ist geschlossen."]]},{"title":"Замены Passiv","headers":["Конструкция","Смысл","Пример"],"rows":[["man","кто-то делает","Man prüft den Antrag."],["sich lassen","можно сделать","Das lässt sich lösen."],["sein + zu","нужно сделать","Der Antrag ist zu prüfen."],["-bar","возможно","verständlich, lösbar"]]}],"whyForRussian":"Этот блок добавлен специально для русскоговорящего ученика: сначала сравниваем с русской логикой, потом показываем немецкий механизм и только после этого тренируем форму.","visualSchemes":[{"title":"Русская мысль -> немецкая форма","steps":[{"label":"1","title":"Смысл","text":"Что я хочу сказать по-русски?"},{"label":"2","title":"Форма","text":"Какой немецкий механизм нужен?","de":"Verb, Artikel, Kasus"},{"label":"3","title":"Контроль","text":"Проверяю порядок, падеж и регистр."}],"bars":[{"label":"смысл","value":70},{"label":"форма","value":90},{"label":"перевод","value":45}]}]},{"id":"b1-05-konjunktiv-ii","level":"B1","order":5,"module":"B1 самостоятельность","title":"Konjunktiv II: вежливость и совет","goal":"Говорить мягче и условно.","rule":"Формы würde + Infinitiv и специальные формы wäre, hätte, könnte, müsste помогают выражать вежливость, совет, нереальность.","examples":[{"de":"Könnten Sie mir bitte helfen?","ru":"Не могли бы Вы мне помочь?"},{"de":"Ich würde mehr üben.","ru":"Я бы больше занимался."},{"de":"Wenn ich Zeit hätte, käme ich mit.","ru":"Если бы у меня было время, я бы пошёл."}],"drills":[{"q":"Вежливо:","options":["Könnten Sie...?","Können Sie sofort!","Du musst!"],"answer":0,"explanation":"Правильно: «Könnten Sie...?». Konjunktiv II звучит вежливо или гипотетически, что важно для B1/B2.","topic":""},{"q":"ich + haben в KII:","options":["ich hätte","ich hatte","ich habe"],"answer":0,"explanation":"Правильно: «ich hätte». Konjunktiv II звучит вежливо или гипотетически, что важно для B1/B2.","topic":""},{"q":"würde + ...","options":["Infinitiv","Partizip II","Dativ"],"answer":0,"explanation":"Правильно: «Infinitiv». Konjunktiv нужен для вежливости, гипотез и косвенной речи; он меняет тон высказывания.","topic":""}],"tags":["konjunktiv"],"deepTheoryRu":"Konjunktiv — это не просто «сослагательное наклонение». Для B1/B2 важны две функции: Konjunktiv II для вежливости/условности и Konjunktiv I для косвенной речи.","russianTrap":"Ловушка: переводить würde как отдельное слово «бы» и забывать инфинитив в конце.","germanLogic":"Konjunktiv меняет дистанцию: делает высказывание вежливым, гипотетическим или переданным со слов другого человека.","formula":"KII: würde + Infinitiv / hätte / wäre / könnte. KI: er habe, sie sei.","typicalMistakes":["ich würde gemacht","er hat gesagt, er hat... вместо er habe","Können Sie sofort! вместо Könnten Sie..."],"grammarTables":[{"title":"Konjunktiv II","headers":["Функция","Форма","Пример"],"rows":[["вежливость","könnte","Könnten Sie mir helfen?"],["условие","wäre/hätte","Wenn ich Zeit hätte..."],["предложение","würde + Infinitiv","Ich würde mehr üben."]]},{"title":"Konjunktiv I","headers":["Обычная форма","Косвенная речь","Пример"],"rows":[["er hat","er habe","Er sagte, er habe keine Zeit."],["sie ist","sie sei","Sie erklärte, die Maßnahme sei notwendig."],["sie müssen","sie müssten","если KI совпадает, часто KII"]]}],"whyForRussian":"Этот блок добавлен специально для русскоговорящего ученика: сначала сравниваем с русской логикой, потом показываем немецкий механизм и только после этого тренируем форму.","visualSchemes":[{"title":"Русская мысль -> немецкая форма","steps":[{"label":"1","title":"Смысл","text":"Что я хочу сказать по-русски?"},{"label":"2","title":"Форма","text":"Какой немецкий механизм нужен?","de":"Verb, Artikel, Kasus"},{"label":"3","title":"Контроль","text":"Проверяю порядок, падеж и регистр."}],"bars":[{"label":"смысл","value":70},{"label":"форма","value":90},{"label":"перевод","value":45}]}]},{"id":"b1-06-","level":"B1","order":6,"module":"B1 самостоятельность","title":"Управление глаголов","goal":"Запоминать глагол вместе с предлогом.","rule":"Многие глаголы требуют устойчивого предлога и падежа: warten auf + Akk., teilnehmen an + Dat., sich interessieren für + Akk.","examples":[{"de":"Ich warte auf den Bus.","ru":"Я жду автобус."},{"de":"Sie nimmt an dem Kurs teil.","ru":"Она участвует в курсе."},{"de":"Wir sprechen über das Problem.","ru":"Мы говорим о проблеме."}],"drills":[{"q":"warten ...","options":["auf + Akk.","an + Dat.","mit + Gen."],"answer":0,"explanation":"Правильно: «auf + Akk.». Сравнивайте не русский перевод, а роль слова: Nominativ - кто, Akkusativ - кого/что, Dativ - кому/с кем/где, Genitiv - чей/из-за чего.","topic":""},{"q":"teilnehmen ...","options":["an + Dat.","für + Akk.","über + Akk."],"answer":0,"explanation":"Правильно: «an + Dat.». Сравнивайте не русский перевод, а роль слова: Nominativ - кто, Akkusativ - кого/что, Dativ - кому/с кем/где, Genitiv - чей/из-за чего.","topic":""},{"q":"sich interessieren ...","options":["für + Akk.","bei + Dativ","nach + Genitiv"],"answer":0,"explanation":"Правильно: «für + Akk.». Сравнивайте не русский перевод, а роль слова: Nominativ - кто, Akkusativ - кого/что, Dativ - кому/с кем/где, Genitiv - чей/из-за чего.","topic":""}],"tags":["prepositions"],"deepTheoryRu":"В русском падежи часто видны по окончанию слова. В немецком главную работу часто делает артикль: der Mann, den Mann, dem Mann, des Mannes. Поэтому нельзя переводить только по смыслу — нужно видеть роль слова в предложении.","russianTrap":"Ловушка: думать «мужчина — der Mann всегда». Но после sehen будет Ich sehe den Mann, а после mit — mit dem Mann.","germanLogic":"Немецкий падеж отвечает на роль: кто действует, кого/что затронули, кому/где/с кем, чей/из-за чего.","formula":"Nominativ = кто? Akkusativ = кого/что? Dativ = кому/где/с кем? Genitiv = чей/из-за чего?","typicalMistakes":["der Mann после sehen","mit den Bus вместо mit dem Bus","wegen dem Problem в формальном письме"],"grammarTables":[{"title":"Артикли по падежам","headers":["Падеж","муж.","жен.","сред.","мн."],"rows":[["Nominativ","der/ein","die/eine","das/ein","die/-"],["Akkusativ","den/einen","die/eine","das/ein","die/-"],["Dativ","dem/einem","der/einer","dem/einem","den + -n"],["Genitiv","des/eines","der/einer","des/eines","der/-"]]},{"title":"Роль падежа","headers":["Падеж","Вопрос","Пример"],"rows":[["Nominativ","кто/что?","Der Arzt hilft."],["Akkusativ","кого/что?","Ich sehe den Arzt."],["Dativ","кому/с кем/где?","Ich helfe dem Patienten."],["Genitiv","чей/из-за чего?","wegen des Problems"]]}],"whyForRussian":"Этот блок добавлен специально для русскоговорящего ученика: сначала сравниваем с русской логикой, потом показываем немецкий механизм и только после этого тренируем форму.","visualSchemes":[{"title":"Падежная развилка","steps":[{"label":"1","title":"Глагол/предлог","text":"Сначала ищу управление.","de":"mit, helfen, sehen"},{"label":"2","title":"Падеж","text":"Выбираю роль: Akkusativ или Dativ.","de":"Akkusativ / Dativ"},{"label":"3","title":"Артикль","text":"Меняю der/ein по таблице.","de":"den Arzt / dem Arzt"}],"bars":[{"label":"управление","value":90},{"label":"артикль","value":85},{"label":"перевод","value":40}]}]},{"id":"b1-07-da-wo","level":"B1","order":7,"module":"B1 самостоятельность","title":"da-/wo-композиты","goal":"Заменять предлог + вещь в B1/B2 речи.","rule":"Если речь о предмете/идее, используйте da-: darauf, darüber, damit. В вопросе: worauf, worüber, womit. Для людей обычно предлог + местоимение: auf ihn.","examples":[{"de":"Ich warte darauf.","ru":"Я этого жду."},{"de":"Worüber sprechen Sie?","ru":"О чём Вы говорите?"},{"de":"Damit bin ich einverstanden.","ru":"С этим я согласен."}],"drills":[{"q":"auf + das →","options":["darauf","damit","dabei"],"answer":0,"explanation":"Правильно: «darauf». В русском вопрос часто держится интонацией, а в немецком его показывает порядок слов: глагол первым или после W-слова.","topic":""},{"q":"über + was →","options":["worüber","womit","woran"],"answer":0,"explanation":"Правильно: «worüber». В русском вопрос часто держится интонацией, а в немецком его показывает порядок слов: глагол первым или после W-слова.","topic":""},{"q":"Для людей:","options":["auf ihn","darauf ihn","woran ihn"],"answer":0,"explanation":"Правильно: «auf ihn». В русском вопрос часто держится интонацией, а в немецком его показывает порядок слов: глагол первым или после W-слова.","topic":""}],"tags":["pronouns"],"deepTheoryRu":"В русском вопрос часто делается интонацией: «У вас есть время?» В немецком порядок слов показывает тип вопроса. Если вопрос без вопросительного слова, глагол идёт первым. Если есть W-слово, оно первое, глагол второй.","russianTrap":"Ловушка: говорить Sie haben Zeit? как основной учебный вариант. Это возможно интонационно, но стандартный грамматический вопрос: Haben Sie Zeit?","germanLogic":"Немецкий вопрос строится через позицию глагола, а не только через интонацию.","formula":"Ja/Nein: Verb + Subjekt + ...? W-Frage: W-Wort + Verb + Subjekt + ...?","typicalMistakes":["Sie haben Zeit? вместо Haben Sie Zeit?","Wo Sie wohnen?","Wann der Termin ist? как прямой вопрос"],"grammarTables":[{"title":"Типы вопросов","headers":["Тип","Шаблон","Пример"],"rows":[["Ja/Nein","Verb + Subjekt","Haben Sie Zeit?"],["W-Frage","Wort + Verb + Subjekt","Wo wohnen Sie?"],["Косвенный вопрос","..., W/ob + ... + Verb","Können Sie sagen, wann der Termin ist?"]]}],"whyForRussian":"Этот блок добавлен специально для русскоговорящего ученика: сначала сравниваем с русской логикой, потом показываем немецкий механизм и только после этого тренируем форму.","visualSchemes":[{"title":"Русская мысль -> немецкая форма","steps":[{"label":"1","title":"Смысл","text":"Что я хочу сказать по-русски?"},{"label":"2","title":"Форма","text":"Какой немецкий механизм нужен?","de":"Verb, Artikel, Kasus"},{"label":"3","title":"Контроль","text":"Проверяю порядок, падеж и регистр."}],"bars":[{"label":"смысл","value":70},{"label":"форма","value":90},{"label":"перевод","value":45}]}]},{"id":"b1-08-b1","level":"B1","order":8,"module":"B1 самостоятельность","title":"Связки аргументации B1","goal":"Строить мнение с причиной и контрастом.","rule":"B1-связки: deshalb, trotzdem, außerdem, jedoch. После наречия-связки в первом поле сразу V2: Deshalb lerne ich jeden Tag.","examples":[{"de":"Ich brauche Deutsch, deshalb übe ich täglich.","ru":"Мне нужен немецкий, поэтому я занимаюсь каждый день."},{"de":"Es ist schwierig, trotzdem mache ich weiter.","ru":"Это сложно, несмотря на это я продолжаю."},{"de":"Außerdem möchte ich in Deutschland arbeiten.","ru":"Кроме того, я хочу работать в Германии."}],"drills":[{"q":"После deshalb глагол стоит...","options":["сразу после deshalb","в конце","перед запятой"],"answer":0,"explanation":"Правильно: «сразу после deshalb». Эта связка занимает первое поле, поэтому после нее сразу идет спрягаемый глагол.","topic":""},{"q":"trotzdem выражает...","options":["контраст","причину","время"],"answer":0,"explanation":"Правильно: «контраст». Для русскоговорящего здесь важен не перевод, а звук: немецкое буквосочетание читается стабильно, но не по-русски и не по-английски.","topic":""},{"q":"außerdem значит...","options":["кроме того","если","несмотря на"],"answer":0,"explanation":"Правильно: «кроме того». Для русскоговорящего здесь важен не перевод, а звук: немецкое буквосочетание читается стабильно, но не по-русски и не по-английски.","topic":""}],"tags":["connectors"],"deepTheoryRu":"Русскоговорящему важно сразу отделить немецкое чтение от английского и русского. Немецкий в основном читается стабильнее английского, но есть группы букв, которые нельзя читать по-русски: ei = ай, ie = долгое и, sch = ш, sp/st в начале часто шп/шт.","russianTrap":"Ловушка: видеть латинские буквы и читать их как английские или русские. Например mein — не «меин», а примерно «майн».","germanLogic":"Немецкая логика: сначала выучи устойчивые буквосочетания, потом слово читается почти механически.","formula":"буква/сочетание → звук → пример: ei → ай → mein; sch → ш → Deutsch","typicalMistakes":["читать ei как «еи»","произносить sch как «сх»","игнорировать умлауты ä/ö/ü"],"grammarTables":[{"title":"Главные сочетания","headers":["Сочетание","Звук","Пример"],"rows":[["ei","ай","mein, nein"],["ie","долгое и","Liebe, sie"],["sch","ш","Deutsch, sprechen"],["sp/st в начале","шп/шт","sprechen, stehen"]]},{"title":"Умлауты","headers":["Буква","Ориентир для русского","Пример"],"rows":[["ä","между э/е","spät"],["ö","округлённый э","schön"],["ü","округлённый и","Tür"],["ß","долгое/глухое с","Straße"]]}],"whyForRussian":"Этот блок добавлен специально для русскоговорящего ученика: сначала сравниваем с русской логикой, потом показываем немецкий механизм и только после этого тренируем форму.","visualSchemes":[{"title":"Схема чтения","steps":[{"label":"1","title":"Вижу сочетание","text":"Не читаю по-английски.","de":"ei, ie, sch, sp, st"},{"label":"2","title":"Выбираю звук","text":"Сначала звук, потом слово.","de":"mein, Liebe, sprechen"},{"label":"3","title":"Собираю фразу","text":"Читаю вслух короткими блоками.","de":"Ich spreche Deutsch."}],"bars":[{"label":"звук","value":90},{"label":"ударение","value":60},{"label":"фраза","value":70}]}]},{"id":"b1-09-b1","level":"B1","order":9,"module":"B1 самостоятельность","title":"Письмо B1: жалоба, просьба, мнение","goal":"Писать связный текст 120–150 слов.","rule":"Структура: цель письма → факты → проблема/мнение → просьба/предложение → завершение. Используйте связки, но не перегружайте текст.","examples":[{"de":"Ich wende mich an Sie, weil...","ru":"Я обращаюсь к Вам, потому что..."},{"de":"Leider gab es ein Problem mit...","ru":"К сожалению, возникла проблема с..."},{"de":"Ich bitte Sie um eine Rückmeldung.","ru":"Прошу Вас ответить."}],"drills":[{"q":"Формула жалобы:","options":["Leider gab es ein Problem...","Viele Grüße an alle","Ich spiele Fußball"],"answer":0,"explanation":"Правильно: «Leider gab es ein Problem...». Для русскоговорящего главное - не переводить дословно, а проверить немецкую форму: глагол, артикль, падеж, предлог и порядок слов.","topic":""},{"q":"Rückmeldung значит...","options":["обратная связь/ответ","налог","рецепт"],"answer":0,"explanation":"Правильно: «обратная связь/ответ». Для русскоговорящего главное - не переводить дословно, а проверить немецкую форму: глагол, артикль, падеж, предлог и порядок слов.","topic":""},{"q":"Письмо лучше завершить...","options":["Mit freundlichen Grüßen","Hallo","Nein"],"answer":0,"explanation":"Правильно: «Mit freundlichen Grüßen». Dativ часто нужен после mit, bei, zu, aus, von, seit, nach и для адресата помощи.","topic":""}],"tags":["writing"],"deepTheoryRu":"Связки в немецком опасны тем, что меняют порядок слов. Русскоговорящий часто переводит связку и сохраняет русский порядок. В немецком важно знать: связка занимает позицию или нет.","russianTrap":"Ловушка: Deshalb ich lerne Deutsch. После deshalb сразу глагол: Deshalb lerne ich Deutsch.","germanLogic":"Связки делятся на 0-позицию, 1-позицию и подчинительные союзы.","formula":"deshalb/trotzdem/dennoch + Verb + Subjekt; weil/dass/obwohl + ... + Verb","typicalMistakes":["Deshalb ich lerne","Obwohl es ist schwierig","Denn требует глагол в конец"],"grammarTables":[{"title":"Связки и позиция","headers":["Тип","Связки","Порядок"],"rows":[["0-позиция","und, aber, denn, sondern, oder","после них обычный порядок"],["1-позиция","deshalb, trotzdem, dennoch, folglich","сразу V2"],["подчинительные","weil, dass, obwohl, während, sofern","глагол в конце"]]}],"whyForRussian":"Этот блок добавлен специально для русскоговорящего ученика: сначала сравниваем с русской логикой, потом показываем немецкий механизм и только после этого тренируем форму.","visualSchemes":[{"title":"Русская мысль -> немецкая форма","steps":[{"label":"1","title":"Смысл","text":"Что я хочу сказать по-русски?"},{"label":"2","title":"Форма","text":"Какой немецкий механизм нужен?","de":"Verb, Artikel, Kasus"},{"label":"3","title":"Контроль","text":"Проверяю порядок, падеж и регистр."}],"bars":[{"label":"смысл","value":70},{"label":"форма","value":90},{"label":"перевод","value":45}]}]},{"id":"b1-10-b1","level":"B1","order":10,"module":"B1 самостоятельность","title":"Говорение B1: мнение и картинка","goal":"Говорить связно 1–2 минуты.","rule":"Мини-структура: что вижу/о чём тема → мнение → причина → пример → вывод. Фразы: Ich denke, dass..., Ein Beispiel dafür ist..., Zusammenfassend...","examples":[{"de":"Meiner Meinung nach ist das wichtig.","ru":"По моему мнению, это важно."},{"de":"Ein Beispiel dafür ist meine Arbeit.","ru":"Пример этого — моя работа."},{"de":"Zusammenfassend kann man sagen, dass...","ru":"В целом можно сказать, что..."}],"drills":[{"q":"Фраза для мнения:","options":["Meiner Meinung nach...","Um acht Uhr","Der Tisch"],"answer":0,"explanation":"Правильно: «Meiner Meinung nach...». После weil/dass/wenn/obwohl спрягаемый глагол уходит в конец придаточного.","topic":""},{"q":"Фраза для примера:","options":["Ein Beispiel dafür ist...","Obwohl wenn","Ich bin Name"],"answer":0,"explanation":"Правильно: «Ein Beispiel dafür ist...». После weil/dass/wenn/obwohl спрягаемый глагол уходит в конец придаточного.","topic":""},{"q":"Zusammenfassend значит...","options":["подводя итог","в понедельник","дороже"],"answer":0,"explanation":"Правильно: «подводя итог». После weil/dass/wenn/obwohl спрягаемый глагол уходит в конец придаточного.","topic":""}],"tags":["speaking"],"deepTheoryRu":"Русский часто сохраняет привычный порядок слов после «потому что/что/если». В немецком подчинительный союз отправляет спрягаемый глагол в конец: weil ich Zeit habe.","russianTrap":"Ловушка: weil ich habe Zeit. Это русская логика порядка слов, но не немецкая.","germanLogic":"Придаточное предложение в немецком закрывается глаголом.","formula":"weil/dass/wenn/obwohl + подлежащее + ... + Verb","typicalMistakes":["weil ich habe Zeit","dass er kommt heute","wenn ich habe Zeit"],"grammarTables":[{"title":"Союзы и порядок слов","headers":["Союз","Смысл","Порядок"],"rows":[["weil","потому что","глагол в конце"],["dass","что","глагол в конце"],["wenn","если/когда","глагол в конце"],["obwohl","хотя","глагол в конце"],["ob","ли","глагол в конце"]]},{"title":"Цель","headers":["Конструкция","Когда","Пример"],"rows":[["um ... zu","один субъект","Ich lerne, um besser zu sprechen."],["damit","разные субъекты","Ich erkläre es, damit du es verstehst."]]}],"whyForRussian":"Этот блок добавлен специально для русскоговорящего ученика: сначала сравниваем с русской логикой, потом показываем немецкий механизм и только после этого тренируем форму.","visualSchemes":[{"title":"Рамка придаточного","steps":[{"label":"1","title":"Союз","text":"weil/dass/wenn открывает придаточное.","de":"weil"},{"label":"2","title":"Смысл","text":"Подлежащее и дополнения идут внутри.","de":"ich Zeit"},{"label":"3","title":"Глагол","text":"Спрягаемый глагол закрывает часть.","de":"habe"}],"bars":[{"label":"союз","value":75},{"label":"конец","value":95},{"label":"перенос с русского","value":80}]}]},{"id":"b1-11-doppelkonnektoren","level":"B1","order":11,"module":"B1 связность","title":"Двойные союзы","goal":"Строить более точные аргументы.","rule":"Двойные союзы связывают части фразы: nicht nur…, sondern auch…; sowohl… als auch…; entweder… oder…; weder… noch….","examples":[{"de":"Der Kurs ist nicht nur praktisch, sondern auch günstig.","ru":"Курс не только практичный, но и недорогой."},{"de":"Sowohl Grammatik als auch Wortschatz sind wichtig.","ru":"Важны и грамматика, и словарь."},{"de":"Entweder übe ich morgens oder ich lerne abends.","ru":"Я тренируюсь либо утром, либо вечером."}],"drills":[{"q":"nicht nur…, ___ auch…","options":["sondern","aber","weil"],"answer":0,"explanation":"Правильно: «sondern». nicht отрицает действие, качество или всю мысль; kein отрицает существительное. Русское «не/нет» нельзя переносить одним способом.","topic":"connectors"},{"q":"sowohl…, ___ auch…","options":["als","oder","noch"],"answer":0,"explanation":"Правильно: «als». nicht отрицает действие, качество или всю мысль; kein отрицает существительное. Русское «не/нет» нельзя переносить одним способом.","topic":"connectors"},{"q":"weder…, noch… значит:","options":["ни…, ни…","либо…, либо…","не только…, но и…"],"answer":0,"explanation":"Правильно: «ни…, ни…». nicht отрицает действие, качество или всю мысль; kein отрицает существительное. Русское «не/нет» нельзя переносить одним способом.","topic":"connectors"}],"tags":["connectors"],"deepTheoryRu":"Русское «не/нет» часто переводится двумя немецкими инструментами: nicht и kein. Kein отрицает существительное с неопределённым артиклем или без артикля. Nicht отрицает глагол, прилагательное, обстоятельство или всю мысль.","russianTrap":"Ловушка: говорить Ich habe nicht Termin. Если имеется в виду «нет записи», нужно keinen Termin.","germanLogic":"Немецкий выбирает отрицание по тому, что именно отрицается: предмет или действие/качество.","formula":"kein + существительное; nicht + глагол/прилагательное/фраза.","typicalMistakes":["Ich habe nicht Termin","Ich verstehe kein","Das ist kein teuer"],"grammarTables":[{"title":"nicht или kein","headers":["Что отрицаем","Немецкий","Пример"],"rows":[["существительное","kein","Ich habe keinen Termin."],["глагол","nicht","Ich komme nicht."],["прилагательное","nicht","Das ist nicht teuer."],["вся мысль","nicht","Ich verstehe das nicht."]]}],"whyForRussian":"Этот блок добавлен специально для русскоговорящего ученика: сначала сравниваем с русской логикой, потом показываем немецкий механизм и только после этого тренируем форму.","visualSchemes":[{"title":"Русская мысль -> немецкая форма","steps":[{"label":"1","title":"Смысл","text":"Что я хочу сказать по-русски?"},{"label":"2","title":"Форма","text":"Какой немецкий механизм нужен?","de":"Verb, Artikel, Kasus"},{"label":"3","title":"Контроль","text":"Проверяю порядок, падеж и регистр."}],"bars":[{"label":"смысл","value":70},{"label":"форма","value":90},{"label":"перевод","value":45}]}]},{"id":"b1-12-verben-mit-praeposition","level":"B1","order":12,"module":"B1 связность","title":"Глаголы с управлением","goal":"Учить глагол вместе с предлогом и падежом.","rule":"Многие глаголы требуют фиксированный предлог: warten auf + Akkusativ, sprechen über + Akkusativ, teilnehmen an + Dativ, sich kümmern um + Akkusativ.","examples":[{"de":"Ich warte auf den Bus.","ru":"Я жду автобус."},{"de":"Wir sprechen über die Prüfung.","ru":"Мы говорим об экзамене."},{"de":"Sie nimmt an dem Kurs teil.","ru":"Она участвует в курсе."}],"drills":[{"q":"warten ___ den Bus","options":["auf","an","mit"],"answer":0,"explanation":"Правильно: «auf». Сравнивайте не русский перевод, а роль слова: Nominativ - кто, Akkusativ - кого/что, Dativ - кому/с кем/где, Genitiv - чей/из-за чего.","topic":"prepositions"},{"q":"teilnehmen ___ dem Kurs","options":["an","auf","über"],"answer":0,"explanation":"Правильно: «an». Сравнивайте не русский перевод, а роль слова: Nominativ - кто, Akkusativ - кого/что, Dativ - кому/с кем/где, Genitiv - чей/из-за чего.","topic":"prepositions"},{"q":"sich kümmern ___ das Problem","options":["um","mit","bei"],"answer":0,"explanation":"Правильно: «um». Сравнивайте не русский перевод, а роль слова: Nominativ - кто, Akkusativ - кого/что, Dativ - кому/с кем/где, Genitiv - чей/из-за чего.","topic":"prepositions"}],"tags":["prepositions","collocations"],"deepTheoryRu":"В русском падежи часто видны по окончанию слова. В немецком главную работу часто делает артикль: der Mann, den Mann, dem Mann, des Mannes. Поэтому нельзя переводить только по смыслу — нужно видеть роль слова в предложении.","russianTrap":"Ловушка: думать «мужчина — der Mann всегда». Но после sehen будет Ich sehe den Mann, а после mit — mit dem Mann.","germanLogic":"Немецкий падеж отвечает на роль: кто действует, кого/что затронули, кому/где/с кем, чей/из-за чего.","formula":"Nominativ = кто? Akkusativ = кого/что? Dativ = кому/где/с кем? Genitiv = чей/из-за чего?","typicalMistakes":["der Mann после sehen","mit den Bus вместо mit dem Bus","wegen dem Problem в формальном письме"],"grammarTables":[{"title":"Артикли по падежам","headers":["Падеж","муж.","жен.","сред.","мн."],"rows":[["Nominativ","der/ein","die/eine","das/ein","die/-"],["Akkusativ","den/einen","die/eine","das/ein","die/-"],["Dativ","dem/einem","der/einer","dem/einem","den + -n"],["Genitiv","des/eines","der/einer","des/eines","der/-"]]},{"title":"Роль падежа","headers":["Падеж","Вопрос","Пример"],"rows":[["Nominativ","кто/что?","Der Arzt hilft."],["Akkusativ","кого/что?","Ich sehe den Arzt."],["Dativ","кому/с кем/где?","Ich helfe dem Patienten."],["Genitiv","чей/из-за чего?","wegen des Problems"]]}],"whyForRussian":"Этот блок добавлен специально для русскоговорящего ученика: сначала сравниваем с русской логикой, потом показываем немецкий механизм и только после этого тренируем форму.","visualSchemes":[{"title":"Падежная развилка","steps":[{"label":"1","title":"Глагол/предлог","text":"Сначала ищу управление.","de":"mit, helfen, sehen"},{"label":"2","title":"Падеж","text":"Выбираю роль: Akkusativ или Dativ.","de":"Akkusativ / Dativ"},{"label":"3","title":"Артикль","text":"Меняю der/ein по таблице.","de":"den Arzt / dem Arzt"}],"bars":[{"label":"управление","value":90},{"label":"артикль","value":85},{"label":"перевод","value":40}]}]},{"id":"b1-13-bewerbung","level":"B1","order":13,"module":"B1 практика","title":" Bewerbung и мотивация","goal":"Коротко объяснять опыт и цель.","rule":"В заявке важны ясные связки: Ich interessiere mich für…, Ich verfüge über…, Ich möchte meine Kenntnisse erweitern. После über часто Akkusativ.","examples":[{"de":"Ich interessiere mich für diese Stelle.","ru":"Меня интересует эта должность."},{"de":"Ich verfüge über Erfahrung im Verkauf.","ru":"У меня есть опыт в продажах."},{"de":"Ich möchte meine Deutschkenntnisse erweitern.","ru":"Я хотел(а) бы расширить знания немецкого."},{"de":"Ich bewerbe mich um diese Stelle.","ru":"Я подаю заявку на эту вакансию."}],"drills":[{"q":"sich interessieren ___ diese Stelle","options":["für","über","an"],"answer":0,"explanation":"Правильно: «für». Сравнивайте не русский перевод, а роль слова: Nominativ - кто, Akkusativ - кого/что, Dativ - кому/с кем/где, Genitiv - чей/из-за чего.","topic":"bewerbung"},{"q":"verfügen ___ Erfahrung","options":["über","auf","für"],"answer":0,"explanation":"Правильно: «über». Сравнивайте не русский перевод, а роль слова: Nominativ - кто, Akkusativ - кого/что, Dativ - кому/с кем/где, Genitiv - чей/из-за чего.","topic":"bewerbung"},{"q":"Kenntnisse erweitern значит:","options":["расширять знания","закрывать офис","получать счёт"],"answer":0,"explanation":"Правильно: «расширять знания». Сравнивайте не русский перевод, а роль слова: Nominativ - кто, Akkusativ - кого/что, Dativ - кому/с кем/где, Genitiv - чей/из-за чего.","topic":"bewerbung"}],"tags":["work","writing"],"deepTheoryRu":"В русском падежи часто видны по окончанию слова. В немецком главную работу часто делает артикль: der Mann, den Mann, dem Mann, des Mannes. Поэтому нельзя переводить только по смыслу — нужно видеть роль слова в предложении.","russianTrap":"Ловушка: думать «мужчина — der Mann всегда». Но после sehen будет Ich sehe den Mann, а после mit — mit dem Mann.","germanLogic":"Немецкий падеж отвечает на роль: кто действует, кого/что затронули, кому/где/с кем, чей/из-за чего.","formula":"Nominativ = кто? Akkusativ = кого/что? Dativ = кому/где/с кем? Genitiv = чей/из-за чего?","typicalMistakes":["der Mann после sehen","mit den Bus вместо mit dem Bus","wegen dem Problem в формальном письме"],"grammarTables":[{"title":"Артикли по падежам","headers":["Падеж","муж.","жен.","сред.","мн."],"rows":[["Nominativ","der/ein","die/eine","das/ein","die/-"],["Akkusativ","den/einen","die/eine","das/ein","die/-"],["Dativ","dem/einem","der/einer","dem/einem","den + -n"],["Genitiv","des/eines","der/einer","des/eines","der/-"]]},{"title":"Роль падежа","headers":["Падеж","Вопрос","Пример"],"rows":[["Nominativ","кто/что?","Der Arzt hilft."],["Akkusativ","кого/что?","Ich sehe den Arzt."],["Dativ","кому/с кем/где?","Ich helfe dem Patienten."],["Genitiv","чей/из-за чего?","wegen des Problems"]]}],"whyForRussian":"Этот блок добавлен специально для русскоговорящего ученика: сначала сравниваем с русской логикой, потом показываем немецкий механизм и только после этого тренируем форму.","contrastExamples":[{"ru":"Я подаю заявку на эту вакансию.","literal":"Не так: Ich bewerbe diese Stelle.","de":"Ich bewerbe mich um diese Stelle.","note":"sich bewerben требует um + Akkusativ."}],"visualSchemes":[{"title":"Падежная развилка","steps":[{"label":"1","title":"Глагол/предлог","text":"Сначала ищу управление.","de":"mit, helfen, sehen"},{"label":"2","title":"Падеж","text":"Выбираю роль: Akkusativ или Dativ.","de":"Akkusativ / Dativ"},{"label":"3","title":"Артикль","text":"Меняю der/ein по таблице.","de":"den Arzt / dem Arzt"}],"bars":[{"label":"управление","value":90},{"label":"артикль","value":85},{"label":"перевод","value":40}]}]},{"id":"b1-14-stellungnahme","level":"B1","order":14,"module":"B1 практика","title":"Stellungnahme: мнение и аргументы","goal":"Строить короткую письменную позицию.","rule":"Хорошая позиция: вводная фраза, мнение, два аргумента, пример, вывод. На B1 достаточно ясности: Ich bin der Meinung, dass…, Ein Vorteil ist…, Deshalb….","examples":[{"de":"Ich bin der Meinung, dass Sprachen im Alltag wichtig sind.","ru":"Я считаю, что языки важны в быту."},{"de":"Ein Vorteil ist, dass man selbstständiger wird.","ru":"Преимущество в том, что человек становится самостоятельнее."},{"de":"Deshalb sollte man regelmäßig üben.","ru":"Поэтому нужно регулярно заниматься."}],"drills":[{"q":"Фраза для мнения:","options":["Ich bin der Meinung, dass…","Ich habe die Meinung essen.","Meinung ich bin."],"answer":0,"explanation":"Правильно: «Ich bin der Meinung, dass…». В придаточном предложении спрягаемый глагол уходит в конец.","topic":"writing"},{"q":"После dass глагол:","options":["в конце","всегда первый","исчезает"],"answer":0,"explanation":"Правильно: «в конце». После weil/dass/wenn/obwohl спрягаемый глагол уходит в конец придаточного.","topic":"clauses"},{"q":"Ein Vorteil ist… значит:","options":["преимущество в том…","недостаток в том…","это запрещено…"],"answer":0,"explanation":"Правильно: «преимущество в том…». После weil/dass/wenn/obwohl спрягаемый глагол уходит в конец придаточного.","topic":"writing"}],"tags":["writing","argumentation"],"deepTheoryRu":"Русский часто сохраняет привычный порядок слов после «потому что/что/если». В немецком подчинительный союз отправляет спрягаемый глагол в конец: weil ich Zeit habe.","russianTrap":"Ловушка: weil ich habe Zeit. Это русская логика порядка слов, но не немецкая.","germanLogic":"Придаточное предложение в немецком закрывается глаголом.","formula":"weil/dass/wenn/obwohl + подлежащее + ... + Verb","typicalMistakes":["weil ich habe Zeit","dass er kommt heute","wenn ich habe Zeit"],"grammarTables":[{"title":"Союзы и порядок слов","headers":["Союз","Смысл","Порядок"],"rows":[["weil","потому что","глагол в конце"],["dass","что","глагол в конце"],["wenn","если/когда","глагол в конце"],["obwohl","хотя","глагол в конце"],["ob","ли","глагол в конце"]]},{"title":"Цель","headers":["Конструкция","Когда","Пример"],"rows":[["um ... zu","один субъект","Ich lerne, um besser zu sprechen."],["damit","разные субъекты","Ich erkläre es, damit du es verstehst."]]}],"whyForRussian":"Этот блок добавлен специально для русскоговорящего ученика: сначала сравниваем с русской логикой, потом показываем немецкий механизм и только после этого тренируем форму.","visualSchemes":[{"title":"Рамка придаточного","steps":[{"label":"1","title":"Союз","text":"weil/dass/wenn открывает придаточное.","de":"weil"},{"label":"2","title":"Смысл","text":"Подлежащее и дополнения идут внутри.","de":"ich Zeit"},{"label":"3","title":"Глагол","text":"Спрягаемый глагол закрывает часть.","de":"habe"}],"bars":[{"label":"союз","value":75},{"label":"конец","value":95},{"label":"перенос с русского","value":80}]}]},{"id":"b2-01-","level":"B2","order":1,"module":"B2 уверенное владение","title":"Порядок слов и глагольная рамка","goal":"Контролировать V2, V-End, рамку и информационный акцент.","rule":"Главное предложение: V2. Придаточное: глагол в конце. Рамка: модальный/вспомогательный глагол открывает, инфинитив/Partizip закрывает. Переднее поле меняет акцент, но не отменяет V2.","examples":[{"de":"Aus beruflichen Gründen muss ich mein Deutsch verbessern.","ru":"По профессиональным причинам я должен улучшить немецкий."},{"de":"Ich glaube, dass diese Lösung langfristig sinnvoll ist.","ru":"Я думаю, что это решение долгосрочно разумно."}],"drills":[{"q":"В главном предложении спрягаемый глагол обычно...","options":["V2","в конце","после всех обстоятельств"],"answer":0,"e
