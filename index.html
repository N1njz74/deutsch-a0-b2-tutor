      border-radius: 12px;

    input:focus, select:focus, textarea:focus {

      font-size: clamp(2rem, 5vw, 4rem);

      letter-spacing: -0.06em;

    .lead { color: var(--text-soft); max-width: 70ch; }

      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 18px;

    .quick {
      text-align: left;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 16px;
      background: rgba(255,255,255,.045);
      color: var(--text);

    .quick span { display: block; color: var(--muted); font-size: .92rem; }

      background: linear-gradient(135deg, rgba(52,211,153,.22), rgba(96,165,250,.08));

    .stats {
      display: grid;
      gap: 12px;
      padding: 18px;

      border-radius: 16px;

      background: rgba(255,255,255,.045);
    }
    .stat .num { font-size: 1.7rem; font-weight: 800; color: var(--accent-2); }
    .muted { color: var(--muted); }
    .section-title {

      justify-content: space-between;
      gap: 12px;
      margin: 28px 0 14px;

    .panel { padding: 18px; margin: 16px 0; }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }
    .grid.two { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .grid.four { grid-template-columns: repeat(4, minmax(0, 1fr)); }

      overflow: hidden;

      display: inline-flex;
      align-items: center;
      gap: 4px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 3px 8px;
      color: var(--text-soft);
      background: rgba(255,255,255,.045);
      font-size: .78rem;
    }
    .badge.ok { color: #bbf7d0; border-color: rgba(34,197,94,.45); background: rgba(34,197,94,.12); }
    .badge.warn { color: #fde68a; border-color: rgba(251,191,36,.45); background: rgba(251,191,36,.10); }
    .badge.danger { color: #fecdd3; border-color: rgba(251,113,133,.45); background: rgba(251,113,133,.10); }
    .btn {

      align-items: center;
      justify-content: center;
      gap: 7px;
      text-decoration: none;
      margin: 4px 4px 4px 0;
      white-space: nowrap;

    .btn.primary {
      background: linear-gradient(135deg, rgba(96,165,250,.95), rgba(52,211,153,.85));
      color: #06121f;
      border: 0;
      font-weight: 800;

    .btn.danger { border-color: rgba(251,113,133,.55); color: #fecdd3; }

      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin: 12px 0 16px;

    .level-tabs { display: flex; flex-wrap: wrap; gap: 8px; }
    .level-tabs button {

      background: rgba(255,255,255,.045);
      color: var(--text);
      border-radius: 999px;
      padding: 7px 12px;

    .level-tabs button.active {
      background: rgba(96,165,250,.22);
      border-color: var(--accent);

    .progress-bar {

      background: rgba(148,163,184,.18);
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid rgba(148,163,184,.16);

      display: block;
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      width: 0%;
      transition: width .25s ease;

    .example-list, .rule-list {

      gap: 8px;
      margin: 12px 0;
      padding: 0;
      list-style: none;

    .example {
      display: grid;
      gap: 4px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 10px;
      background: rgba(255,255,255,.035);

      margin-left: 6px;

      padding-top: 12px;
      margin-top: 12px;

      width: 100%;
      text-align: left;
      margin: 7px 0;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
      color: var(--text);
      background: rgba(255,255,255,.04);

      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: 16px;

    td { color: #e5e7eb; }
    .vocab-card { display: grid; gap: 6px; }
    .diagnostic-grid {
      display: grid;
      gap: 12px;

    .diagnostic-q {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      background: rgba(255,255,255,.035);
    }

      display: block;
      margin: 8px 0;
      color: var(--text-soft);
    }

      border-radius: 16px;
      padding: 16px;
      margin: 14px 0;

    .drawer-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.5);
      z-index: 29;
      display: none;

    .drawer {
      position: fixed;
      inset: 0 auto 0 0;
      width: min(330px, 86vw);
      background: #0b1220;
      border-right: 1px solid var(--line);
      z-index: 30;
      transform: translateX(-102%);

      padding: 14px;
      overflow-y: auto;

    .drawer-backdrop.open { display: block; }
    .drawer button { display: block; width: 100%; text-align: left; margin: 8px 0; border-radius: 14px; }

      left: 50%;
      bottom: 20px;
      transform: translateX(-50%);
      background: #020617;
      border: 1px solid var(--line);
      color: var(--text);
      border-radius: 999px;
      padding: 10px 14px;
      box-shadow: var(--shadow);
      display: none;
      z-index: 60;

    details {

      background: rgba(255,255,255,.035);
      padding: 12px;
      margin: 12px 0;

    summary { cursor: pointer; font-weight: 700; }
    .hidden-learned {
      display: none !important;

    .empty {

      border: 1px dashed var(--line);
      padding: 18px;
      border-radius: 16px;
    }
    footer {
      width: min(var(--max), calc(100% - 28px));
      margin: 0 auto 30px;
      color: var(--muted);
      border-top: 1px solid var(--line);
      padding-top: 18px;
      font-size: .9rem;
    }
    @media (max-width: 980px) {

      .grid, .grid.four { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .nav { display: none; }
      .hamburger { display: inline-flex; }
      .brand { min-width: 0; flex: 1; }
      .top-controls input { width: 110px; }

    @media (max-width: 620px) {
      .topbar { padding: 9px 10px; }
      .quick-grid, .grid, .grid.four { grid-template-columns: 1fr; }
      main { width: min(100% - 18px, var(--max)); padding-top: 12px; }
      .hero-card { padding: 18px; }
      .hero h1 { font-size: 2.25rem; }
      .section-title { align-items: start; flex-direction: column; }
      .top-controls .search { display: none; }
      .btn { width: 100%; white-space: normal; }
      .toolbar select, .toolbar input { width: 100%; }
      table { min-width: 660px; }
    }
    @media print {
      body { background: #fff; color: #000; }
      .topbar, .drawer, .drawer-backdrop, .toast, .btn, .speak, .toolbar, footer { display: none !important; }
      main { width: 100%; padding: 0; }
      .hero, .grid, .grid.two, .grid.four { display: block; }
      .hero-card, .panel, .card, .lesson-card, details {
        background: #fff !important;

        border: 1px solid #999;
        box-shadow: none;
        page-break-inside: avoid;
      }
      .muted, .ru, .de { color: #000; }
    }

dule":"Старт","title":"Числа, дни, время","goal":"Понимать время встречи, дату и базовые числа.","rule":"Точное время обычно с um: um acht Uhr. Дни недели с am: am Montag. Даты часто с am + порядковое числительное.","examples":[{"de":"Der Termin ist um neun Uhr.","ru":"Приём в девять часов."},{"de":"Am Montag habe ich Zeit.","ru":"В понедельник у меня есть время."},{"de":"Heute ist der achte Juli.","ru":"Сегодня восьмое июля."}],"drills":[{"q":"Что подходит к точному времени?","options":["am acht Uhr","um acht Uhr","in acht Uhr"],"answer":1,"explanation":"","topic":""},{"q":"Как сказать «в понедельник»?","options":["am Montag","um Montag","der Montag"],"answer":0,"explanation":"","topic":""},{"q":"Что значит morgen?","options":["сегодня","завтра","вчера"],"answer":1,"explanation":"","topic":""}],"tags":["time"]},{"id":"a0-04-","level":"A0","order":4,"module":"Старт","title":"Простое предложение: кто + глагол","goal":"Собрать немецкую фразу с правильным местом глагола.","rule":"В обычном утверждении спрягаемый глагол стоит на втором месте: Ich lerne Deutsch. Если сначала стоит время или место, глагол всё равно второй: Heute lerne ich Deutsch.","examples":[{"de":"Ich lerne Deutsch.","ru":"Я учу немецкий."},{"de":"Heute lerne ich Deutsch.","ru":"Сегодня я учу немецкий."},{"de":"In Frankfurt wohne ich.","ru":"Во Франкфурте я живу."}],"drills":[{"q":"Где стоит спрягаемый глагол в утверждении?","options":["на первом месте","на втором месте","в конце всегда"],"answer":1,"explanation":"Правило V2.","topic":""},{"q":"Выберите правильный порядок:","options":["Heute ich lerne Deutsch.","Heute lerne ich Deutsch.","Heute Deutsch lerne ich."],"answer":1,"explanation":"","topic":""},{"q":"Что является глаголом в «Ich wohne in Berlin»?","options":["Ich","wohne","Berlin"],"answer":1,"explanation":"","topic":""}],"tags":["word-order"]},{"id":"a0-05-sein-haben-werden-praesens","level":"A0","order":5,"module":"Старт","title":"sein, haben, werden в Präsens","goal":"Использовать три самые частые формы.","rule":"sein = быть, haben = иметь, werden = становиться/будет. Формы нерегулярные, их нужно выучить как таблицу: ich bin, du bist, er ist; ich habe, du hast; ich werde, du wirst.","examples":[{"de":"Ich bin müde.","ru":"Я устал/устала."},{"de":"Sie hat heute Zeit.","ru":"У неё сегодня есть время."},{"de":"Wir werden besser.","ru":"Мы становимся лучше."}],"drills":[{"q":"Правильно: ich ...","options":["bin","ist","bist"],"answer":0,"explanation":"","topic":""},{"q":"Правильно: du ... Zeit.","options":["haben","hast","hat"],"answer":1,"explanation":"","topic":""},{"q":"Что значит werden в базовом смысле?","options":["иметь","становиться","знать"],"answer":1,"explanation":"","topic":""}],"tags":["verbs"]},{"id":"a0-06-ja-nein-w","level":"A0","order":6,"module":"Старт","title":"Ja/Nein-вопрос и W-вопрос","goal":"Задать простой вопрос.","rule":"В вопросе без вопросительного слова глагол стоит на первом месте: Haben Sie Zeit? В W-вопросе вопросительное слово первое, глагол второе: Wo wohnen Sie?","examples":[{"de":"Haben Sie heute Zeit?","ru":"У Вас сегодня есть время?"},{"de":"Wo wohnen Sie?","ru":"Где Вы живёте?"},{"de":"Wie heißen Sie?","ru":"Как Вас зовут?"}],"drills":[{"q":"Правильный ja/nein-вопрос:","options":["Sie haben Zeit?","Haben Sie Zeit?","Wo haben Sie Zeit?"],"answer":1,"explanation":"","topic":""},{"q":"Какое W-слово значит «где»?","options":["wer","wo","wann"],"answer":1,"explanation":"","topic":""},{"q":"В W-вопросе глагол стоит...","options":["на втором месте","всегда в конце","на третьем месте"],"answer":0,"explanation":"","topic":""}],"tags":["questions"]},{"id":"a0-07-nicht-kein","level":"A0","order":7,"module":"Старт","title":"Отрицание nicht и kein","goal":"Отрицать действие и существительное.","rule":"kein отрицает существительное с неопределённым артиклем или без артикля: Ich habe keinen Termin. nicht отрицает глагол, прилагательное или всю фразу: Ich komme nicht.","examples":[{"de":"Ich habe keinen Termin.","ru":"У меня нет записи."},{"de":"Ich verstehe nicht.","ru":"Я не понимаю."},{"de":"Das ist nicht teuer.","ru":"Это не дорого."}],"drills":[{"q":"Как отрицать «einen Termin»?","options":["nicht Termin","keinen Termin","kein Termin"],"answer":1,"explanation":"","topic":""},{"q":"Выберите правильное:","options":["Ich verstehe nicht.","Ich nicht verstehe.","Ich verstehe kein."],"answer":0,"explanation":"","topic":""},{"q":"kein меняется по падежам?","options":["да","нет","только в B2"],"answer":0,"explanation":"","topic":""}],"tags":["negation"]},{"id":"a0-08-","level":"A0","order":8,"module":"Старт","title":"Мини-диалог: выжить в разговоре","goal":"Собрать короткий бытовой диалог.","rule":"На A0 важнее не идеальная грамматика, а безопасные готовые фразы: Bitte langsamer. Ich lerne Deutsch. Können Sie mir helfen?","examples":[{"de":"Entschuldigung, ich lerne Deutsch.","ru":"Извините, я учу немецкий."},{"de":"Bitte etwas langsamer.","ru":"Пожалуйста, немного медленнее."},{"de":"Ich brauche Hilfe.","ru":"Мне нужна помощь."}],"drills":[{"q":"Как попросить говорить медленнее?","options":["Bitte etwas langsamer.","Bitte schneller.","Ich langsamer."],"answer":0,"explanation":"","topic":""},{"q":"Что значит «Ich brauche Hilfe»?","options":["Мне нужна помощь","Я иду домой","Я говорю быстро"],"answer":0,"explanation":"","topic":""},{"q":"Как начать вежливо?","options":["Entschuldigung","Tschüss","Nein danke"],"answer":0,"explanation":"","topic":""}],"tags":["dialogue"]},{"id":"a0-09-artikel-merken","level":"A0","order":9,"module":"Старт","title":"Как учить существительные с артиклем","goal":"Не терять род существительного уже на старте.","rule":"Немецкое существительное нужно учить как связку: артикль + слово + пример. Не der/die/das отдельно, а der Termin, die Frage, das Formular. Это снижает ошибки в Akkusativ и Dativ позже.","examples":[{"de":"der Termin","ru":"запись/приём"},{"de":"die Frage","ru":"вопрос"},{"de":"das Formular","ru":"формуляр"},{"de":"Ich habe einen Termin.","ru":"У меня есть запись."}],"drills":[{"q":"Как лучше учить слово Termin?","options":["Termin","der Termin","einen Termin только"],"answer":1,"explanation":"Учите сразу с артиклем.","topic":"articles"},{"q":"Какой артикль у Frage?","options":["der","die","das"],"answer":1,"explanation":"die Frage","topic":"articles"},{"q":"Что значит das Formular?","options":["формуляр","друг","дорога"],"answer":0,"explanation":"","topic":"articles"}],"tags":["articles","learning"]},{"id":"a0-10-hoeflichkeit","level":"A0","order":10,"module":"Старт","title":"Вежливые фразы Sie-уровня","goal":"Безопасно говорить с незнакомыми людьми.","rule":"В Германии и Швейцарии в официальной ситуации лучше начинать с Sie. Типовые фразы: Könnten Sie…, Ich hätte gern…, Entschuldigung, ich habe eine Frage.","examples":[{"de":"Könnten Sie mir bitte helfen?","ru":"Не могли бы Вы мне помочь?"},{"de":"Ich hätte gern einen Termin.","ru":"Я хотел(а) бы записаться."},{"de":"Entschuldigung, ich habe eine Frage.","ru":"Извините, у меня вопрос."}],"drills":[{"q":"Вежливое обращение к незнакомому человеку:","options":["du","Sie","ihr"],"answer":1,"explanation":"","topic":"politeness"},{"q":"Как сказать «я хотел бы»?","options":["Ich hätte gern","Ich habe gern","Ich bin gern"],"answer":0,"explanation":"","topic":"politeness"},{"q":"Что звучит безопасно в клинике?","options":["Könnten Sie mir bitte helfen?","Hilf sofort!","Du musst helfen."],"answer":0,"explanation":"","topic":"politeness"}],"tags":["phrases","politeness"]},{"id":"a0-11-satzbau-minimal","level":"A0","order":11,"module":"Старт","title":"Минимальный шаблон немецкой фразы","goal":"Собирать простые фразы без лишней теории.","rule":"Для первых фраз держите шаблон: Wer? + Verb + Ergänzung. Если добавляете время в начало, глагол всё равно остаётся вторым.","examples":[{"de":"Ich brauche Hilfe.","ru":"Мне нужна помощь."},{"de":"Heute brauche ich Hilfe.","ru":"Сегодня мне нужна помощь."},{"de":"Wir lernen Deutsch.","ru":"Мы учим немецкий."}],"drills":[{"q":"Где глагол в Heute brauche ich Hilfe?","options":["1","2","в конце"],"answer":1,"explanation":"Heute = позиция 1, brauche = позиция 2.","topic":"word-order"},{"q":"Выберите правильное:","options":["Ich Hilfe brauche.","Ich brauche Hilfe.","Brauche ich Hilfe."],"answer":1,"explanation":"Утверждение: глагол на позиции 2.","topic":"word-order"},{"q":"Wer? в фразе Wir lernen Deutsch:","options":["Wir","lernen","Deutsch"],"answer":0,"explanation":"","topic":"word-order"}],"tags":["word-order"]},{"id":"a0-12-mini-check-a0","level":"A0","order":12,"module":"Старт","title":"A0 мини-проверка перед A1","goal":"Понять, готов ли пользователь идти дальше.","rule":"Перед A1 достаточно уверенно читать простые слова, знать sein/haben, задавать простой вопрос и понимать nicht/kein на уровне готовых фраз.","examples":[{"de":"Ich bin bereit.","ru":"Я готов(а)."},{"de":"Haben Sie Zeit?","ru":"У Вас есть время?"},{"de":"Ich verstehe nicht.","ru":"Я не понимаю."}],"drills":[{"q":"ich + sein =","options":["ich bin","ich ist","ich bist"],"answer":0,"explanation":"","topic":"verbs"},{"q":"Ja/Nein-вопрос начинается с…","options":["подлежащего","глагола","артикля"],"answer":1,"explanation":"Haben Sie Zeit?","topic":"questions"},{"q":"Как сказать «я не понимаю»?","options":["Ich verstehe nicht.","Ich nicht verstehe.","Ich habe kein verstehe."],"answer":0,"explanation":"","topic":"negation"}],"tags":["checkpoint"]},{"id":"a1-01-praesens","level":"A1","order":1,"module":"A1 база","title":"Регулярные глаголы в Präsens","goal":"Спрягать lernen, machen, wohnen.","rule":"У регулярных глаголов основа + окончание: ich -e, du -st, er/sie/es -t, wir -en, ihr -t, sie/Sie -en.","examples":[{"de":"ich lerne, du lernst, er lernt","ru":"я учу, ты учишь, он учит"},{"de":"Wir wohnen in Frankfurt.","ru":"Мы живём во Франкфурте."}],"drills":[{"q":"du + lernen =","options":["du lerne","du lernst","du lernt"],"answer":1,"explanation":"","topic":""},{"q":"wir + machen =","options":["wir machen","wir macht","wir machst"],"answer":0,"explanation":"","topic":""},{"q":"ich + wohnen =","options":["ich wohnt","ich wohne","ich wohnen"],"answer":1,"explanation":"","topic":""}],"tags":["verbs"]},{"id":"a1-02-","level":"A1","order":2,"module":"A1 база","title":"Частые нерегулярные глаголы","goal":"Узнать сильные изменения в Präsens.","rule":"У некоторых глаголов меняется гласная во 2/3 лице: fahren → du fährst, er fährt; lesen → du liest, er liest; sprechen → du sprichst.","examples":[{"de":"Er fährt mit dem Bus.","ru":"Он едет на автобусе."},{"de":"Sprichst du Deutsch?","ru":"Ты говоришь по-немецки?"}],"drills":[{"q":"er + fahren =","options":["er fährt","er fahrt","er fahren"],"answer":0,"explanation":"","topic":""},{"q":"du + sprechen =","options":["du sprechst","du sprichst","du sprechen"],"answer":1,"explanation":"","topic":""},{"q":"lesen: er ...","options":["liest","lest","lesen"],"answer":0,"explanation":"","topic":""}],"tags":["verbs"]},{"id":"a1-03-der-die-das-nominativ","level":"A1","order":3,"module":"A1 база","title":"Артикли der/die/das и Nominativ","goal":"Понять род и форму подлежащего.","rule":"В Nominativ артикли: der Mann, die Frau, das Kind, die Leute. Род нужно учить вместе со словом.","examples":[{"de":"Der Arzt hilft.","ru":"Врач помогает."},{"de":"Die Frage ist wichtig.","ru":"Вопрос важен."},{"de":"Das Kind schläft.","ru":"Ребёнок спит."}],"drills":[{"q":"Какой артикль у Frau?","options":["der","die","das"],"answer":1,"explanation":"","topic":""},{"q":"Nominativ отвечает на вопрос...","options":["кто/что делает?","кого/что?","кому?"],"answer":0,"explanation":"","topic":""},{"q":"Множественное число в Nominativ чаще:","options":["die","der","das"],"answer":0,"explanation":"","topic":""}],"tags":["cases"]},{"id":"a1-04-akkusativ","level":"A1","order":4,"module":"A1 база","title":"Akkusativ: прямой объект","goal":"Сказать, кого/что видят, покупают, имеют.","rule":"В Akkusativ меняется только мужской артикль: der → den, ein → einen, kein → keinen. Женский, средний и множественное обычно как в Nominativ.","examples":[{"de":"Ich sehe den Arzt.","ru":"Я вижу врача."},{"de":"Ich kaufe eine Tasche.","ru":"Я покупаю сумку."},{"de":"Wir haben kein Auto.","ru":"У нас нет машины."}],"drills":[{"q":"der Termin в Akkusativ:","options":["den Termin","der Termin","dem Termin"],"answer":0,"explanation":"","topic":""},{"q":"ein Mann в Akkusativ:","options":["ein Mann","einen Mann","einem Mann"],"answer":1,"explanation":"","topic":""},{"q":"die Frau в Akkusativ:","options":["die Frau","den Frau","der Frau"],"answer":0,"explanation":"","topic":""}],"tags":["cases"]},{"id":"a1-05-dativ","level":"A1","order":5,"module":"A1 база","title":"Dativ: адресат и получатель","goal":"Использовать кому/где/с кем в базовых фразах.","rule":"Dativ часто отвечает на «кому?». Артикли: dem Mann, der Frau, dem Kind, den Leuten. После mit, nach, bei, seit, von, zu всегда Dativ.","examples":[{"de":"Ich helfe dem Patienten.","ru":"Я помогаю пациенту."},{"de":"Ich fahre mit dem Zug.","ru":"Я еду на поезде."},{"de":"Sie spricht mit der Ärztin.","ru":"Она говорит с врачом."}],"drills":[{"q":"mit требует...","options":["Akkusativ","Dativ","Nominativ"],"answer":1,"explanation":"","topic":""},{"q":"der Arzt в Dativ:","options":["den Arzt","dem Arzt","der Arzt"],"answer":1,"explanation":"","topic":""},{"q":"кому? чаще всего =","options":["Dativ","Akkusativ","Genitiv"],"answer":0,"explanation":"","topic":""}],"tags":["cases"]},{"id":"a1-06-","level":"A1","order":6,"module":"A1 база","title":"Модальные глаголы","goal":"Сказать могу/должен/хочу/разрешено.","rule":"Модальный глагол стоит на втором месте, основной инфинитив уходит в конец: Ich muss arbeiten. Частые: können, müssen, wollen, möchten, dürfen, sollen.","examples":[{"de":"Ich möchte einen Termin vereinbaren.","ru":"Я хотел(а) бы записаться."},{"de":"Wir müssen heute arbeiten.","ru":"Мы должны сегодня работать."},{"de":"Darf ich fragen?","ru":"Можно спросить?"}],"drills":[{"q":"Правильный порядок:","options":["Ich muss heute arbeiten.","Ich heute arbeiten muss.","Ich muss heute arbeite."],"answer":0,"explanation":"","topic":""},{"q":"möchten значит...","options":["хотел бы","должен","могу"],"answer":0,"explanation":"","topic":""},{"q":"Инфинитив после модального стоит...","options":["в конце","на первом месте","не нужен"],"answer":0,"explanation":"","topic":""}],"tags":["modal"]},{"id":"a1-07-","level":"A1","order":7,"module":"A1 база","title":"Отделяемые глаголы","goal":"Понять anrufen, aufstehen, einkaufen.","rule":"В Präsens приставка отделяется и уходит в конец: Ich rufe dich an. В Perfekt Partizip часто с ge внутри: angerufen, eingekauft.","examples":[{"de":"Ich stehe um sieben Uhr auf.","ru":"Я встаю в семь."},{"de":"Rufen Sie mich bitte an.","ru":"Позвоните мне, пожалуйста."},{"de":"Wir kaufen heute ein.","ru":"Мы сегодня закупаемся."}],"drills":[{"q":"anrufen: Ich ... dich ...","options":["rufe / an","anrufe / —","rufe / auf"],"answer":0,"explanation":"","topic":""},{"q":"aufstehen значит...","options":["вставать","звонить","покупать"],"answer":0,"explanation":"","topic":""},{"q":"Приставка в Präsens часто стоит...","options":["в конце","всегда перед глаголом","после артикля"],"answer":0,"explanation":"","topic":""}],"tags":["verbs"]},{"id":"a1-08-imperativ","level":"A1","order":8,"module":"A1 база","title":"Imperativ: просьбы и инструкции","goal":"Давать простые инструкции.","rule":"Формы: Komm! Kommen Sie bitte! Macht bitte die Übung! Вежливая форма с Sie сохраняет глагол + Sie.","examples":[{"de":"Warten Sie bitte einen Moment.","ru":"Подождите, пожалуйста, минуту."},{"de":"Komm bitte pünktlich.","ru":"Приходи, пожалуйста, вовремя."},{"de":"Öffnen Sie das Fenster.","ru":"Откройте окно."}],"drills":[{"q":"Вежливый императив:","options":["Warten Sie bitte.","Warte Sie bitte.","Sie warten bitte."],"answer":0,"explanation":"","topic":""},{"q":"Неформально к одному человеку:","options":["Komm!","Kommen Sie!","Kommt!"],"answer":0,"explanation":"","topic":""},{"q":"Что значит «bitte» в просьбе?","options":["пожалуйста","вчера","никогда"],"answer":0,"explanation":"","topic":""}],"tags":["speaking"]},{"id":"a1-09-perfekt","level":"A1","order":9,"module":"A1 база","title":"Perfekt на частых глаголах","goal":"Рассказать, что было вчера.","rule":"Perfekt = haben/sein + Partizip II. Большинство глаголов с haben; движение/изменение состояния часто с sein: Ich bin gegangen.","examples":[{"de":"Ich habe Deutsch gelernt.","ru":"Я учил немецкий."},{"de":"Wir sind nach Hause gegangen.","ru":"Мы пошли домой."},{"de":"Hast du gut geschlafen?","ru":"Ты хорошо спал?"}],"drills":[{"q":"lernen в Perfekt:","options":["gelernt","gelernen","lernt"],"answer":0,"explanation":"","topic":""},{"q":"gehen обычно с...","options":["sein","haben","werden"],"answer":0,"explanation":"","topic":""},{"q":"Partizip II стоит...","options":["в конце","на втором месте","перед субъектом"],"answer":0,"explanation":"","topic":""}],"tags":["past"]},{"id":"a1-10-a1","level":"A1","order":10,"module":"A1 база","title":"A1-диалоги: магазин, город, врач","goal":"Собрать простые сценарии общения.","rule":"Для A1 полезны шаблоны: Ich hätte gern..., Wo ist...?, Ich habe Schmerzen. Держите фразу короткой и уточняйте вопросом.","examples":[{"de":"Ich hätte gern ein Wasser.","ru":"Я хотел(а) бы воду."},{"de":"Wo ist die nächste Apotheke?","ru":"Где ближайшая аптека?"},{"de":"Ich habe Kopfschmerzen.","ru":"У меня болит голова."}],"drills":[{"q":"В магазине:","options":["Ich hätte gern...","Ich bin gestern...","Trotzdem..."],"answer":0,"explanation":"","topic":""},{"q":"Как спросить «где»?","options":["Wo...?","Wann...?","Warum...?"],"answer":0,"explanation":"","topic":""},{"q":"Schmerzen значит...","options":["боли","город","скидка"],"answer":0,"explanation":"","topic":""}],"tags":["dialogue"]},{"id":"a1-11-trennbare-verben","level":"A1","order":11,"module":"A1 база","title":"Отделяемые приставки","goal":"Понимать anrufen, aufstehen, einkaufen.","rule":"В Präsens отделяемая приставка уходит в конец: Ich rufe dich an. В инфинитиве и в словаре глагол пишется вместе: anrufen.","examples":[{"de":"Ich rufe morgen an.","ru":"Я позвоню завтра."},{"de":"Wir kaufen heute ein.","ru":"Мы сегодня покупаем продукты."},{"de":"Stehst du früh auf?","ru":"Ты рано встаёшь?"}],"drills":[{"q":"Правильно: Ich ___ dich ___.","options":["rufe / an","anrufe / —","rufe / auf"],"answer":0,"explanation":"anrufen разделяется.","topic":"verbs"},{"q":"einkaufen: Wir ___ heute ___.","options":["kaufen / ein","einkaufen / —","ein / kaufen"],"answer":0,"explanation":"","topic":"verbs"},{"q":"Где приставка в утверждении?","options":["в конце","всегда перед глаголом","исчезает"],"answer":0,"explanation":"","topic":"verbs"}],"tags":["verbs","separable"]},{"id":"a1-12-imperativ","level":"A1","order":12,"module":"A1 база","title":"Императив: просьба и инструкция","goal":"Давать короткие инструкции без грубости.","rule":"Императив бывает формальным и неформальным. С Sie: Kommen Sie bitte. С du: Komm bitte. Вежливость часто делает bitte и тон.","examples":[{"de":"Kommen Sie bitte um neun.","ru":"Приходите, пожалуйста, в девять."},{"de":"Füllen Sie das Formular aus.","ru":"Заполните формуляр."},{"de":"Warten Sie bitte hier.","ru":"Подождите здесь, пожалуйста."}],"drills":[{"q":"Формальный императив:","options":["Kommen Sie bitte.","Kommst du bitte.","Sie kommen bitte?"],"answer":0,"explanation":"","topic":"imperative"},{"q":"Что смягчает инструкцию?","options":["bitte","sofort","nie"],"answer":0,"explanation":"","topic":"politeness"},{"q":"ausfüllen в императиве Sie:","options":["Füllen Sie aus.","Ausfüllen Sie.","Sie ausfüllen."],"answer":0,"explanation":"","topic":"separable"}],"tags":["imperative","politeness"]},{"id":"a1-13-pronomen-akkusativ","level":"A1","order":13,"module":"A1 база","title":"Личные местоимения в Akkusativ","goal":"Заменять существительные местоимениями.","rule":"Akkusativ-формы: mich, dich, ihn, sie, es, uns, euch, sie/Sie. Они нужны после sehen, brauchen, fragen, anrufen.","examples":[{"de":"Ich sehe ihn.","ru":"Я вижу его."},{"de":"Sie ruft mich an.","ru":"Она звонит мне."},{"de":"Wir brauchen es.","ru":"Нам это нужно."}],"drills":[{"q":"Akkusativ от ich:","options":["mir","mich","ich"],"answer":1,"explanation":"","topic":"pronouns"},{"q":"Akkusativ от er:","options":["ihn","ihm","er"],"answer":0,"explanation":"","topic":"pronouns"},{"q":"rufen + mich или mir?","options":["mich","mir","ich"],"answer":0,"explanation":"anrufen требует Akkusativ.","topic":"pronouns"}],"tags":["pronouns","cases"]},{"id":"a2-01-akkusativ-dativ","level":"A2","order":1,"module":"A2 система","title":"Akkusativ/Dativ системно","goal":"Различать объект и адресата.","rule":"Akkusativ часто прямой объект: Ich sehe den Mann. Dativ адресат/получатель или после Dativ-предлогов: Ich helfe dem Mann.","examples":[{"de":"Ich gebe dem Kind den Ball.","ru":"Я даю ребёнку мяч."},{"de":"Sie erklärt der Kollegin die Aufgabe.","ru":"Она объясняет коллеге задание."}],"drills":[{"q":"В «Ich gebe dem Kind den Ball» dem Kind =","options":["Dativ","Akkusativ","Nominativ"],"answer":0,"explanation":"","topic":""},{"q":"den Ball =","options":["Dativ","Akkusativ","Genitiv"],"answer":1,"explanation":"","topic":""},{"q":"helfen требует...","options":["Dativ","Akkusativ","Nominativ"],"answer":0,"explanation":"","topic":""}],"tags":["cases"]},{"id":"a2-02-wechselpraepositionen-wo-wohin","level":"A2","order":2,"module":"A2 система","title":"Wechselpräpositionen: wo/wohin","goal":"Выбирать Dativ или Akkusativ после in/an/auf/unter...","rule":"Если вопрос где? — Dativ. Если куда? — Akkusativ. Ich bin in der Schule. Ich gehe in die Schule.","examples":[{"de":"Das Buch liegt auf dem Tisch.","ru":"Книга лежит на столе."},{"de":"Ich lege das Buch auf den Tisch.","ru":"Я кладу книгу на стол."},{"de":"Wir gehen ins Kino.","ru":"Мы идём в кино."}],"drills":[{"q":"wo? требует...","options":["Dativ","Akkusativ","Genitiv"],"answer":0,"explanation":"","topic":""},{"q":"wohin? требует...","options":["Dativ","Akkusativ","Nominativ"],"answer":1,"explanation":"","topic":""},{"q":"in + das Kino =","options":["ins Kino","im Kino","in dem Kino"],"answer":0,"explanation":"","topic":""}],"tags":["prepositions"]},{"id":"a2-03-perfekt","level":"A2","order":3,"module":"A2 система","title":"Perfekt системно","goal":"Строить прошлое для разных типов глаголов.","rule":"Слабые: gemacht. Сильные часто с -en: geschrieben. Отделяемые: eingekauft. Неотделяемые без ge-: besucht. Движение/изменение состояния часто с sein.","examples":[{"de":"Ich habe die E-Mail geschrieben.","ru":"Я написал письмо."},{"de":"Sie ist früh aufgestanden.","ru":"Она рано встала."},{"de":"Wir haben das Museum besucht.","ru":"Мы посетили музей."}],"drills":[{"q":"besuchen в Partizip II:","options":["besucht","gebesucht","besuchen"],"answer":0,"explanation":"","topic":""},{"q":"aufstehen:","options":["aufgestanden","geaufstanden","aufgesteht"],"answer":0,"explanation":"","topic":""},{"q":"fahren часто с...","options":["sein","haben","machen"],"answer":0,"explanation":"","topic":""}],"tags":["past"]},{"id":"a2-04-praeteritum-sein-haben-modal","level":"A2","order":4,"module":"A2 система","title":"Präteritum sein/haben/modal","goal":"Понимать короткое письменное прошлое.","rule":"В разговоре часто Perfekt, но sein/haben/modal часто в Präteritum: ich war, ich hatte, ich musste, ich konnte.","examples":[{"de":"Ich war gestern krank.","ru":"Вчера я был болен."},{"de":"Wir hatten keine Zeit.","ru":"У нас не было времени."},{"de":"Sie musste länger warten.","ru":"Ей пришлось ждать дольше."}],"drills":[{"q":"ich + sein в Präteritum:","options":["ich war","ich bin","ich wäre"],"answer":0,"explanation":"","topic":""},{"q":"wir + haben в Präteritum:","options":["wir hatten","wir haben","wir hätten"],"answer":0,"explanation":"","topic":""},{"q":"musste значит...","options":["должен был","мог бы","хотел бы"],"answer":0,"explanation":"","topic":""}],"tags":["past"]},{"id":"a2-05-weil-dass-wenn-ob","level":"A2","order":5,"module":"A2 система","title":"Придаточные weil/dass/wenn/ob","goal":"Ставить глагол в конец придаточного.","rule":"Союзы weil, dass, wenn, ob отправляют спрягаемый глагол в конец придаточного: Ich denke, dass er kommt.","examples":[{"de":"Ich lerne Deutsch, weil ich in Deutschland lebe.","ru":"Я учу немецкий, потому что живу в Германии."},{"de":"Ich weiß nicht, ob er heute kommt.","ru":"Я не знаю, придёт ли он сегодня."},{"de":"Wenn ich Zeit habe, übe ich.","ru":"Когда у меня есть время, я занимаюсь."}],"drills":[{"q":"После weil глагол...","options":["в конце","на первом месте","всегда второй"],"answer":0,"explanation":"","topic":""},{"q":"ob значит...","options":["ли","потому что","хотя"],"answer":0,"explanation":"","topic":""},{"q":"Правильно:","options":["weil ich Zeit habe","weil ich habe Zeit","weil habe ich Zeit"],"answer":0,"explanation":"","topic":""}],"tags":["clauses"]},{"id":"a2-06-komparativ-superlativ","level":"A2","order":6,"module":"A2 система","title":"Сравнение: Komparativ/Superlativ","goal":"Сравнивать людей, цены, варианты.","rule":"Komparativ часто с -er: schneller, wichtiger. Superlativ: am wichtigsten или der wichtigste. Нерегулярные: gut → besser → am besten.","examples":[{"de":"Deutsch wird leichter.","ru":"Немецкий становится легче."},{"de":"Das ist die beste Lösung.","ru":"Это лучшее решение."},{"de":"Diese Wohnung ist größer als die andere.","ru":"Эта квартира больше другой."}],"drills":[{"q":"gut →","options":["besser","guter","mehr gut"],"answer":0,"explanation":"","topic":""},{"q":"als используется для...","options":["сравнения","причины","времени"],"answer":0,"explanation":"","topic":""},{"q":"am wichtigsten =","options":["важнее всего","важный","неважный"],"answer":0,"explanation":"","topic":""}],"tags":["adjectives"]},{"id":"a2-07-","level":"A2","order":7,"module":"A2 система","title":"Возвратные глаголы","goal":"Говорить о действиях с sich.","rule":"Некоторые глаголы требуют reflexiv: sich erinnern, sich interessieren, sich fühlen. Ме ic":""},{"q":"der ___ Plan","options":["gute","guter","gutes"],"answer":0,"explanation":"","topic":""},{"q":"mit требует Dativ: mit gut___ Grund","options":["em","en","er"],"answer":0,"explanation":"","topic":""}],"tags":["adjectives"]},{"id":"a2-10-a2","level":"A2","order":10,"module":"A2 система","title":"Письмо A2: сообщение и просьба","goal":"Писать короткие бытовые тексты.","rule":"Структура: обращение → причина → просьба/информация → завершение. Используйте короткие предложения и понятные связки: weil, deshalb, bitte.","examples":[{"de":"Sehr geehrte Damen und Herren, ich möchte einen Termin verschieben.","ru":"Уважаемые дамы и господа, я хотел(а) бы перенести запись."},{"de":"Ich kann am Montag leider nicht kommen.","ru":"К сожалению, я не могу прийти в понедельник."},{"de":"Könnten Sie mir bitte einen neuen Termin geben?","ru":"Не могли бы Вы дать мне новую запись?"}],"drills":[{"q":"Формальное обращение:","options":["Sehr geehrte Damen und Herren","Hallo Leute","Tschüss"],"answer":0,"explanation":"","topic":""},{"q":"leider значит...","options":["к сожалению","поэтому","вчера"],"answer":0,"explanation":"","topic":""},{"q":"Könnten Sie... звучит...","options":["вежливо","грубо","детски"],"answer":0,"explanation":"","topic":""}],"tags":["writing"]},{"id":"a2-11-damit-um-zu","level":"A2","order":11,"module":"A2 развитие","title":"Цель: damit и um…zu","goal":"Объяснять цель действия.","rule":"Если субъект один и тот же, часто используется um…zu: Ich lerne, um besser zu sprechen. Если субъекты разные — damit: Ich erkläre es, damit du es verstehst.","examples":[{"de":"Ich lerne Deutsch, um in der Klinik zu arbeiten.","ru":"Я учу немецкий, чтобы работать в клинике."},{"de":"Ich schreibe es auf, damit ich es nicht vergesse.","ru":"Я записываю, чтобы не забыть."},{"de":"Er hilft mir, damit ich schneller fertig werde.","ru":"Он помогает мне, чтобы я быстрее закончил(а)."}],"drills":[{"q":"Один субъект: Ich lerne, ___ besser zu sprechen.","options":["um","damit","weil"],"answer":0,"explanation":"","topic":"clauses"},{"q":"Разные субъекты чаще требуют:","options":["um…zu","damit","ohne zu"],"answer":1,"explanation":"","topic":"clauses"},{"q":"Где стоит zu в um…zu?","options":["перед инфинитивом","после подлежащего","в начале главного"],"answer":0,"explanation":"","topic":"infinitive"}],"tags":["clauses","infinitive"]},{"id":"a2-12-praeteritum-modal","level":"A2","order":12,"module":"A2 развитие","title":"Präteritum модальных глаголов","goal":"Рассказывать о прошлом проще и естественнее.","rule":"Модальные глаголы в прошедшем часто используются в Präteritum: ich musste, konnte, wollte, sollte, durfte. Инфинитив смыслового глагола остаётся в конце.","examples":[{"de":"Ich musste lange warten.","ru":"Мне пришлось долго ждать."},{"de":"Wir konnten nicht kommen.","ru":"Мы не смогли прийти."},{"de":"Sie wollte einen Termin vereinbaren.","ru":"Она хотела договориться о приёме."}],"drills":[{"q":"ich + müssen в Präteritum:","options":["musste","müsste","gemusst"],"answer":0,"explanation":"","topic":"past"},{"q":"Правильный порядок:","options":["Ich musste lange warten.","Ich lange warten musste.","Ich musste wartete lange."],"answer":0,"explanation":"","topic":"word-order"},{"q":"konnte значит:","options":["мог/смог","должен был","хотел"],"answer":0,"explanation":"","topic":"modal"}],"tags":["past","modal"]},{"id":"a2-13-telefonieren","level":"A2","order":13,"module":"A2 развитие","title":"Телефонный разговор и запись","goal":"Позвонить, уточнить и перенести запись.","rule":"Для телефона нужны готовые рамки: Ich rufe wegen… an. Ich möchte einen Termin vereinbaren. Könnten wir den Termin verschieben?","examples":[{"de":"Ich rufe wegen meines Termins an.","ru":"Я звоню по поводу моего приёма."},{"de":"Ich möchte einen Termin vereinbaren.","ru":"Я хотел(а) бы договориться о приёме."},{"de":"Könnten wir den Termin verschieben?","ru":"Могли бы мы перенести запись?"}],"drills":[{"q":"Как начать звонок по поводу записи?","options":["Ich rufe we "topic":""}],"tags":["prepositions"]},{"id":"b1-07-da-wo","level":"B1","order":7,"module":"B1 самостоятельность","title":"da-/wo-композиты","goal":"Заменять предлог + вещь в B1/B2 речи.","rule":"Если речь о предмете/идее, используйте da-: darauf, darüber, damit. В вопросе: worauf, worüber, womit. Для людей обычно предлог + местоимение: auf ihn.","examples":[{"de":"Ich warte darauf.","ru":"Я этого жду."},{"de":"Worüber sprechen Sie?","ru":"О чём Вы говорите?"},{"de":"Damit bin ich einverstanden.","ru":"С этим я согласен."}],"drills":[{"q":"auf + das →","options":["darauf","damit","dabei"],"answer":0,"explanation":"","topic":""},{"q":"über + was →","options":["worüber","womit","woran"],"answer":0,"explanation":"","topic":""},{"q":"Для людей:","options":["auf ihn","darauf ihn","woran ihn"],"answer":0,"explanation":"","topic":""}],"tags":["pronouns"]},{"id":"b1-08-b1","level":"B1","order":8,"module":"B1 самостоятельность","title":"Связки аргументации B1","goal":"Строить мнение с причиной и контрастом.","rule":"B1-связки: deshalb, trotzdem, außerdem, jedoch. После наречия-связки в первом поле сразу V2: Deshalb lerne ich jeden Tag.","examples":[{"de":"Ich brauche Deutsch, deshalb übe ich täglich.","ru":"Мне нужен немецкий, поэтому я занимаюсь каждый день."},{"de":"Es ist schwierig, trotzdem mache ich weiter.","ru":"Это сложно, несмотря на это я продолжаю."},{"de":"Außerdem möchte ich in Deutschland arbeiten.","ru":"Кроме того, я хочу работать в Германии."}],"drills":[{"q":"После deshalb глагол стоит...","options":["сразу после deshalb","в конце","перед запятой"],"answer":0,"explanation":"","topic":""},{"q":"trotzdem выражает...","options":["контраст","причину","время"],"answer":0,"explanation":"","topic":""},{"q":"außerdem значит...","options":["кроме того","если","несмотря на"],"answer":0,"explanation":"","topic":""}],"tags":["connectors"]},{"id":"b1-09-b1","level":"B1","order":9,"module":"B1 самостоятельность","title":"Письмо B1: жалоба, просьба, мнение","goal":"Писать вязывают части фразы: nicht nur…, sondern auch…; sowohl… als auch…; entweder… oder…; weder… noch….","examples":[{"de":"Der Kurs ist nicht nur praktisch, sondern auch günstig.","ru":"Курс не только практичный, но и недорогой."},{"de":"Sowohl Grammatik als auch Wortschatz sind wichtig.","ru":"Важны и грамматика, и словарь."},{"de":"Entweder übe ich morgens oder ich lerne abends.","ru":"Я тренируюсь либо утром, либо вечером."}],"drills":[{"q":"nicht nur…, ___ auch…","options":["sondern","aber","weil"],"answer":0,"explanation":"","topic":"connectors"},{"q":"sowohl…, ___ auch…","options":["als","oder","noch"],"answer":0,"explanation":"","topic":"connectors"},{"q":"weder…, noch… значит:","options":["ни…, ни…","либо…, либо…","не только…, но и…"],"answer":0,"explanation":"","topic":"connectors"}],"tags":["connectors"]},{"id":"b1-12-verben-mit-praeposition","level":"B1","order":12,"module":"B1 связность","title":"Глаголы с управлением","goal":"Учить глагол вместе с предлогом и падежом.","rule":"Многие глаголы требуют фиксированный предлог: warten auf + Akkusativ, sprechen über + Akkusativ, teilnehmen an + Dativ, sich kümmern um + Akkusativ.","examples":[{"de":"Ich warte auf den Bus.","ru":"Я жду автобус."},{"de":"Wir sprechen über die Prüfung.","ru":"Мы говорим об экзамене."},{"de":"Sie nimmt an dem Kurs teil.","ru":"Она участвует в курсе."}],"drills":[{"q":"warten ___ den Bus","options":["auf","an","mit"],"answer":0,"explanation":"auf + Akkusativ","topic":"prepositions"},{"q":"teilnehmen ___ dem Kurs","options":["an","auf","über"],"answer":0,"explanation":"an + Dativ","topic":"prepositions"},{"q":"sich kümmern ___ das Problem","options":["um","mit","bei"],"answer":0,"explanation":"","topic":"prepositions"}],"tags":["prepositions","collocations"]},{"id":"b1-13-bewerbung","level":"B1","order":13,"module":"B1 практика","title":" Bewerbung и мотивация","goal":"Коротко объяснять опыт и цель.","rule":"В заявке важны ясные связки: Ich interessiere mich für…, Ich verfüge über…, Ich möchte meine Kenntnisse erweitern. После über часто Akkusativ.","examples":[{"de":"Ich interessiere mich für diese Stelle.","ru":"Меня интересует эта должность."},{"de":"Ich verfüge über Erfahrung im Verkauf.","ru":"У меня есть опыт в продажах."},{"de":"Ich möchte meine Deutschkenntnisse erweitern.","ru":"Я хотел(а) бы расширить знания немецкого."}],"drills":[{"q":"sich interessieren ___ diese Stelle","options":["für","über","an"],"answer":0,"explanation":"","topic":"bewerbung"},{"q":"verfügen ___ Erfahrung","options":["über","auf","für"],"answer":0,"explanation":"","topic":"bewerbung"},{"q":"Kenntnisse erweitern значит:","options":["расширять знания","закрывать офис","получать счёт"],"answer":0,"explanation":"","topic":"bewerbung"}],"tags":["work","writing"]},{"id":"b1-14-stellungnahme","level":"B1","order":14,"module":"B1 практика","title":"Stellungnahme: мнение и аргументы","goal":"Строить короткую письменную позицию.","rule":"Хорошая позиция: вводная фраза, мнение, два аргумента, пример, вывод. На B1 достаточно ясности: Ich bin der Meinung, dass…, Ein Vorteil ist…, Deshalb….","examples":[{"de":"Ich bin der Meinung, dass Sprachen im Alltag wichtig sind.","ru":"Я считаю, что языки важны в быту."},{"de":"Ein Vorteil ist, dass man selbstständiger wird.","ru":"Преимущество в том, что человек становится самостоятельнее."},{"de":"Deshalb sollte man regelmäßig üben.","ru":"Поэтому нужно регулярно заниматься."}],"drills":[{"q":"Фраза для мнения:","options":["Ich bin der Meinung, dass…","Ich habe die Meinung essen.","Meinung ich bin."],"answer":0,"explanation":"","topic":"writing"},{"q":"После dass глагол:","options":["в конце","всегда первый","исчезает"],"answer":0,"explanation":"","topic":"clauses"},{"q":"Ein Vorteil ist… значит:","options":["преимущество в том…","недостаток в том…","это запрещено…"],"answer":0,"explanation":"","topic":"writing"}],"tags":["writing","argumentation"]},{"id":"b2-01-","level":"B2","order":1,"module":"B2 уверенное владение","title":"Порядок         audio: { enabled:true, rate:0.95, lang:'de-DE' },
        migratedFromV13: false
      };
    }

    function loadState(){
      let s = defaultState();
      try {
        const raw = localStorage.getItem(STORE_KEY);

      } catch(e) {}
      s.profile = Object.assign({medicine:false, swiss:false, surgery:false}, s.profile || {});

      s.wordStatus = s.wordStatus || {};
      s.weakTopics = s.weakTopics || {};

      return s;
    }

    function saveState(){
      try { localStorage.setItem(STORE_KEY, JSON.stringify(state)); } catch(e) {}
      updateLevelSelect();
    }

    function migrateOldDoneKeys(s){
      if (s.migratedFromV13) return;
      try {
        const keys = Object.keys(localStorage).filter(k => k.startsWith('done-') && localStorage.getItem(k) === '1');
        if (keys.length) {
          // старые ключи v13 не имеют полной карты новых уроков; сохраняем факт миграции и помечаем стартовый маршрут как изученный, если он был отмечен

          s.v13DoneKeys = keys;

    }

    }

    function navigate(name){
      if (route() === name) render();
      else location.hash = name;
      closeDrawer();
    }

    function toast(msg){
      const t = $('#toast');
      t.textContent = msg;
      t.classList.add('show');
      clearTimeout(toast._timer);
      toast._timer = setTimeout(() => t.classList.remove('show'), 2300);
    }

    function updateNav(){
      const current = route().split('/')[0];
      const buttons = NAV.map(([r,label]) => `<button class="${current===r?'active':''}" data-route="${r}">${esc(label)}</button>`).join('');
      $('#desktopNav').innerHTML = buttons;
      $('#drawerNav').innerHTML = buttons + `<hr style="border-color:var(--line);margin:14px 0"><button data-action="print">Печатная шпаргалка</button>`;
    }

    function updateLevelSelect(){
      const sel = $('#levelSelect');
      sel.innerHTML = LEVELS.map(l => `<option value="${l}" ${state.currentLevel===l?'selected':''}>${l}</option>`).join('');
    }

    function levelIndex(level){ return LEVELS.indexOf(level); }

    function lessonsBy(level){
      return DATA.lessons.filter(l => level === 'Alle' || l.level === level);
    }

    function statusOf(id){
      return state.lessonStatus[id] || 'new';
    }

    function statusBadge(st){
      const map = {
        new: ['Новый',''],
        in_progress: ['В процессе','warn'],
        learned: ['✓ изучено','ok'],
        review: ['Повторить','danger']
      };
      const x = map[st] || map.new;
      return `<span class="badge ${x[1]}">${x[0]}</span>`;
    }

    function levelProgress(level){
      const arr = lessonsBy(level);
      const done = arr.filter(l => statusOf(l.id) === 'learned').length;
      return {done, total: arr.length, pct: arr.length ? Math.round(done / arr.length * 100) : 0};
    }

    function allProgress(){
      const done = DATA.lessons.filter(l => statusOf(l.id) === 'learned').length;
      return {done, total: DATA.lessons.length, pct: Math.round(done / DATA.lessons.length * 100)};
    }

    function nextLesson(){
      const fromCurrent = DATA.lessons.filter(l => levelIndex(l.level) >= levelIndex(state.currentLevel));
      return fromCurrent.find(l => statusOf(l.id) !== 'learned') || DATA.lessons.find(l => statusOf(l.id) !== 'learned') || DATA.lessons[0];
    }

    function render(){
      updateNav();
      updateLevelSelect();
      const r = route();
      const [base, param] = r.split('/');
      const app = $('#app');
      let html = '';
      if (base === 'home') html = renderHome();
      else if (base === 'diagnostic') html = renderDiagnostic();
      else if (base === 'path') html = renderPath(param || state.currentLevel);
      else if (base === 'lesson') html = renderLesson(param);
      else if (base === 'grammar') html = renderGrammar(param);
      else if (base === 'b2') html = renderB2Short();
      else if (base === 'vocab') html = renderVocab();
      else if (base === 'trainer') html = renderTrainer();
      else if (base === 'progress') html = renderProgress();
      else if (base === 'settings') html = renderSettings();
      else html = renderHome();
      app.innerHTML = html;
      app.focus({preventScroll:true});
      bindDynamic();
    }

    function renderHome(){
      const p = allProgress();
      const n = nextLesson();
      const b2p = levelProgress('B2');
      return `
        <section class="hero">
          <div class="hero-card">
            <div class="badge-row">
              <span class="badge ok">готовый маршрут A0→B2</span>
              <span class="badge">offline HTML</span>
              <span class="badge">v14.1</span>
            </div>
            <h1>Немецкий без хаоса: A0 → B2</h1>
            <p class="lead">Сначала выберите сценарий. Не нужно разбираться в длинном меню: B2-грамматика, словарь, путь с нуля и диагностика открываются сразу.</p>
            <div class="quick-grid">
              <button class="quick primary" data-route="path/A0"><b>Я новичок</b><span>начать с A0, звуки, первые фразы, простые вопросы</span></button>
              <button class="quick" data-route="diagnostic"><b>Проверить уровень</b><span>31 вопрос и рекомендация A0/A1/A2/B1/B2</span></button>
              <button class="quick" data-route="b2"><b>Грамматика B2 коротко</b><span>прямой вход в краткое B2-резюме</span></button>
              <button class="quick" data-route="vocab"><b>Словарь отдельно</b><span>поиск, уровни, темы, профильные пакеты</span></button>
            </div>
          </div>
          <aside class="stats">
            <div class="stat">
              <div class="num">${p.pct}%</div>
              <div>общий прогресс: ${p.done}/${p.total} уроков</div>
              <div class="progress-bar"><span style="width:${p.pct}%"></span></div>
            </div>
            <div class="stat">
              <div class="muted">Следующий шаг</div>
              <h3>${esc(n.level)} · ${esc(n.title)}</h3>
              <p>${esc(n.goal)}</p>
              <button class="btn primary" data-route="lesson/${esc(n.id)}">Открыть урок</button>
            </div>
            <div class="stat">
              <div class="muted">B2-грамматика</div>
              <div class="progress-bar"><span style="width:${b2p.pct}%"></span></div>
              <p>${b2p.done}/${b2p.total} B2-тем отмечено.</p>
            </div>
          </aside>
        </section>

        <section class="panel">
          <div class="section-title"><h2>Быстрые зоны</h2><span class="muted">сделано по плану v13 → v14.1</span></div>
          <div class="grid four">
            ${infoCard('Диагностика', 'Короткий входной тест. Слабые темы сохраняются в прогрессе.', 'diagnostic')}
            ${infoCard('Учебный путь', '58 уроков: короткое правило → примеры → тренировка.', 'path')}
            ${infoCard('Грамматика', 'Фильтр по уровню, режим B2-резюме, печатная шпаргалка.', 'grammar')}
            ${infoCard('Словарь', `${DATA.vocab.length} слов и фраз. Профильные блоки выключены по умолчанию.`, 'vocab')}
          </div>
        </section>

        <section class="panel">
          <div class="section-title"><h2>Уровни</h2><button class="btn" data-route="progress">Открыть прогресс</button></div>
          <div class="grid">
            ${LEVELS.map(l => {
              const pr = levelProgress(l);
              return `<article class="card">
                <div class="badge-row"><span class="badge">${l}</span><span class="badge ${pr.pct===100?'ok':''}">${pr.pct}%</span></div>
                <h3>${levelTitle(l)}</h3>
                <p>${levelGoal(l)}</p>
                <div class="progress-bar"><span style="width:${pr.pct}%"></span></div>
                <p class="muted">${pr.done}/${pr.total} уроков</p>
                <button class="btn" data-route="path/${l}">Открыть ${l}</button>
              </article>`;
            }).join('')}
          </div>
        </section>
      `;
    }

    function infoCard(title, text, routeName){
      return `<article class="card"><h3>${esc(title)}</h3><p>${esc(text)}</p><button class="btn" data-route="${routeName}">Перейти</button></article>`;
    }

    function levelTitle(l){
      return ({A0:'Полный старт', A1:'База общения', A2:'Систематизация', B1:'Самостоятельность', B2:'Уверенное владение'})[l] || l;
    }
    function levelGoal(l){
      return ({
        A0:'читать, представиться, задать первые вопросы',
        A1:'говорить о себе, семье, городе, работе и потребностях',
        A2:'рассказывать прошлое, объяснять причину, писать короткие сообщения',
        B1:'аргументировать, писать связные тексты, понимать основные темы',
        B2:'писать и говорить структурированно, пользоваться официальным стилем'
      })[l] || '';
    }

    function levelTabs(active, base='path'){
      return `<div class="level-tabs">
        ${LEVELS.map(l => `<button class="${active===l?'active':''}" data-route="${base}/${l}">${l}</button>`).join('')}
        ${base==='grammar' ? `<button class="${active==='Alle'?'active':''}" data-route="grammar/Alle">Все</button>` : ''}
      </div>`;
    }

    function renderPath(level){
      if (!LEVELS.includes(level)) level = state.currentLevel;
      state.currentLevel = level;
      saveState();
      const all = lessonsBy(level);
      const visible = all.filter(l => {
        const st = statusOf(l.id);
        if (state.hideLearned && st === 'learned') return false;
        if (state.statusFilter !== 'all' && st !== state.statusFilter) return false;
        return true;
      });
      return `
        <section class="panel">
          <div class="section-title">
            <div><h2>Путь с нуля до B2</h2><p class="muted">Выбран уровень ${esc(level)} · ${esc(levelTitle(level))}</p></div>
            <button class="btn" data-route="diagnostic">Не знаю уровень</button>
          </div>
          ${levelTabs(level,'path')}
          <div class="toolbar">
            <label class="pill"><input type="checkbox" data-action="toggle-hide" ${state.hideLearned?'checked':''}> Скрывать изученное</label>
            <select data-action="status-filter">
              ${[['all','Все статусы'],['new','Новые'],['in_progress','В процессе'],['learned','Изученные'],['review','На повторение']].map(([v,t]) => `<option value="${v}" ${state.statusFilter===v?'selected':''}>${t}</option>`).join('')}
            </select>
            ${state.hideLearned ? '<button class="btn" data-action="show-learned">Показать изученное</button>' : ''}
          </div>
          <div class="grid">
            ${visible.map(renderLessonCard).join('') || '<div class="empty">По текущему фильтру уроков нет. Снимите скрытие изученного или измените статус.</div>'}
          </div>
        </section>
      `;
    }

    function renderLessonCard(l){
      const st = statusOf(l.id);
      return `<article class="lesson-card ${state.hideLearned && st==='learned'?'hidden-learned':''}">
        <div class="badge-row"><span class="badge">${esc(l.level)}</span>${statusBadge(st)}<span class="badge">${esc(l.module)}</span></div>
        <h3>${esc(l.order)}. ${esc(l.title)}</h3>
        <p>${esc(l.goal)}</p>
        <div class="progress-bar"><span style="width:${st==='learned'?100:st==='in_progress'?45:st==='review'?20:0}%"></span></div>
        <button class="btn primary" data-route="lesson/${esc(l.id)}">Урок</button>
        <button class="btn good" data-action="mark" data-id="${esc(l.id)}" data-status="learned">✓ изучено</button>
        <button class="btn warn" data-action="mark" data-id="${esc(l.id)}" data-status="review">Повторить</button>
      </article>`;
    }

    function renderLesson(id){
      const l = DATA.lessons.find(x => x.id === id) || nextLesson();
      if (statusOf(l.id) === 'new') {
        state.lessonStatus[l.id] = 'in_progress';
        saveState();
      }
      const prev = DATA.lessons[DATA.lessons.indexOf(l)-1];
      const next = DATA.lessons[DATA.lessons.indexOf(l)+1];
      return `
        <section class="panel">
          <div class="badge-row"><span class="badge">${esc(l.level)}</span>${statusBadge(statusOf(l.id))}<span class="badge">${esc(l.module)}</span></div>
          <h2>${esc(l.title)}</h2>
          <p class="lead">${esc(l.goal)}</p>
          <div class="grid two">
            <article class="card">
              <h3>Короткое правило</h3>
              <p>${esc(l.rule)}</p>
            </article>
            <article class="card">
              <h3>Что сделать сейчас</h3>
              <p>Прочитайте правило, вслух повторите примеры, затем ответьте на вопросы. После этого нажмите «✓ изучено» или отправьте тему на повторение.</p>
              <button class="btn good" data-action="mark" data-id="${esc(l.id)}" data-status="learned">✓ изучено</button>
              <button class="btn warn" data-action="mark" data-id="${esc(l.id)}" data-status="review">Повторить позже</button>
            </article>
          </div>
          <h3>Примеры</h3>
          <ul class="example-list">
            ${l.examples.map(e => `<li class="example"><span class="de">${esc(e.de)} <button class="speak" data-speak="${esc(e.de)}">🔊</button></span><span class="ru">${esc(e.ru)}</span></li>`).join('')}
          </ul>
          <h3>Мини-тренировка</h3>
          ${l.drills.map((d,i) => renderDrill(d, `${l.id}-${i}`)).join('')}
          <div class="toolbar">
            ${prev ? `<button class="btn" data-route="lesson/${esc(prev.id)}">← Предыдущий</button>` : ''}
            <button class="btn" data-route="path/${esc(l.level)}">К списку ${esc(l.level)}</button>
            ${next ? `<button class="btn primary" data-route="lesson/${esc(next.id)}">Следующий →</button>` : ''}
          </div>
        </section>
      `;
    }

    function renderDrill(d, key){
      return `<div class="drill" data-drill="${esc(key)}" data-answer="${d.answer}" data-topic="${esc(d.topic || d.topic === 0 ? d.topic : '')}">
        <p><b>${esc(d.q)}</b></p>
        ${d.options.map((o,i) => `<button class="option" data-action="answer-drill" data-choice="${i}" data-correct="${d.answer}" data-explanation="${esc(d.explanation || '')}">${esc(o)}</button>`).join('')}
        <div class="answer-note" aria-live="polite"></div>
      </div>`;
    }

    function renderGrammar(levelParam){
      let level = levelParam || state.grammarLevel || 'Alle';
      if (![...LEVELS,'Alle'].includes(level)) level = 'Alle';
      state.grammarLevel = level;
      saveState();
      const arr = DATA.lessons.filter(l => level === 'Alle' || l.level === level);
      return `
        <section class="panel">
          <div class="section-title">
            <div><h2>Грамматика</h2><p class="muted">Фильтр по уровню. Для исходной задачи есть отдельная кнопка B2-коротко.</p></div>
            <button class="btn primary" data-route="b2">Грамматика B2 коротко</button>
          </div>
          ${levelTabs(level,'grammar')}
          <div class="grid">
            ${arr.map(l => `<article class="card">
              <div class="badge-row"><span class="badge">${esc(l.level)}</span>${statusBadge(statusOf(l.id))}</div>
              <h3>${esc(l.title)}</h3>
              <p>${esc(l.rule)}</p>
              <details><summary>Примеры</summary>
                <ul class="example-list">${l.examples.map(e => `<li class="example"><span class="de">${esc(e.de)} <button class="speak" data-speak="${esc(e.de)}">🔊</button></span><span class="ru">${esc(e.ru)}</span></li>`).join('')}</ul>
              </details>
              <button class="btn" data-route="lesson/${esc(l.id)}">Открыть урок</button>
            </article>`).join('')}
          </div>
        </section>`;
    }

    function renderB2Short(){
      const arr = DATA.lessons.filter(l => l.level === 'B2');
      return `
        <section class="panel">
          <div class="section-title">
            <div><h2>Грамматика B2 коротко</h2><p class="muted">Прямой вход без маршрута, аудио-панелей и профессиональных блоков.</p></div>
            <button class="btn" data-action="print">Печатать</button>
          </div>
          <div class="toolbar">
            <button class="btn" data-route="vocab">Словарь отдельно</button>
            <button class="btn" data-route="trainer">Тренажёр</button>
            <button class="btn" data-route="path/B2">Учить B2 по урокам</button>
          </div>
          <div class="grid two">
            ${arr.map(l => `<article class="card">
              <div class="badge-row"><span class="badge">B2</span>${statusBadge(statusOf(l.id))}</div>
              <h3>${esc(l.order)}. ${esc(l.title)}</h3>
              <p>${esc(l.rule)}</p>
              <ul class="example-list">
                ${l.examples.slice(0,2).map(e => `<li class="example"><span class="de">${esc(e.de)} <button class="speak" data-speak="${esc(e.de)}">🔊</button></span><span class="ru">${esc(e.ru)}</span></li>`).join('')}
              </ul>
              <button class="btn good" data-action="mark" data-id="${esc(l.id)}" data-status="learned">✓ изучено</button>
              <button class="btn" data-route="lesson/${esc(l.id)}">Тренировка</button>
            </article>`).join('')}
          </div>
        </section>`;
    }

    function allowedVocab(v){
      if (!v.profile) return true;
      return !!state.profile[v.profile];
    }

    function renderVocab(){
      const levels = ['Alle', ...LEVELS];
      const topics = ['Alle', ...Array.from(new Set(DATA.vocab.filter(allowedVocab).map(v => v.topic))).sort((a,b)=>a.localeCompare(b,'ru'))];
      const q = (state.vocabSearch || '').trim().toLowerCase();
      const arr = DATA.vocab.filter(v => {
        if (!allowedVocab(v)) return false;
        if (state.vocabLevel !== 'Alle' && v.level !== state.vocabLevel) return false;
        if (state.vocabTopic !== 'Alle' && v.topic !== state.vocabTopic) return false;
        if (q && ![v.de,v.ru,v.example,v.topic,v.pos].join(' ').toLowerCase().includes(q)) return false;
        return true;
      });
      return `
        <section class="panel">
          <div class="section-title">
            <div><h2>Словарь отдельно</h2><p class="muted">${arr.length}/${DATA.vocab.length} слов и фраз. Профессиональные пакеты включаются в настройках.</p></div>
            <button class="btn" data-route="settings">Профили</button>
          </div>
          <div class="toolbar">
            <select data-action="vocab-level">${levels.map(l => `<option value="${l}" ${state.vocabLevel===l?'selected':''}>${l}</option>`).join('')}</select>
            <select data-action="vocab-topic">${topics.map(t => `<option value="${esc(t)}" ${state.vocabTopic===t?'selected':''}>${esc(t)}</option>`).join('')}</select>
            <input type="search" data-action="vocab-search" placeholder="искать слово, перевод, пример" value="${esc(state.vocabSearch)}">
            <button class="btn" data-action="clear-vocab">Сбросить</button>
          </div>
          <div class="grid four">
            ${['medicine','swiss','surgery'].map(p => profileCard(p)).join('')}
          </div>
          <div class="table-wrap" aria-label="Словарь">
            <table>
              <thead><tr><th>Уровень</th><th>Тема</th><th>Deutsch</th><th>Перевод</th><th>Пример</th><th>Статус</th></tr></thead>
              <tbody>${arr.map(v => {
                const known = state.wordStatus[v.id] === 'known';
                return `<tr>
                  <td><span class="badge">${esc(v.level)}</span></td>
                  <td>${esc(v.topic)} ${v.profile?`<span class="badge warn">${esc(profileName(v.profile))}</span>`:''}</td>
                  <td><b>${esc(v.de)}</b> <button class="speak" data-speak="${esc(v.de)}">🔊</button><br><span class="muted">${esc(v.pos)}</span></td>
                  <td>${esc(v.ru)}</td>
                  <td>${esc(v.example)}</td>
                  <td><button class="btn ${known?'good':''}" data-action="word-known" data-id="${esc(v.id)}">${known?'✓ знаю':'Отметить'}</button></td>
                </tr>`;
              }).join('')}</tbody>
            </table>
          </div>
        </section>`;
    }

    function profileName(p){
      return {medicine:'медицина', swiss:'Швейцария', surgery:'пластическая хирургия'}[p] || p;
    }

    function profileCard(p){
      const on = !!state.profile[p];
      const text = {
        medicine:'врач-пациент, диагностика, лечение',
        swiss:'швейцарская клиника и Alltag',
        surgery:'эстетическая медицина и Nachsorge'
      }[p];
      return `<article class="card">
        <div class="badge-row"><span class="badge ${on?'ok':'warn'}">${on?'включено':'выключено'}</span></div>
        <h3>${esc(profileName(p))}</h3>
        <p>${esc(text)}</p>
        <button class="btn" data-action="toggle-profile" data-profile="${p}">${on?'Выключить':'Включить'}</button>
      </article>`;
    }

    function renderDiagnostic(){
      const result = state.diagnosticResult;
      return `
        <section class="panel">
          <div class="section-title">
            <div><h2>Проверка уровня / диагностика</h2><p class="muted">31 вопрос. Результат предлагает стартовый уровень и сохраняет слабые темы.</p></div>
            <button class="btn" data-action="reset-diagnostic">Очистить ответы</button>
          </div>
          ${result ? renderDiagnosticResult(result) : ''}
          <form id="diagnosticForm" class="diagnostic-grid">
            ${DATA.diagnostic.map((q,i) => `<div class="diagnostic-q">
              <div class="badge-row"><span class="badge">${esc(q.level)}</span><span class="badge">${esc(q.topic)}</span></div>
              <p><b>${i+1}. ${esc(q.q)}</b></p>
              ${q.options.map((o,j) => `<label><input type="radio" name="dq${i}" value="${j}"> ${esc(o)}</label>`).join('')}
            </div>`).join('')}
            <button type="button" class="btn primary" data-action="submit-diagnostic">Показать рекомендацию</button>
          </form>
        </section>`;
    }

    function renderDiagnosticResult(r){
      return `<div class="result-box">
        <h3>Рекомендация: начать с ${esc(r.recommended)}</h3>
        <p>Результат: ${r.totalCorrect}/${DATA.diagnostic.length}. По уровням: ${LEVELS.map(l => `${l}: ${r.byLevel[l].correct}/${r.byLevel[l].total}`).join(' · ')}</p>
        <div class="toolbar">
          <button class="btn primary" data-route="path/${esc(r.recommended)}">Принять: открыть ${esc(r.recommended)}</button>
          <button class="btn" data-route="trainer">Тренировать слабые темы</button>
        </div>
      </div>`;
    }

    function submitDiagnostic(){
      const form = $('#diagnosticForm');
      const byLevel = {};
      LEVELS.forEach(l => byLevel[l] = {correct:0,total:0});
      let totalCorrect = 0;
      DATA.diagnostic.forEach((q,i) => {
        byLevel[q.level].total++;
        const val = form.querySelector(`input[name="dq${i}"]:checked`);
        const choice = val ? Number(val.value) : -1;
        if (choice === q.answer) {
          byLevel[q.level].correct++;
          totalCorrect++;
        } else {
          state.weakTopics[q.topic] = (state.weakTopics[q.topic] || 0) + 1;
        }
      });
      let recommended = 'B2';
      for (const l of LEVELS) {
        if (byLevel[l].correct < Math.ceil(byLevel[l].total * .6)) { recommended = l; break; }
      }
      state.currentLevel = recommended;
      state.diagnosticResult = {recommended, byLevel, totalCorrect, date: new Date().toISOString()};
      saveState();
      render();
      toast(`Рекомендация: ${recommended}`);
    }

    function renderTrainer(){
      const weak = Object.keys(state.weakTopics).filter(k => state.weakTopics[k] > 0);
      let drills = DATA.lessons
        .filter(l => l.level === state.currentLevel || weak.some(t => l.tags.includes(t)))
        .flatMap(l => l.drills.map((d,i) => Object.assign({lesson:l.title, level:l.level, key:`${l.id}-${i}`}, d)));
      if (!drills.length) drills = DATA.lessons.filter(l => l.level === state.currentLevel).flatMap(l => l.drills);
      drills = drills.slice(0, 18);
      return `<section class="panel">
        <div class="section-title">
          <div><h2>Тренажёр</h2><p class="muted">Текущий уровень: ${esc(state.currentLevel)}. Слабые темы: ${weak.length ? weak.map(esc).join(', ') : 'пока нет'}.</p></div>
          <button class="btn" data-route="diagnostic">Обновить диагностику</button>
        </div>
        <div class="grid two">
          ${drills.map((d,i) => `<article class="card">
            <div class="badge-row"><span class="badge">${esc(d.level || state.currentLevel)}</span><span class="badge">${esc(d.lesson || 'упражнение')}</span></div>
            ${renderDrill(d, `trainer-${i}`)}
          </article>`).join('')}
        </div>
      </section>`;
    }

    function renderProgress(){
      const p = allProgress();
      const weak = Object.entries(state.weakTopics).filter(([,n]) => n > 0).sort((a,b)=>b[1]-a[1]);
      return `<section class="panel">
        <div class="section-title">
          <div><h2>Прогресс</h2><p class="muted">Состояние хранится локально в одном объекте ${STORE_KEY}.</p></div>
          <button class="btn primary" data-route="path/${esc(state.currentLevel)}">Продолжить</button>
        </div>
        <div class="card">
          <h3>Общий прогресс: ${p.pct}%</h3>
          <div class="progress-bar"><span style="width:${p.pct}%"></span></div>
          <p>${p.done}/${p.total} уроков изучено.</p>
        </div>
        <div class="grid">
          ${LEVELS.map(l => {
            const pr = levelProgress(l);
            return `<article class="card"><h3>${l} · ${levelTitle(l)}</h3><div class="progress-bar"><span style="width:${pr.pct}%"></span></div><p>${pr.done}/${pr.total} · ${pr.pct}%</p><button class="btn" data-route="path/${l}">Открыть</button></article>`;
          }).join('')}
        </div>
        <div class="grid two">
          <article class="card">
            <h3>Слабые темы</h3>
            ${weak.length ? `<ul>${weak.map(([t,n]) => `<li>${esc(t)} — ${n}</li>`).join('')}</ul>` : '<p class="muted">Пока нет данных. Пройдите диагностику или тренировки.</p>'}
            <button class="btn" data-route="trainer">Тренировать</button>
          </article>
          <article class="card">
            <h3>Данные прогресса</h3>
            <p>Можно экспортировать JSON или сбросить локальный прогресс.</p>
            <button class="btn" data-action="export-progress">Экспорт JSON</button>
            <button class="btn danger" data-action="reset-progress">Сбросить прогресс</button>
          </article>
        </div>
      </section>`;
    }

    function renderSettings(){
      return `<section class="panel">
        <div class="section-title"><h2>Настройки</h2><span class="muted">аудио свернуто, профильные блоки выключены по умолчанию</span></div>
        <div class="grid two">
          <article class="card">
            <h3>Текущий уровень</h3>
            <p>Можно вручную переключить уровень независимо от диагностики.</p>
            <div class="level-tabs">${LEVELS.map(l => `<button class="${state.currentLevel===l?'active':''}" data-action="set-level" data-level="${l}">${l}</button>`).join('')}</div>
          </article>
          <article class="card">
            <h3>Скрывать изученное</h3>
            <p>По умолчанию изученный материал остаётся видимым. Это можно изменить здесь или в маршруте.</p>
            <label class="pill"><input type="checkbox" data-action="toggle-hide" ${state.hideLearned?'checked':''}> Скрывать изученное</label>
          </article>
        </div>
        <div class="grid three">
          ${['medicine','swiss','surgery'].map(p => profileCard(p)).join('')}
        </div>
        <details>
          <summary>Аудио-настройки</summary>
          <p class="muted">Используется Web Speech API браузера. Если голоса нет, кнопка озвучки просто не произнесёт текст.</p>
          <div class="toolbar">
            <label class="pill"><input type="checkbox" data-action="audio-enabled" ${state.audio.enabled?'checked':''}> Озвучка включена</label>
            <label>Скорость <input type="number" min="0.6" max="1.3" step="0.05" data-action="audio-rate" value="${esc(state.audio.rate)}"></label>
            <button class="btn" data-speak="Guten Tag. Ich lerne Deutsch.">Тест 🔊</button>
          </div>
        </details>
        <details>
          <summary>Печатная версия</summary>
          <p>Печать скрывает меню, кнопки, озвучку и лишнюю навигацию.</p>
          <button class="btn" data-action="print">Печатать текущий экран</button>
        </details>
      </section>`;
    }

    function bindDynamic(){
      $$('#app [data-speak], .topbar [data-speak], .drawer [data-speak]').forEach(b => b.addEventListener('click', ev => {
        ev.stopPropagation();
        speak(b.getAttribute('data-speak'));
      }));
    }

    function speak(text){
      if (!state.audio.enabled) return toast('Озвучка выключена в настройках');
      try {
        if (!('speechSynthesis' in window)) return toast('В браузере нет speechSynthesis');
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(cleanSpeak(text));
        u.lang = state.audio.lang || 'de-DE';
        u.rate = Number(state.audio.rate) || .95;
        window.speechSynthesis.speak(u);
      } catch(e) { toast('Озвучка недоступна'); }
    }

    function markLesson(id, status){
      state.lessonStatus[id] = status;
      saveState();
      toast(status === 'learned' ? 'Отмечено как изучено' : 'Добавлено на повторение');
      render();
    }

    function answerDrill(btn){
      const parent = btn.closest('.drill');
      const correct = Number(btn.dataset.correct);
      const choice = Number(btn.dataset.choice);
      $$('.option', parent).forEach((b,i) => {
        b.disabled = true;
        if (i === correct) b.classList.add('correct');
        if (i === choice && i !== correct) b.classList.add('wrong');
      });
      const note = $('.answer-note', parent);
      if (choice === correct) {
        note.textContent = 'Верно. ' + (btn.dataset.explanation || '');
      } else {
        const topic = parent.dataset.topic || 'trainer';
        state.weakTopics[topic] = (state.weakTopics[topic] || 0) + 1;
        saveState();
        note.textContent = 'Неверно. Правильный ответ подсвечен. ' + (btn.dataset.explanation || '');
      }
    }

    function exportProgress(){
      const blob = new Blob([JSON.stringify(state, null, 2)], {type:'application/json'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `deutsch-a0-b2-progress-${new Date().toISOString().slice(0,10)}.json`;
      a.click();
      URL.revokeObjectURL(a.href);
    }

    function resetProgress(){
      if (!confirm('Сбросить локальный прогресс в этом браузере?')) return;
      try { localStorage.removeItem(STORE_KEY); } catch(e) {}
      state = defaultState();
      saveState();
      render();
      toast('Прогресс сброшен');
    }

    function closeDrawer(){
      $('#drawer').classList.remove('open');
      $('#drawerBackdrop').classList.remove('open');
    }

    document.addEventListener('click', ev => {
      const routeBtn = ev.target.closest('[data-route]');
      if (routeBtn) {
        ev.preventDefault();
        navigate(routeBtn.dataset.route);
        return;
      }
      const action = ev.target.closest('[data-action]');
      if (!action) return;
      const a = action.dataset.action;
      if (a === 'mark') markLesson(action.dataset.id, action.dataset.status);
      if (a === 'answer-drill') answerDrill(action);
      if (a === 'toggle-hide') { state.hideLearned = action.checked; saveState(); render(); }
      if (a === 'show-learned') { state.hideLearned = false; saveState(); render(); }
      if (a === 'status-filter') { state.statusFilter = action.value; saveState(); render(); }
      if (a === 'vocab-level') { state.vocabLevel = action.value; saveState(); render(); }
      if (a === 'vocab-topic') { state.vocabTopic = action.value; saveState(); render(); }
      if (a === 'vocab-search') {}
      if (a === 'clear-vocab') { state.vocabLevel='Alle'; state.vocabTopic='Alle'; state.vocabSearch=''; saveState(); render(); }
      if (a === 'word-known') { state.wordStatus[action.dataset.id] = state.wordStatus[action.dataset.id] === 'known' ? '' : 'known'; saveState(); render(); }
      if (a === 'toggle-profile') { const p=action.dataset.profile; state.profile[p]=!state.profile[p]; saveState(); render(); }
      if (a === 'submit-diagnostic') submitDiagnostic();
      if (a === 'reset-diagnostic') { state.diagnosticResult = null; saveState(); render(); }
      if (a === 'set-level') { state.currentLevel = action.dataset.level; saveState(); render(); }
      if (a === 'audio-enabled') { state.audio.enabled = action.checked; saveState(); }
      if (a === 'print') window.print();
      if (a === 'export-progress') exportProgress();
      if (a === 'reset-progress') resetProgress();
    });

    document.addEventListener('input', ev => {
      const el = ev.target;
      if (el.matches('[data-action="vocab-search"]')) {
        state.vocabSearch = el.value;
        saveState();
        clearTimeout(window.__vocabTimer);
        window.__vocabTimer = setTimeout(render, 180);
      }
      if (el.matches('[data-action="audio-rate"]')) {
        state.audio.rate = Number(el.value) || .95;
        saveState();
      }
    });

    $('#levelSelect').addEventListener('change', ev => {
      state.currentLevel = ev.target.value;
      saveState();
      if (['path','trainer'].includes(route().split('/')[0])) navigate(route().split('/')[0] === 'path' ? `path/${state.currentLevel}` : 'trainer');
      else toast(`Текущий уровень: ${state.currentLevel}`);
    });

    $('#globalSearch').addEventListener('keydown', ev => {
      if (ev.key === 'Enter') {
        state.vocabSearch = ev.target.value;
        state.vocabLevel = 'Alle';
        state.vocabTopic = 'Alle';
        saveState();
        navigate('vocab');
      }
    });

    $('#menuBtn').addEventListener('click', () => {
      $('#drawer').classList.add('open');
      $('#drawerBackdrop').classList.add('open');
    });
    $('#drawerBackdrop').addEventListener('click', closeDrawer);
    window.addEventListener('hashchange', render);

    updateNav();
    updateLevelSelect();
    render();
  })();
  </script>
</body>
</html>
