nswer":0,"explanation":"Правильно: «подать». В официальном немецком важны нейтральный тон, точная просьба и стандартные формулы, а не дословная русская канцелярская фраза.","topic":"documents"},{"q":"die Bescheinigung —","options":["справка","приём","город"],"answer":0,"explanation":"Правильно: «справка». В официальном немецком важны нейтральный тон, точная просьба и стандартные формулы, а не дословная русская канцелярская фраза.","topic":"documents"}],"tags":["documents","formal","v14.2"],"deepTheoryRu":"Для русскоговорящего письмо на немецком сложно не только грамматикой, но и регистром. Немецкое официальное письмо требует ясной структуры, нейтрального тона и точных просьб.","russianTrap":"Ловушка: писать слишком эмоционально или слишком прямо, как в устном русском. В немецком официальном стиле лучше спокойная формула.","germanLogic":"Официальное письмо — это не художественный текст, а управляемая структура: причина, факт, просьба, срок, финал.","formula":"Anrede → Grund → Details → Bitte/Forderung → Frist → Schlussformel","typicalMistakes":["Hallo в официальном письме","Mach schnell","слишком длинное предложение без структуры"],"grammarTables":[{"title":"Официальное письмо","headers":["Часть","Фраза","Задача"],"rows":[["Обращение","Sehr geehrte Damen und Herren,","безопасный старт"],["Причина","Ich wende mich an Sie, weil...","объяснить цель"],["Просьба","Ich bitte um Rückmeldung.","сказать, что нужно"],["Срок","bis zum 15. August","дать рамку"],["Финал","Mit freundlichen Grüßen","официально закрыть"]]}],"whyForRussian":"Этот блок добавлен специально для русскоговорящего ученика: сначала сравниваем с русской логикой, потом показываем немецкий механизм и только после этого тренируем форму.","visualSchemes":[{"title":"Схема официального текста","steps":[{"label":"1","title":"Цель","text":"Сразу назвать Anliegen.","de":"Hiermit möchte ich..."},{"label":"2","title":"Факт","text":"Коротко и проверяемо.","de":"Der Termin wurde nicht eingehalten."},{"label":"3","title":"Просьба","text":"Вежливо и конкретно.","de":"Ich bitte um Rückmeldung."},{"label":"4","title":"Формула","text":"Закрыть стандартно.","de":"Mit freundlichen Grüßen"}],"bars":[{"label":"структура","value":90},{"label":"регистр","value":95},{"label":"эмоции","value":25}]}]},{"id":"a2-16-topic","level":"A2","order":16,"module":"Грамматика","title":"Прилагательные после артикля","goal":"Не бояться окончаний guter/gute/guten.","rule":"На A2 достаточно узнавать типичные формы: ein guter Plan, eine gute Idee, ein gutes Beispiel. После der/die/das часто -e или -en.","examples":[{"de":"ein guter Plan","ru":"хороший план"},{"de":"eine gute Idee","ru":"хорошая идея"},{"de":"ein gutes Beispiel","ru":"хороший пример"},{"de":"mit einem guten Arzt","ru":"с хорошим врачом"}],"drills":[{"q":"ein ___ Plan","options":["guter","gute","guten"],"answer":0,"explanation":"Правильно: «guter». Артикль нужно учить вместе с существительным: он показывает род, число и падеж, которых в русском нет в такой форме.","topic":"adjectives"},{"q":"eine ___ Idee","options":["gute","guter","gutes"],"answer":0,"explanation":"Правильно: «gute». Артикль нужно учить вместе с существительным: он показывает род, число и падеж, которых в русском нет в такой форме.","topic":"adjectives"},{"q":"ein ___ Beispiel","options":["gutes","gute","guter"],"answer":0,"explanation":"Правильно: «gutes». Артикль нужно учить вместе с существительным: он показывает род, число и падеж, которых в русском нет в такой форме.","topic":"adjectives"},{"q":"mit einem ___ Arzt","options":["guten","guter","gute"],"answer":0,"explanation":"Правильно: «guten». Артикль нужно учить вместе с существительным: он показывает род, число и падеж, которых в русском нет в такой форме.","topic":"adjectives"}],"tags":["adjectives","cases","v14.2"],"deepTheoryRu":"В русском нет артиклей, поэтому русскоговорящий часто хочет учить только слово. В немецком это ошибка: существительное надо учить вместе с der/die/das, потому что род влияет на Akkusativ, Dativ, Genitiv и окончания прилагательных.","russianTrap":"Ловушка: учить Termin без der. Потом сложно понять, почему einen Termin, mit dem Termin, wegen des Termins.","germanLogic":"Артикль — это не украшение, а грамматическая метка рода, числа и падежа.","formula":"слово = артикль + существительное + пример: der Termin — Ich habe einen Termin.","typicalMistakes":["учить слово без артикля","путать der/die/das","не менять мужской род в Akkusativ"],"grammarTables":[{"title":"Артикли в Nominativ","headers":["Род/число","Определённый","Неопределённый","Пример"],"rows":[["мужской","der","ein","der Termin / ein Termin"],["женский","die","eine","die Frage / eine Frage"],["средний","das","ein","das Formular / ein Formular"],["множественное","die","-","die Unterlagen"]]},{"title":"Мини-логика артикля","headers":["Функция","Что показывает","Почему важно"],"rows":[["род","der/die/das","влияет на падеж"],["падеж","den/dem/des...","показывает роль слова"],["число","die Plural","множественное часто отличается"]]}],"whyForRussian":"Этот блок добавлен специально для русскоговорящего ученика: сначала сравниваем с русской логикой, потом показываем немецкий механизм и только после этого тренируем форму.","visualSchemes":[{"title":"Артикль как метка формы","steps":[{"label":"1","title":"Род","text":"Учить слово вместе с der/die/das.","de":"der Termin"},{"label":"2","title":"Падеж","text":"Роль меняет артикль.","de":"den Termin"},{"label":"3","title":"Фраза","text":"Сразу закреплять в примере.","de":"Ich habe einen Termin."}],"bars":[{"label":"род","value":80},{"label":"падеж","value":90},{"label":"пример","value":70}]}]},{"id":"a2-17-indirekte-fragen-ob-wann-wo","level":"A2","order":17,"module":"Грамматика","title":"Indirekte Fragen с ob, wann, wo","goal":"Задавать вежливые уточняющие вопросы.","rule":"В косвенном вопросе глагол уходит в конец: Können Sie mir sagen, wann der Termin ist? В ja/nein-вопросах используется ob.","examples":[{"de":"Können Sie mir sagen, wann der Termin ist?","ru":"Можете сказать, когда запись?"},{"de":"Ich möchte wissen, ob das möglich ist.","ru":"Я хотел(а) бы знать, возможно ли это."},{"de":"Wissen Sie, wo die Praxis ist?","ru":"Вы знаете, где практика/кабинет?"},{"de":"Ich frage, ob ich kommen kann.","ru":"Я спрашиваю, могу ли прийти."}],"drills":[{"q":"Косвенный вопрос требует глагол...","options":["в конце","на первом месте","без изменений"],"answer":0,"explanation":"Правильно: «в конце». В русском вопрос часто держится интонацией, а в немецком его показывает порядок слов: глагол первым или после W-слова.","topic":"clauses"},{"q":"ja/nein в косвенном вопросе:","options":["ob","weil","trotzdem"],"answer":0,"explanation":"Правильно: «ob». В вопросе без вопросительного слова спрягаемый глагол стоит первым.","topic":"clauses"},{"q":"Правильно:","options":["wann der Termin ist","wann ist der Termin","wann der Termin hat ist"],"answer":0,"explanation":"Правильно: «wann der Termin ist». В русском вопрос часто держится интонацией, а в немецком его показывает порядок слов: глагол первым или после W-слова.","topic":"word-order"},{"q":"Ich möchte wissen, ___ das möglich ist.","options":["ob","wer","denn"],"answer":0,"explanation":"Правильно: «ob». В русском вопрос часто держится интонацией, а в немецком его показывает порядок слов: глагол первым или после W-слова.","topic":"clauses"}],"tags":["clauses","questions","v14.2"],"deepTheoryRu":"В русском вопрос часто делается интонацией: «У вас есть время?» В немецком порядок слов показывает тип вопроса. Если вопрос без вопросительного слова, глагол идёт первым. Если есть W-слово, оно первое, глагол второй.","russianTrap":"Ловушка: говорить Sie haben Zeit? как основной учебный вариант. Это возможно интонационно, но стандартный грамматический вопрос: Haben Sie Zeit?","germanLogic":"Немецкий вопрос строится через позицию глагола, а не только через интонацию.","formula":"Ja/Nein: Verb + Subjekt + ...? W-Frage: W-Wort + Verb + Subjekt + ...?","typicalMistakes":["Sie haben Zeit? вместо Haben Sie Zeit?","Wo Sie wohnen?","Wann der Termin ist? как прямой вопрос"],"grammarTables":[{"title":"Типы вопросов","headers":["Тип","Шаблон","Пример"],"rows":[["Ja/Nein","Verb + Subjekt","Haben Sie Zeit?"],["W-Frage","Wort + Verb + Subjekt","Wo wohnen Sie?"],["Косвенный вопрос","..., W/ob + ... + Verb","Können Sie sagen, wann der Termin ist?"]]}],"whyForRussian":"Этот блок добавлен специально для русскоговорящего ученика: сначала сравниваем с русской логикой, потом показываем немецкий механизм и только после этого тренируем форму.","visualSchemes":[{"title":"Русская мысль -> немецкая форма","steps":[{"label":"1","title":"Смысл","text":"Что я хочу сказать по-русски?"},{"label":"2","title":"Форма","text":"Какой немецкий механизм нужен?","de":"Verb, Artikel, Kasus"},{"label":"3","title":"Контроль","text":"Проверяю порядок, падеж и регистр."}],"bars":[{"label":"смысл","value":70},{"label":"форма","value":90},{"label":"перевод","value":45}]}]},{"id":"b1-15-beschwerde","level":"B1","order":15,"module":"Письмо","title":"Официальная жалоба: Beschwerde","goal":"Писать жалобу спокойно и структурно.","rule":"Жалоба: факты → проблема → ожидание → срок/просьба. Тон должен быть вежливым, без агрессии.","examples":[{"de":"Hiermit möchte ich mich über die Verzögerung beschweren.","ru":"Настоящим хотел(а) бы пожаловаться на задержку."},{"de":"Leider wurde der Termin nicht eingehalten.","ru":"К сожалению, срок не был соблюдён."},{"de":"Ich bitte um eine Rückmeldung bis Freitag.","ru":"Прошу ответить до пятницы."},{"de":"Vielen Dank für Ihre Unterstützung.","ru":"Спасибо за вашу поддержку."}],"drills":[{"q":"Beschwerde значит...","options":["жалоба","похвала","справка"],"answer":0,"explanation":"Правильно: «жалоба». В официальном немецком важны нейтральный тон, точная просьба и стандартные формулы, а не дословная русская канцелярская фраза.","topic":"letter"},{"q":"В жалобе лучше...","options":["факты и просьба","оскорбления","только эмоции"],"answer":0,"explanation":"Правильно: «факты и просьба». В официальном немецком важны нейтральный тон, точная просьба и стандартные формулы, а не дословная русская канцелярская фраза.","topic":"style"},{"q":"bis Freitag значит...","options":["до пятницы","с пятницы","в пятницу вечером"],"answer":0,"explanation":"Правильно: «до пятницы». В официальном немецком важны нейтральный тон, точная просьба и стандартные формулы, а не дословная русская канцелярская фраза.","topic":"time"},{"q":"Ich bitte um Rückmeldung —","options":["прошу ответить","я запрещаю ответ","я уже оплатил"],"answer":0,"explanation":"Правильно: «прошу ответить». В официальном немецком важны нейтральный тон, точная просьба и стандартные формулы, а не дословная русская канцелярская фраза.","topic":"formal"}],"tags":["letter","formal","style","v14.2"],"deepTheoryRu":"Для русскоговорящего письмо на немецком сложно не только грамматикой, но и регистром. Немецкое официальное письмо требует ясной структуры, нейтрального тона и точных просьб.","russianTrap":"Ловушка: писать слишком эмоционально или слишком прямо, как в устном русском. В немецком официальном стиле лучше спокойная формула.","germanLogic":"Официальное письмо — это не художественный текст, а управляемая структура: причина, факт, просьба, срок, финал.","formula":"Anrede → Grund → Details → Bitte/Forderung → Frist → Schlussformel","typicalMistakes":["Hallo в официальном письме","Mach schnell","слишком длинное предложение без структуры"],"grammarTables":[{"title":"Официальное письмо","headers":["Часть","Фраза","Задача"],"rows":[["Обращение","Sehr geehrte Damen und Herren,","безопасный старт"],["Причина","Ich wende mich an Sie, weil...","объяснить цель"],["Просьба","Ich bitte um Rückmeldung.","сказать, что нужно"],["Срок","bis zum 15. August","дать рамку"],["Финал","Mit freundlichen Grüßen","официально закрыть"]]}],"whyForRussian":"Этот блок добавлен специально для русскоговорящего ученика: сначала сравниваем с русской логикой, потом показываем немецкий механизм и только после этого тренируем форму.","visualSchemes":[{"title":"Схема официального текста","steps":[{"label":"1","title":"Цель","text":"Сразу назвать Anliegen.","de":"Hiermit möchte ich..."},{"label":"2","title":"Факт","text":"Коротко и проверяемо.","de":"Der Termin wurde nicht eingehalten."},{"label":"3","title":"Просьба","text":"Вежливо и конкретно.","de":"Ich bitte um Rückmeldung."},{"label":"4","title":"Формула","text":"Закрыть стандартно.","de":"Mit freundlichen Grüßen"}],"bars":[{"label":"структура","value":90},{"label":"регистр","value":95},{"label":"эмоции","value":25}]}]},{"id":"b1-16-topic","level":"B1","order":16,"module":"Аргументация","title":"Структура абзаца: мнение, причина, пример","goal":"Строить связный B1-абзац.","rule":"Один абзац = одна мысль. Схема: Ich bin der Meinung, dass… Der Grund dafür ist… Zum Beispiel… Deshalb…","examples":[{"de":"Ich bin der Meinung, dass Sprachkurse wichtig sind.","ru":"Я считаю, что языковые курсы важны."},{"de":"Der Grund dafür ist die bessere Kommunikation.","ru":"Причина в лучшей коммуникации."},{"de":"Zum Beispiel kann man im Alltag sicherer sprechen.","ru":"Например, можно увереннее говорить в быту."},{"de":"Deshalb lohnt sich regelmäßiges Üben.","ru":"Поэтому регулярная практика стоит того."}],"drills":[{"q":"Абзац лучше строить как...","options":["мнение-причина-пример-вывод","только пример","хаотичный список"],"answer":0,"explanation":"Правильно: «мнение-причина-пример-вывод». После weil/dass/wenn/obwohl спрягаемый глагол уходит в конец придаточного.","topic":"argumentation"},{"q":"Der Grund dafür ist... значит","options":["причина этого","несмотря на это","вопрос такой"],"answer":0,"explanation":"Правильно: «причина этого». После weil/dass/wenn/obwohl спрягаемый глагол уходит в конец придаточного.","topic":"redemittel"},{"q":"Zum Beispiel =","options":["например","поэтому","однако"],"answer":0,"explanation":"Правильно: «например». После weil/dass/wenn/obwohl спрягаемый глагол уходит в конец придаточного.","topic":"redemittel"},{"q":"Deshalb требует...","options":["V2","глагол в конце","без глагола"],"answer":0,"explanation":"Правильно: «V2». После weil/dass/wenn/obwohl спрягаемый глагол уходит в конец придаточного.","topic":"word-order"}],"tags":["argumentation","redemittel","v14.2"],"deepTheoryRu":"Русский часто сохраняет привычный порядок слов после «потому что/что/если». В немецком подчинительный союз отправляет спрягаемый глагол в конец: weil ich Zeit habe.","russianTrap":"Ловушка: weil ich habe Zeit. Это русская логика порядка слов, но не немецкая.","germanLogic":"Придаточное предложение в немецком закрывается глаголом.","formula":"weil/dass/wenn/obwohl + подлежащее + ... + Verb","typicalMistakes":["weil ich habe Zeit","dass er kommt heute","wenn ich habe Zeit"],"grammarTables":[{"title":"Союзы и порядок слов","headers":["Союз","Смысл","Порядок"],"rows":[["weil","потому что","глагол в конце"],["dass","что","глагол в конце"],["wenn","если/когда","глагол в конце"],["obwohl","хотя","глагол в конце"],["ob","ли","глагол в конце"]]},{"title":"Цель","headers":["Конструкция","Когда","Пример"],"rows":[["um ... zu","один субъект","Ich lerne, um besser zu sprechen."],["damit","разные субъекты","Ich erkläre es, damit du es verstehst."]]}],"whyForRussian":"Этот блок добавлен специально для русскоговорящего ученика: сначала сравниваем с русской логикой, потом показываем немецкий механизм и только после этого тренируем форму.","visualSchemes":[{"title":"Рамка придаточного","steps":[{"label":"1","title":"Союз","text":"weil/dass/wenn открывает придаточное.","de":"weil"},{"label":"2","title":"Смысл","text":"Подлежащее и дополнения идут внутри.","de":"ich Zeit"},{"label":"3","title":"Глагол","text":"Спрягаемый глагол закрывает часть.","de":"habe"}],"bars":[{"label":"союз","value":75},{"label":"конец","value":95},{"label":"перенос с русского","value":80}]}]},{"id":"b1-17-topic","level":"B1","order":17,"module":"Грамматика","title":"Управление прилагательных","goal":"Использовать zufrieden mit, interessiert an, verantwortlich für.","rule":"Некоторые прилагательные требуют предлог: zufrieden mit + Dativ, interessiert an + Dativ, verantwortlich für + Akkusativ.","examples":[{"de":"Ich bin mit dem Ergebnis zufrieden.","ru":"Я доволен результатом."},{"de":"Sie ist an dem Kurs interessiert.","ru":"Она заинтересована в курсе."},{"de":"Er ist für die Planung verantwortlich.","ru":"Он ответственен за планирование."},{"de":"Das ist für mich wichtig.","ru":"Это важно для меня."}],"drills":[{"q":"zufrieden ___ dem Ergebnis","options":["mit","auf","für"],"answer":0,"explanation":"Правильно: «mit». Сравнивайте не русский перевод, а роль слова: Nominativ - кто, Akkusativ - кого/что, Dativ - кому/с кем/где, Genitiv - чей/из-за чего.","topic":"collocations"},{"q":"interessiert ___ dem Kurs","options":["an","für","über"],"answer":0,"explanation":"Правильно: «an». Сравнивайте не русский перевод, а роль слова: Nominativ - кто, Akkusativ - кого/что, Dativ - кому/с кем/где, Genitiv - чей/из-за чего.","topic":"collocations"},{"q":"verantwortlich ___ die Planung","options":["für","mit","an"],"answer":0,"explanation":"Правильно: «für». Сравнивайте не русский перевод, а роль слова: Nominativ - кто, Akkusativ - кого/что, Dativ - кому/с кем/где, Genitiv - чей/из-за чего.","topic":"collocations"},{"q":"mit dem Ergebnis — это...","options":["Dativ","Akkusativ","Genitiv"],"answer":0,"explanation":"Правильно: «Dativ». Сравнивайте не русский перевод, а роль слова: Nominativ - кто, Akkusativ - кого/что, Dativ - кому/с кем/где, Genitiv - чей/из-за чего.","topic":"cases"}],"tags":["collocations","prepositions","v14.2"],"deepTheoryRu":"В русском падежи часто видны по окончанию слова. В немецком главную работу часто делает артикль: der Mann, den Mann, dem Mann, des Mannes. Поэтому нельзя переводить только по смыслу — нужно видеть роль слова в предложении.","russianTrap":"Ловушка: думать «мужчина — der Mann всегда». Но после sehen будет Ich sehe den Mann, а после mit — mit dem Mann.","germanLogic":"Немецкий падеж отвечает на роль: кто действует, кого/что затронули, кому/где/с кем, чей/из-за чего.","formula":"Nominativ = кто? Akkusativ = кого/что? Dativ = кому/где/с кем? Genitiv = чей/из-за чего?","typicalMistakes":["der Mann после sehen","mit den Bus вместо mit dem Bus","wegen dem Problem в формальном письме"],"grammarTables":[{"title":"Артикли по падежам","headers":["Падеж","муж.","жен.","сред.","мн."],"rows":[["Nominativ","der/ein","die/eine","das/ein","die/-"],["Akkusativ","den/einen","die/eine","das/ein","die/-"],["Dativ","dem/einem","der/einer","dem/einem","den + -n"],["Genitiv","des/eines","der/einer","des/eines","der/-"]]},{"title":"Роль падежа","headers":["Падеж","Вопрос","Пример"],"rows":[["Nominativ","кто/что?","Der Arzt hilft."],["Akkusativ","кого/что?","Ich sehe den Arzt."],["Dativ","кому/с кем/где?","Ich helfe dem Patienten."],["Genitiv","чей/из-за чего?","wegen des Problems"]]}],"whyForRussian":"Этот блок добавлен специально для русскоговорящего ученика: сначала сравниваем с русской логикой, потом показываем немецкий механизм и только после этого тренируем форму.","visualSchemes":[{"title":"Падежная развилка","steps":[{"label":"1","title":"Глагол/предлог","text":"Сначала ищу управление.","de":"mit, helfen, sehen"},{"label":"2","title":"Падеж","text":"Выбираю роль: Akkusativ или Dativ.","de":"Akkusativ / Dativ"},{"label":"3","title":"Артикль","text":"Меняю der/ein по таблице.","de":"den Arzt / dem Arzt"}],"bars":[{"label":"управление","value":90},{"label":"артикль","value":85},{"label":"перевод","value":40}]}]},{"id":"b1-18-relativsatz","level":"B1","order":18,"module":"Грамматика","title":"Relativsatz с предлогом","goal":"Строить уточнение с предлогом и относительным местоимением.","rule":"Если предлог относится к относительному местоимению, он ставится перед ним: der Kurs, an dem ich teilnehme; die Firma, für die ich arbeite.","examples":[{"de":"Das ist der Kurs, an dem ich teilnehme.","ru":"Это курс, в котором я участвую."},{"de":"Das ist die Firma, für die ich arbeite.","ru":"Это фирма, на которую я работаю."},{"de":"Das ist der Arzt, mit dem ich gesprochen habe.","ru":"Это врач, с которым я говорил."},{"de":"Das ist das Formular, auf das ich warte.","ru":"Это формуляр, которого я жду."}],"drills":[{"q":"teilnehmen an + Dativ: der Kurs, ___ dem ich teilnehme","options":["an","auf","für"],"answer":0,"explanation":"Правильно: «an». Dativ часто нужен после mit, bei, zu, aus, von, seit, nach и для адресата помощи.","topic":"relative"},{"q":"arbeiten für + Akkusativ: die Firma, ___ die ich arbeite","options":["für","mit","an"],"answer":0,"explanation":"Правильно: «für». Akkusativ показывает объект действия; у мужского рода der/ein меняется на den/einen.","topic":"relative"},{"q":"sprechen mit + Dativ: der Arzt, mit ___","options":["dem","den","der"],"answer":0,"explanation":"Правильно: «dem». Dativ часто нужен после mit, bei, zu, aus, von, seit, nach и для адресата помощи.","topic":"relative"},{"q":"В Relativsatz глагол стоит...","options":["в конце","всегда вторым","первым"],"answer":0,"explanation":"Правильно: «в конце». Местоимение выбирается по роли внутри немецкой части фразы, а не по русскому вопросу целиком.","topic":"word-order"}],"tags":["relative","prepositions","v14.2"],"deepTheoryRu":"Местоимения в немецком меняются по падежам. Русскому это знакомо по смыслу: я/меня/мне. Но формы нужно автоматизировать: ich/mich/mir, er/ihn/ihm.","russianTrap":"Ловушка: использовать ich вместо mich/mir после глагола или предлога.","germanLogic":"Местоимение показывает роль человека или предмета в предложении.","formula":"Nominativ: ich; Akkusativ: mich; Dativ: mir","typicalMistakes":["Ich sehe er","Hilfst du ich?","mit sie вместо mit ihr"],"grammarTables":[{"title":"Личные местоимения","headers":["Nominativ","Akkusativ","Dativ"],"rows":[["ich","mich","mir"],["du","dich","dir"],["er","ihn","ihm"],["sie","sie","ihr"],["wir","uns","uns"]]},{"title":"da-/wo-композиты","headers":["Предлог + вещь","Форма","Пример"],"rows":[["auf + das","darauf","Ich warte darauf."],["über + das","darüber","Wir sprechen darüber."],["mit + was","womit","Womit lässt sich das erklären?"]]}],"whyForRussian":"Этот блок добавлен специально для русскоговорящего ученика: сначала сравниваем с русской логикой, потом показываем немецкий механизм и только после этого тренируем форму.","visualSchemes":[{"title":"Русская мысль -> немецкая форма","steps":[{"label":"1","title":"Смысл","text":"Что я хочу сказать по-русски?"},{"label":"2","title":"Форма","text":"Какой немецкий механизм нужен?","de":"Verb, Artikel, Kasus"},{"label":"3","title":"Контроль","text":"Проверяю порядок, падеж и регистр."}],"bars":[{"label":"смысл","value":70},{"label":"форма","value":90},{"label":"перевод","value":45}]}]},{"id":"b1-19-passiv-praeteritum-perfekt","level":"B1","order":19,"module":"Грамматика","title":"Passiv в Präteritum и Perfekt","goal":"Узнавать Passiv в прошлом.","rule":"Präsens: wird geprüft. Präteritum: wurde geprüft. Perfekt: ist geprüft worden. На B1/B2 важно хотя бы понимать эти формы.","examples":[{"de":"Der Antrag wurde geprüft.","ru":"Заявление было проверено."},{"de":"Die Rechnung wurde bezahlt.","ru":"Счёт был оплачен."},{"de":"Das Formular ist ausgefüllt worden.","ru":"Формуляр был заполнен."},{"de":"Der Termin ist bestätigt worden.","ru":"Запись была подтверждена."}],"drills":[{"q":"Passiv Präteritum:","options":["wurde geprüft","hat geprüft","prüfte sich"],"answer":0,"explanation":"Правильно: «wurde geprüft». Passiv строится через werden + Partizip II и фокусирует действие, а не исполнителя.","topic":"passive"},{"q":"Die Rechnung ___ bezahlt.","options":["wurde","hat","ist bezahlen"],"answer":0,"explanation":"Правильно: «wurde». Passiv строится через werden + Partizip II и фокусирует действие, а не исполнителя.","topic":"passive"},{"q":"Perfekt Passiv содержит...","options":["worden","geworden всегда","werden без изменения"],"answer":0,"explanation":"Правильно: «worden». Passiv строится через werden + Partizip II и фокусирует действие, а не исполнителя.","topic":"passive"},{"q":"Passiv фокусируется на...","options":["действии","только исполнителе","эмоции"],"answer":0,"explanation":"Правильно: «действии». В Perfekt нужен помощник haben/sein и Partizip II в конце; движение с изменением места часто берет sein.","topic":"passive"}],"tags":["passive","past","v14.2"],"deepTheoryRu":"Русский прошедшее время часто проще: сделал/был/ходил. В немецком нужно выбрать конструкцию: Perfekt для разговорного прошлого, Präteritum часто для sein/haben/modal и письменного стиля, Plusquamperfekt для более раннего прошлого.","russianTrap":"Ловушка: всегда использовать haben. Движение с изменением места часто требует sein: Ich bin gegangen.","germanLogic":"Немецкое прошедшее выбирается не только по времени, но и по стилю.","formula":"Perfekt = haben/sein + Partizip II","typicalMistakes":["ich habe gegangen","ich bin gelernt","Partizip II не в конце"],"grammarTables":[{"title":"Прошедшие формы","headers":["Форма","Когда","Пример"],"rows":[["Perfekt","разговорное прошлое","Ich habe gelernt."],["Perfekt с sein","движение/изменение состояния","Ich bin gekommen."],["Präteritum","sein/haben/modal, письменный стиль","Ich war krank."],["Plusquamperfekt","раньше другого прошлого","Nachdem ich gekommen war..."]]}],"whyForRussian":"Этот блок добавлен специально для русскоговорящего ученика: сначала сравниваем с русской логикой, потом показываем немецкий механизм и только после этого тренируем форму.","visualSchemes":[{"title":"Русская мысль -> немецкая форма","steps":[{"label":"1","title":"Смысл","text":"Что я хочу сказать по-русски?"},{"label":"2","title":"Форма","text":"Какой немецкий механизм нужен?","de":"Verb, Artikel, Kasus"},{"label":"3","title":"Контроль","text":"Проверяю порядок, падеж и регистр."}],"bars":[{"label":"смысл","value":70},{"label":"форма","value":90},{"label":"перевод","value":45}]}]},{"id":"b2-27-muendlich-b2-bildbeschreibung","level":"B2","order":27,"module":"B2 закрепление","title":"Mündlich B2: Bildbeschreibung","goal":"Описывать изображение структурно.","rule":"Для устной части используйте схему: Was sieht man? Welche Situation? Welche Vermutung? Welche Bewertung? Не перечисляйте хаотично.","examples":[{"de":"Auf dem Bild sieht man eine Beratungssituation.","ru":"На картинке видно ситуацию консультации."},{"de":"Im Vordergrund befindet sich eine Patientin.","ru":"На переднем плане находится пациентка."},{"de":"Es könnte sich um ein Aufklärungsgespräch handeln.","ru":"Возможно, это информирующая консультация."},{"de":"Auffällig ist die ruhige Atmosphäre.","ru":"Заметна спокойная атмосфера."}],"drills":[{"q":"Что главное в этой теме?","options":["структура и точность","случайный порядок","максимум редких слов"],"answer":0,"explanation":"Правильно: «структура и точность». В официальном немецком важны нейтральный тон, точная просьба и стандартные формулы, а не дословная русская канцелярская фраза.","topic":"speaking"},{"q":"Какой стиль безопаснее?","options":["нейтральный и точный","рекламный","разговорный с жаргоном"],"answer":0,"explanation":"Правильно: «нейтральный и точный». В официальном немецком важны нейтральный тон, точная просьба и стандартные формулы, а не дословная русская канцелярская фраза.","topic":"style"},{"q":"Что нужно проверить?","options":["глагол, падеж, связки","только длину текста","только перевод"],"answer":0,"explanation":"Правильно: «глагол, падеж, связки». В официальном немецком важны нейтральный тон, точная просьба и стандартные формулы, а не дословная русская канцелярская фраза.","topic":"selfcheck"},{"q":"Какая связка подходит для аргументации?","options":["darüber hinaus","mega","naja"],"answer":0,"explanation":"Правильно: «darüber hinaus». В официальном немецком важны нейтральный тон, точная просьба и стандартные формулы, а не дословная русская канцелярская фраза.","topic":"connectors"}],"tags":["b2","speaking","style","v14.2"],"deepTheoryRu":"Konjunktiv — это не просто «сослагательное наклонение». Для B1/B2 важны две функции: Konjunktiv II для вежливости/условности и Konjunktiv I для косвенной речи.","russianTrap":"Ловушка: переводить würde как отдельное слово «бы» и забывать инфинитив в конце.","germanLogic":"Konjunktiv меняет дистанцию: делает высказывание вежливым, гипотетическим или переданным со слов другого человека.","formula":"KII: würde + Infinitiv / hätte / wäre / könnte. KI: er habe, sie sei.","typicalMistakes":["ich würde gemacht","er hat gesagt, er hat... вместо er habe","Können Sie sofort! вместо Könnten Sie..."],"grammarTables":[{"title":"Konjunktiv II","headers":["Функция","Форма","Пример"],"rows":[["вежливость","könnte","Könnten Sie mir helfen?"],["условие","wäre/hätte","Wenn ich Zeit hätte..."],["предложение","würde + Infinitiv","Ich würde mehr üben."]]},{"title":"Konjunktiv I","headers":["Обычная форма","Косвенная речь","Пример"],"rows":[["er hat","er habe","Er sagte, er habe keine Zeit."],["sie ist","sie sei","Sie erklärte, die Maßnahme sei notwendig."],["sie müssen","sie müssten","если KI совпадает, часто KII"]]}],"whyForRussian":"Этот блок добавлен специально для русскоговорящего ученика: сначала сравниваем с русской логикой, потом показываем немецкий механизм и только после этого тренируем форму.","visualSchemes":[{"title":"Схема официального текста","steps":[{"label":"1","title":"Цель","text":"Сразу назвать Anliegen.","de":"Hiermit möchte ich..."},{"label":"2","title":"Факт","text":"Коротко и проверяемо.","de":"Der Termin wurde nicht eingehalten."},{"label":"3","title":"Просьба","text":"Вежливо и конкретно.","de":"Ich bitte um Rückmeldung."},{"label":"4","title":"Формула","text":"Закрыть стандартно.","de":"Mit freundlichen Grüßen"}],"bars":[{"label":"структура","value":90},{"label":"регистр","value":95},{"label":"эмоции","value":25}]}]},{"id":"b2-28-schreiben-b2-beschwerde-mit-forderung","level":"B2","order":28,"module":"B2 закрепление","title":"Schreiben B2: Beschwerde mit Forderung","goal":"Писать жалобу с конкретным требованием.","rule":"B2-жалоба должна содержать факты, последствия, требование и срок. Формулируйте строго, но нейтрально.","examples":[{"de":"Hiermit reklamiere ich die fehlerhafte Leistung.","ru":"Настоящим заявляю рекламацию на ошибочную услугу."},{"de":"Dadurch sind mir zusätzliche Kosten entstanden.","ru":"Из-за этого у меня возникли дополнительные расходы."},{"de":"Ich bitte um Erstattung des Betrags.","ru":"Прошу возместить сумму."},{"de":"Bitte teilen Sie mir bis zum 15. August mit, wie Sie weiter vorgehen.","ru":"Прошу сообщить до 15 августа, как Вы будете действовать дальше."}],"drills":[{"q":"Что главное в этой теме?","options":["структура и точность","случайный порядок","максимум редких слов"],"answer":0,"explanation":"Правильно: «структура и точность». В официальном немецком важны нейтральный тон, точная просьба и стандартные формулы, а не дословная русская канцелярская фраза.","topic":"letter"},{"q":"Какой стиль безопаснее?","options":["нейтральный и точный","рекламный","разговорный с жаргоном"],"answer":0,"explanation":"Правильно: «нейтральный и точный». В официальном немецком важны нейтральный тон, точная просьба и стандартные формулы, а не дословная русская канцелярская фраза.","topic":"style"},{"q":"Что нужно проверить?","options":["глагол, падеж, связки","только длину текста","только перевод"],"answer":0,"explanation":"Правильно: «глагол, падеж, связки». В официальном немецком важны нейтральный тон, точная просьба и стандартные формулы, а не дословная русская канцелярская фраза.","topic":"selfcheck"},{"q":"Какая связка подходит для аргументации?","options":["darüber hinaus","mega","naja"],"answer":0,"explanation":"Правильно: «darüber hinaus». В официальном немецком важны нейтральный тон, точная просьба и стандартные формулы, а не дословная русская канцелярская фраза.","topic":"connectors"}],"tags":["b2","letter","style","v14.2"],"deepTheoryRu":"Для русскоговорящего письмо на немецком сложно не только грамматикой, но и регистром. Немецкое официальное письмо требует ясной структу "случайный порядок","максимум редких слов"],"answer":0,"explanation":"Правильно: «структура и точность». Связка занимает поле предложения и влияет на порядок слов: deshalb/trotzdem требуют глагол сразу после себя.","topic":"connectors"},{"q":"Какой стиль безопаснее?","options":["нейтральный и точный","рекламный","разговорный с жаргоном"],"answer":0,"explanation":"Правильно: «нейтральный и точный». Связка занимает поле предложения и влияет на порядок слов: deshalb/trotzdem требуют глагол сразу после себя.","topic":"style"},{"q":"Что нужно проверить?","options":["глагол, падеж, связки","только длину текста","только перевод"],"answer":0,"explanation":"Правильно: «глагол, падеж, связки». Связка занимает поле предложения и влияет на порядок слов: deshalb/trotzdem требуют глагол сразу после себя.","topic":"selfcheck"},{"q":"Какая связка подходит для аргументации?","options":["darüber hinaus","mega","naja"],"answer":0,"explanation":"Правильно: «darüber hinaus». Связка занимает поле предложения и влияет на порядок слов: deshalb/trotzdem требуют глагол сразу после себя.","topic":"connectors"}],"tags":["b2","connectors","style","v14.2"],"deepTheoryRu":"Связки в немецком опасны тем, что меняют порядок слов. Русскоговорящий часто переводит связку и сохраняет русский порядок. В немецком важно знать: связка занимает позицию или нет.","russianTrap":"Ловушка: Deshalb ich lerne Deutsch. После deshalb сразу глагол: Deshalb lerne ich Deutsch.","germanLogic":"Связки делятся на 0-позицию, 1-позицию и подчинительные союзы.","formula":"deshalb/trotzdem/dennoch + Verb + Subjekt; weil/dass/obwohl + ... + Verb","typicalMistakes":["Deshalb ich lerne","Obwohl es ist schwierig","Denn требует глагол в конец"],"grammarTables":[{"title":"Связки и позиция","headers":["Тип","Связки","Порядок"],"rows":[["0-позиция","und, aber, denn, sondern, oder","после них обычный порядок"],["1-позиция","deshalb, trotzdem, dennoch, folglich","сразу V2"],["подчинительные","weil, dass, obwohl, während, sofern","глагол в конце"]]}],"whyForRussian":"Этот блок добавлен специально для русскоговорящего ученика: сначала сравниваем с русской логикой, потом показываем немецкий механизм и только после этого тренируем форму.","visualSchemes":[{"title":"Русская мысль -> немецкая форма","steps":[{"label":"1","title":"Смысл","text":"Что я хочу сказать по-русски?"},{"label":"2","title":"Форма","text":"Какой немецкий механизм нужен?","de":"Verb, Artikel, Kasus"},{"label":"3","title":"Контроль","text":"Проверяю порядок, падеж и регистр."}],"bars":[{"label":"смысл","value":70},{"label":"форма","value":90},{"label":"перевод","value":45}]}]},{"id":"b2-34-fehlerkorrektur-b2-checkliste-vor-abgabe","level":"B2","order":34,"module":"B2 закрепление","title":"Fehlerkorrektur B2: Checkliste vor Abgabe","goal":"Проверять текст перед отправкой.","rule":"Перед сдачей проверьте: Verbposition, Nebensatzende, Kasus nach Präposition, Artikel, Register, Wiederholungen, логика абзацев.","examples":[{"de":"Ich überprüfe zuerst die Verbposition.","ru":"Сначала я проверяю позицию глагола."},{"de":"Danach kontrolliere ich die Präpositionen.","ru":"После этого я проверяю предлоги."},{"de":"Zum Schluss achte ich auf den Stil.","ru":"В конце я обращаю внимание на стиль."},{"de":"Der Text sollte sachlich und klar bleiben.","ru":"Текст должен оставаться деловым и ясным."}],"drills":[{"q":"Что главное в этой теме?","options":["структура и точность","случайный порядок","максимум редких слов"],"answer":0,"explanation":"Правильно: «структура и точность». Для русскоговорящего ключевой контроль - место спрягаемого глагола. В главном предложении он стоит на позиции 2.","topic":"selfcheck"},{"q":"Какой стиль безопаснее?","options":["нейтральный и точный","рекламный","разговорный с жаргоном"],"answer":0,"explanation":"Правильно: «нейтральный и точный». Для русскоговорящего ключевой контроль - место спрягаемого глагола. В главном предложении он стоит на позиции 2.","topic":"style"},{"q":"Что нужно проверить?","options":["глагол, падеж, связки","только длину текста","только перевод"],"answer":0,"explanation":"Правильно: «глагол, падеж, связки». Для русскоговорящего ключевой контроль - место спрягаемого глагола. В главном предложении он стоит на позиции 2.","topic":"selfcheck"},{"q":"Какая связка подходит для аргументации?","options":["darüber hinaus","mega","naja"],"answer":0,"explanation":"Правильно: «darüber hinaus». Для русскоговорящего ключевой контроль - место спрягаемого глагола. В главном предложении он стоит на позиции 2.","topic":"connectors"}],"tags":["b2","selfcheck","style","v14.2"],"deepTheoryRu":"Русский порядок слов свободнее: «Сегодня я учу немецкий» и «Я сегодня учу немецкий» звучат нормально. В немецком спрягаемый глагол — якорь предложения. В обычном утверждении он стоит на позиции 2, даже если первым стоит время, место или причина.","russianTrap":"Ловушка: переносить русский порядок напрямую: Heute ich lerne Deutsch. Немцу это ломает грамматику, потому что после Heute должен идти глагол.","germanLogic":"Немецкая логика: первое поле можно менять для акцента, но второе место закреплено за спрягаемым глаголом.","formula":"Поле 1 + Verb 2 + субъект + остальное: Heute lerne ich Deutsch.","typicalMistakes":["Heute ich lerne Deutsch","Weil ich habe Zeit","ставить два элемента перед глаголом"],"grammarTables":[{"title":"V2 в главном предложении","headers":["Тип","Правильно","Почему"],"rows":[["Обычно","Ich lerne Deutsch.","глагол lerne на позиции 2"],["Время первым","Heute lerne ich Deutsch.","Heute = поле 1, lerne = V2"],["Место первым","In Frankfurt wohne ich.","место в поле 1, глагол остаётся вторым"]]},{"title":"Где стоит глагол","headers":["Конструкция","Позиция глагола","Пример"],"rows":[["Главное предложение","2","Ich lerne Deutsch."],["Ja/Nein-вопрос","1","Haben Sie Zeit?"],["W-вопрос","2","Wo wohnen Sie?"],["Придаточное","в конце","..., weil ich Zeit habe."]]}],"whyForRussian":"Этот блок добавлен специально для русскоговорящего ученика: сначала сравниваем с русской логикой, потом показываем немецкий механизм и только после этого тренируем форму.","visualSchemes":[{"title":"Граф предложения V2","steps":[{"label":"1","title":"Поле 1","text":"Тема, время или место.","de":"Heute"},{"label":"2","title":"Verb 2","text":"Спрягаемый глагол закреплён.","de":"lerne"},{"label":"3","title":"Субъект","text":"Если первым было не ich, субъект идёт после глагола.","de":"ich"},{"label":"4","title":"Рамка","text":"Остальное закрывает смысл.","de":"Deutsch."}],"bars":[{"label":"V2","value":95},{"label":"рамка","value":75},{"label":"акцент","value":55}]}]},{"id":"a0-15-russian-bridge","level":"A0","module":"Русскоговорящий мост","title":"Русская мысль -> немецкая фраза","goal":"Научиться не переводить первые фразы дословно.","rule":"В немецком часто выбирается не тот же глагол, что в русском. «Меня зовут» = ich heiße, «мне 30 лет» = ich bin 30 Jahre alt, «у меня есть» = ich habe.","examples":[{"de":"Ich heiße Anna.","ru":"Меня зовут Анна."},{"de":"Ich bin dreißig Jahre alt.","ru":"Мне тридцать лет."},{"de":"Ich komme aus Russland.","ru":"Я из России."},{"de":"Ich habe eine Frage.","ru":"У меня есть вопрос."},{"de":"Ich brauche Hilfe.","ru":"Мне нужна помощь."}],"drills":[{"q":"Как сказать «Меня зовут Анна»?","options":["Ich bin Anna heißen.","Ich heiße Anna.","Mich nennt Anna."],"answer":1,"topic":"russian-transfer","explanation":"Правильно: «Ich heiße Anna.». Русское «меня зовут» не переводится дословно; немецкий использует готовый глагол heißen."},{"q":"Как сказать «Мне 30 лет»?","options":["Ich habe dreißig Jahre.","Ich bin dreißig Jahre alt.","Mir ist dreißig."],"answer":1,"topic":"russian-transfer","explanation":"Правильно: «Ich bin dreißig Jahre alt.». Возраст в немецком выражается через sein: ich bin ... Jahre alt."},{"q":"Как сказать «У меня есть вопрос»?","options":["Ich habe eine Frage.","Bei mir ist eine Frage.","Ich bin eine Frage."],"answer":0,"topic":"russian-transfer","explanation":"Правильно: «Ich habe eine Frage.». Русское «у меня есть» переводится через haben: ich habe."},{"q":"Как сказать «Мне нужна помощь»?","options":["Ich brauche Hilfe.","Mir muss Hilfe.","Ich habe helfen."],"answer":0,"topic":"russian-transfer","explanation":"Правильно: «Ich brauche Hilfe.». brauchen требует прямой объект; Hilfe часто употребляется без артикля."}],"deepTheoryRu":"Русскоговорящий новичок часто ищет немецкое слово под каждое русское слово. На A0 это мешает: немецкий берет готовую конструкцию целиком. Поэтому фразу нужно учить как шаблон, а не как набор отдельных переводов.","russianTrap":"Ловушка: «мне 30 лет» перевести через haben, потому что по-русски есть скрытая идея «у меня 30 лет». В немецком возраст выражается через sein: Ich bin ... Jahre alt.","germanLogic":"Немецкий выбирает устойчивый глагол конструкции: heißen для имени, sein для возраста, kommen aus для происхождения, haben для наличия.","formula":"русская мысль -> немецкий шаблон: меня зовут -> ich heiße; мне ... лет -> ich bin ... Jahre alt","typicalMistakes":["Ich habe dreißig Jahre","Ich bin heißen Anna","Ich brauche eine Hilfe вместо Ich brauche Hilfe"],"grammarTables":[{"title":"Русская мысль и немецкий шаблон","headers":["Русский смысл","Немецкая форма","Почему"],"rows":[["меня зовут","ich heiße","глагол heißen"],["мне ... лет","ich bin ... Jahre alt","возраст через sein"],["я из России","ich komme aus Russland","происхождение через kommen aus"],["у меня есть","ich habe","наличие через haben"]]}],"contrastExamples":[{"ru":"Мне тридцать лет.","literal":"Не так: Ich habe dreißig Jahre.","de":"Ich bin dreißig Jahre alt.","note":"Возраст в немецком - через sein."},{"ru":"Меня зовут Анна.","literal":"Не так: Ich bin heißen Anna.","de":"Ich heiße Anna.","note":"heißen уже содержит смысл «зваться»."}],"order":15,"tags":["russian-transfer","russian-speakers"],"whyForRussian":"Этот урок добавлен специально для русскоговорящего ученика: сначала фиксируем русскую мысль, затем выбираем естественную немецкую конструкцию.","visualSchemes":[{"title":"Схема чтения","steps":[{"label":"1","title":"Вижу сочетание","text":"Не читаю по-английски.","de":"ei, ie, sch, sp, st"},{"label":"2","title":"Выбираю звук","text":"Сначала звук, потом слово.","de":"mein, Liebe, sprechen"},{"label":"3","title":"Собираю фразу","text":"Читаю вслух короткими блоками.","de":"Ich spreche Deutsch."}],"bars":[{"label":"звук","value":90},{"label":"ударение","value":60},{"label":"фраза","value":70}]}]},{"id":"a1-18-russian-cases","level":"A1","module":"Русскоговорящий мост","title":"Падежи без русской кальки","goal":"Выбирать Akkusativ и Dativ по немецкой роли слова.","rule":"Русский вопрос помогает не всегда. В немецком падеж часто задают глагол и предлог: sehen + Akkusativ, helfen + Dativ, mit + Dativ, warten auf + Akkusativ.","examples":[{"de":"Ich sehe den Arzt.","ru":"Я вижу врача."},{"de":"Ich spreche mit dem Arzt.","ru":"Я говорю с врачом."},{"de":"Ich helfe der Kollegin.","ru":"Я помогаю коллеге."},{"de":"Ich habe einen Termin.","ru":"У меня есть запись/приём."},{"de":"Ich gehe zur Apotheke.","ru":"Я иду в аптеку."}],"drills":[{"q":"sehen + der Arzt ->","options":["Ich sehe der Arzt.","Ich sehe den Arzt.","Ich sehe dem Arzt."],"answer":1,"topic":"cases","explanation":"Правильно: «Ich sehe den Arzt.». sehen требует Akkusativ; der Arzt становится den Arzt."},{"q":"mit + der Arzt ->","options":["mit den Arzt","mit dem Arzt","mit der Arzt"],"answer":1,"topic":"cases","explanation":"Правильно: «mit dem Arzt». Предлог mit всегда требует Dativ."},{"q":"helfen + die Kollegin ->","options":["Ich helfe die Kollegin.","Ich helfe der Kollegin.","Ich helfe den Kollegin."],"answer":1,"topic":"cases","explanation":"Правильно: «Ich helfe der Kollegin.». helfen требует Dativ, поэтому die Kollegin становится der Kollegin."},{"q":"warten auf + der Bus ->","options":["Ich warte auf den Bus.","Ich warte auf dem Bus.","Ich warte den Bus."],"answer":0,"topic":"prepositions","explanation":"Правильно: «Ich warte auf den Bus.». warten требует auf + Akkusativ."}],"deepTheoryRu":"Русские падежные вопросы похожи на немецкие только частично. Немецкий падеж нельзя выбирать только по переводу: его задаёт управление глагола или предлог.","russianTrap":"Ловушка: «помогаю коллегу» по смыслу кажется объектом, но helfen требует Dativ: ich helfe der Kollegin.","germanLogic":"Глагол и предлог управляют формой артикля. Сначала ищем управление, потом выбираем падеж.","formula":"глагол/предлог -> падеж -> артикль: mit -> Dativ -> dem Arzt","typicalMistakes":["Ich helfe die Kollegin","mit den Arzt","Ich warte den Bus"],"grammarTables":[{"title":"Управление для A1","headers":["Конструкция","Падеж","Пример"],"rows":[["sehen","Akkusativ","Ich sehe den Arzt."],["helfen","Dativ","Ich helfe der Kollegin."],["mit","Dativ","mit dem Arzt"],["warten auf","Akkusativ","auf den Bus warten"]]}],"contrastExamples":[{"ru":"Я помогаю коллеге.","literal":"Не так: Ich helfe die Kollegin.","de":"Ich helfe der Kollegin.","note":"helfen требует Dativ."},{"ru":"Я жду автобус.","literal":"Не так: Ich warte den Bus.","de":"Ich warte auf den Bus.","note":"warten требует auf + Akkusativ."}],"order":18,"tags":["russian-transfer","russian-speakers"],"whyForRussian":"Этот урок добавлен специально для русскоговорящего ученика: сначала фиксируем русскую мысль, затем выбираем естественную немецкую конструкцию.","visualSchemes":[{"title":"Русская мысль -> немецкая форма","steps":[{"label":"1","title":"Смысл","text":"Что я хочу сказать по-русски?"},{"label":"2","title":"Форма","text":"Какой немецкий механизм нужен?","de":"Verb, Artikel, Kasus"},{"label":"3","title":"Контроль","text":"Проверяю порядок, падеж и регистр."}],"bars":[{"label":"смысл","value":70},{"label":"форма","value":90},{"label":"перевод","value":45}]}]},{"id":"a2-18-russian-nebensatz","level":"A2","module":"Русскоговорящий мост","title":"Придаточные после русских «потому что/что/если»","goal":"Ставить глагол в конец после weil, dass, wenn и ob.","rule":"В русском после «потому что» порядок часто остаётся обычным. В немецком после weil/dass/wenn/ob спрягаемый глагол уходит в конец придаточной части.","examples":[{"de":"Ich bleibe zu Hause, weil ich krank bin.","ru":"Я остаюсь дома, потому что я болею."},{"de":"Ich glaube, dass der Termin wichtig ist.","ru":"Я думаю, что приём важен."},{"de":"Wenn ich Zeit habe, rufe ich Sie an.","ru":"Если у меня будет время, я Вам позвоню."},{"de":"Ich lerne Deutsch, um in Deutschland zu arbeiten.","ru":"Я учу немецкий, чтобы работать в Германии."},{"de":"Können Sie mir sagen, wann der Termin ist?","ru":"Не могли бы Вы сказать, когда приём?"}],"drills":[{"q":"Выберите правильный порядок после weil:","options":["weil ich bin krank","weil ich krank bin","weil bin ich krank"],"answer":1,"topic":"clauses","explanation":"Правильно: «weil ich krank bin». В придаточном и косвенном вопросе спрягаемый глагол уходит в конец."},{"q":"Выберите правильный порядок после dass:","options":["dass der Termin wichtig ist","dass ist der Termin wichtig","dass der Termin ist wichtig"],"answer":0,"topic":"clauses","explanation":"Правильно: «dass der Termin wichtig ist». В придаточном и косвенном вопросе спрягаемый глагол уходит в конец."},{"q":"Косвенный вопрос:","options":["wann ist der Termin","wann der Termin ist","wann ist der Termin ist"],"answer":1,"topic":"indirect-questions","explanation":"Правильно: «wann der Termin ist». В придаточном и косвенном вопросе спрягаемый глагол уходит в конец."},{"q":"Цель через um ... zu:","options":["um Deutsch zu üben","um Deutsch übe","zu um Deutsch üben"],"answer":0,"topic":"um-zu","explanation":"Правильно: «um Deutsch zu üben». um ... zu выражает цель и требует Infinitiv с zu."}],"deepTheoryRu":"Русскоговорящий ученик часто сохраняет обычный порядок слов после союза. Для немецкого это одна из самых заметных ошибок A2: союз открывает придаточное, а глагол закрывает его.","russianTrap":"Ловушка: weil ich habe Zeit. По-русски «потому что у меня есть время» не меняет порядок, но немецкий требует weil ich Zeit habe.","germanLogic":"Придаточное предложение работает как закрытая рамка: союз в начале, спрягаемый глагол в конце.","formula":"weil/dass/wenn/ob + подлежащее + ... + Verb am Ende","typicalMistakes":["weil ich habe Zeit","dass der Termin ist wichtig","Können Sie sagen, wann ist der Termin?"],"grammarTables":[{"title":"Русский союз и немецкий порядок","headers":["Русский смысл","Союз","Немецкий пример"],"rows":[["потому что","weil","..., weil ich krank bin."],["что","dass","Ich glaube, dass es wichtig ist."],["если/когда","wenn","Wenn ich Zeit habe, ..."],["ли","ob","Ich weiß nicht, ob er kommt."]]}],"contrastExamples":[{"ru":"Потому что у меня есть время.","literal":"Не так: weil ich habe Zeit.","de":"weil ich Zeit habe","note":"haben уходит в конец придаточного."},{"ru":"Когда приём?","literal":"Не так: Können Sie sagen, wann ist der Termin?","de":"Können Sie mir sagen, wann der Termin ist?","note":"В косвенном вопросе глагол в конце."}],"order":18,"tags":["russian-transfer","russian-speakers"],"whyForRussian":"Этот урок добавлен специально для русскоговорящего ученика: сначала фиксируем русскую мысль, затем выбираем естественную немецкую конструкцию.","visualSchemes":[{"title":"Граф предложения V2","steps":[{"label":"1","title":"Поле 1","text":"Тема, время или место.","de":"Heute"},{"label":"2","title":"Verb 2","text":"Спрягаемый глагол закреплён.","de":"lerne"},{"label":"3","title":"Субъект","text":"Если первым было не ich, субъект идёт после глагола.","de":"ich"},{"label":"4","title":"Рамка","text":"Остальное закрывает смысл.","de":"Deutsch."}],"bars":[{"label":"V2","value":95},{"label":"рамка","value":75},{"label":"акцент","value":55}]}]},{"id":"b1-20-russian-formal-writing","level":"B1","module":"Русскоговорящий мост","title":"Официальное письмо без русской кальки","goal":"Писать просьбы и жалобы нейтрально, коротко и по-немецки.","rule":"Немецкое официальное письмо строится вокруг цели, фактов, просьбы и вежливого закрытия. Русскую эмоциональность и тяжёлую канцелярию лучше заменить ясной формулой.","examples":[{"de":"Hiermit möchte ich einen Termin verschieben.","ru":"Настоящим я хотел(а) бы перенести приём."},{"de":"Ich bitte um eine kurze Rückmeldung.","ru":"Прошу дать короткий ответ."},{"de":"Könnten Sie mir die Unterlagen per E-Mail zusenden?","ru":"Не могли бы Вы отправить мне документы по электронной почте?"},{"de":"Leider wurde der Termin nicht eingehalten.","ru":"К сожалению, срок/приём не был соблюдён."},{"de":"Vielen Dank im Voraus.","ru":"Заранее благодарю."}],"drills":[{"q":"Нейтральная просьба об ответе:","options":["Ich bitte um eine kurze Rückmeldung.","Geben Sie mir sofort Antwort.","Ich will Antwort."],"answer":0,"topic":"formal-writing","explanation":"Правильно: «Ich bitte um eine kurze Rückmeldung.». Это нейтральная официальная просьба, без давления и разговорности."},{"q":"Вежливая просьба отправить документы:","options":["Schicken Unterlagen.","Könnten Sie mir die Unterlagen zusenden?","Sie müssen Unterlagen senden."],"answer":1,"topic":"formal-writing","explanation":"Правильно: «Könnten Sie mir die Unterlagen zusenden?». Konjunktiv II в Könnten Sie делает просьбу вежливой."},{"q":"Формальное начало заявления:","options":["Hiermit möchte ich...","Also ich will...","Na gut, ich brauche..."],"answer":0,"topic":"formal-writing","explanation":"Правильно: «Hiermit möchte ich...». Hiermit — стандартное формальное начало заявления или письма."},{"q":"Заключительная формула:","options":["Vielen Dank im Voraus.","Danke, пока.","Ich warte!"],"answer":0,"topic":"formal-writing","explanation":"Правильно: «Vielen Dank im Voraus.». Это стандартная формула вежливого закрытия письма."}],"deepTheoryRu":"В русском деловом письме часто появляются длинные обороты и эмоциональные оценки. В немецком B1 лучше писать проще: факт, причина, просьба, срок, вежливая формула.","russianTrap":"Ловушка: усиливать просьбу давлением. Немецкое письмо должно звучать уверенно, но не агрессивно.","germanLogic":"Формальный стиль держится на стандартных блоках: Bezug, Anliegen, Bitte, Dank, Schlussformel.","formula":"Anrede -> Anliegen -> Grund/Fakt -> Bitte -> Dank -> Gruß","typicalMistakes":["слишком эмоциональная жалоба","прямой приказ вместо Könnten Sie...","нет конкретной просьбы"],"grammarTables":[{"title":"Письмо B1","headers":["Задача","Немецкая формула","Тон"],"rows":[["начать цель","Hiermit möchte ich...","нейтрально"],["попросить","Ich bitte um...","официально"],["смягчить","Könnten Sie bitte...?","вежливо"],["закрыть","Vielen Dank im Voraus.","стандартно"]]}],"contrastExamples":[{"ru":"Ответьте мне как можно скорее.","literal":"Не так: Antworten Sie mir sofort.","de":"Ich bitte um eine kurze Rückmeldung.","note":"Просьба звучит официально и без давления."},{"ru":"Пришлите документы.","literal":"Не так: Schicken Sie Dokumente.","de":"Könnten Sie mir die Unterlagen per E-Mail zusenden?","note":"Könnten Sie смягчает просьбу."}],"order":20,"tags":["russian-transfer","russian-speakers"],"whyForRussian":"Этот урок добавлен специально для русскоговорящего ученика: сначала фиксируем русскую мысль, затем выбираем естественную немецкую конструкцию.","visualSchemes":[{"title":"Схема официального текста","steps":[{"label":"1","title":"Цель","text":"Сразу назвать Anliegen.","de":"Hiermit möchte ich..."},{"label":"2","title":"Факт","text":"Коротко и проверяемо.","de":"Der Termin wurde nicht eingehalten."},{"label":"3","title":"Просьба","text":"Вежливо и конкретно.","de":"Ich bitte um Rückmeldung."},{"label":"4","title":"Формула","text":"Закрыть стандартно.","de":"Mit freundlichen Grüßen"}],"bars":[{"label":"структура","value":90},{"label":"регистр","value":95},{"label":"эмоции","value":25}]}]},{"id":"b2-35-russian-precision","level":"B2","module":"Русскоговорящий мост","title":"B2: точность вместо русского длинного предложения","goal":"Делать немецкий B2-текст ясным, точным и официальным.","rule":"Русское сложное предложение часто лучше разбить или перевести немецкой структурой: Nominalstil, Passiv, zu-Infinitiv, безличное es ist zu prüfen.","examples":[{"de":"Aus meiner Sicht ist diese Maßnahme nachvollziehbar.","ru":"С моей точки зрения эта мера понятна/обоснована."},{"de":"Unter Berücksichtigung der Kosten ist die Entscheidung schwierig.","ru":"С учётом расходов решение сложное."},{"de":"Nach Prüfung der Unterlagen erhalten Sie eine Rückmeldung.","ru":"После проверки документов Вы получите ответ."},{"de":"Es ist zu prüfen, ob weitere Maßnahmen erforderlich sind.","ru":"Необходимо проверить, требуются ли дополнительные меры."},{"de":"Die Risiken sollten sachlich erläutert werden.","ru":"Риски следует объяснить нейтрально."}],"drills":[{"q":"Официальнее: nachdem man die Unterlagen geprüft hat ->","options":["Nach Prüfung der Unterlagen","Nach man prüft Unterlagen","Nachdem Prüfung Unterlagen"],"answer":0,"topic":"nominalstil","explanation":"Правильно: «Nach Prüfung der Unterlagen». Nominalstil делает B2-текст компактнее и официальнее."},{"q":"Безличная проверочная формула:","options":["Es ist zu prüfen, ob...","Man muss schauen, ob...","Es prüft, ob..."],"answer":0,"topic":"formal-style","explanation":"Правильно: «Es ist zu prüfen, ob...». sein + zu + Infinitiv — нейтральная B2-формула необходимости/проверки."},{"q":"Нейтральная B2-оценка:","options":["Das ist total gut.","Diese Maßnahme ist nachvollziehbar.","Das passt irgendwie."],"answer":1,"topic":"register","explanation":"Правильно: «Diese Maßnahme ist nachvollziehbar.». B2-регистр избегает эмоциональной категоричности и формулирует оценку точнее."},{"q":"Пассив для фокуса на рисках:","options":["Die Risiken sollten erläutert werden.","Die Risiken sollten erläutern.","Man die Risiken erläutert."],"answer":0,"topic":"passive","explanation":"Правильно: «Die Risiken sollten erläutert werden.». Passiv нужен, когда важнее действие или процесс, а не исполнитель."}],"deepTheoryRu":"На B2 русскоговорящий часто пишет длинно: много придаточных, вводных слов и эмоциональных оценок. Немецкий B2 ценит ясную структуру, точные связки и компактные официальные формы.","russianTrap":"Ловушка: переносить русскую длину предложения и получать тяжёлый немецкий текст с потерей глагола и падежа.","germanLogic":"B2-текст держится на управляемых конструкциях: Nominalstil, Passiv, zu-Infinitiv, klare Konnektoren.","formula":"русская длинная мысль -> немецкий блок: Nach Prüfung ... / Es ist zu prüfen ... / Die Risiken werden ...","typicalMistakes":["слишком длинное предложение","разговорные слова в официальном тексте","нет точной связки между причиной и выводом"],"grammarTables":[{"title":"B2-компрессия","headers":["Русская логика","Немецкая форма","Эффект"],"rows":[["после того как проверят","nach Prüfung der Unterlagen","кратко и официально"],["нужно проверить","es ist zu prüfen","нейтрально"],["с учётом расходов","unter Berücksichtigung der Kosten","точный Genitiv"],["следует объяснить риски","die Risiken sollten erläutert werden","Passiv"]]}],"contrastExamples":[{"ru":"После того как документы проверят, Вам ответят.","literal":"Не так: Nachdem man die Unterlagen prüft, bekommen Sie Antwort.","de":"Nach Prüfung der Unterlagen erhalten Sie eine Rückmeldung.","note":"Nominalstil звучит компактнее и официальнее."},{"ru":"Нужно проверить, нужны ли ещё меры.","literal":"Не так: Man muss schauen, ob noch Maßnahmen brauchen.","de":"Es ist zu prüfen, ob weitere Maßnahmen erforderlich sind.","note":"Безличная формула звучит нейтрально."}],"order":35,"tags":["russian-transfer","russian-speakers"],"whyForRussian":"Этот урок добавлен специально для русскоговорящего ученика: сначала фиксируем русскую мысль, затем выбираем естественную немецкую конструкцию.","visualSchemes":[{"title":"Русская мысль -> немецкая форма","steps":[{"label":"1","title":"Смысл","text":"Что я хочу сказать по-русски?"},{"label":"2","title":"Форма","text":"Какой немецкий механизм нужен?","de":"Verb, Artikel, Kasus"},{"label":"3","title":"Контроль","text":"Проверяю порядок, падеж и регистр."}],"bars":[{"label":"смысл","value":70},{"label":"форма","value":90},{"label":"перевод","value":45}]}]},{"id":"b2-36-argumentationsarchitektur","level":"B2","module":"B2 Qualität","title":"Argumentationsarchitektur: These, Einwand, Fazit","goal":"Строить B2-аргумент не как поток мыслей, а как проверяемую структуру.","rule":"B2-аргументация требует не только мнения, но и ограничения: позиция -> причина -> пример -> Einwand -> Abwägung -> Fazit.","examples":[{"de":"Aus meiner Sicht ist die Maßnahme sinnvoll, weil sie langfristig Kosten senkt.","ru":"С моей точки зрения мера разумна, потому что она долгосрочно снижает расходы."},{"de":"Ein Gegenargument besteht darin, dass die Umsetzung zunächst teuer ist.","ru":"Контраргумент состоит в том, что реализация сначала дорогая."},{"de":"Trotzdem überwiegen die Vorteile, sofern die Maßnahme sorgfältig geplant wird.","ru":"Тем не менее преимущества преобладают, если мера тщательно планируется."},{"de":"Daraus lässt sich schließen, dass eine differenzierte Lösung erforderlich ist.","ru":"Из этого можно сделать вывод, что необходимо дифференцированное решение."},{"de":"Diese Position lässt sich mit praktischen Beispielen begründen.","ru":"Эту позицию можно обосновать практическими примерами."},{"de":"Man sollte jedoch berücksichtigen, dass nicht alle Betroffenen gleichermaßen profitieren.","ru":"Однако следует учитывать, что не все затронутые лица получают одинаковую пользу."}],"drills":[{"q":"Что делает аргумент B2-качественным?","options":["только мнение","мнение + причина + ограничение","много длинных слов"],"answer":1,"topic":"argumentation","explanation":"Правильно: «мнение + причина + ограничение». Здесь проверяется точная немецкая форма, а не дословный русский перевод."},{"q":"Как ввести контраргумент?","options":["Ein Gegenargument besteht darin, dass ...","Ich bin total dagegen.","Das ist schlecht."],"answer":0,"topic":"argumentation","explanation":"Правильно: «Ein Gegenargument besteht darin, dass ...». В придаточном и косвенном вопросе спрягаемый глагол уходит в конец."},{"q":"B2-вывод:","options":["Daraus lässt sich schließen, dass ...","Also fertig.","Das war alles."],"answer":0,"topic":"argumentation","explanation":"Правильно: «Daraus lässt sich schließen, dass ...». В придаточном и косвенном вопросе спрягаемый глагол уходит в конец."},{"q":"Что значит abwägen?","options":["взвешивать аргументы","забывать аргументы","переводить дословно"],"answer":0,"topic":"argumentation","explanation":"Правильно: «взвешивать аргументы». abwägen значит сопоставлять плюсы, минусы и ограничения."}],"deepTheoryRu":"Русскоговорящий ученик часто пишет эссе как длинный поток: «я считаю, потому что..., ещё..., также...». На B2 это выглядит слабее, чем текст, где есть архитектура: тезис, причина, пример, контраргумент, взвешивание и вывод.","russianTrap":"Ловушка: усиливать позицию эмоцией вместо логики. B2 требует показать не только «за», но и границы своей позиции.","germanLogic":"Немецкий B2-текст ценит nachvollziehbar: читатель должен видеть, как из аргумента получается вывод.","formula":"These -> Begründung -> Beispiel -> Einwand -> Abwägung -> Fazit","typicalMistakes":["нет Einwand","связки не показывают логику","вывод повторяет начало без развития"],"grammarTables":[{"title":"Архитектура аргумента","headers":["Блок","Формула","Функция"],"rows":[["These","Aus meiner Sicht...","позиция"],["Begründung","Der Grund dafür ist...","причина"],["Einwand","Ein Gegenargument besteht darin, dass...","ограничение"],["Abwägung","Trotzdem überwiegt...","взвешивание"],["Fazit","Daraus lässt sich schließen, dass...","вывод"]]}],"contrastExamples":[{"ru":"Я считаю, что это хорошо, потому что это полезно.","literal":"Слабо: Ich finde das gut, weil es gut ist.","de":"Aus meiner Sicht ist die Maßnahme sinnvoll, weil sie langfristig konkrete Vorteile bringt.","note":"B2 требует точной причины."},{"ru":"Но есть и минусы.","literal":"Слабо: Aber es gibt Minus.","de":"Ein Gegenargument besteht darin, dass die Umsetzung zusätzliche Ressourcen erfordert.","note":"Контраргумент формулируется предметно."}],"order":36,"tags":["b2-quality","russian-speakers","writing","argumentation"],"whyForRussian":"B2-блок усилен специально для русскоговорящего ученика: сначала убираем русскую кальку, затем выбираем точную немецкую конструкцию и редактируем регистр.","visualSchemes":[{"title":"B2-процесс качества","steps":[{"label":"1","title":"Смысл","text":"Формулирую мысль без дословного перевода."},{"label":"2","title":"Структура","text":"Выбираю B2-блок.","de":"These -> Begründung -> Beispiel -> Einwand -> Abwägung -> Fazit"},{"label":"3","title":"Форма","text":"Проверяю Verbposition, Kasus, Valenz."},{"label":"4","title":"Регистр","text":"Редактирую под официальную или экзаменационную ситуацию."}],"bars":[{"label":"структура","value":95},{"label":"точность","value":90},{"label":"регистр","value":90}]}]},{"id":"b2-37-satzbau-informationsstruktur","level":"B2","module":"B2 Qualität","title":"Satzbau B2: Vorfeld, Mittelfeld, Nachfeld","goal":"Управлять немецким предложением через информационную структуру.","rule":"На B2 важно не только правило V2, но и то, что стоит в Vorfeld: тема, контраст, причина или ограничение. Выбор первого поля меняет фокус.","examples":[{"de":"Aus diesem Grund sollte die Entscheidung sorgfältig geprüft werden.","ru":"По этой причине решение следует тщательно проверить."},{"de":"Besonders problematisch ist die fehlende Transparenz.","ru":"Особенно проблематичным является отсутствие прозрачности."},{"de":"Unter diesen Umständen wäre eine kurzfristige Lösung kaum sinnvoll.","ru":"При этих обстоятельствах краткосрочное решение едва ли было бы разумным."},{"de":"Nicht zu unterschätzen ist der zeitliche Aufwand.","ru":"Не следует недооценивать временные затраты."},{"de":"Für russischsprachige Lernende ist vor allem die Verbposition entscheidend.","ru":"Для русскоговорящих учеников прежде всего решающей является позиция глагола."}],"drills":[{"q":"Что стоит на позиции 2 после Aus diesem Grund?","options":["sollte","die Entscheidung","geprüft"],"answer":0,"topic":"satzbau","explanation":"Правильно: «sollte». После Vorfeld спрягаемый глагол должен стоять на позиции 2."},{"q":"Что делает Vorfeld?","options":["задаёт фокус","отменяет падежи","заменяет артикль"],"answer":0,"topic":"satzbau","explanation":"Правильно: «задаёт фокус». Для русскоговорящего B2 ключевой контроль — Verbposition и информационный фокус."},{"q":"B2-вариант для акцента:","options":["Besonders problematisch ist ...","Es problematisch besonders ist ...","Ist besonders problematisch ..."],"answer":0,"topic":"satzbau","explanation":"Правильно: «Besonders problematisch ist ...». B2-регистр избегает эмоциональной категоричности и формулирует оценку точнее."},{"q":"Что контролировать русскоговорящему?","options":["Verbposition","только перевод","только длину слова"],"answer":0,"topic":"satzbau","explanation":"Правильно: «Verbposition». Для русскоговорящего B2 ключевой контроль — Verbposition и информационный фокус."}],"deepTheoryRu":"Русский порядок слов гибкий и часто передаёт акцент интонацией. В немецком акцент можно делать через Vorfeld, но глагол всё равно остаётся на позиции 2. Это даёт B2-тексту управляемость.","russianTrap":"Ловушка: поставить два смысловых блока перед глаголом: Aus diesem Grund die Entscheidung sollte...","germanLogic":"Первое поле выбирается для фокуса, второе место закреплено за спрягаемым глаголом, конец предложения часто закрывает Partizip или Infinitiv.","formula":"Vorfeld + Verb 2 + Mittelfeld + rechte Klammer","typicalMistakes":["два элемента перед глаголом","слишком длинное Mittelfeld","Partizip не закрывает рамку"],"grammarTables":[{"title":"Поля немецкого предложения","headers":["Поле","Что там стоит","Пример"],"rows":[["Vorfeld","акцент/тема","Aus diesem Grund"],["linke Klammer","спрягаемый глагол","sollte"],["Mittelfeld","субъект, объекты, обстоятельства","die Entscheidung sorgfältig"],["rechte Klammer","Partizip/Infinitiv","geprüft werden"]]}],"contrastExamples":[{"ru":"По этой причине решение следует проверить.","literal":"Не так: Aus diesem Grund die Entscheidung sollte geprüft werden.","de":"Aus diesem Grund sollte die Entscheidung geprüft werden.","note":"После первого поля сразу идёт глагол."},{"ru":"Особенно проблематично отсутствие прозрачности.","literal":"Не так: Besonders problematisch die Transparenz fehlt.","de":"Besonders problematisch ist die fehlende Transparenz.","note":"B2-стиль использует компактную именную группу."}],"order":37,"tags":["b2-quality","russian-speakers","writing","argumentation"],"whyForRussian":"B2-блок усилен специально для русскоговорящего ученика: сначала убираем русскую кальку, затем выбираем точную немецкую конструкцию и редактируем регистр.","visualSchemes":[{"title":"B2-процесс качества","steps":[{"label":"1","title":"Смысл","text":"Формулирую мысль без дословного перевода."},{"label":"2","title":"Структура","text":"Выбираю B2-блок.","de":"Vorfeld + Verb 2 + Mittelfeld + rechte Klammer"},{"label":"3","title":"Форма","text":"Проверяю Verbposition, Kasus, Valenz."},{"label":"4","title":"Регистр","text":"Редактирую под официальную или экзаменационную ситуацию."}],"bars":[{"label":"структура","value":95},{"label":"точность","value":90},{"label":"регистр","value":90}]}]},{"id":"b2-38-nominalstil-passiv-zu-infinitiv","level":"B2","module":"B2 Qualität","title":"B2-Werkzeuge: Nominalstil, Passiv, zu-Infinitiv","goal":"Выбирать B2-конструкцию под задачу, а не усложнять текст случайно.","rule":"Nominalstil делает текст официальнее, Passiv меняет фокус на процесс, zu-Infinitiv компактно выражает необходимость, цель или оценку.","examples":[{"de":"Nach Prüfung der Unterlagen wird eine Entscheidung getroffen.","ru":"После проверки документов будет принято решение."},{"de":"Die Risiken müssen vor der Behandlung erläutert werden.","ru":"Риски должны быть объяснены до лечения."},{"de":"Es ist zu beachten, dass die Kosten variieren können.","ru":"Следует учитывать, что расходы могут различаться."},{"de":"Zur Klärung der offenen Fragen ist ein Beratungsgespräch erforderlich.","ru":"Для прояснения открытых вопросов необходима консультация."},{"de":"Ohne die Alternativen zu prüfen, sollte keine Entscheidung getroffen werden.","ru":"Без проверки альтернатив не следует принимать решение."}],"drills":[{"q":"Официальнее: nachdem man die Unterlagen geprüft hat","options":["Nach Prüfung der Unterlagen","Nach man prüft die Unterlagen","Nach prüfen Unterlagen"],"answer":0,"topic":"nominalstil","explanation":"Правильно: «Nach Prüfung der Unterlagen». Nominalstil делает B2-текст компактнее и официальнее."},{"q":"Passiv:","options":["Die Risiken werden erläutert.","Die Risiken erläutern.","Die Risiken wird erläutern."],"answer":0,"topic":"passive","explanation":"Правильно: «Die Risiken werden erläutert.». Passiv нужен, когда важнее действие или процесс, а не исполнитель."},{"q":"zu-Infinitiv формула:","options":["Es ist zu beachten, dass ...","Es ist beachten, dass ...","Es zu ist beachten ..."],"answer":0,"topic":"zu-infinitive","explanation":"Правильно: «Es ist zu beachten, dass ...». В придаточном и косвенном вопросе спрягаемый глагол уходит в конец."},{"q":"Когда использовать Nominalstil?","options":["для официальной компактности","чтобы скрыть артикли","в каждом предложении без причины"],"answer":0,"topic":"nominalstil","explanation":"Правильно: «для официальной компактности». Здесь проверяется точная немецкая форма, а не дословный русский перевод."}],"deepTheoryRu":"Для русскоговорящего B2 опасность в том, что «сложнее» кажется «лучше». На самом деле B2-качество — это выбор инструмента: где нужен Nominalstil, где Passiv, где проще оставить Verbalstil.","russianTrap":"Ловушка: превращать каждую русскую фразу в тяжёлую немецкую конструкцию и терять управление падежами.","germanLogic":"B2-инструмент выбирается по функции: компактность, фокус, нейтральность, официальность.","formula":"Funktion -> Werkzeug: offiziell = Nominalstil; Prozess = Passiv; Bewertung = zu-Infinitiv","typicalMistakes":["Nominalstil без Genitiv","Passiv без Partizip II","zu-Infinitiv без zu"],"grammarTables":[{"title":"B2-инструменты","headers":["Задача","Конструкция","Пример"],"rows":[["официальная краткость","Nominalstil","Nach Prüfung der Unterlagen"],["процесс важнее исполнителя","Passiv","Die Risiken werden erläutert."],["оценка/необходимость","sein + zu + Infinitiv","Es ist zu beachten."],["цель","zur + Nomen / um ... zu","Zur Klärung / um zu klären"]]}],"contrastExamples":[{"ru":"После того как проверят документы...","literal":"Слабее: Nachdem man die Unterlagen geprüft hat...","de":"Nach Prüfung der Unterlagen...","note":"Официальный текст часто компактнее."},{"ru":"Нужно учитывать расходы.","literal":"Не так: Man muss die Kosten beachten werden.","de":"Es ist zu beachten, dass die Kosten variieren können.","note":"sein + zu + Infinitiv даёт нейтральную формулу."}],"order":38,"tags":["b2-quality","russian-speakers","writing","argumentation"],"whyForRussian":"B2-блок усилен специально для русскоговорящего ученика: сначала убираем русскую кальку, затем выбираем точную немецкую конструкцию и редактируем регистр.","visualSchemes":[{"title":"B2-процесс качества","steps":[{"label":"1","title":"Смысл","text":"Формулирую мысль без дословного перевода."},{"label":"2","title":"Структура","text":"Выбираю B2-блок.","de":"Funktion -> Werkzeug: offiziell = Nominalstil; Prozess = Passiv; Bewertung = zu-Infinitiv"},{"label":"3","title":"Форма","text":"Проверяю Verbposition, Kasus, Valenz."},{"label":"4","title":"Регистр","text":"Редактирую под официальную или экзаменационную ситуацию."}],"bars":[{"label":"структура","value":95},{"label":"точность","value":90},{"label":"регистр","value":90}]}]},{"id":"b2-39-register-redaktion","level":"B2","module":"B2 Qualität","title":"Register und Redaktion: как звучать на B2","goal":"Редактировать текст так, чтобы он звучал нейтрально, точно и естественно.","rule":"B2-регистр — это не набор сложных слов. Это точность, дистанция, умеренность оценки и отсутствие русской эмоциональной кальки.","examples":[{"de":"Die Situation ist problematisch, jedoch nicht unlösbar.","ru":"Ситуация проблематична, однако не безвыходна."},{"de":"Diese Einschätzung erscheint nachvollziehbar.","ru":"Эта оценка кажется обоснованной."},{"de":"Die Kritik ist teilweise berechtigt.","ru":"Критика частично обоснована."},{"de":"Eine pauschale Bewertung wäre unangemessen.","ru":"Обобщающая оценка была бы неуместной."},{"de":"Der Text sollte sprachlich präziser formuliert werden.","ru":"Текст следует сформулировать языково точнее."}],"drills":[{"q":"Нейтральнее:","options":["Die Situation ist problematisch.","Das ist kompletter Unsinn.","Alles ist schrecklich."],"answer":0,"topic":"register","explanation":"Правильно: «Die Situation ist problematisch.». B2-регистр избегает эмоциональной категоричности и формулирует оценку точнее."},{"q":"B2-оценка без категоричности:","options":["teilweise berechtigt","immer falsch","total super"],"answer":0,"topic":"register","explanation":"Правильно: «teilweise berechtigt». B2-регистр избегает эмоциональной категоричности и формулирует оценку точнее."},{"q":"Что убрать при редактуре?","options":["эмоциональные усилители","точные связки","артикли"],"answer":0,"topic":"redaktion","explanation":"Правильно: «эмоциональные усилители». Здесь проверяется точная немецкая форма, а не дословный русский перевод."},{"q":"Как сказать «обобщающая оценка»?","options":["eine pauschale Bewertung","eine totale Meinung","ein ganzes Denken"],"answer":0,"topic":"register","explanation":"Правильно: «eine pauschale Bewertung». B2-регистр избегает эмоциональной категоричности и формулирует оценку точнее."}],"deepTheoryRu":"Русский текст часто допускает сильные оценки: «это ужасно», «совершенно неправильно». В немецком B2 лучше звучит умеренная точность: teilweise, tendenziell, nachvollziehbar, problematisch, jedoch.","russianTrap":"Ловушка: думать, что B2 — это максимально длинно и резко. На экзамене и в рабочем письме ценится ясная тикль, падеж, предлог и порядок слов."},{"level":"A2","topic":"questions","q":"Косвенный вопрос: wann der Termin ___","options":["ist","ist?","sein"],"answer":0,"explanation":"Правильно: «ist». Для русскоговорящего главное - не переводить дословно, а проверить немецкую форму: глагол, артикль, падеж, предлог и порядок слов."},{"level":"A2","topic":"phone","q":"Termin verschieben значит...","options":["перенести запись","подписать договор","купить билет"],"answer":0,"explanation":"Правильно: «перенести запись». Для русскоговорящего главное - не переводить дословно, а проверить немецкую форму: глагол, артикль, падеж, предлог и порядок слов."},{"level":"B1","topic":"letter","q":"Ich bitte um Rückmeldung значит...","options":["прошу ответить","прошу оплатить немедленно","я не понимаю"],"answer":0,"explanation":"Правильно: «прошу ответить». Для русскоговорящего главное - не переводить дословно, а проверить немецкую форму: глагол, артикль, падеж, предлог и порядок слов."},{"level":"B1","topic":"relative","q":"der Arzt, mit ___ ich gesprochen habe","options":["dem","den","der"],"answer":0,"explanation":"Правильно: «dem». Для русскоговорящего главное - не переводить дословно, а проверить немецкую форму: глагол, артикль, падеж, предлог и порядок слов."},{"level":"B1","topic":"passive","q":"Der Antrag ___ geprüft.","options":["wurde","hat","war prüfen"],"answer":0,"explanation":"Правильно: «wurde». Passiv строится через werden + Partizip II и фокусирует действие, а не исполнителя."},{"level":"B1","topic":"collocations","q":"zufrieden ___ dem Ergebnis","options":["mit","für","auf"],"answer":0,"explanation":"Правильно: «mit». Для русскоговорящего главное - не переводить дословно, а проверить немецкую форму: глагол, артикль, падеж, предлог и порядок слов."},{"level":"B2","topic":"medical","q":"die Einwilligung — это...","options":["согласие","страховка","строительные леса"],"answer":0,"explanation":"Правильно: «согласие». Для русскоговорящего главное - не переводить дословно, а п
