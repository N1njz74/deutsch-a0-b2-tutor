le":"Род","text":"Учить слово вместе с der/die/das.","de":"der Termin"},{"label":"2","title":"Падеж","text":"Роль меняет артикль.","de":"den Termin"},{"label":"3","title":"Фраза","text":"Сразу закреплять в примере.","de":"Ich habe einen Termin."}],"bars":[{"label":"род","value":80},{"label":"падеж","value":90},{"label":"пример","value":70}]}]},{"id":"b2-05-akkusativ-dativ-genitiv","level":"B2","order":5,"module":"B2 уверенное владение","title":"Предлоги: Akkusativ, Dativ, Genitiv","goal":"Выбирать падеж по предлогу и смыслу.","rule":"Akkusativ: durch, für, gegen, ohne, um. Dativ: aus, bei, mit, nach, seit, von, zu. Genitiv: aufgrund, trotz, während, wegen; в разговоре wegen/trotz часто с Dativ.","examples":[{"de":"Aufgrund der neuen Regelung müssen wir den Prozess ändern.","ru":"Из-за нового правила мы должны изменить процесс."},{"de":"Während der Behandlung sollte man vorsichtig sein.","ru":"Во время лечения следует быть осторожным."}],"drills":[{"q":"aufgrund требует...","options":["Genitiv","Akkusativ","Nominativ"],"answer":0,"explanation":"Правильно: «Genitiv». Сравнивайте не русский перевод, а роль слова: Nominativ - кто, Akkusativ - кого/что, Dativ - кому/с кем/где, Genitiv - чей/из-за чего.","topic":""},{"q":"ohne требует...","options":["Akkusativ","Dativ","Genitiv"],"answer":0,"explanation":"Правильно: «Akkusativ». Сравнивайте не русский перевод, а роль слова: Nominativ - кто, Akkusativ - кого/что, Dativ - кому/с кем/где, Genitiv - чей/из-за чего.","topic":""},{"q":"mit требует...","options":["Dativ","Akkusativ","Genitiv"],"answer":0,"explanation":"Правильно: «Dativ». Сравнивайте не русский перевод, а роль слова: Nominativ - кто, Akkusativ - кого/что, Dativ - кому/с кем/где, Genitiv - чей/из-за чего.","topic":""}],"tags":["prepositions"],"deepTheoryRu":"В русском падежи часто видны по окончанию слова. В немецком главную работу часто делает артикль: der Mann, den Mann, dem Mann, des Mannes. Поэтому нельзя переводить только по смыслу — нужно видеть роль слова в предложении.","russianTrap":"Ловушка: думать «мужчина — der Mann всегда». Но после sehen будет Ich sehe den Mann, а после mit — mit dem Mann.","germanLogic":"Немецкий падеж отвечает на роль: кто действует, кого/что затронули, кому/где/с кем, чей/из-за чего.","formula":"Nominativ = кто? Akkusativ = кого/что? Dativ = кому/где/с кем? Genitiv = чей/из-за чего?","typicalMistakes":["der Mann после sehen","mit den Bus вместо mit dem Bus","wegen dem Problem в формальном письме"],"grammarTables":[{"title":"Артикли по падежам","headers":["Падеж","муж.","жен.","сред.","мн."],"rows":[["Nominativ","der/ein","die/eine","das/ein","die/-"],["Akkusativ","den/einen","die/eine","das/ein","die/-"],["Dativ","dem/einem","der/einer","dem/einem","den + -n"],["Genitiv","des/eines","der/einer","des/eines","der/-"]]},{"title":"Роль падежа","headers":["Падеж","Вопрос","Пример"],"rows":[["Nominativ","кто/что?","Der Arzt hilft."],["Akkusativ","кого/что?","Ich sehe den Arzt."],["Dativ","кому/с кем/где?","Ich helfe dem Patienten."],["Genitiv","чей/из-за чего?","wegen des Problems"]]}],"whyForRussian":"Этот блок добавлен специально для русскоговорящего ученика: сначала сравниваем с русской логикой, потом показываем немецкий механизм и только после этого тренируем форму.","visualSchemes":[{"title":"Падежная развилка","steps":[{"label":"1","title":"Глагол/предлог","text":"Сначала ищу управление.","de":"mit, helfen, sehen"},{"label":"2","title":"Падеж","text":"Выбираю роль: Akkusativ или Dativ.","de":"Akkusativ / Dativ"},{"label":"3","title":"Артикль","text":"Меняю der/ein по таблице.","de":"den Arzt / dem Arzt"}],"bars":[{"label":"управление","value":90},{"label":"артикль","value":85},{"label":"перевод","value":40}]}]},{"id":"b2-06-","level":"B2","order":6,"module":"B2 уверенное владение","title":"Существительные и номинализация","goal":"Делать стиль более письменным.","rule":"B2-письмо часто использует Nominalstil: weil die Kosten steigen → aufgrund steigender Kosten. Не злоупотребляйте: ясность важнее тяжёлого стиля.","examples":[{"de":"Aufgrund steigender Kosten wird die Planung angepasst.","ru":"Из-за растущих расходов план корректируют."},{"de":"Die Durchführung der Maßnahme ist umstritten.","ru":"Проведение меры спорно."}],"drills":[{"q":"Nominalstil делает текст чаще...","options":["официальнее","детским","без глаголов вообще"],"answer":0,"explanation":"Правильно: «официальнее». После weil/dass/wenn/obwohl спрягаемый глагол уходит в конец придаточного.","topic":""},{"q":"aufgrund steigender Kosten =","options":["weil die Kosten steigen","ob ich Kosten habe","wenn Kosten gut sind"],"answer":0,"explanation":"Правильно: «weil die Kosten steigen». В придаточном предложении спрягаемый глагол уходит в конец.","topic":""},{"q":"Durchführung значит...","options":["проведение","сомнение","отпуск"],"answer":0,"explanation":"Правильно: «проведение». После weil/dass/wenn/obwohl спрягаемый глагол уходит в конец придаточного.","topic":""}],"tags":["writing"],"deepTheoryRu":"Русский часто сохраняет привычный порядок слов после «потому что/что/если». В немецком подчинительный союз отправляет спрягаемый глагол в конец: weil ich Zeit habe.","russianTrap":"Ловушка: weil ich habe Zeit. Это русская логика порядка слов, но не немецкая.","germanLogic":"Придаточное предложение в немецком закрывается глаголом.","formula":"weil/dass/wenn/obwohl + подлежащее + ... + Verb","typicalMistakes":["weil ich habe Zeit","dass er kommt heute","wenn ich habe Zeit"],"grammarTables":[{"title":"Союзы и порядок слов","headers":["Союз","Смысл","Порядок"],"rows":[["weil","потому что","глагол в конце"],["dass","что","глагол в конце"],["wenn","если/когда","глагол в конце"],["obwohl","хотя","глагол в конце"],["ob","ли","глагол в конце"]]},{"title":"Цель","headers":["Конструкция","Когда","Пример"],"rows":[["um ... zu","один субъект","Ich lerne, um besser zu sprechen."],["damit","разные субъекты","Ich erkläre es, damit du es verstehst."]]}],"whyForRussian":"Этот блок добавлен специально для русскоговорящего ученика: сначала сравниваем с русской логикой, потом показываем немецкий механизм и только после этого тренируем форму.","visualSchemes":[{"title":"Рамка придаточного","steps":[{"label":"1","title":"Союз","text":"weil/dass/wenn открывает придаточное.","de":"weil"},{"label":"2","title":"Смысл","text":"Подлежащее и дополнения идут внутри.","de":"ich Zeit"},{"label":"3","title":"Глагол","text":"Спрягаемый глагол закрывает часть.","de":"habe"}],"bars":[{"label":"союз","value":75},{"label":"конец","value":95},{"label":"перенос с русского","value":80}]}]},{"id":"b2-07-partizip-ii","level":"B2","order":7,"module":"B2 уверенное владение","title":"Глаголы и Partizip II как прилагательное","goal":"Использовать причастия для компактной речи.","rule":"Partizip I = активный процесс: die wachsende Nachfrage. Partizip II = результат/пассивность: die abgeschlossene Behandlung.","examples":[{"de":"die zunehmende Bedeutung","ru":"растущее значение"},{"de":"die geplante Maßnahme","ru":"запланированная мера"},{"de":"ein gut begründetes Argument","ru":"хорошо обоснованный аргумент"}],"drills":[{"q":"zunehmende Bedeutung — это...","options":["Partizip I","Partizip II","Konjunktiv I"],"answer":0,"explanation":"Правильно: «Partizip I». В Perfekt нужен помощник haben/sein и Partizip II в конце; движение с изменением места часто берет sein.","topic":""},{"q":"geplante Maßnahme — чаще...","options":["Partizip II","Infinitiv","Dativ"],"answer":0,"explanation":"Правильно: «Partizip II». В Perfekt нужен помощник haben/sein и Partizip II в конце; движение с изменением места часто берет sein.","topic":""},{"q":"begründetes Argument значит...","options":["обоснованный аргумент","опасный договор","короткий приём"],"answer":0,"explanation":"Правильно: «обоснованный аргумент». В Perfekt нужен помощник haben/sein и Partizip II в конце; движение с изменением места часто берет sein.","topic":""}],"tags":["verbs","adjectives"],"deepTheoryRu":"Окончания прилагательных — одна из главных зон риска для русскоговорящих. В немецком окончание зависит от рода, числа, падежа и артикля. Не нужно угадывать — нужно видеть систему.","russianTrap":"Ловушка: везде ставить gute/guten. Например ein guter Plan, eine gute Idee, ein gutes Beispiel.","germanLogic":"Если артикль уже показывает род/падеж, прилагательное несёт меньше информации. Если артикль слабый или его нет, прилагательное несёт больше.","formula":"артикль + прилагательное + существительное; окончание зависит от грамматической информации.","typicalMistakes":["ein gute Plan","mit gutem Grund забывать Dativ","die langfristige Folgen вместо langfristigen"],"grammarTables":[{"title":"После ein-слов","headers":["Род/падеж","Пример","Почему"],"rows":[["муж. Nom.","ein guter Plan","прилагательное показывает мужской род"],["жен. Nom.","eine gute Idee","женский род уже виден"],["сред. Nom.","ein gutes Beispiel","прилагательное показывает средний род"],["Dativ","mit einem guten Arzt","после Dativ часто -en"]]},{"title":"После der-слов","headers":["Форма","Пример","Комментарий"],"rows":[["der","der gute Plan","слабое окончание"],["die","die gute Idee","слабое окончание"],["das","das gute Beispiel","слабое окончание"],["Plural","die guten Beispiele","часто -en"]]}],"whyForRussian":"Этот блок добавлен специально для русскоговорящего ученика: сначала сравниваем с русской логикой, потом показываем немецкий механизм и только после этого тренируем форму.","visualSchemes":[{"title":"Русская мысль -> немецкая форма","steps":[{"label":"1","title":"Смысл","text":"Что я хочу сказать по-русски?"},{"label":"2","title":"Форма","text":"Какой немецкий механизм нужен?","de":"Verb, Artikel, Kasus"},{"label":"3","title":"Контроль","text":"Проверяю порядок, падеж и регистр."}],"bars":[{"label":"смысл","value":70},{"label":"форма","value":90},{"label":"перевод","value":45}]}]},{"id":"b2-08-b2","level":"B2","order":8,"module":"B2 уверенное владение","title":"Времена на B2: функция и стиль","goal":"Выбирать время по жанру и смыслу.","rule":"Präteritum часто в письменном повествовании, Perfekt в разговоре, Plusquamperfekt для предшествования, Futur I для прогноза или предположения.","examples":[{"de":"Die Studie zeigte, dass...","ru":"Исследование показало, что..."},{"de":"Bis dahin hatte sich die Situation verbessert.","ru":"К тому времени ситуация улучшилась."},{"de":"Das wird vermutlich zu Problemen führen.","ru":"Вероятно, это приведёт к проблемам."}],"drills":[{"q":"Plusquamperfekt нужно для...","options":["раньше другого прошлого","приказа","Dativ"],"answer":0,"explanation":"Правильно: «раньше другого прошлого». В Perfekt нужен помощник haben/sein и Partizip II в конце; движение с изменением места часто берет sein.","topic":""},{"q":"wird vermutlich führen выражает...","options":["предположение/прогноз","завершённое прошлое","артикль"],"answer":0,"explanation":"Правильно: «предположение/прогноз». В Perfekt нужен помощник haben/sein и Partizip II в конце; движение с изменением места часто берет sein.","topic":""},{"q":"В письменном отчёте часто:","options":["Präteritum","только Perfekt","только Imperativ"],"answer":0,"explanation":"Правильно: «Präteritum». В Perfekt нужен помощник haben/sein и Partizip II в конце; движение с изменением места часто берет sein.","topic":""}],"tags":["tenses"],"deepTheoryRu":"Русский прошедшее время часто проще: сделал/был/ходил. В немецком нужно выбрать конструкцию: Perfekt для разговорного прошлого, Präteritum часто для sein/haben/modal и письменного стиля, Plusquamperfekt для более раннего прошлого.","russianTrap":"Ловушка: всегда использовать haben. Движение с изменением места часто требует sein: Ich bin gegangen.","germanLogic":"Немецкое прошедшее выбирается не только по времени, но и по стилю.","formula":"Perfekt = haben/sein + Partizip II","typicalMistakes":["ich habe gegangen","ich bin gelernt","Partizip II не в конце"],"grammarTables":[{"title":"Прошедшие формы","headers":["Форма","Когда","Пример"],"rows":[["Perfekt","разговорное прошлое","Ich habe gelernt."],["Perfekt с sein","движение/изменение состояния","Ich bin gekommen."],["Präteritum","sein/haben/modal, письменный стиль","Ich war krank."],["Plusquamperfekt","раньше другого прошлого","Nachdem ich gekommen war..."]]}],"whyForRussian":"Этот блок добавлен специально для русскоговорящего ученика: сначала сравниваем с русской логикой, потом показываем немецкий механизм и только после этого тренируем форму.","visualSchemes":[{"title":"Русская мысль -> немецкая форма","steps":[{"label":"1","title":"Смысл","text":"Что я хочу сказать по-русски?"},{"label":"2","title":"Форма","text":"Какой немецкий механизм нужен?","de":"Verb, Artikel, Kasus"},{"label":"3","title":"Контроль","text":"Проверяю порядок, падеж и регистр."}],"bars":[{"label":"смысл","value":70},{"label":"форма","value":90},{"label":"перевод","value":45}]}]},{"id":"b2-09-","level":"B2","order":9,"module":"B2 уверенное владение","title":"Модальные значения и субъективность","goal":"Понимать muss/kann/soll/dürfte как оценку.","rule":"Модальные глаголы могут выражать не только обязанность/возможность, но и предположение: Er muss krank sein = должно быть, он болен. Es dürfte schwierig werden = вероятно, будет сложно.","examples":[{"de":"Das dürfte langfristig problematisch sein.","ru":"Вероятно, это будет проблематично в долгосрочной перспективе."},{"de":"Er soll sehr kompetent sein.","ru":"Говорят, он очень компетентен."}],"drills":[{"q":"dürfte sein часто значит...","options":["вероятно","запрещено","вчера"],"answer":0,"explanation":"Правильно: «вероятно». Модальный глагол занимает вторую позицию, а смысловой глагол уходит в конец в инфинитиве.","topic":""},{"q":"Er muss krank sein =","options":["должно быть, он болен","он обязан болеть","он болел"],"answer":0,"explanation":"Правильно: «должно быть, он болен». Модальный глагол занимает вторую позицию, а смысловой глагол уходит в конец в инфинитиве.","topic":""},{"q":"soll в сообщении слуха:","options":["говорят, что","я разрешаю","безусловно"],"answer":0,"explanation":"Правильно: «говорят, что». Модальный глагол занимает вторую позицию, а смысловой глагол уходит в конец в инфинитиве.","topic":""}],"tags":["modal"],"deepTheoryRu":"Модальный глагол в немецком занимает место спрягаемого глагола, а смысловой глагол уходит в конец в инфинитиве. Для русского это непривычно: «я должен сегодня работать» → Ich muss heute arbeiten.","russianTrap":"Ловушка: Ich muss heute arbeite. После модального нужен инфинитив arbeiten.","germanLogic":"Модальный глагол открывает рамку, инфинитив закрывает рамку.","formula":"Subjekt + Modalverb + ... + Infinitiv","typicalMistakes":["Ich muss arbeite","Ich heute muss arbeiten","Ich möchte einen Termin vereinbare"],"grammarTables":[{"title":"Модальные глаголы","headers":["Глагол","Смысл","Пример"],"rows":[["können","мочь/уметь","Ich kann kommen."],["müssen","должен","Ich muss arbeiten."],["wollen","хотеть","Ich will lernen."],["möchten","хотел бы","Ich möchte einen Termin."],["dürfen","можно/иметь разрешение","Darf ich fragen?"],["sollen","следует/должен по поручению","Sie sollen warten."]]}],"whyForRussian":"Этот блок добавлен специально для русскоговорящего ученика: сначала сравниваем с русской логикой, потом показываем немецкий механизм и только после этого тренируем форму.","visualSchemes":[{"title":"Русская мысль -> немецкая форма","steps":[{"label":"1","title":"Смысл","text":"Что я хочу сказать по-русски?"},{"label":"2","title":"Форма","text":"Какой немецкий механизм нужен?","de":"Verb, Artikel, Kasus"},{"label":"3","title":"Контроль","text":"Проверяю порядок, падеж и регистр."}],"bars":[{"label":"смысл","value":70},{"label":"форма","value":90},{"label":"перевод","value":45}]}]},{"id":"b2-10-passiv","level":"B2","order":10,"module":"B2 уверенное владение","title":"Passiv: формы и замены","goal":"Говорить официально без лишнего агента.","rule":"Passiv полезен для процессов: Es wird geprüft. Альтернативы: man prüft, sich lassen, sein + zu + Infinitiv: Das Problem lässt sich lösen. Der Antrag ist zu prüfen.","examples":[{"de":"Der Antrag wird derzeit geprüft.","ru":"Заявление сейчас проверяется."},{"de":"Das lässt sich schwer beurteilen.","ru":"Это трудно оценить."},{"de":"Die Unterlagen sind bis Freitag einzureichen.","ru":"Документы нужно подать до пятницы."}],"drills":[{"q":"lässt sich lösen =","options":["можно решить","решил себя","обязан решить"],"answer":0,"explanation":"Правильно: «можно решить». Passiv переносит фокус с исполнителя на действие или результат: wird geprüft, wurde geprüft, ist geprüft worden.","topic":""},{"q":"ist zu prüfen =","options":["нужно проверить","было проверено","проверяет"],"answer":0,"explanation":"Правильно: «нужно проверить». Passiv переносит фокус с исполнителя на действие или результат: wird geprüft, wurde geprüft, ist geprüft worden.","topic":""},{"q":"Der Antrag wird geprüft — это...","options":["Passiv","Konjunktiv I","Imperativ"],"answer":0,"explanation":"Правильно: «Passiv». Passiv переносит фокус с исполнителя на действие или результат: wird geprüft, wurde geprüft, ist geprüft worden.","topic":""}],"tags":["passive"],"deepTheoryRu":"В русском можно сказать «заявление проверяют» без указания исполнителя. В немецком для этого часто используется Passiv: Der Antrag wird geprüft. Это особенно важно в официальном стиле.","russianTrap":"Ловушка: пытаться всегда переводить через man. Man prüft den Antrag возможно, но Passiv звучит официальнее и нейтральнее.","germanLogic":"Passiv ставит действие в центр, а исполнителя убирает или делает второстепенным.","formula":"werden + Partizip II: wird geprüft; wurde geprüft; ist geprüft worden","typicalMistakes":["Der Antrag ist prüfen","wurde gepruft без Partizip II","путать Zustandspassiv и Vorgangspassiv"],"grammarTables":[{"title":"Passiv","headers":["Время/тип","Форма","Пример"],"rows":[["Präsens","wird + Partizip II","Der Antrag wird geprüft."],["Präteritum","wurde + Partizip II","Der Antrag wurde geprüft."],["Perfekt","ist + Partizip II + worden","Der Antrag ist geprüft worden."],["Zustand","sein + Partizip II","Die Praxis ist geschlossen."]]},{"title":"Замены Passiv","headers":["Конструкция","Смысл","Пример"],"rows":[["man","кто-то делает","Man prüft den Antrag."],["sich lassen","можно сделать","Das lässt sich lösen."],["sein + zu","нужно сделать","Der Antrag ist zu prüfen."],["-bar","возможно","verständlich, lösbar"]]}],"whyForRussian":"Этот блок добавлен специально для русскоговорящего ученика: сначала сравниваем с русской логикой, потом показываем немецкий механизм и только после этого тренируем форму.","visualSchemes":[{"title":"Русская мысль -> немецкая форма","steps":[{"label":"1","title":"Смысл","text":"Что я хочу сказать по-русски?"},{"label":"2","title":"Форма","text":"Какой немецкий механизм нужен?","de":"Verb, Artikel, Kasus"},{"label":"3","title":"Контроль","text":"Проверяю порядок, падеж и регистр."}],"bars":[{"label":"смысл","value":70},{"label":"форма","value":90},{"label":"перевод","value":45}]}]},{"id":"b2-11-konjunktiv-ii","level":"B2","order":11,"module":"B2 уверенное владение","title":"Konjunktiv II: условия и дипломатия","goal":"Выражать нереальность, осторожность и критику без грубости.","rule":"B2 использует KII для гипотез, предложений, вежливой критики: Es wäre sinnvoll, wenn...; Man könnte überlegen, ob...","examples":[{"de":"Es wäre sinnvoll, diese Frage genauer zu prüfen.","ru":"Было бы разумно проверить этот вопрос точнее."},{"de":"Wenn mehr Zeit zur Verfügung stünde, könnten wir bessere Ergebnisse erzielen.","ru":"Если бы было больше времени, мы могли бы получить лучшие результаты."}],"drills":[{"q":"Es wäre sinnvoll выражает...","options":["осторожное предложение","команду","прошлое"],"answer":0,"explanation":"Правильно: «осторожное предложение». После weil/dass/wenn/obwohl спрягаемый глагол уходит в конец придаточного.","topic":""},{"q":"zur Verfügung stünde — это...","options":["Konjunktiv II","Perfekt","Imperativ"],"answer":0,"explanation":"Правильно: «Konjunktiv II». После weil/dass/wenn/obwohl спрягаемый глагол уходит в конец придаточного.","topic":""},{"q":"could = könnte в немецком:","options":["könnte","konnte","kennt"],"answer":0,"explanation":"Правильно: «könnte». Konjunktiv II звучит вежливо или гипотетически, что важно для B1/B2.","topic":""}],"tags":["konjunktiv"],"deepTheoryRu":"Русский часто сохраняет привычный порядок слов после «потому что/что/если». В немецком подчинительный союз отправляет спрягаемый глагол в конец: weil ich Zeit habe.","russianTrap":"Ловушка: weil ich habe Zeit. Это русская логика порядка слов, но не немецкая.","germanLogic":"Придаточное предложение в немецком закрывается глаголом.","formula":"weil/dass/wenn/obwohl + подлежащее + ... + Verb","typicalMistakes":["weil ich habe Zeit","dass er kommt heute","wenn ich habe Zeit"],"grammarTables":[{"title":"Союзы и порядок слов","headers":["Союз","Смысл","Порядок"],"rows":[["weil","потому что","глагол в конце"],["dass","что","глагол в конце"],["wenn","если/когда","глагол в конце"],["obwohl","хотя","глагол в конце"],["ob","ли","глагол в конце"]]},{"title":"Цель","headers":["Конструкция","Когда","Пример"],"rows":[["um ... zu","один субъект","Ich lerne, um besser zu sprechen."],["damit","разные субъекты","Ich erkläre es, damit du es verstehst."]]}],"whyForRussian":"Этот блок добавлен специально для русскоговорящего ученика: сначала сравниваем с русской логикой, потом показываем немецкий механизм и только после этого тренируем форму.","visualSchemes":[{"title":"Рамка придаточного","steps":[{"label":"1","title":"Союз","text":"weil/dass/wenn открывает придаточное.","de":"weil"},{"label":"2","title":"Смысл","text":"Подлежащее и дополнения идут внутри.","de":"ich Zeit"},{"label":"3","title":"Глагол","text":"Спрягаемый глагол закрывает часть.","de":"habe"}],"bars":[{"label":"союз","value":75},{"label":"конец","value":95},{"label":"перенос с русского","value":80}]}]},{"id":"b2-12-konjunktiv-i","level":"B2","order":12,"module":"B2 уверенное владение","title":"Konjunktiv I: косвенная речь","goal":"Передавать чужие слова в официальном стиле.","rule":"Konjunktiv I часто в новостях и отчётах: Er sagte, er habe keine Zeit. Если форма совпадает с Indikativ, используют KII.","examples":[{"de":"Die Sprecherin erklärte, die Maßnahme sei notwendig.","ru":"Спикер заявила, что мера необходима."},{"de":"Er betonte, er habe die Unterlagen bereits geschickt.","ru":"Он подчеркнул, что уже отправил документы."}],"drills":[{"q":"sei в косвенной речи — форма от...","options":["sein","haben","werden"],"answer":0,"explanation":"Правильно: «sein». Konjunktiv I используется для косвенной речи: автор передает чужие слова дистанционно.","topic":""},{"q":"er habe — это...","options":["Konjunktiv I","Perfekt обычный","Imperativ"],"answer":0,"explanation":"Правильно: «Konjunktiv I». nicht отрицает действие, качество или всю мысль; kein отрицает существительное. Русское «не/нет» нельзя переносить одним способом.","topic":""},{"q":"Konjunktiv I часто встречается в...","options":["новостях/отчётах","заказе еды","алфавите"],"answer":0,"explanation":"Правильно: «новостях/отчётах». nicht отрицает действие, качество или всю мысль; kein отрицает существительное. Русское «не/нет» нельзя переносить одним способом.","topic":""}],"tags":["konjunktiv"],"deepTheoryRu":"Русское «не/нет» часто переводится двумя немецкими инструментами: nicht и kein. Kein отрицает существительное с неопределённым артиклем или без артикля. Nicht отрицает глагол, прилагательное, обстоятельство или всю мысль.","russianTrap":"Ловушка: говорить Ich habe nicht Termin. Если имеется в виду «нет записи», нужно keinen Termin.","germanLogic":"Немецкий выбирает отрицание по тому, что именно отрицается: предмет или действие/качество.","formula":"kein + существительное; nicht + глагол/прилагательное/фраза.","typicalMistakes":["Ich habe nicht Termin","Ich verstehe kein","Das ist kein teuer"],"grammarTables":[{"title":"nicht или kein","headers":["Что отрицаем","Немецкий","Пример"],"rows":[["существительное","kein","Ich habe keinen Termin."],["глагол","nicht","Ich komme nicht."],["прилагательное","nicht","Das ist nicht teuer."],["вся мысль","nicht","Ich verstehe das nicht."]]}],"whyForRussian":"Этот блок добавлен специально для русскоговорящего ученика: сначала сравниваем с русской логикой, потом показываем немецкий механизм и только после этого тренируем форму.","visualSchemes":[{"title":"Русская мысль -> немецкая форма","steps":[{"label":"1","title":"Смысл","text":"Что я хочу сказать по-русски?"},{"label":"2","title":"Форма","text":"Какой немецкий механизм нужен?","de":"Verb, Artikel, Kasus"},{"label":"3","title":"Контроль","text":"Проверяю порядок, падеж и регистр."}],"bars":[{"label":"смысл","value":70},{"label":"форма","value":90},{"label":"перевод","value":45}]}]},{"id":"b2-13-infinitiv-mit-zu","level":"B2","order":13,"module":"B2 уверенное владение","title":"Infinitiv mit zu и конструкции цели","goal":"Связывать действия без лишних dass-фраз.","rule":"zu + Infinitiv, um ... zu, ohne ... zu, statt ... zu делают речь компактной. Субъект обычно совпадает с главным предложением.","examples":[{"de":"Ich lerne Deutsch, um beruflich flexibler zu sein.","ru":"Я учу немецкий, чтобы быть профессионально гибче."},{"de":"Statt lange zu warten, rief sie direkt an.","ru":"Вместо того чтобы долго ждать, она позвонила напрямую."},{"de":"Ohne die Risiken zu prüfen, sollte man nicht entscheiden.","ru":"Не проверив риски, не следует принимать решение."}],"drills":[{"q":"um ... zu выражает...","options":["цель","уступку","род"],"answer":0,"explanation":"Правильно: «цель». Для русскоговорящего главное - не переводить дословно, а проверить немецкую форму: глагол, артикль, падеж, предлог и порядок слов.","topic":""},{"q":"ohne ... zu =","options":["не сделав что-то","потому что","несмотря на"],"answer":0,"explanation":"Правильно: «не сделав что-то». Для русскоговорящего главное - не переводить дословно, а проверить немецкую форму: глагол, артикль, падеж, предлог и порядок слов.","topic":""},{"q":"statt ... zu =","opti
