е частые формы.","rule":"sein = быть, haben = иметь, werden = становиться/будет. Формы нерегулярные, их нужно выучить как таблицу: ich bin, du bist, er ist; ich habe, du hast; ich werde, du wirst.","examples":[{"de":"Ich bin müde.","ru":"Я устал/устала."},{"de":"Sie hat heute Zeit.","ru":"У неё сегодня есть время."},{"de":"Wir werden besser.","ru":"Мы становимся лучше."}],"drills":[{"q":"Правильно: ich ...","options":["bin","ist","bist"],"answer":0,"explanation":"","topic":""},{"q":"Правильно: du ... Zeit.","options":["haben","hast","hat"],"answer":1,"explanation":"","topic":""},{"q":"Что значит werden в базовом смысле?","options":["иметь","становиться","знать"],"answer":1,"explanation":"","topic":""}],"tags":["verbs"]},{"id":"a0-06-ja-nein-w","level":"A0","order":6,"module":"Старт","title":"Ja/Nein-вопрос и W-вопрос","goal":"Задать простой вопрос.","rule":"В вопросе без вопросительного слова глагол стоит на первом месте: Haben Sie Zeit? В W-вопросе вопросительное слово первое, глагол второе: Wo wohnen Sie?","examples":[{"de":"Haben Sie heute Zeit?","ru":"У Вас сегодня есть время?"},{"de":"Wo wohnen Sie?","ru":"Где Вы живёте?"},{"de":"Wie heißen Sie?","ru":"Как Вас зовут?"}],"drills":[{"q":"Правильный ja/nein-вопрос:","options":["Sie haben Zeit?","Haben Sie Zeit?","Wo haben Sie Zeit?"],"answer":1,"explanation":"","topic":""},{"q":"Какое W-слово значит «где»?","options":["wer","wo","wann"],"answer":1,"explanation":"","topic":""},{"q":"В W-вопросе глагол стоит...","options":["на втором месте","всегда в конце","на третьем месте"],"answer":0,"explanation":"","topic":""}],"tags":["questions"]},{"id":"a0-07-nicht-kein","level":"A0","order":7,"module":"Старт","title":"Отрицание nicht и kein","goal":"Отрицать действие и существительное.","rule":"kein отрицает существительное с неопределённым артиклем или без артикля: Ich habe keinen Termin. nicht отрицает глагол, прилагательное или всю фразу: Ich komme nicht.","examples":[{"de":"Ich habe keinen Termin.","ru":"У меня нет записи."},{"de":"Ich verstehe nicht.","ru":"Я не понимаю."},{"de":"Das ist nicht teuer.","ru":"Это не дорого."}],"drills":[{"q":"Как отрицать «einen Termin»?","options":["nicht Termin","keinen Termin","kein Termin"],"answer":1,"explanation":"","topic":""},{"q":"Выберите правильное:","options":["Ich verstehe nicht.","Ich nicht verstehe.","Ich verstehe kein."],"answer":0,"explanation":"","topic":""},{"q":"kein меняется по падежам?","options":["да","нет","только в B2"],"answer":0,"explanation":"","topic":""}],"tags":["negation"]},{"id":"a0-08-","level":"A0","order":8,"module":"Старт","title":"Мини-диалог: выжить в разговоре","goal":"Собрать короткий бытовой диалог.","rule":"На A0 важнее не идеальная грамматика, а безопасные готовые фразы: Bitte langsamer. Ich lerne Deutsch. Können Sie mir helfen?","examples":[{"de":"Entschuldigung, ich lerne Deutsch.","ru":"Извините, я учу немецкий."},{"de":"Bitte etwas langsamer.","ru":"Пожалуйста, немного медленнее."},{"de":"Ich brauche Hilfe.","ru":"Мне нужна помощь."}],"drills":[{"q":"Как попросить говорить медленнее?","options":["Bitte etwas langsamer.","Bitte schneller.","Ich langsamer."],"answer":0,"explanation":"","topic":""},{"q":"Что значит «Ich brauche Hilfe»?","options":["Мне нужна помощь","Я иду домой","Я говорю быстро"],"answer":0,"explanation":"","topic":""},{"q":"Как начать вежливо?","options":["Entschuldigung","Tschüss","Nein danke"],"answer":0,"explanation":"","topic":""}],"tags":["dialogue"]},{"id":"a0-09-artikel-merken","level":"A0","order":9,"module":"Старт","title":"Как учить существительные с артиклем","goal":"Не терять род существительного уже на старте.","rule":"Немецкое существительное нужно учить как связку: артикль + слово + пример. Не der/die/das отдельно, а der Termin, die Frage, das Formular. Это снижает ошибки в Akkusativ и Dativ позже.","examples":[{"de":"der Termin","ru":"запись/приём"},{"de":"die Frage","ru":"вопрос"},{"de":"das Formular","ru":"формуляр"},{"de":"Ich habe einen Termin.","ru":"У меня есть запись."}],"drills":[{"q":"Как лучше учить слово Termin?","options":["Termin","der Termin","einen Termin только"],"answer":1,"explanation":"Учите сразу с артиклем.","topic":"articles"},{"q":"Какой артикль у Frage?","options":["der","die","das"],"answer":1,"explanation":"die Frage","topic":"articles"},{"q":"Что значит das Formular?","options":["формуляр","друг","дорога"],"answer":0,"explanation":"","topic":"articles"}],"tags":["articles","learning"]},{"id":"a0-10-hoeflichkeit","level":"A0","order":10,"module":"Старт","title":"Вежливые фразы Sie-уровня","goal":"Безопасно говорить с незнакомыми людьми.","rule":"В Германии и Швейцарии в официальной ситуации лучше начинать с Sie. Типовые фразы: Könnten Sie…, Ich hätte gern…, Entschuldigung, ich habe eine Frage.","examples":[{"de":"Könnten Sie mir bitte helfen?","ru":"Не могли бы Вы мне помочь?"},{"de":"Ich hätte gern einen Termin.","ru":"Я хотел(а) бы записаться."},{"de":"Entschuldigung, ich habe eine Frage.","ru":"Извините, у меня вопрос."}],"drills":[{"q":"Вежливое обращение к незнакомому человеку:","options":["du","Sie","ihr"],"answer":1,"explanation":"","topic":"politeness"},{"q":"Как сказать «я хотел бы»?","options":["Ich hätte gern","Ich habe gern","Ich bin gern"],"answer":0,"explanation":"","topic":"politeness"},{"q":"Что звучит безопасно в клинике?","options":["Könnten Sie mir bitte helfen?","Hilf sofort!","Du musst helfen."],"answer":0,"explanation":"","topic":"politeness"}],"tags":["phrases","politeness"]},{"id":"a0-11-satzbau-minimal","level":"A0","order":11,"module":"Старт","title":"Минимальный шаблон немецкой фразы","goal":"Собирать простые фразы без лишней теории.","rule":"Для первых фраз держите шаблон: Wer? + Verb + Ergänzung. Если добавляете время в начало, глагол всё равно остаётся вторым.","examples":[{"de":"Ich brauche Hilfe.","ru":"Мне нужна помощь."},{"de":"Heute brauche ich Hilfe.","ru":"Сегодня мне нужна помощь."},{"de":"Wir lernen Deutsch.","ru":"Мы учим немецкий."}],"drills":[{"q":"Где глагол в Heute brauche ich Hilfe?","options":["1","2","в конце"],"answer":1,"explanation":"Heute = позиция 1, brauche = позиция 2.","topic":"word-order"},{"q":"Выберите правильное:","options":["Ich Hilfe brauche.","Ich brauche Hilfe.","Brauche ich Hilfe."],"answer":1,"explanation":"Утверждение: глагол на позиции 2.","topic":"word-order"},{"q":"Wer? в фразе Wir lernen Deutsch:","options":["Wir","lernen","Deutsch"],"answer":0,"explanation":"","topic":"word-order"}],"tags":["word-order"]},{"id":"a0-12-mini-check-a0","level":"A0","order":12,"module":"Старт","title":"A0 мини-проверка перед A1","goal":"Понять, готов ли пользователь идти дальше.","rule":"Перед A1 достаточно уверенно читать простые слова, знать sein/haben, задавать простой вопрос и понимать nicht/kein на уровне готовых фраз.","examples":[{"de":"Ich bin bereit.","ru":"Я готов(а)."},{"de":"Haben Sie Zeit?","ru":"У Вас есть время?"},{"de":"Ich verstehe nicht.","ru":"Я не понимаю."}],"drills":[{"q":"ich + sein =","options":["ich bin","ich ist","ich bist"],"answer":0,"explanation":"","topic":"verbs"},{"q":"Ja/Nein-вопрос начинается с…","options":["подлежащего","глагола","артикля"],"answer":1,"explanation":"Haben Sie Zeit?","topic":"questions"},{"q":"Как сказать «я не понимаю»?","options":["Ich verstehe nicht.","Ich nicht verstehe.","Ich habe kein verstehe."],"answer":0,"explanation":"","topic":"negation"}],"tags":["checkpoint"]},{"id":"a1-01-praesens","level":"A1","order":1,"module":"A1 база","title":"Регулярные глаголы в Präsens","goal":"Спрягать lernen, machen, wohnen.","rule":"У регулярных глаголов основа + окончание: ich -e, du -st, er/sie/es -t, wir -en, ihr -t, sie/Sie -en.","examples":[{"de":"ich lerne, du lernst, er lernt","ru":"я учу, ты учишь, он учит"},{"de":"Wir wohnen in Frankfurt.","ru":"Мы живём во Франкфурте."}],"drills":[{"q":"du + lernen =","options":["du lerne","du lernst","du lernt"],"answer":1,"explanation":"","topic":""},{"q":"wir + machen =","options":["wir machen","wir macht","wir machst"],"answer":0,"explanation":"","topic":""},{"q":"ich + wohnen =","options":["ich wohnt","ich wohne","ich wohnen"],"answer":1,"explanation":"","topic":""}],"tags":["verbs"]},{"id":"a1-02-","level":"A1","order":2,"module":"A1 база","title":"Частые нерегулярные глаголы","goal":"Узнать сильные изменения в Präsens.","rule":"У некоторых глаголов меняется гласная во 2/3 лице: fahren → du fährst, er fährt; lesen → du liest, er liest; sprechen → du sprichst.","examples":[{"de":"Er fährt mit dem Bus.","ru":"Он едет на автобусе."},{"de":"Sprichst du Deutsch?","ru":"Ты говоришь по-немецки?"}],"drills":[{"q":"er + fahren =","options":["er fährt","er fahrt","er fahren"],"answer":0,"explanation":"","topic":""},{"q":"du + sprechen =","options":["du sprechst","du sprichst","du sprechen"],"answer":1,"explanation":"","topic":""},{"q":"lesen: er ...","options":["liest","lest","lesen"],"answer":0,"explanation":"","topic":""}],"tags":["verbs"]},{"id":"a1-03-der-die-das-nominativ","level":"A1","order":3,"module":"A1 база","title":"Артикли der/die/das и Nominativ","goal":"Понять род и форму подлежащего.","rule":"В Nominativ артикли: der Mann, die Frau, das Kind, die Leute. Род нужно учить вместе со словом.","examples":[{"de":"Der Arzt hilft.","ru":"Врач помогает."},{"de":"Die Frage ist wichtig.","ru":"Вопрос важен."},{"de":"Das Kind schläft.","ru":"Ребёнок спит."}],"drills":[{"q":"Какой артикль у Frau?","options":["der","die","das"],"answer":1,"explanation":"","topic":""},{"q":"Nominativ отвечает на вопрос...","options":["кто/что делает?","кого/что?","кому?"],"answer":0,"explanation":"","topic":""},{"q":"Множественное число в Nominativ чаще:","options":["die","der","das"],"answer":0,"explanation":"","topic":""}],"tags":["cases"]},{"id":"a1-04-akkusativ","level":"A1","order":4,"module":"A1 база","title":"Akkusativ: прямой объект","goal":"Сказать, кого/что видят, покупают, имеют.","rule":"В Akkusativ меняется только мужской артикль: der → den, ein → einen, kein → keinen. Женский, средний и множественное обычно как в Nominativ.","examples":[{"de":"Ich sehe den Arzt.","ru":"Я вижу врача."},{"de":"Ich kaufe eine Tasche.","ru":"Я покупаю сумку."},{"de":"Wir haben kein Auto.","ru":"У нас нет машины."}],"drills":[{"q":"der Termin в Akkusativ:","options":["den Termin","der Termin","dem Termin"],"answer":0,"explanation":"","topic":""},{"q":"ein Mann в Akkusativ:","options":["ein Mann","einen Mann","einem Mann"],"answer":1,"explanation":"","topic":""},{"q":"die Frau в Akkusativ:","options":["die Frau","den Frau","der Frau"],"answer":0,"explanation":"","topic":""}],"tags":["cases"]},{"id":"a1-05-dativ","level":"A1","order":5,"module":"A1 база","title":"Dativ: адресат и получатель","goal":"Использовать кому/где/с кем в базовых фразах.","rule":"Dativ часто отвечает на «кому?». Артикли: dem Mann, der Frau, dem Kind, den Leuten. После mit, nach, bei, seit, von, zu всегда Dativ.","examples":[{"de":"Ich helfe dem Patienten.","ru":"Я помогаю пациенту."},{"de":"Ich fahre mit dem Zug.","ru":"Я еду на поезде."},{"de":"Sie spricht mit der Ärztin.","ru":"Она говорит с врачом."}],"drills":[{"q":"mit требует...","options":["Akkusativ","Dativ","Nominativ"],"answer":1,"explanation":"","topic":""},{"q":"der Arzt в Dativ:","options":["den Arzt","dem Arzt","der Arzt"],"answer":1,"explanation":"","topic":""},{"q":"кому? чаще всего =","options":["Dativ","Akkusativ","Genitiv"],"answer":0,"explanation":"","topic":""}],"tags":["cases"]},{"id":"a1-06-","level":"A1","order":6,"module":"A1 база","title":"Модальные глаголы","goal":"Сказать могу/должен/хочу/разрешено.","rule":"Модальный глагол стоит на втором месте, основной инфинитив уходит в конец: Ich muss arbeiten. Частые: können, müssen, wollen, möchten, dürfen, sollen.","examples":[{"de":"Ich möchte einen Termin vereinbaren.","ru":"Я хотел(а) бы записаться."},{"de":"Wir müssen heute arbeiten.","ru":"Мы должны сегодня работать."},{"de":"Darf ich fragen?","ru":"Можно спросить?"}],"drills":[{"q":"Правильный порядок:","options":["Ich muss heute arbeiten.","Ich heute arbeiten muss.","Ich muss heute arbeite."],"answer":0,"explanation":"","topic":""},{"q":"möchten значит...","options":["хотел бы","должен","могу"],"answer":0,"explanation":"","topic":""},{"q":"Инфинитив после модального стоит...","options":["в конце","на первом месте","не нужен"],"answer":0,"explanation":"","topic":""}],"tags":["modal"]},{"id":"a1-07-","level":"A1","order":7,"module":"A1 база","title":"Отделяемые глаголы","goal":"Понять anrufen, aufstehen, einkaufen.","rule":"В Präsens приставка отделяется и уходит в конец: Ich rufe dich an. В Perfekt Partizip часто с ge внутри: angerufen, eingekauft.","examples":[{"de":"Ich stehe um sieben Uhr auf.","ru":"Я встаю в семь."},{"de":"Rufen Sie mich bitte an.","ru":"Позвоните мне, пожалуйста."},{"de":"Wir kaufen heute ein.","ru":"Мы сегодня закупаемся."}],"drills":[{"q":"anrufen: Ich ... dich ...","options":["rufe / an","anrufe / —","rufe / auf"],"answer":0,"explanation":"","topic":""},{"q":"aufstehen значит...","options":["вставать","звонить","покупать"],"answer":0,"explanation":"","topic":""},{"q":"Приставка в Präsens часто стоит...","options":["в конце","всегда перед глаголом","после артикля"],"answer":0,"explanation":"","topic":""}],"tags":["verbs"]},{"id":"a1-08-imperativ","level":"A1","order":8,"module":"A1 база","title":"Imperativ: просьбы и инструкции","goal":"Давать простые инструкции.","rule":"Формы: Komm! Kommen Sie bitte! Macht bitte die Übung! Вежливая форма с Sie сохраняет глагол + Sie.","examples":[{"de":"Warten Sie bitte einen Moment.","ru":"Подождите, пожалуйста, минуту."},{"de":"Komm bitte pünktlich.","ru":"Приходи, пожалуйста, вовремя."},{"de":"Öffnen Sie das Fenster.","ru":"Откройте окно."}],"drills":[{"q":"Вежливый императив:","options":["Warten Sie bitte.","Warte Sie bitte.","Sie warten bitte."],"answer":0,"explanation":"","topic":""},{"q":"Неформально к одному человеку:","options":["Komm!","Kommen Sie!","Kommt!"],"answer":0,"explanation":"","topic":""},{"q":"Что значит «bitte» в просьбе?","options":["пожалуйста","вчера","никогда"],"answer":0,"explanation":"","topic":""}],"tags":["speaking"]},{"id":"a1-09-perfekt","level":"A1","order":9,"module":"A1 база","title":"Perfekt на частых глаголах","goal":"Рассказать, что было вчера.","rule":"Perfekt = haben/sein + Partizip II. Большинство глаголов с haben; движение/изменение состояния часто с sein: Ich bin gegangen.","examples":[{"de":"Ich habe Deutsch gelernt.","ru":"Я учил немецкий."},{"de":"Wir sind nach Hause gegangen.","ru":"Мы пошли домой."},{"de":"Hast du gut geschlafen?","ru":"Ты хорошо спал?"}],"drills":[{"q":"lernen в Perfekt:","options":["gelernt","gelernen","lernt"],"answer":0,"explanation":"","topic":""},{"q":"gehen обычно с...","options":["sein","haben","werden"],"answer":0,"explanation":"","topic":""},{"q":"Partizip II стоит...","options":["в конце","на втором месте","перед субъектом"],"answer":0,"explanation":"","topic":""}],"tags":["past"]},{"id":"a1-10-a1","level":"A1","order":10,"module":"A1 база","title":"A1-диалоги: магазин, город, врач","goal":"Собрать простые сценарии общения.","rule":"Для A1 полезны шаблоны: Ich hätte gern..., Wo ist...?, Ich habe Schmerzen. Держите фразу короткой и уточняйте вопросом.","examples":[{"de":"Ich hätte gern ein Wasser.","ru":"Я хотел(а) бы воду."},{"de":"Wo ist die nächste Apotheke?","ru":"Где ближайшая аптека?"},{"de":"Ich habe Kopfschmerzen.","ru":"У меня болит голова."}],"drills":[{"q":"В магазине:","options":["Ich hätte gern...","Ich bin gestern...","Trotzdem..."],"answer":0,"explanation":"","topic":""},{"q":"Как спросить «где»?","options":["Wo...?","Wann...?","Warum...?"],"answer":0,"explanation":"","topic":""},{"q":"Schmerzen значит...","options":["боли","город","скидка"],"answer":0,"explanation":"","topic":""}],"tags":["dialogue"]},{"id":"a1-11-trennbare-verben","level":"A1","order":11,"module":"A1 база","title":"Отделяемые приставки","goal":"Понимать anrufen, aufstehen, einkaufen.","rule":"В Präsens отделяемая приставка уходит в конец: Ich rufe dich an. В инфинитиве и в словаре глагол пишется вместе: anrufen.","examples":[{"de":"Ich rufe morgen an.","ru":"Я позвоню завтра."},{"de":"Wir kaufen heute ein.","ru":"Мы сегодня покупаем продукты."},{"de":"Stehst du früh auf?","ru":"Ты рано встаёшь?"}],"drills":[{"q":"Правильно: Ich ___ dich ___.","options":["rufe / an","anrufe / —","rufe / auf"],"answer":0,"explanation":"anrufen разделяется.","topic":"verbs"},{"q":"einkaufen: Wir ___ heute ___.","options":["kaufen / ein","einkaufen / —","ein / kaufen"],"answer":0,"explanation":"","topic":"verbs"},{"q":"Где приставка в утверждении?","options":["в конце","всегда перед глаголом","исчезает"],"answer":0,"explanation":"","topic":"verbs"}],"tags":["verbs","separable"]},{"id":"a1-12-imperativ","level":"A1","order":12,"module":"A1 база","title":"Императив: просьба и инструкция","goal":"Давать короткие инструкции без грубости.","rule":"Императив бывает формальным и неформальным. С Sie: Kommen Sie bitte. С du: Komm bitte. Вежливость часто делает bitte и тон.","examples":[{"de":"Kommen Sie bitte um neun.","ru":"Приходите, пожалуйста, в девять."},{"de":"Füllen Sie das Formular aus.","ru":"Заполните формуляр."},{"de":"Warten Sie bitte hier.","ru":"Подождите здесь, пожалуйста."}],"drills":[{"q":"Формальный императив:","options":["Kommen Sie bitte.","Kommst du bitte.","Sie kommen bitte?"],"answer":0,"explanation":"","topic":"imperative"},{"q":"Что смягчает инструкцию?","options":["bitte","sofort","nie"],"answer":0,"explanation":"","topic":"politeness"},{"q":"ausfüllen в императиве Sie:","options":["Füllen Sie aus.","Ausfüllen Sie.","Sie ausfüllen."],"answer":0,"explanation":"","topic":"separable"}],"tags":["imperative","politeness"]},{"id":"a1-13-pronomen-akkusativ","level":"A1","order":13,"module":"A1 база","title":"Личные местоимения в Akkusativ","goal":"Заменять существительные местоимениями.","rule":"Akkusativ-формы: mich, dich, ihn, sie, es, uns, euch, sie/Sie. Они нужны после sehen, brauchen, fragen, anrufen.","examples":[{"de":"Ich sehe ihn.","ru":"Я вижу его."},{"de":"Sie ruft mich an.","ru":"Она звонит мне."},{"de":"Wir brauchen es.","ru":"Нам это нужно."}],"drills":[{"q":"Akkusativ от ich:","options":["mir","mich","ich"],"answer":1,"explanation":"","topic":"pronouns"},{"q":"Akkusativ от er:","options":["ihn","ihm","er"],"answer":0,"explanation":"","topic":"pronouns"},{"q":"rufen + mich или mir?","options":["mich","mir","ich"],"answer":0,"explanation":"anrufen требует Akkusativ.","topic":"pronouns"}],"tags":["pronouns","cases"]},{"id":"a2-01-akkusativ-dativ","level":"A2","order":1,"module":"A2 система","title":"Akkusativ/Dativ системно","goal":"Различать объект и адресата.","rule":"Akkusativ часто прямой объект: Ich sehe den Mann. Dativ адресат/получатель или после Dativ-предлогов: Ich helfe dem Mann.","examples":[{"de":"Ich gebe dem Kind den Ball.","ru":"Я даю ребёнку мяч."},{"de":"Sie erklärt der Kollegin die Aufgabe.","ru":"Она объясняет коллеге задание."}],"drills":[{"q":"В «Ich gebe dem Kind den Ball» dem Kind =","options":["Dativ","Akkusativ","Nominativ"],"answer":0,"explanation":"","topic":""},{"q":"den Ball =","options":["Dativ","Akkusativ","Genitiv"],"answer":1,"explanation":"","topic":""},{"q":"helfen требует...","options":["Dativ","Akkusativ","Nominativ"],"answer":0,"explanation":"","topic":""}],"tags":["cases"]},{"id":"a2-02-wechselpraepositionen-wo-wohin","level":"A2","order":2,"module":"A2 система","title":"Wechselpräpositionen: wo/wohin","goal":"Выбирать Dativ или Akkusativ после in/an/auf/unter...","rule":"Если вопрос где? — Dativ. Если куда? — Akkusativ. Ich bin in der Schule. Ich gehe in die Schule.","examples":[{"de":"Das Buch liegt auf dem Tisch.","ru":"Книга лежит на столе."},{"de":"Ich lege das Buch auf den Tisch.","ru":"Я кладу книгу на стол."},{"de":"Wir gehen ins Kino.","ru":"Мы идём в кино."}],"drills":[{"q":"wo? требует...","options":["Dativ","Akkusativ","Genitiv"],"answer":0,"explanation":"","topic":""},{"q":"wohin? требует...","options":["Dativ","Akkusativ","Nominativ"],"answer":1,"explanation":"","topic":""},{"q":"in + das Kino =","options":["ins Kino","im Kino","in dem Kino"],"answer":0,"explanation":"","topic":""}],"tags":["prepositions"]},{"id":"a2-03-perfekt","level":"A2","order":3,"module":"A2 система","title":"Perfekt системно","goal":"Строить прошлое для разных типов глаголов.","rule":"Слабые: gemacht. Сильные часто с -en: geschrieben. Отделяемые: eingekauft. Неотделяемые без ge-: besucht. Движение/изменение состояния часто с sein.","examples":[{"de":"Ich habe die E-Mail geschrieben.","ru":"Я написал письмо."},{"de":"Sie ist früh aufgestanden.","ru":"Она рано встала."},{"de":"Wir haben das Museum besucht.","ru":"Мы посетили музей."}],"drills":[{"q":"besuchen в Partizip II:","options":["besucht","gebesucht","besuchen"],"answer":0,"explanation":"","topic":""},{"q":"aufstehen:","options":["aufgestanden","geaufstanden","aufgesteht"],"answer":0,"explanation":"","topic":""},{"q":"fahren часто с...","options":["sein","haben","machen"],"answer":0,"explanation":"","topic":""}],"tags":["past"]},{"id":"a2-04-praeteritum-sein-haben-modal","level":"A2","order":4,"module":"A2 система","title":"Präteritum sein/haben/modal","goal":"Понимать короткое письменное прошлое.","rule":"В разговоре часто Perfekt, но sein/haben/modal часто в Präteritum: ich war, ich hatte, ich musste, ich konnte.","examples":[{"de":"Ich war gestern krank.","ru":"Вчера я был болен."},{"de":"Wir hatten keine Zeit.","ru":"У нас не было времени."},{"de":"Sie musste länger warten.","ru":"Ей пришлось ждать дольше."}],"drills":[{"q":"ich + sein в Präteritum:","options":["ich war","ich bin","ich wäre"],"answer":0,"explanation":"","topic":""},{"q":"wir + haben в Präteritum:","options":["wir hatten","wir haben","wir hätten"],"answer":0,"explanation":"","topic":""},{"q":"musste значит...","options":["должен был","мог бы","хотел бы"],"answer":0,"explanation":"","topic":""}],"tags":["past"]},{"id":"a2-05-weil-dass-wenn-ob","level":"A2","order":5,"module":"A2 система","title":"Придаточные weil/dass/wenn/ob","goal":"Ставить глагол в конец придаточного.","rule":"Союзы weil, dass, wenn, ob отправляют спрягаемый глагол в конец придаточного: Ich denke, dass er kommt.","examples":[{"de":"Ich lerne Deutsch, weil ich in Deutschland lebe.","ru":"Я учу немецкий, потому что живу в Германии."},{"de":"Ich weiß nicht, ob er heute kommt.","ru":"Я не знаю, придёт ли он сегодня."},{"de":"Wenn ich Zeit habe, übe ich.","ru":"Когда у меня есть время, я занимаюсь."}],"drills":[{"q":"После weil глагол...","options":["в конце","на первом месте","всегда второй"],"answer":0,"explanation":"","topic":""},{"q":"ob значит...","options":["ли","потому что","хотя"],"answer":0,"explanation":"","topic":""},{"q":"Правильно:","options":["weil ich Zeit habe","weil ich habe Zeit","weil habe ich Zeit"],"answer":0,"explanation":"","topic":""}],"tags":["clauses"]},{"id":"a2-06-komparativ-superlativ","level":"A2","order":6,"module":"A2 система","title":"Сравнение: Komparativ/Superlativ","goal":"Сравнивать людей, цены, варианты.","rule":"Komparativ часто с -er: schneller, wichtiger. Superlativ: am wichtigsten или der wichtigste. Нерегулярные: gut → besser → am besten.","examples":[{"de":"Deutsch wird leichter.","ru":"Немецкий становится легче."},{"de":"Das ist die beste Lösung.","ru":"Это лучшее решение."},{"de":"Diese Wohnung ist größer als die andere.","ru":"Эта квартира больше другой."}],"drills":[{"q":"gut →","options":["besser","guter","mehr gut"],"answer":0,"explanation":"","topic":""},{"q":"als используется для...","options":["сравнения","причины","времени"],"answer":0,"explanation":"","topic":""},{"q":"am wichtigsten =","options":["важнее всего","важный","неважный"],"answer":0,"explanation":"","topic":""}],"tags":["adjectives"]},{"id":"a2-07-","level":"A2","order":7,"module":"A2 система","title":"Возвратные глаголы","goal":"Говорить о действиях с sich.","rule":"Некоторые глаголы требуют reflexiv: sich erinnern, sich interessieren, sich fühlen. Местоимение меняется: ich erinnere mich, du erinnerst dich.","examples":[{"de":"Ich interessiere mich für Medizin.","ru":"Я интересуюсь медициной."},{"de":"Wie fühlst du dich?","ru":"Как ты себя чувствуешь?"},{"de":"Wir erinnern uns an den Termin.","ru":"Мы помним о встрече."}],"drills":[{"q":"ich + sich interessieren:","options":["ich interessiere mich","ich interessiere sich","ich interessiere mir"],"answer":0,"explanation":"","topic":""},{"q":"du + sich fühlen:","options":["du fühlst dich","du fühlst sich","du fühlst dir"],"answer":0,"explanation":"","topic":""},{"q":"sich erinnern an требует...","options":["an + Akkusativ","mit + Dativ","zu + Dativ"],"answer":0,"explanation":"","topic":""}],"tags":["verbs"]},{"id":"a2-08-","level":"A2","order":8,"module":"A2 система","title":"Местоимения","goal":"Заменять повторяющиеся существительные.","rule":"Личные местоимения меняются по падежу: ich/mich/mir; du/dich/dir; er/ihn/ihm; sie/sie/ihr.","examples":[{"de":"Ich sehe ihn.","ru":"Я вижу его."},{"de":"Ich helfe ihr.","ru":"Я помогаю ей."},{"de":"Kannst du mir helfen?","ru":"Можешь мне помочь?"}],"drills":[{"q":"Akkusativ от er:","options":["ihn","ihm","er"],"answer":0,"explanation":"","topic":""},{"q":"Dativ от sie (она):","options":["ihr","sie","ihn"],"answer":0,"explanation":"","topic":""},{"q":"mir значит...","options":["мне","меня","я"],"answer":0,"explanation":"","topic":""}],"tags":["pronouns"]},{"id":"a2-09-","level":"A2","order":9,"module":"A2 система","title":"Склонение прилагательных: старт","goal":"Ставить окончания после der/ein/без артикля.","rule":"После der-слов часто слабое окончание -e/-en: der gute Plan. После ein-слов в Nominativ муж./ср. прилагательное несёт род: ein guter Plan, ein gutes Beispiel.","examples":[{"de":"der gute Arzt","ru":"хороший врач"},{"de":"ein wichtiger Termin","ru":"важная встреча"},{"de":"mit gutem Grund","ru":"по хорошей причине"}],"drills":[{"q":"ein ___ Plan","options":["guter","gute","guten"],"answer":0,"explanation":"","topic":""},{"q":"der ___ Plan","options":["gute","guter","gutes"],"answer":0,"explanation":"","topic":""},{"q":"mit требует Dativ: mit gut___ Grund","options":["em","en","er"],"answer":0,"explanation":"","topic":""}],"tags":["adjectives"]},{"id":"a2-10-a2","level":"A2","order":10,"module":"A2 система","title":"Письмо A2: сообщение и просьба","goal":"Писать короткие бытовые тексты.","rule":"Структура: обращение → причина → просьба/информация → завершение. Используйте короткие предложения и понятные связки: weil, deshalb, bitte.","examples":[{"de":"Sehr geehrte Damen und Herren, ich möchte einen Termin verschieben.","ru":"Уважаемые дамы и господа, я хотел(а) бы перенести запись."},{"de":"Ich kann am Montag leider nicht kommen.","ru":"К сожалению, я не могу прийти в понедельник."},{"de":"Könnten Sie mir bitte einen neuen Termin geben?","ru":"Не могли бы Вы дать мне новую запись?"}],"drills":[{"q":"Формальное обращение:","options":["Sehr geehrte Damen und Herren","Hallo Leute","Tschüss"],"answer":0,"explanation":"","topic":""},{"q":"leider значит...","options":["к сожалению","поэтому","вчера"],"answer":0,"explanation":"","topic":""},{"q":"Könnten Sie... звучит...","options":["вежливо","грубо","детски"],"answer":0,"explanation":"","topic":""}],"tags":["writing"]},{"id":"a2-11-damit-um-zu","level":"A2","order":11,"module":"A2 развитие","title":"Цель: damit и um…zu","goal":"Объяснять цель действия.","rule":"Если субъект один и тот же, часто используется um…zu: Ich lerne, um besser zu sprechen. Если субъекты разные — damit: Ich erkläre es, damit du es verstehst.","examples":[{"de":"Ich lerne Deutsch, um in der Klinik zu arbeiten.","ru":"Я учу немецкий, чтобы работать в клинике."},{"de":"Ich schreibe es auf, damit ich es nicht vergesse.","ru":"Я записываю, чтобы не забыть."},{"de":"Er hilft mir, damit ich schneller fertig werde.","ru":"Он помогает мне, чтобы я быстрее закончил(а)."}],"drills":[{"q":"Один субъект: Ich lerne, ___ besser zu sprechen.","options":["um","damit","weil"],"answer":0,"explanation":"","topic":"clauses"},{"q":"Разные субъекты чаще требуют:","options":["um…zu","damit","ohne zu"],"answer":1,"explanation":"","topic":"clauses"},{"q":"Где стоит zu в um…zu?","options":["перед инфинитивом","после подлежащего","в начале главного"],"answer":0,"explanation":"","topic":"infinitive"}],"tags":["clauses","infinitive"]},{"id":"a2-12-praeteritum-modal","level":"A2","order":12,"module":"A2 развитие","title":"Präteritum модальных глаголов","goal":"Рассказывать о прошлом проще и естественнее.","rule":"Модальные глаголы в прошедшем часто используются в Präteritum: ich musste, konnte, wollte, sollte, durfte. Инфинитив смыслового глагола остаётся в конце.","examples":[{"de":"Ich musste lange warten.","ru":"Мне пришлось долго ждать."},{"de":"Wir konnten nicht kommen.","ru":"Мы не смогли прийти."},{"de":"Sie wollte einen Termin vereinbaren.","ru":"Она хотела договориться о приёме."}],"drills":[{"q":"ich + müssen в Präteritum:","options":["musste","müsste","gemusst"],"answer":0,"explanation":"","topic":"past"},{"q":"Правильный порядок:","options":["Ich musste lange warten.","Ich lange warten musste.","Ich musste wartete lange."],"answer":0,"explanation":"","topic":"word-order"},{"q":"konnte значит:","options":["мог/смог","должен был","хотел"],"answer":0,"explanation":"","topic":"modal"}],"tags":["past","modal"]},{"id":"a2-13-telefonieren","level":"A2","order":13,"module":"A2 развитие","title":"Телефонный разговор и запись","goal":"Позвонить, уточнить и перенести запись.","rule":"Для телефона нужны готовые рамки: Ich rufe wegen… an. Ich möchte einen Termin vereinbaren. Könnten wir den Termin verschieben?","examples":[{"de":"Ich rufe wegen meines Termins an.","ru":"Я звоню по поводу моего приёма."},{"de":"Ich möchte einen Termin vereinbaren.","ru":"Я хотел(а) бы договориться о приёме."},{"de":"Könnten wir den Termin verschieben?","ru":"Могли бы мы перенести запись?"}],"drills":[{"q":"Как начать звонок по поводу записи?","options":["Ich rufe wegen meines Termins an.","Ich telefoniere mein Termin.","Ich bin Termin."],"answer":0,"explanation":"","topic":"phone"},{"q":"vereinbaren значит:","options":["договариваться","отменять","болеть"],"answer":0,"explanation":"","topic":"phone"},{"q":"Вежливо перенести:","options":["Könnten wir den Termin verschieben?","Termin weg!","Ich verschiebe du."],"answer":0,"explanation":"","topic":"politeness"}],"tags":["phone","appointments"]},{"id":"b1-01-","level":"B1","order":1,"module":"B1 самостоятельность","title":"Времена: обзор функций","goal":"Использовать времена не только как формы, но и как смысл.","rule":"Präsens — сейчас/регулярно/будущее по контексту. Perfekt — разговорное прошлое. Präteritum — письменное повествование и sein/haben/modal. Plusquamperfekt — действие раньше другого прошлого. Futur I — будущее или предположение.","examples":[{"de":"Nachdem ich angekommen war, rief ich sie an.","ru":"После того как я приехал, я ей позвонил."},{"de":"Er wird wohl krank sein.","ru":"Он, вероятно, болен."}],"drills":[{"q":"Plusquamperfekt показывает...","options":["предшествование в прошлом","будущее","приказ"],"answer":0,"explanation":"","topic":""},{"q":"Futur I может выражать...","options":["предположение","только прошлое","падеж"],"answer":0,"explanation":"","topic":""},{"q":"sein/haben в прошлом часто:","options":["Präteritum","Genitiv","Imperativ"],"answer":0,"explanation":"","topic":""}],"tags":["tenses"]},{"id":"b1-02-","level":"B1","order":2,"module":"B1 самостоятельность","title":"Относительные предложения","goal":"Соединять фразы без повторов.","rule":"Относительное местоимение зависит от рода/числа существительного и падежа в придаточном: der Mann, den ich sehe; die Frau, der ich helfe.","examples":[{"de":"Das ist der Kollege, der mir geholfen hat.","ru":"Это коллега, который мне помог."},{"de":"Die Aufgabe, die ich gemacht habe, war schwer.","ru":"Задание, которое я сделал, было сложным."},{"de":"Der Patient, dem ich helfe, wartet.","ru":"Пациент, которому я   <script>
  (() => {
    'use strict';

    const DATA = JSON.parse(document.getElementById('app-data').textContent);
    const STORE_KEY = 'deTutor.v2';
    const LEVELS = DATA.levels;
    const NAV = [
      ['home','Главная'],
      ['diagnostic','Диагностика'],
      ['path','Путь A0→B2'],
      ['grammar','Грамматика'],
      ['b2','B2 коротко'],
      ['vocab','Словарь'],
      ['trainer','Тренажёр'],
      ['progress','Прогресс'],
      ['settings','Настройки']
    ];
    const $ = (s, root=document) => root.querySelector(s);
    const $$ = (s, root=document) => Array.from(root.querySelectorAll(s));
    const esc = (s) => String(s ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
    const cleanSpeak = (s) => String(s || '').replace(/\([^)]*\)/g,'').replace(/^[^A-Za-zÄÖÜäöüß]+/,'').trim();

    let state = loadState();

    function defaultState(){
      return {
        version: DATA.version,
        currentLevel: 'A0',
        lessonStatus: {},
        wordStatus: {},
        hideLearned: false,
        statusFilter: 'all',
        vocabLevel: 'Alle',
        vocabTopic: 'Alle',
        vocabSearch: '',
        grammarLevel: 'Alle',
        diagnosticResult: null,
        diagnosticAnswers: {},
        weakTopics: {},
        profile: { medicine:false, swiss:false, surgery:false },
        audio: { enabled:true, rate:0.95, lang:'de-DE', mode:'online', lastEngine:'' },
        migratedFromV13: false
      };
    }

    function loadState(){
      let s = defaultState();
      try {
        const raw = localStorage.getItem(STORE_KEY);
        if (raw) s = Object.assign(s, JSON.parse(raw));
      } catch(e) {}
      s.profile = Object.assign({medicine:false, swiss:false, surgery:false}, s.profile || {});
      s.audio = Object.assign({enabled:true, rate:0.95, lang:'de-DE', mode:'online', lastEngine:'', policyVersion:''}, s.audio || {});
      if (s.audio.policyVersion !== 'v14.5-online-default') {
        if (!s.audio.mode || s.audio.mode === 'auto' || s.audio.mode === 'offline') s.audio.mode = 'online';
        s.audio.policyVersion = 'v14.5-online-default';
      }
      s.lessonStatus = s.lessonStatus || {};
      s.wordStatus = s.wordStatus || {};
      s.weakTopics = s.weakTopics || {};
      s.diagnosticAnswers = s.diagnosticAnswers || {};
      migrateOldDoneKeys(s);
      return s;
    }

    function saveState(){
      try { localStorage.setItem(STORE_KEY, JSON.stringify(state)); } catch(e) {}
      updateLevelSelect();
    }

    function migrateOldDoneKeys(s){
      if (s.migratedFromV13) return;
      try {
        const keys = Object.keys(localStorage).filter(k => k.startsWith('done-') && localStorage.getItem(k) === '1');
        if (keys.length) {
          // старые ключи v13 не имеют полной карты новых уроков; сохраняем факт миграции и помечаем стартовый маршрут как изученный, если он был отмечен
          if (keys.includes('done-study-route')) {
            const first = DATA.lessons.find(l => l.level === 'A0');
            if (first) s.lessonStatus[first.id] = 'learned';
          }
          s.v13DoneKeys = keys;
        }
      } catch(e) {}
      s.migratedFromV13 = true;
    }

    function route(){
      return (location.hash || '#home').slice(1) || 'home';
    }

    function navigate(name){
      if (route() === name) render();
      else location.hash = name;
      closeDrawer();
    }

    function toast(msg){
      const t = $('#toast');
      t.textContent = msg;
      t.classList.add('show');
      clearTimeout(toast._timer);
      toast._timer = setTimeout(() => t.classList.remove('show'), 2300);
    }

    function updateNav(){
      const current = route().split('/')[0];
      const buttons = NAV.map(([r,label]) => `<button class="${current===r?'active':''}" data-route="${r}">${esc(label)}</button>`).join('');
      $('#desktopNav').innerHTML = buttons;
      $('#drawerNav').innerHTML = buttons + `<hr style="border-color:var(--line);margin:14px 0"><button data-action="print">Печатная шпаргалка</button>`;
    }

    function updateLevelSelect(){
      const sel = $('#levelSelect');
      sel.innerHTML = LEVELS.map(l => `<option value="${l}" ${state.currentLevel===l?'selected':''}>${l}</option>`).join('');
    }

    function levelIndex(level){ return LEVELS.indexOf(level); }

    function lessonsBy(level){
      return DATA.lessons.filter(l => level === 'Alle' || l.level === level);
    }

    function statusOf(id){
      return state.lessonStatus[id] || 'new';
    }

    function statusBadge(st){
      const map = {
        new: ['Новый',''],
        in_progress: ['В процессе','warn'],
        learned: ['✓ изучено','ok'],
        review: ['Повторить','danger']
      };
      const x = map[st] || map.new;
      return `<span class="badge ${x[1]}">${x[0]}</span>`;
    }

    function levelProgress(level){
      const arr = lessonsBy(level);
      const done = arr.filter(l => statusOf(l.id) === 'learned').length;
      return {done, total: arr.length, pct: arr.length ? Math.round(done / arr.length * 100) : 0};
    }

    function allProgress(){
      const done = DATA.lessons.filter(l => statusOf(l.id) === 'learned').length;
      return {done, total: DATA.lessons.length, pct: Math.round(done / DATA.lessons.length * 100)};
    }

    function nextLesson(){
      const fromCurrent = DATA.lessons.filter(l => levelIndex(l.level) >= levelIndex(state.currentLevel));
      return fromCurrent.find(l => statusOf(l.id) !== 'learned') || DATA.lessons.find(l => statusOf(l.id) !== 'learned') || DATA.lessons[0];
    }

    function render(){
      updateNav();
      updateLevelSelect();
      const r = route();
      const [base, param] = r.split('/');
      const app = $('#app');
      let html = '';
      if (base === 'home') html = renderHome();
      else if (base === 'diagnostic') html = renderDiagnostic();
      else if (base === 'path') html = renderPath(param || state.currentLevel);
      else if (base === 'lesson') html = renderLesson(param);
      else if (base === 'grammar') html = renderGrammar(param);
      else if (base === 'b2') html = renderB2Short();
      else if (base === 'vocab') html = renderVocab();
      else if (base === 'trainer') html = renderTrainer();
      else if (base === 'progress') html = renderProgress();
      else if (base === 'settings') html = renderSettings();
      else html = renderHome();
      app.innerHTML = html;
      app.focus({preventScroll:true});
      bindDynamic();
    }

    function renderHome(){
      const p = allProgress();
      const n = nextLesson();
      const b2p = levelProgress('B2');
      return `
        <section class="hero">
          <div class="hero-card">
            <div class="badge-row">
              <span class="badge ok">готовый маршрут A0→B2</span>
              <span class="badge">offline HTML</span>
              <span class="badge">v14.2</span>
            </div>
            <h1>Немецкий без хаоса: A0 → B2</h1>
            <p class="lead">Сначала выберите сценарий. Не нужно разбираться в длинном меню: B2-грамматика, словарь, путь с нуля и диагностика открываются сразу.</p>
            <div class="quick-grid">
              <button class="quick primary" data-route="path/A0"><b>Я новичок</b><span>начать с A0, звуки, первые фразы, простые вопросы</span></button>
              <button class="quick" data-route="diagnostic"><b>Проверить уровень</b><span>${DATA.diagnostic.length} вопросов и рекомендация A0/A1/A2/B1/B2</span></button>
              <button class="quick" data-route="b2"><b>Грамматика B2 коротко</b><span>прямой вход в краткое B2-резюме</span></button>
              <button class="quick" data-route="vocab"><b>Словарь отдельно</b><span>поиск, уровни, темы, профильные пакеты</span></button>
            </div>
          </div>
          <aside class="stats">
            <div class="stat">
              <div class="num">${p.pct}%</div>
              <div>общий прогресс: ${p.done}/${p.total} уроков</div>
              <div class="progress-bar"><span style="width:${p.pct}%"></span></div>
            </div>
            <div class="stat">
              <div class="muted">Следующий шаг</div>
              <h3>${esc(n.level)} · ${esc(n.title)}</h3>
              <p>${esc(n.goal)}</p>
              <button class="btn primary" data-route="lesson/${esc(n.id)}">Открыть урок</button>
            </div>
            <div class="stat">
              <div class="muted">B2-грамматика</div>
              <div class="progress-bar"><span style="width:${b2p.pct}%"></span></div>
              <p>${b2p.done}/${b2p.total} B2-тем отмечено.</p>
            </div>
          </aside>
        </section>

        <section class="panel">
          <div class="section-title"><h2>Быстрые зоны</h2><span class="muted">сделано по плану v13 → v14.2</span></div>
          <div class="grid four">
            ${infoCard('Диагностика', 'Короткий входной тест. Слабые темы сохраняются в прогрессе.', 'diagnostic')}
            ${infoCard('Учебный путь', `${DATA.lessons.length} урок: короткое правило → примеры → тренировка.`, 'path')}
            ${infoCard('Грамматика', 'Фильтр по уровню, режим B2-резюме, печатная шпаргалка.', 'grammar')}
            ${infoCard('Словарь', `${DATA.vocab.length} слов и фраз. Профильные блоки выключены по умолчанию.`, 'vocab')}
          </div>
        </section>

        <section class="panel">

    function infoCard(title, text, routeName){
      return `<article class="card"><h3>${esc(title)}</h3><p>${esc(text)}</p><button class="btn" data-route="${routeName}">Перейти</button></article>`;

    function levelTitle(l){
      return ({A0:'Полный старт', A1:'База общения', A2:'Систематизация', B1:'Самостоятельность', B2:'Уверенное владение'})[l] || l;

    function levelGoal(l){
      return ({
        A0:'читать, представиться, задать первые вопросы',
        A1:'говорить о себе, семье, городе, работе и потребностях',
        A2:'рассказывать прошлое, объяснять причину, писать короткие сообщения',
        B1:'аргументировать, писать связные тексты, понимать основные темы',
        B2:'писать и говорить структурированно, пользоваться официальным стилем'

    function levelTabs(active, base='path'){
      return `<div class="level-tabs">

    function renderPath(level){
      if (!LEVELS.includes(level)) level = state.currentLevel;

      saveState();

      const visible = all.filter(l => {
        const st = statusOf(l.id);

        <section class="panel">

                  <td><b>${esc(v.de)}</b> <button class="speak" data-speak="${esc(v.de)}">🔊</button><br><span class="muted">${esc(v.pos)}</span></td>

    function renderDiagnostic(){

      return `
        <section class="panel">
          <div class="section-title">
            <div><h2>Проверка уровня / диагностика</h2><p class="muted">${DATA.diagnostic.length} вопросов. Результат предлагает стартовый уровень и сохраняет слабые темы.</p></div>
            <button class="btn" data-action="reset-diagnostic">Очистить ответы</button>
          </div>
          ${result ? renderDiagnosticResult(result) : ''}
          <form id="diagnosticForm" class="diagnostic-grid">
            ${DATA.diagnostic.map((q,i) => `<div class="diagnostic-q">
              <div class="badge-row"><span class="badge">${esc(q.level)}</span><span class="badge">${esc(q.topic)}</span></div>
              <p><b>${i+1}. ${esc(q.q)}</b></p>

            </div>`).join('')}
            <button type="button" class="btn primary" data-action="submit-diagnostic">Показать рекомендацию</button>
          </form>
        </section>`;
    }

    function diagnosticExplain(q, rightText, yourText){
      const raw = [q.q, q.topic, q.level, rightText, ...(q.options || [])].join(' ').toLowerCase();

      if (q.explanation) return q.explanation;

      if (raw.includes('guten tag')) return '«Guten Tag» — дневное приветствие: “добрый день”. Это не прощание и не ночная формула.';
      if (raw.includes('ei') || raw.includes('mein')) return 'ei обычно читается как «ай»: mein ≈ майн, nein ≈ найн.';
      if (raw.includes('sch')) return 'sch читается как русский звук «ш»: Schule, Deutsch, sprechen.';
      if (raw.includes('ich ...') || raw.includes('ich bin')) return 'Для sein с ich нужна форма bin: ich bin. Bist = du, ist = er/sie/es.';
      if (raw.includes('du + lernen') || raw.includes('du lernst')) return 'У регулярного глагола lernen во 2-м лице единственного числа окончание -st: du lernst.';
      if (raw.includes('wo wohnen')) return '“Где?” = wo. В W-вопросе порядок: W-слово + глагол + подлежащее: Wo wohnen Sie?';
      if (raw.includes('haben sie zeit')) return 'В Ja/Nein-вопросе глагол стоит первым: Haben Sie Zeit?';
      if (raw.includes('um acht')) return 'Для точного времени используется um: um acht Uhr. am используется с днями и датами.';
      if (raw.includes('akkusativ') || raw.includes('den termin')) return 'Akkusativ нужен для прямого объекта “кого? что?”. У мужского рода der/ein меняется на den/einen: der Termin → den Termin.';
      if (raw.includes('dativ') || raw.includes('mit ') || raw.includes('dem bus') || raw.includes('mir')) return 'Dativ часто отвечает на “кому?” и используется после mit, bei, zu, aus, von, seit, nach.';
      if (raw.includes('genitiv') || raw.includes('aufgrund') || raw.includes('wegen') || raw.includes('trotz')) return 'В письменном стандарте aufgrund, wegen, trotz, während часто требуют Genitiv: aufgrund der Kosten.';
      if (raw.includes('modal') || raw.includes('muss arbeiten')) return 'С модальным глаголом смысловой глагол уходит в конец в инфинитиве: Ich muss arbeiten.';
      if (raw.includes('perfekt') || raw.includes('gefahren') || raw.includes('gelernt')) return 'Perfekt = haben/sein + Partizip II. Движение с изменением места часто берёт sein: ich bin gefahren.';
      if (raw.includes('wohin') || raw.includes('wechsel')) return 'С Wechselpräpositionen wo? → Dativ, wohin? → Akkusativ.';
      if (raw.includes('weil') || raw.includes('dass') || raw.includes('wenn') || raw.includes('obwohl')) return 'После weil/dass/wenn/obwohl спрягаемый глагол стоит в конце придаточного: weil ich Zeit habe.';
      if (raw.includes('um') && raw.includes('zu')) return 'Если субъект один и тот же, цель часто выражается через um ... zu. Если субъекты разные, чаще нужен damit.';
      if (raw.includes('adjektiv') || raw.includes('guter') || raw.includes('gute idee')) return 'Окончание прилагательного зависит от рода, падежа и артикля: ein guter Plan, eine gute Idee, ein gutes Beispiel.';
      if (raw.includes('relativ') || raw.includes('mit ___ ich')) return 'В Relativsatz местоимение зависит от падежа внутри придаточного. После mit нужен Dativ: mit dem.';
      if (raw.includes('anzurufen')) return 'У отделяемого глагола zu вставляется между приставкой и основой: anrufen → anzurufen.';
      if (raw.includes('passiv') || raw.includes('wurde') || raw.includes('aufgeklärt')) return 'Passiv смещает фокус на действие. Präsens: wird geprüft; Präteritum: wurde geprüft.';
      if (raw.includes('lässt sich') || raw.includes('laesst sich')) return 'lässt sich + Infinitiv означает “это можно сделать”: Das Problem lässt sich lösen = проблему можно решить.';
      if (raw.includes('konjunktiv ii') || raw.includes('könnten') || raw.includes('hätte') || raw.includes('wäre')) return 'Konjunktiv II используется для вежливости, осторожных предложений и нереальных условий.';
      if (raw.includes('konjunktiv i') || raw.includes('sei') || raw.includes('er habe')) return 'Konjunktiv I передаёт чужие слова в косвенной речи: er habe, sie sei.';
      if (raw.includes('dennoch') || raw.includes('deshalb') || raw.includes('trotzdem')) return 'dennoch/deshalb/trotzdem занимают первое поле, поэтому после них сразу стоит спрягаемый глагол: Dennoch sollte man…';
      if (raw.includes('nominalstil') || raw.includes('nach prüfung')) return 'Nominalstil заменяет действие существительным: nachdem man geprüft hat → nach Prüfung. Это делает текст официальнее.';
      if (raw.includes('rückmeldung') || raw.includes('официальнее')) return 'В официальной ситуации нужен нейтральный регистр: Ich bitte um Rückmeldung.';
      if (raw.includes('einwilligung')) return 'die Einwilligung — согласие. В медицине это ключевое слово перед процедурой или лечением.';
      if (raw.includes('franchise')) return 'die Franchise в Швейцарии относится к медицинской страховке и собственному участию в расходах.';
      if (raw.includes('trockenschichtdicke')) return 'die Trockenschichtdicke — сухая толщина слоя покрытия. Это термин строительства/АКЗ.';

      return `Правильный ответ — «${rightText}». Твой вариант «${yourText}» отличается по форме, падежу, порядку слов, смыслу или стилю.`;
    }

    function renderDiagnosticReview(r){
      const answers = r.answers || state.diagnosticAnswers || {};
      return `<div class="diagnostic-review">
        <h3>Разбор ответов</h3>
        <p class="muted">Появляется только после завершения диагностики.</p>
        ${DATA.diagnostic.map((q,i) => {
          const selected = Number(answers[i]);
          const known = Number.isInteger(selected) && selected >= 0;
          const ok = known && selected === q.answer;
          const yourText = known ? q.options[selected] : 'не выбран';
          const rightText = q.options[q.answer];
          return `<article class="diag-item ${ok?'ok':'bad'}">
            <div class="diag-q">${i+1}. [${esc(q.level)}] ${esc(q.q)}</div>
            <div class="diag-line"><b>Твой ответ:</b> ${esc(yourText)}</div>
            <div class="diag-line"><b>Правильный ответ:</b> ${esc(rightText)}</div>
            <div class="diag-line"><b>Статус:</b> ${ok ? '✓ правильно' : '✗ ошибка'}</div>
            <div class="diag-explain"><b>Почему так:</b> ${esc(diagnosticExplain(q, rightText, yourText))}</div>
            ${ok ? '' : '<div class="diag-note">Смотри механизм: падеж, место глагола, форму глагола, смысл или регистр.</div>'}
          </article>`;
        }).join('')}
      </div>`;
    }

    function renderDiagnosticResult(r){
      return `<div class="result-box">
        <h3>Рекомендация: начать с ${esc(r.recommended)}</h3>
        <p>Результат: ${r.totalCorrect}/${DATA.diagnostic.length}. По уровням: ${LEVELS.map(l => `${l}: ${r.byLevel[l].correct}/${r.byLevel[l].total}`).join(' · ')}</p>
        <div class="toolbar">
          <button class="btn primary" data-route="path/${esc(r.recommended)}">Принять: открыть ${esc(r.recommended)}</button>
          <button class="btn" data-route="trainer">Тренировать слабые темы</button>
        </div>
        ${renderDiagnosticReview(r)}
      </div>`;
    }

    function submitDiagnostic(){
      const form = $('#diagnosticForm');
      const byLevel = {};
      const answers = {};
      LEVELS.forEach(l => byLevel[l] = {correct:0,total:0});
      let totalCorrect = 0;

      DATA.diagnostic.forEach((q,i) => {
        byLevel[q.level].total++;
        const val = form.querySelector(`input[name="dq${i}"]:checked`);
        const choice = val ? Number(val.value) : -1;
        answers[i] = choice;

        if (choice === q.answer) {
          byLevel[q.level].correct++;
          totalCorrect++;
        } else {
          state.weakTopics[q.topic] = (state.weakTopics[q.topic] || 0) + 1;
        }
      });

      let recommended = 'B2';
      for (const l of LEVELS) {
        if (byLevel[l].correct < Math.ceil(byLevel[l].total * .6)) { recommended = l; break; }
      }

      state.currentLevel = recommended;
      state.diagnosticAnswers = answers;
      state.diagnosticResult = {recommended, byLevel, totalCorrect, answers, date: new Date().toISOString()};
      saveState();
      render();
      toast(`Рекомендация: ${recommended}`);
    }

    function renderTrainer(){
      const weak = Object.keys(state.weakTopics).filter(k => state.weakTopics[k] > 0);
      let drills = DATA.lessons
        .filter(l => l.level === state.currentLevel || weak.some(t => l.tags.includes(t)))
        .flatMap(l => l.drills.map((d,i) => Object.assign({lesson:l.title, level:l.level, key:`${l.id}-${i}`}, d)));
      if (!drills.length) drills = DATA.lessons.filter(l => l.level === state.currentLevel).flatMap(l => l.drills);
      drills = drills.slice(0, 18);
      return `<section class="panel">
        <div class="section-title">
          <div><h2>Тренажёр</h2><p class="muted">Текущий уровень: ${esc(state.currentLevel)}. Слабые темы: ${weak.length ? weak.map(esc).join(', ') : 'пока нет'}.</p></div>
          <button class="btn" data-route="diagnostic">Обновить диагностику</button>
        </div>
        <div class="grid two">
          ${drills.map((d,i) => `<article class="card">
            <div class="badge-row"><span class="badge">${esc(d.level || state.currentLevel)}</span><span class="badge">${esc(d.lesson || 'упражнение')}</span></div>
            ${renderDrill(d, `trainer-${i}`)}
          </article>`).join('')}
        </div>
      </section>`;
    }

    function renderProgress(){
      const p = allProgress();
      const weak = Object.entries(state.weakTopics).filter(([,n]) => n > 0).sort((a,b)=>b[1]-a[1]);
      return `<section class="panel">
        <div class="section-title">
          <div><h2>Прогресс</h2><p class="muted">Состояние хранится локально в одном объекте ${STORE_KEY}.</p></div>
          <button class="btn primary" data-route="path/${esc(state.currentLevel)}">Продолжить</button>
        </div>
        <div class="card">
          <h3>Общий прогресс: ${p.pct}%</h3>
          <div class="progress-bar"><span style="width:${p.pct}%"></span></div>
          <p>${p.done}/${p.total} уроков изучено.</p>
        </div>
        <div class="grid">
          ${LEVELS.map(l => {
            const pr = levelProgress(l);
            return `<article class="card"><h3>${l} · ${levelTitle(l)}</h3><div class="progress-bar"><span style="width:${pr.pct}%"></span></div><p>${pr.done}/${pr.total} · ${pr.pct}%</p><button class="btn" data-route="path/${l}">Открыть</button></article>`;
          }).join('')}
        </div>
        <div class="grid two">
          <article class="card">
            <h3>Слабые темы</h3>
            ${weak.length ? `<ul>${weak.map(([t,n]) => `<li>${esc(t)} — ${n}</li>`).join('')}</ul>` : '<p class="muted">Пока нет данных. Пройдите диагностику или тренировки.</p>'}
            <button class="btn" data-route="trainer">Тренировать</button>
          </article>
          <article class="card">
            <h3>Данные прогресса</h3>
            <p>Можно экспортировать JSON или сбросить локальный прогресс.</p>
            <button class="btn" data-action="export-progress">Экспорт JSON</button>
            <button class="btn danger" data-action="reset-progress">Сбросить прогресс</button>
          </article>
        </div>
      </section>`;
    }

    function renderSettings(){
      return `<section class="panel">
        <div class="section-title"><h2>Настройки</h2><span class="muted">аудио свернуто, профильные блоки выключены по умолчанию</span></div>
        <div class="grid two">
          <article class="card">
            <h3>Текущий уровень</h3>
            <p>Можно вручную переключить уровень независимо от диагностики.</p>
            <div class="level-tabs">${LEVELS.map(l => `<button class="${state.currentLevel===l?'active':''}" data-action="set-level" data-level="${l}">${l}</button>`).join('')}</div>
          </article>
          <article class="card">
            <h3>Скрывать изученное</h3>
            <p>По умолчанию изученный материал остаётся видимым. Это можно изменить здесь или в маршруте.</p>
            <label class="pill"><input type="checkbox" data-action="toggle-hide" ${state.hideLearned?'checked':''}> Скрывать изученное</label>
          </article>
        </div>
        <div class="grid three">
          ${['medicine','swiss','surgery'].map(p => profileCard(p)).join('')}
        </div>
        <details open>
          <summary>Аудио-настройки</summary>
          <p class="muted">v14.2: авто-режим выбирает доступный способ озвучки. На телефоне сначала пробуется offline-MP3 из папки <code>audio/</code>, затем online-MP3, затем голос устройства; на ПК обычно сначала голос устройства.</p>
          <div class="toolbar">
            <label class="pill"><input type="checkbox" data-action="audio-enabled" ${state.audio.enabled?'checked':''}> Озвучка включена</label>
            <label>Режим <select data-action="audio-mode">
              ${[['auto','Авто'],['device','Голос устройства'],['online','Онлайн MP3'],['offline','Offline MP3']].map(([v,t]) => `<option value="${v}" ${state.audio.mode===v?'selected':''}>${t}</option>`).join('')}
            </select></label>
            <label>Язык <select data-action="audio-lang">
              ${[['de-DE','Deutsch DE'],['de-CH','Deutsch CH'],['de-AT','Deutsch AT']].map(([v,t]) => `<option value="${v}" ${state.audio.lang===v?'selected':''}>${t}</option>`).join('')}
            </select></label>
            <label>Скорость <input type="number" min="0.6" max="1.3" step="0.05" data-action="audio-rate" value="${esc(state.audio.rate)}"></label>
            <button class="btn" data-speak="Guten Tag. Ich lerne Deutsch.">Тест 🔊</button>
          </div>
          <p class="muted">Последний движок: ${esc(state.audio.lastEngine || 'ещё не проверялся')}. На iPhone/Android первый запуск должен быть именно нажатием на кнопку 🔊.</p>
        </details>
        <details>
          <summary>Печатная версия</summary>
          <p>Печать скрывает меню, кнопки, озвучку и лишнюю навигацию.</p>
          <button class="btn" data-action="print">Печатать текущий экран</button>
        </details>
      </section>`;
    }

    function bindDynamic(){
      $$('#app [data-speak], .topbar [data-speak], .drawer [data-speak]').forEach(b => b.addEventListener('click', ev => {
        ev.stopPropagation();
        speak(b.getAttribute('data-speak'));
      }));
    }

    function isMobileAudio(){
      return /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent || '');
    }

    function bestGermanVoice(){
      try {
        const voices = window.speechSynthesis ? window.speechSynthesis.getVoices() : [];
        const lang = state.audio.lang || 'de-DE';
        return voices.find(v => v.lang === lang && v.localService) ||
               voices.find(v => v.lang === lang) ||
               voices.find(v => /^de[-_]/i.test(v.lang) && v.localService) ||
               voices.find(v => /^de[-_]/i.test(v.lang)) || null;
      } catch(e) { return null; }
    }

    function audioFileName(text){
      const s = cleanSpeak(text).toLowerCase().replace(/ä/g,'ae').replace(/ö/g,'oe').replace(/ü/g,'ue').replace(/ß/g,'ss').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'').slice(0,80);
      return s || 'audio';
    }

    function tryOfflineMp3(text){
      return new Promise((resolve, reject) => {
        const a = new Audio(`audio/${audioFileName(text)}.mp3`);
        a.preload = 'auto';
        a.onended = () => resolve('offline-mp3');
        a.onerror = () => reject(new Error('offline mp3 not found'));
        a.play().catch(reject);
      });
    }

    function tryOnlineMp3(text){
      return new Promise((resolve, reject) => {
        const spoken = cleanSpeak(text).slice(0,180);
        if (!spoken) return reject(new Error('online mp3 empty text'));
        const q = encodeURIComponent(spoken);
        const lang = encodeURIComponent((state.audio.lang || 'de-DE').split('-')[0] || 'de');
        const url = `https://translate.google.com/translate_tts?ie=UTF-8&client=tw-ob&tl=${lang}&q=${q}`;
        const a = new Audio();
        window.__deTutorAudio = a;
        let settled = false;
        const finish = (engine) => {
          if (settled) return;
          settled = true;
          clearTimeout(timer);
          state.audio.lastEngine = engine;
          saveState();
          resolve(engine);
        };
        const fail = (reason) => {
          if (settled) return;
          settled = true;
          clearTimeout(timer);
          const msg = `online error: ${reason}`;
          state.audio.lastEngine = msg;
          saveState();
          reject(new Error(msg));
        };
        const timer = setTimeout(() => fail('timeout'), isMobileAudio() ? 9000 : 7000);
        a.preload = 'auto';
        a.playbackRate = Number(state.audio.rate) || .95;
        a.onplaying = () => finish('online-mp3');
        a.onended = () => finish('online-mp3');
        a.onerror = () => {
          const code = a.error ? `media ${a.error.code}` : 'media error';
          fail(code);
        };
        a.src = url;
        a.play().catch(e => fail(e && (e.name || e.message) ? (e.name || e.message) : 'play rejected'));
      });
    }

    function tryDeviceSpeech(text){
      return new Promise((resolve, reject) => {
        try {
          if (!('speechSynthesis' in window) || !('SpeechSynthesisUtterance' in window)) return reject(new Error('speechSynthesis unavailable'));
          const spoken = cleanSpeak(text);
          if (!spoken) return reject(new Error('empty text'));
          window.speechSynthesis.cancel();
          const u = new SpeechSynthesisUtterance(spoken);
          u.lang = state.audio.lang || 'de-DE';
          u.rate = Number(state.audio.rate) || .95;
          const voice = bestGermanVoice();
          if (voice) u.voice = voice;
          let started = false;
          const timer = setTimeout(() => {
            if (!started) reject(new Error('device speech timeout'));
          }, isMobileAudio() ? 1400 : 2200);
          u.onstart = () => { started = true; state.audio.lastEngine = voice ? `device: ${voice.name}` : 'device: default'; saveState(); };
          u.onend = () => { clearTimeout(timer); resolve(state.audio.lastEngine || 'device'); };
          u.onerror = (e) => { clearTimeout(timer); reject(e.error || new Error('speech error')); };
          window.speechSynthesis.speak(u);
        } catch(e) { reject(e); }
      });
    }

    async function speak(text){
      if (!state.audio.enabled) return toast('Озвучка выключена в настройках');
      const mode = state.audio.mode || 'online';
      const order = mode === 'offline' ? ['offline','device','online'] :
                    mode === 'online' ? ['online','device','offline'] :
                    mode === 'device' ? ['device','online','offline'] :
                    ['online','device','offline'];

      for (const engine of order) {
        try {
          let used = '';
          if (engine === 'offline') used = await tryOfflineMp3(text);
          if (engine === 'online') used = await tryOnlineMp3(text);
          if (engine === 'device') used = await tryDeviceSpeech(text);

          if (used) {
            state.audio.lastEngine = used;
            saveState();
            toast(`Озвучка: ${used}`);
            return;
          }
        } catch(e) {
          state.audio.lastEngine = `${engine} error: ${e && (e.message || e.name || e) ? (e.message || e.name || e) : 'unknown'}`;
          saveState();
        }
      }

      toast('Озвучка не запустилась. Деталь: ' + (state.audio.lastEngine || 'нет данных') + '. Попробуйте «Голос устройства» или «Offline MP3».');
    }

    function markLesson(id, status){
      state.lessonStatus[id] = status;
      saveState();
      toast(status === 'learned' ? 'Отмечено как изучено' : 'Добавлено на повторение');
      render();
    }

    function answerDrill(btn){
      const parent = btn.closest('.drill');
      const correct = Number(btn.dataset.correct);
      const choice = Number(btn.dataset.choice);
      $$('.option', parent).forEach((b,i) => {
        b.disabled = true;
        if (i === correct) b.classList.add('correct');
        if (i === choice && i !== correct) b.classList.add('wrong');
      });
      const note = $('.answer-note', parent);
      if (choice === correct) {
        note.textContent = 'Верно. ' + (btn.dataset.explanation || '');
      } else {
        const topic = parent.dataset.topic || 'trainer';
        state.weakTopics[topic] = (state.weakTopics[topic] || 0) + 1;
        saveState();
        note.textContent = 'Неверно. Правильный ответ подсвечен. ' + (btn.dataset.explanation || '');
      }
    }

    function exportProgress(){
      const blob = new Blob([JSON.stringify(state, null, 2)], {type:'application/json'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `deutsch-a0-b2-progress-${new Date().toISOString().slice(0,10)}.json`;
      a.click();
      URL.revokeObjectURL(a.href);
    }

    function resetProgress(){
      if (!confirm('Сбросить локальный прогресс в этом браузере?')) return;
      try { localStorage.removeItem(STORE_KEY); } catch(e) {}
      state = defaultState();
      saveState();
      render();
      toast('Прогресс сброшен');
    }

    function closeDrawer(){
      $('#drawer').classList.remove('open');
      $('#drawerBackdrop').classList.remove('open');
    }

    document.addEventListener('click', ev => {
      const routeBtn = ev.target.closest('[data-route]');
      if (routeBtn) {
        ev.preventDefault();
        navigate(routeBtn.dataset.route);
        return;
      }
      const action = ev.target.closest('[data-action]');
      if (!action) return;
      const a = action.dataset.action;
      // v14.2: form-controls обрабатываются через change, не через click.
      // Иначе select перерисовывал экран при открытии и выбор мог теряться при отпускании мышки.
      if (['toggle-hide','status-filter','vocab-level','vocab-topic','audio-enabled','audio-mode','audio-lang'].includes(a)) return;
      if (a === 'mark') markLesson(action.dataset.id, action.dataset.status);
      if (a === 'answer-drill') answerDrill(action);
      if (a === 'show-learned') { state.hideLearned = false; saveState(); render(); }
      if (a === 'vocab-search') {}
      if (a === 'clear-vocab') { state.vocabLevel='Alle'; state.vocabTopic='Alle'; state.vocabSearch=''; saveState(); render(); }
      if (a === 'word-known') { state.wordStatus[action.dataset.id] = state.wordStatus[action.dataset.id] === 'known' ? '' : 'known'; saveState(); render(); }
      if (a === 'toggle-profile') { const p=action.dataset.profile; state.profile[p]=!state.profile[p]; saveState(); render(); }
      if (a === 'submit-diagnostic') submitDiagnostic();
      if (a === 'reset-diagnostic') { state.diagnosticResult = null; state.diagnosticAnswers = {}; saveState(); render(); }
      if (a === 'set-level') { state.currentLevel = action.dataset.level; saveState(); render(); }
      if (a === 'print') window.print();
      if (a === 'export-progress') exportProgress();
      if (a === 'reset-progress') resetProgress();
    });

    document.addEventListener('change', ev => {
      const action = ev.target.closest('[data-action]');
      if (!action) return;
      const a = action.dataset.action;
      if (a === 'toggle-hide') { state.hideLearned = action.checked; saveState(); render(); }
      if (a === 'status-filter') { state.statusFilter = action.value; saveState(); render(); }
      if (a === 'vocab-level') { state.vocabLevel = action.value; saveState(); render(); }
      if (a === 'vocab-topic') { state.vocabTopic = action.value; saveState(); render(); }
      if (a === 'audio-enabled') { state.audio.enabled = action.checked; saveState(); }
      if (a === 'audio-mode') { state.audio.mode = action.value; saveState(); render(); }
      if (a === 'audio-lang') { state.audio.lang = action.value; saveState(); render(); }
    });

    document.addEventListener('input', ev => {
      const el = ev.target;
      if (el.matches('[data-action="vocab-search"]')) {
        state.vocabSearch = el.value;
        saveState();
        clearTimeout(window.__vocabTimer);
        window.__vocabTimer = setTimeout(render, 180);
      }
      if (el.matches('[data-action="audio-rate"]')) {
        state.audio.rate = Number(el.value) || .95;
        saveState();
      }
    });

    $('#levelSelect').addEventListener('change', ev => {
      state.currentLevel = ev.target.value;
      saveState();
      if (['path','trainer'].includes(route().split('/')[0])) navigate(route().split('/')[0] === 'path' ? `path/${state.currentLevel}` : 'trainer');
      else toast(`Текущий уровень: ${state.currentLevel}`);
    });

    $('#globalSearch').addEventListener('keydown', ev => {
      if (ev.key === 'Enter') {
        state.vocabSearch = ev.target.value;
        state.vocabLevel = 'Alle';
        state.vocabTopic = 'Alle';
        saveState();
        navigate('vocab');
      }
    });

    $('#menuBtn').addEventListener('click', () => {
      $('#drawer').classList.add('open');
      $('#drawerBackdrop').classList.add('open');
    });
    $('#drawerBackdrop').addEventListener('click', closeDrawer);
    window.addEventListener('hashchange', render);


    if ('speechSynthesis' in window) {
      try { window.speechSynthesis.onvoiceschanged = () => { state.audio.lastEngine = bestGermanVoice() ? `device ready: ${bestGermanVoice().name}` : state.audio.lastEngine; saveState(); }; } catch(e) {}
    }

    updateNav();
    updateLevelSelect();
    render();
  })();
  </script>
</body>
</html>
